<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>REPRISE. — Ton académie de rachat d'entreprise</title>

<!-- Installation sur écran d'accueil (Android/Chrome) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#11162A">

<!-- Installation sur écran d'accueil (iOS/Safari) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REPRISE.">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
  :root{
    --ink: #11162A;
    --ink-2: #1A2140;
    --ink-3: #232C54;
    --ink-border: #333E6E;
    --paper: #EFE8D6;
    --paper-2: #E5DAC0;
    --paper-border: #CBB98E;
    --gold: #C99A3E;
    --gold-2: #E2BE6E;
    --wine: #96434D;
    --wine-2: #B96269;
    --forest: #3D7A5C;
    --forest-2: #5AA07C;
    --text-light: #F2EDDF;
    --text-muted: #9BA3C4;
    --text-dark: #241F33;
    --text-dark-muted: #7A6F53;
    --radius: 16px;
    --radius-sm: 9px;
    --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "Roboto Mono", "Courier New", monospace;
  }
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
  html, body { height:100%; }
  body{
    font-family: var(--font-body);
    background: var(--ink);
    background-image:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(201,154,62,0.10), transparent),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(61,122,92,0.09), transparent);
    color: var(--text-light);
    min-height: 100vh;
    line-height: 1.55;
  }
  button, input, textarea { font-family: inherit; color: inherit; }
  button { cursor: pointer; }
  ::selection{ background: var(--gold); color: var(--ink); }
  a { color: var(--gold-2); }

  /* ---------- Shell layout ---------- */
  .shell{ display:flex; min-height:100vh; }
  .sidebar{
    width: 250px; flex-shrink:0;
    background: linear-gradient(180deg, var(--ink-2), var(--ink));
    border-right: 1px solid var(--ink-border);
    display:flex; flex-direction:column;
    padding: 28px 20px;
    position: sticky; top:0; height:100vh;
  }
  .brand{ display:flex; align-items:baseline; gap:8px; margin-bottom: 6px; }
  .brand-mark{
    font-family: var(--font-display); font-size: 26px; letter-spacing: 0.5px;
    color: var(--text-light);
  }
  .brand-dot{ color: var(--gold); }
  .brand-tagline{ font-size: 12px; color: var(--text-muted); margin-bottom: 34px; }
  .nav-item{
    display:flex; align-items:center; gap:12px;
    padding: 11px 14px; border-radius: var(--radius-sm);
    color: var(--text-muted); background: transparent; border: none; text-align:left;
    font-size: 14.5px; font-weight: 500; width:100%;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .nav-item svg{ flex-shrink:0; opacity: 0.85; }
  .nav-item:hover{ background: rgba(255,255,255,0.04); color: var(--text-light); }
  .nav-item.active{ background: var(--ink-3); color: var(--gold-2); }
  .nav-item.active svg{ opacity:1; }
  .sidebar-footer{ margin-top:auto; padding-top: 20px; border-top: 1px solid var(--ink-border); }
  .mini-level{ font-size: 12.5px; color: var(--text-muted); margin-bottom: 8px; }
  .mini-level b{ color: var(--gold-2); font-family: var(--font-display); }
  .mini-xp-bar{ height:6px; border-radius:4px; background: var(--ink-3); overflow:hidden; margin-bottom: 12px;}
  .mini-xp-fill{ height:100%; background: linear-gradient(90deg, var(--gold), var(--gold-2)); border-radius:4px; transition: width 0.5s ease; }
  .reset-link{ font-size: 11.5px; color: var(--text-muted); background:none; border:none; text-decoration: underline; opacity:0.7; padding:0; }
  .reset-link:hover{ opacity:1; color: var(--wine-2); }

  .main{ flex:1; min-width:0; padding: 40px 44px 100px; max-width: 920px; }
  @media (max-width: 900px){ .main{ padding: 28px 20px 100px; } }

  /* ---------- Mobile bottom nav ---------- */
  .bottom-nav{ display:none; }
  @media (max-width: 767px){
    .sidebar{ display:none; }
    .bottom-nav{
      display:flex; position:fixed; bottom:0; left:0; right:0; z-index: 50;
      background: var(--ink-2); border-top: 1px solid var(--ink-border);
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
    }
    .bottom-nav button{
      flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
      background:none; border:none; color: var(--text-muted); font-size: 11px; padding: 6px 2px;
      border-radius: var(--radius-sm);
    }
    .bottom-nav button.active{ color: var(--gold-2); }
    .main{ padding-bottom: 90px; }
  }

  /* ---------- Typography ---------- */
  h1,h2,h3{ font-family: var(--font-display); font-weight:400; letter-spacing:0.2px; }
  h1{ font-size: 30px; margin-bottom: 6px; }
  h2{ font-size: 22px; }
  .eyebrow{ font-size: 11.5px; text-transform: uppercase; letter-spacing: 1.6px; color: var(--gold-2); font-weight:600; margin-bottom:10px; }
  .subtitle{ color: var(--text-muted); font-size: 15px; margin-bottom: 28px; }

  /* ---------- Buttons ---------- */
  .btn-primary{
    background: linear-gradient(180deg, var(--gold-2), var(--gold));
    color: #21170a; border:none; font-weight:700; font-size:14.5px;
    padding: 12px 22px; border-radius: 999px; box-shadow: 0 4px 14px rgba(201,154,62,0.28);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 6px 18px rgba(201,154,62,0.38); }
  .btn-primary:active{ transform: translateY(0); }
  .btn-ghost{
    background: transparent; border: 1px solid var(--ink-border); color: var(--text-light);
    font-size: 14px; padding: 11px 20px; border-radius: 999px; font-weight:500;
  }
  .btn-ghost:hover{ border-color: var(--gold-2); color: var(--gold-2); }
  button:focus-visible, .nav-item:focus-visible, input:focus-visible, textarea:focus-visible{
    outline: 2px solid var(--gold-2); outline-offset: 2px;
  }
  button:disabled{ opacity:0.55; cursor: default; }

  /* ---------- Dashboard ---------- */
  .stat-row{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom: 30px; }
  .stat-card{
    background: var(--ink-2); border: 1px solid var(--ink-border); border-radius: var(--radius);
    padding: 18px 20px; flex:1; min-width:140px;
  }
  .stat-num{ font-family: var(--font-mono); font-size: 26px; color: var(--gold-2); font-variant-numeric: tabular-nums; }
  .stat-label{ font-size: 12px; color: var(--text-muted); margin-top:2px; }
  .continue-card{
    background: linear-gradient(135deg, var(--ink-3), var(--ink-2));
    border: 1px solid var(--ink-border); border-radius: var(--radius);
    padding: 26px 28px; margin-bottom: 34px; position:relative; overflow:hidden;
  }
  .continue-card::before{
    content:""; position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%;
    background: radial-gradient(circle, rgba(201,154,62,0.18), transparent 70%);
  }
  .continue-eyebrow{ font-size:11.5px; text-transform:uppercase; letter-spacing:1.4px; color: var(--text-muted); margin-bottom:8px; }
  .continue-title{ font-family: var(--font-display); font-size:21px; margin-bottom:14px; }
  .section-title{ font-family: var(--font-display); font-size:17px; color: var(--text-light); margin: 34px 0 16px; display:flex; align-items:center; gap:10px; }

  /* ---------- Roadmap (journey) ---------- */
  .journey{ position:relative; padding-left: 30px; }
  .journey::before{
    content:""; position:absolute; left:13px; top:10px; bottom:10px; width:2px;
    background: linear-gradient(180deg, var(--gold) 0%, var(--ink-border) 100%);
  }
  .phase-block{ margin-bottom: 8px; }
  .phase-label{
    font-size: 12px; text-transform: uppercase; letter-spacing:1.3px; color: var(--text-muted);
    margin: 26px 0 14px -30px; padding-left: 0; font-weight:600;
  }
  .phase-label:first-child{ margin-top:0; }
  .module-node{ position:relative; margin-bottom: 14px; }
  .module-dot{
    position:absolute; left:-30px; top: 18px; width:26px; height:26px; border-radius:50%;
    background: var(--ink-3); border: 2px solid var(--ink-border);
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
    color: var(--text-muted); z-index:2;
  }
  .module-node.done .module-dot{ background: var(--forest); border-color: var(--forest-2); color:#eafff2; }
  .module-node.current .module-dot{ background: var(--gold); border-color: var(--gold-2); color:#21170a; box-shadow: 0 0 0 4px rgba(201,154,62,0.18); }
  .module-card{
    background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius);
    padding: 16px 18px; display:flex; justify-content:space-between; align-items:center; gap: 14px;
    transition: border-color 0.15s ease;
  }
  .module-node.clickable .module-card{ cursor:pointer; }
  .module-node.clickable .module-card:hover{ border-color: var(--gold); }
  .module-card-title{ font-family: var(--font-display); font-size:16.5px; margin-bottom:4px; }
  .module-card-desc{ font-size: 13px; color: var(--text-muted); }
  .module-card-meta{ font-size: 11.5px; color: var(--text-muted); white-space:nowrap; text-align:right; flex-shrink:0; }
  .module-node.locked .module-card{ opacity: 0.55; }
  .module-node.locked .module-card-meta{ color: var(--text-muted); }
  .badge-built{ background: var(--forest); color:#eafff2; font-size:10.5px; padding:2px 9px; border-radius:999px; font-weight:700; letter-spacing:0.4px; }
  .badge-soon{ background: var(--ink-3); border:1px solid var(--ink-border); color: var(--text-muted); font-size:10.5px; padding:2px 9px; border-radius:999px; }

  /* ---------- Lesson view ---------- */
  .lesson-header{ margin-bottom: 26px; }
  .back-link{ background:none; border:none; color: var(--text-muted); font-size:13px; margin-bottom:14px; padding:0; }
  .back-link:hover{ color: var(--gold-2); }
  .progress-bar{ height:5px; background: var(--ink-3); border-radius:4px; overflow:hidden; margin: 12px 0 6px; }
  .progress-fill{ height:100%; background: linear-gradient(90deg, var(--gold), var(--forest-2)); transition: width 0.4s ease; }
  .step-counter{ font-size:12px; color: var(--text-muted); font-family: var(--font-mono); }

  .step-card{ animation: rise 0.25s ease; }
  @keyframes rise{ from{ opacity:0; transform: translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .step-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:1.3px; color: var(--gold-2); font-weight:700; margin-bottom: 12px; }
  .step-question{ font-size: 17px; margin-bottom: 18px; }

  .concept-card{
    background: var(--paper); color: var(--text-dark); border-radius: var(--radius);
    padding: 26px 28px; box-shadow: 0 10px 34px rgba(0,0,0,0.28);
  }
  .concept-card .step-label{ color: var(--wine); }
  .concept-card p{ margin-bottom: 14px; font-size:15.5px; }
  .concept-card p:last-child{ margin-bottom:0; }
  .concept-card ol, .concept-card ul{ padding-left: 20px; margin: 10px 0 14px; }
  .concept-card li{ margin-bottom:8px; font-size:15px; }
  .concept-card strong{ color: var(--wine); }
  .concept-card .term{ font-family: var(--font-mono); background: var(--paper-2); padding:1px 6px; border-radius:5px; font-size:0.92em; }

  .predict-card, .exercise-card, .checkpoint-card, .validation-card{
    background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius); padding: 24px 26px;
  }
  .mcq-options{ display:flex; flex-direction:column; gap:9px; }
  .mcq-option{
    background: var(--ink-3); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 12px 16px; text-align:left; font-size:14.5px; color: var(--text-light);
    transition: border-color 0.15s ease;
  }
  .mcq-option:hover:not(:disabled){ border-color: var(--gold-2); }
  .mcq-option.correct{ border-color: var(--forest-2); background: rgba(61,122,92,0.22); }
  .mcq-option.incorrect{ border-color: var(--wine-2); background: rgba(150,67,77,0.2); }
  .mcq-explanation{ margin-top:16px; padding:14px 16px; background: var(--ink); border-radius: var(--radius-sm); font-size:14px; border-left:3px solid var(--gold); }
  .mcq-explanation.hidden{ display:none; }

  .numeric-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .numeric-row input{
    background: var(--ink); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 11px 14px; font-family: var(--font-mono); font-size:15px; color: var(--text-light); width:170px;
  }
  .numeric-feedback{ margin-top:14px; padding:13px 16px; border-radius: var(--radius-sm); font-size:14px; }
  .numeric-feedback.hidden{ display:none; }
  .numeric-feedback.success{ background: rgba(61,122,92,0.22); border-left:3px solid var(--forest-2); }
  .numeric-feedback.retry{ background: rgba(150,67,77,0.16); border-left:3px solid var(--wine-2); }

  .pitfall-card{ background: rgba(150,67,77,0.14); border:1px solid var(--wine-2); border-radius: var(--radius); padding:22px 26px; }
  .pitfall-card .step-label{ color: var(--wine-2); }
  .pitfall-card ul{ padding-left:20px; }
  .pitfall-card li{ margin-bottom:10px; font-size:14.5px; }

  .expert-card{ background: rgba(201,154,62,0.10); border:1px solid var(--gold); border-radius: var(--radius); padding:22px 26px; }
  .expert-card p{ font-size:15px; margin-bottom:10px; }
  .expert-card p:last-child{ margin-bottom:0; }

  .checkpoint-card{ text-align:center; }
  .checkpoint-actions{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:6px; }

  .validation-card textarea{
    width:100%; min-height:100px; background: var(--ink); border:1px solid var(--ink-border);
    border-radius: var(--radius-sm); padding:13px 15px; font-size:14.5px; color: var(--text-light);
    resize: vertical; margin-bottom: 14px;
  }
  .summary-card{ background: var(--ink-2); border:1px solid var(--gold); border-radius: var(--radius); padding: 26px 28px; }
  .summary-card p{ font-size:15.5px; margin-bottom:14px; }
  .next-hint{ color: var(--text-muted); font-size:14px; font-style:italic; }

  .lesson-footer{ display:flex; justify-content:space-between; margin-top:24px; }

  /* ---------- Onboarding ---------- */
  .onboard-wrap{ max-width: 620px; }
  .onboard-q{ background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius); padding:22px 24px; margin-bottom:18px; }
  .onboard-q p{ font-size:15px; margin-bottom:14px; }

  /* ---------- Chat ---------- */
  .chat-wrap{ display:flex; flex-direction:column; height: calc(100vh - 80px); max-height: 780px; }
  .chat-messages{ flex:1; overflow-y:auto; padding: 6px 2px 16px; display:flex; flex-direction:column; gap:14px; }
  .msg{ max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size:14.5px; line-height:1.5; }
  .msg-user{ align-self:flex-end; background: linear-gradient(180deg, var(--gold-2), var(--gold)); color:#21170a; border-bottom-right-radius:4px; }
  .msg-assistant{ align-self:flex-start; background: var(--paper); color: var(--text-dark); border-bottom-left-radius:4px; box-shadow: 0 4px 16px rgba(0,0,0,0.22); }
  .msg-assistant.typing{ color: var(--text-dark-muted); font-style: italic; }
  .chat-empty{ color: var(--text-muted); text-align:center; margin-top: 50px; font-size:14.5px; }
  .chat-input-row{ display:flex; gap:10px; border-top:1px solid var(--ink-border); padding-top:14px; }
  .chat-input-row textarea{
    flex:1; background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 12px 14px; color: var(--text-light); font-size:14.5px; resize:none; min-height:46px; max-height:140px;
  }
  .chat-hint{ font-size:12px; color: var(--text-muted); margin-bottom:10px; }

  .hidden{ display:none !important; }
  .icon{ display:inline-flex; vertical-align:middle; }
  .storage-warning{
    background: rgba(150,67,77,0.16); border:1px solid var(--wine-2); border-radius: var(--radius);
    padding:16px 20px; margin-bottom:26px; font-size:13.5px; line-height:1.6; color: var(--text-light);
  }
  .storage-warning strong{ color: var(--wine-2); }
</style>
</head>

  <nav class="sidebar">
    <div class="brand"><span class="brand-mark">REPRISE<span class="brand-dot">.</span></span></div>
    <div class="brand-tagline">Ton académie de rachat d'entreprise</div>
    <button class="nav-item" id="nav-dashboard" onclick="goTo('dashboard')">

    </button>

    </button>

  <main class="main" id="app"></main>

  </button>
  <button id="bnav-agent" onclick="goTo('agent')">

<script>
/* =========================================================
   DONNEES DU PROGRAMME
   ========================================================= */
const PHASES = [
  { id:1, name:"Comprendre & Cibler", moduleIds:[1,2,3] },
  { id:2, name:"Valoriser & Sécuriser", moduleIds:[4,5,6] },
  { id:3, name:"Financer & Structurer", moduleIds:[7,8] },
  { id:4, name:"Reprendre & Piloter", moduleIds:[9,10] },
  { id:5, name:"Développer & Sortir", moduleIds:[11,12,13,14] }
];

const MODULES = [

  cf1: {

    steps:[
      { type:"concept", label:"Le principe qui change tout",
        body:`<p>Voici l'idée centrale de tout ce module, et probablement la plus rentable de tout ce programme : <strong>il ne s'agit pas de créer de la croissance, mais de révéler du cash déjà présent dans l'entreprise.</strong></p>

      { type:"concept", label:"Phase 1 — Stabilisation (0 à 60 jours)",
        body:`<p><strong>Objectif : sécuriser l'existant et préserver le cash.</strong> Rien d'autre ne compte encore.</p>
        <p><strong>Actions concrètes :</strong></p>
        <ul>
          <li><strong>Sécurisation des clients clés</strong> — identifie-les avant même le closing (tu les connais déjà grâce à ta due diligence commerciale du Module 5), et prépare une communication de transition rassurante, pas une surprise.</li>
          <li><strong>Fidélisation des équipes essentielles</strong> — repère qui détient une relation client critique ou un savoir-faire clé. Ce sont eux qu'il faut rassurer en priorité, individuellement.</li>

        <p><strong>Indicateurs à suivre dès le jour 1 :</strong> niveau de trésorerie, taux de churn client, concentration client (quelle part du CA dépend de tes 3 plus gros clients).</p>` },
      { type:"expert", label:"Œil d'expert : l'angle mort juridique",
        body:`<p>Un point que la plupart des repreneurs débutants découvrent trop tard, parfois à leurs dépens : en France, l'<strong>article L1224-1 du Code du travail</strong> impose le <strong>transfert automatique de tous les contrats de travail</strong> lors d'une cession — ancienneté, avantages acquis, tout est repris tel quel, tu n'as pas le choix de « faire le tri ».</p>
        <p>Ce n'est pas une option de gestion RH, c'est une obligation légale à connaître AVANT le closing, pas à découvrir en Phase 1. Ça doit être vérifié pendant la due diligence sociale (Module 5), pour que tu arrives en Phase 1 sans surprise sur la masse salariale ou les engagements sociaux repris.</p>` },
      { type:"pitfall", label:"⚠ Le piège qui coûte le plus cher",
        items:[

  cf2: {
    id:"cf2", moduleId:10, title:"Phase 2 : Extraction de cash", duration:"15 min",
    steps:[
      { type:"concept", label:"Le levier le plus puissant de tout le système",
        body:`<p><strong>Objectif de la Phase 2 (1 à 3 mois) : augmenter le cash-flow SANS croissance.</strong> Tu n'as pas encore besoin d'un seul client de plus.</p>
        <p>Le levier principal, et de loin le plus puissant : <strong>le pricing.</strong> Voici pourquoi il domine tous les autres leviers : une augmentation de prix va (presque) intégralement dans ta marge, alors qu'un euro de chiffre d'affaires supplémentaire par la croissance traîne avec lui des coûts additionnels (acquisition, production, service). Prix et volume ne se valent pas du tout, euro pour euro.</p>` },
      { type:"numeric", label:"Exercice — l'effet de levier du pricing",
        question:"Une entreprise fait 800 000 € de CA avec 20% de marge nette (160 000 €). Tu augmentes tous les prix de 8%, sans perdre un seul client et sans coût supplémentaire. Quelle est la nouvelle marge nette en euros (arrondis) ?",
        placeholder:"Ex : 200000", answer:224000, tolerance:2000,
        successMsg:"224 000 € (160 000 € + 8% × 800 000 €). Ta marge nette augmente de 40% alors que le CA n'a bougé que de 8%. C'est ça, l'effet de levier du pricing : un petit mouvement sur le prix a un effet démultiplié sur ce qui te reste réellement en poche.",
        hint:"Indice : les 8% d'augmentation de prix (64 000 €) s'ajoutent presque intégralement à la marge existante, puisque les coûts ne changent pas." },
      { type:"concept", label:"Comment augmenter les prix sans perdre ses clients",
        body:`<p><strong>Le levier pricing en pratique :</strong></p>
        <ul>
          <li><strong>Augmentation des prix de 5 à 15%</strong> — la fourchette qui fonctionne dans la majorité des PME sans provoquer de départs massifs.</li>
          <li><strong>Segmentation clients</strong> — n'augmente pas tout le monde pareil. Un client fidèle depuis 10 ans avec un fort coût de changement de fournisseur tolère plus qu'un client récent et opportuniste.</li>
          <li><strong>Réduction des remises injustifiées</strong> — dans la plupart des PME rachetées, des remises historiques traînent sans plus aucune justification commerciale.</li>
          <li><strong>Correction des oublis de facturation</strong> — des prestations réalisées mais jamais refacturées, plus fréquent qu'on ne le pense dans les structures peu digitalisées.</li>
        </ul>
        <p>En parallèle, <strong>optimise le besoin en fonds de roulement (BFR)</strong> : réduis les délais de paiement clients, allonge (raisonnablement) les délais fournisseurs, optimise les niveaux de stock. Ce sont des leviers de trésorerie immédiate, sans toucher au compte de résultat.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Augmenter les prix de façon uniforme et brutale, sans tester ni segmenter — c'est le meilleur moyen de perdre exactement les clients qu'il ne fallait pas perdre.",
          "Annoncer une hausse sans justification ni accompagnement : une hausse expliquée (qualité, coûts, valeur ajoutée) passe presque toujours mieux qu'une hausse silencieuse qu'on découvre sur une facture."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté ne fait jamais une hausse de prix « à l'aveugle ». Il segmente d'abord sa base clients en trois groupes : les clients captifs (fort coût de changement, faible sensibilité prix), les clients loyaux mais sensibles, et les clients opportunistes (déjà en train de comparer). Il augmente fortement le premier groupe, modérément le deuxième, et retravaille l'offre plutôt que le prix pour le troisième.</p>
        <p>Un débutant augmente tout le monde pareil et découvre la segmentation... après avoir perdu les clients qu'il n'aurait jamais dû toucher en premier.</p>` },
      { type:"checkpoint", question:"L'idée que le pricing soit le levier n°1 (avant même la croissance) te semble-t-elle claire ?",
        helpPrompt:"Je viens de voir que le pricing est présenté comme le levier n°1 pour extraire du cash, avant même de chercher de nouveaux clients. Peux-tu m'aider à réfléchir à comment je testerais une hausse de prix sur une cible réelle, étape par étape ?" },
      { type:"summary",
        summary:"Le pricing est le levier le plus puissant du système : un euro de prix va presque intégralement dans ta marge, contrairement à un euro de croissance qui traîne des coûts avec lui. Segmenter avant d'augmenter fait toute la différence entre une hausse réussie et une hausse qui fait fuir les clients.",
        nextHint:"La Phase 3 : comment faire croître le cash, pas seulement le chiffre d'affaires, sur 3 à 12 mois." }
    ]
  },

  cf3: {
    id:"cf3", moduleId:10, title:"Phase 3 : Croissance intelligente", duration:"14 min",
    steps:[
      { type:"concept", label:"Croissance intelligente ≠ chiffre d'affaires",
        body:`<p><strong>Objectif de la Phase 3 (3 à 12 mois) : augmenter le CASH, pas uniquement le chiffre d'affaires.</strong> C'est une distinction essentielle : un CA en hausse avec des délais de paiement clients qui s'allongent, des remises qui repartent, ou des coûts d'acquisition mal maîtrisés peut très bien générer... moins de cash qu'avant.</p>`  },
      { type:"predict", label:"À toi de jouer",
        question:"Pourquoi une entreprise peut-elle voir son chiffre d'affaires augmenter de 20% tout en ayant MOINS de cash en banque qu'avant ?",
        options:["C'est impossible si le CA augmente","Parce que les nouveaux clients paient plus tard, ou que les coûts d'acquisition et de livraison ont augmenté plus vite que le CA","Parce que la comptabilité est forcément fausse"],
        correctIndex:1,
        explanation:"Exactement. Le CA est une opinion comptable ; le cash est un fait bancaire. C'est pour ça que la Phase 3 doit toujours être pilotée avec les indicateurs de cash de la Phase 4, jamais avec le seul chiffre d'affaires comme boussole." },
      { type:"concept", label:"Les 5 chantiers de la croissance intelligente",
        body:`<ul>
          <li><strong>Activation de la base clients existante</strong> — un CRM (HubSpot, Pipedrive) pour segmenter (clients top, dormants, récents) et lancer upsell, cross-sell, réactivation. C'est souvent le chantier le plus rentable : il coûte moins cher de réactiver un client dormant que d'en acquérir un nouveau.</li>
          <li><strong>Structuration de l'acquisition</strong> — un vrai funnel de vente : acquisition (SEO, ads, outbound), conversion, closing. La plupart des « belles endormies » n'ont littéralement aucun processus ici — c'est ton terrain de jeu le plus vierge.</li>
          <li><strong>Standardisation de l'offre</strong> — réduire le sur-mesure quand c'est possible, pour améliorer les marges et simplifier le discours commercial. Attention cependant : certains clients historiques sont justement fidèles À CAUSE du sur-mesure — à doser, pas à supprimer en bloc.</li>
          <li><strong>Optimisation opérationnelle</strong> — automatisation des tâches répétitives, réallocation des ressources vers ce qui génère réellement du cash. (On y reviendra en profondeur au Module 11 avec les agents IA, taillés pour exactement ce type de chantier.)</li>
          <li><strong>Structuration managériale</strong> — nommer un responsable opérationnel, clarifier les rôles, mettre en place des indicateurs simples que tout le monde comprend.</li>
        </ul>` },
      { type:"pitfall", label:"⚠ Piège classique",
        items:["Standardiser l'offre de façon trop agressive et trop rapide, en oubliant que certains de tes meilleurs clients historiques sont fidèles précisément parce qu'ils ont un traitement sur-mesure. Segmente : standardise ce qui peut l'être, préserve ce qui ne le doit pas."]},
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté pilote la Phase 3 avec un seul réflexe permanent : à chaque nouvelle action de croissance, il se demande « est-ce que ça génère du cash à 90 jours, ou est-ce que ça génère seulement du chiffre d'affaires qui deviendra du cash... un jour, peut-être » ? Une facture émise n'est pas du cash. Un client signé n'est pas du cash. Le cash, c'est ce qui est réellement encaissé.</p>` },
      { type:"checkpoint", question:"La distinction cash vs chiffre d'affaires est-elle claire à ce stade ?",
        helpPrompt:"Je viens de voir la différence entre 'faire du chiffre d'affaires' et 'générer du cash' en Phase 3. Peux-tu me donner un exemple chiffré concret où le CA monte mais le cash baisse, pour bien fixer l'idée ?" },
      { type:"summary",
        summary:"La croissance intelligente se juge en cash généré, pas en chiffre d'affaires signé. Activation client, funnel structuré, standardisation dosée, automatisation et structuration managériale sont les 5 chantiers — chacun jugé à l'aune du cash qu'il produit réellement, pas de sa promesse.",
        nextHint:"Les Phases 4 et 5 : comment piloter durablement par le cash, et rendre tout le système reproductible pour ta prochaine acquisition." }
    ]
  },

  cf4: {

    steps:[
      { type:"concept", label:"Phase 4 — Piloter par le cash, pas par le CA",
        body:`<p>À partir de ce stade, ton tableau de bord change de nature : on <strong>transitionne vers un pilotage entièrement orienté cash-flow</strong>, plutôt que vers les indicateurs comptables classiques.</p>
        <p><strong>4 indicateurs à suivre en continu :</strong></p>

          <li><strong>Coût d'acquisition</strong> — combien te coûte réellement un nouveau client, tous canaux confondus.</li>
          <li><strong>Valeur client (LTV)</strong> — combien un client rapporte sur toute sa durée de vie, pas seulement sur sa première commande.</li>

        <p><strong>Finalité de cette phase :</strong> la délégation devient possible (quelqu'un d'autre peut exécuter sans toi), la scalabilité devient réelle (le système tient la charge si l'activité double), et la multiplication des acquisitions devient réaliste (tu peux réappliquer ce même système à une 2e entreprise sans repartir de zéro).</p>

  f1: {
    id:"f1", moduleId:7, title:"Le crédit-vendeur, en profondeur", duration:"14 min",
    steps:[
      { type:"concept", label:"Le pilier le plus sous-estimé de ton montage",
        body:`<p>Tu connais déjà le principe (Module 1) : le vendeur accepte d'être payé sur une partie du prix, dans le temps, plutôt que 100 % cash au closing. Ce module va beaucoup plus loin : comment le dimensionner, le sécuriser, et t'en servir comme véritable pierre angulaire d'un montage à faible apport.</p>
        <p><strong>Ordres de grandeur observés en pratique sur des PME comme ta cible</strong> : 10 à 30 % du prix, remboursé sur 2 à 5 ans, à un taux souvent inférieur au marché bancaire (parfois 0 à 3 %). Rien n'est figé par la loi — tout se négocie, et c'est justement l'objet de ce module.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Pourquoi un vendeur accepterait-il d'être payé sur 3 ans plutôt que cash immédiat, alors qu'il pourrait dire non ?",
        options:["Il n'a pas le choix, c'est une obligation légale","Cela peut lui permettre d'obtenir un prix facial plus élevé, d'étaler sa fiscalité selon son régime, et c'est un signal qu'il croit en la pérennité de sa boîte","Les banques l'exigent systématiquement du vendeur"],
        correctIndex:1,
        explanation:"Exactement — et c'est ton principal levier de négociation. Un vendeur qui exige 100 % cash renonce à ces trois avantages. En pratique, beaucoup de cédants qui n'ont pas un besoin immédiat de liquidités (retraite déjà financée, pas de nouveau projet à financer) sont plus ouverts que tu ne le penses." },
      { type:"concept", label:"Comment le sécuriser juridiquement",
        body:`<p>Un crédit-vendeur se formalise par une <span class="term">convention de crédit-vendeur</span>, annexée à l'acte de cession, précisant montant, durée, taux, échéancier, et garanties.</p>
        <p><strong>Point essentiel à négocier : la subordination.</strong> En pratique, ta banque (si tu as un prêt LBO en parallèle) va presque toujours exiger que le crédit-vendeur soit <em>subordonné</em> — c'est-à-dire remboursé après la dette bancaire en cas de difficulté. C'est normal et attendu, mais assure-toi que l'échéancier du crédit-vendeur reste réaliste une fois cette priorité posée : ne promets pas un remboursement que ton cash-flow, après avoir servi la banque, ne pourra pas tenir.</p>
        <p><strong>Ta meilleure protection : la compensation avec la GAP.</strong> Si un vice caché apparaît après la vente et déclenche la garantie d'actif et de passif (Module 6), tu peux généralement compenser ce que le vendeur te doit avec ce que tu lui dois encore sur le crédit-vendeur — au lieu d'avoir à le poursuivre en justice pour récupérer de l'argent qu'il a peut-être déjà dépensé. C'est une des raisons pour lesquelles un crédit-vendeur généreux te protège, il ne fait pas que financer.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Négocier un crédit-vendeur élevé en durée sans vérifier que le cash-flow post-Phase-1 (Module 10) peut réellement le tenir EN PLUS de la dette bancaire — un montage qui a l'air malin sur le papier peut t'étrangler à l'usage.",
          "Utiliser un crédit-vendeur trop long pour compenser un prix trop élevé plutôt que pour financer une entreprise saine : le crédit-vendeur finance une acquisition, il ne répare pas une valorisation excessive."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté présente TOUJOURS le crédit-vendeur comme un partenariat, jamais comme une faveur qu'on demande. La formule qui fonctionne : « Je vous propose un prix de X, dont Y % réglés immédiatement et Z % étalés sur N ans — cette structure me permet de sécuriser le financement bancaire du solde, et vous garantit un complément de revenu régulier. » C'est un échange de valeur, présenté comme tel.</p>` },
      { type:"checkpoint", question:"La logique du crédit-vendeur comme pierre angulaire (pas juste un complément) est-elle claire ?",
        helpPrompt:"Je viens de voir le crédit-vendeur en profondeur (subordination, compensation avec la GAP). Peux-tu m'aider à réfléchir à comment je le dimensionnerais sur une cible à 220K€ d'EBITDA et un multiple de 2,5x ?" },
      { type:"summary",
        summary:"Le crédit-vendeur n'est pas qu'un outil de financement : bien négocié (subordination claire, compensable avec la GAP), c'est aussi ta meilleure protection contre les vices cachés et ton principal levier pour réduire l'apport personnel exigé par la banque.",
        nextHint:"La dette bancaire et les dispositifs publics (Bpifrance) qui réduisent encore l'apport demandé." }
    ]
  },

  f2: {
    id:"f2", moduleId:7, title:"La dette bancaire & les dispositifs Bpifrance", duration:"16 min",
    steps:[
      { type:"concept", label:"Pourquoi le marché impose souvent 30 % d'apport",
        body:`<p>Une banque qui finance un rachat de PME prend un risque réel : et si le repreneur échoue à faire tourner l'affaire ? L'apport personnel sert de coussin d'absorption des premiers aléas, et c'est aussi un signal d'engagement. C'est pour ça que 20 à 30 % d'apport reste une demande fréquente — ce n'est pas arbitraire, c'est de la gestion du risque bancaire.</p>
        <p>La bonne nouvelle : il existe des leviers concrets, publics, pour réduire ce chiffre — sans que ça relève seulement d'un « discours rassurant ».</p>` },
      { type:"concept", label:"La Garantie Transmission Bpifrance",
        body:`<p>Bpifrance peut garantir une partie du prêt bancaire — <strong>jusqu'à 60 % du montant financé</strong> selon le dossier (chiffre confirmé sur le site officiel Bpifrance Création, dans le cadre du "Plan Objectif reprises" annoncé par Bercy en avril 2026 pour fluidifier les transmissions de TPE/PME ; certaines sources antérieures citent plutôt 40-50 %, le plafond semble avoir été relevé récemment — à reconfirmer avec ta banque au moment du dossier, ces dispositifs évoluent).</p>
        <p><strong>Ce que ça change concrètement pour toi</strong> : en partageant le risque avec la banque, cette garantie peut réduire l'apport en cash exigé, et parfois alléger la caution personnelle demandée — la banque est plus encline à financer un dossier déjà partiellement garanti par un tiers public.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"La Garantie Transmission Bpifrance remplace-t-elle ton dossier bancaire, ou vient-elle en plus ?",
        options:["Elle remplace entièrement le besoin de convaincre une banque","Elle vient en soutien d'un dossier bancaire classique : elle rassure la banque, elle ne se substitue pas à elle","Elle n'est accessible qu'aux entreprises de plus de 50 salariés"],
        correctIndex:1,
        explanation:"Exactement. Tu négocies toujours avec une banque ; la garantie Bpifrance est un argument que TU apportes dans cette négociation pour obtenir de meilleures conditions, pas un guichet de financement direct qui remplace la banque." },
      { type:"concept", label:"Deux autres outils Bpifrance à connaître",
        body:`<p><strong>Le Prêt Croissance Transmission</strong> : jusqu'à 5 M€, <strong>sans garantie ni caution personnelle demandée sur ce prêt</strong>, pour financer la reprise de PME/ETI — un outil taillé pour exactement ton profil de deal (source : Bpifrance Création).</p>
        <p><strong>Le Prêt d'Honneur Reprise</strong> : à <strong>taux zéro</strong>, jusqu'à <strong>80 000 €</strong>, pour soutenir le porteur de projet personnellement (source : Bpifrance Création). C'est un prêt personnel, généralement sans garantie ni caution, qui peut littéralement couvrir ton plafond de 30 000 € d'apport — à 0 % d'intérêt. On y revient en détail dans la prochaine leçon.</p>` },
      { type:"pitfall", label:"⚠ À garder en tête",
        items:["Une source d'avocat spécialisé le résume bien : « une reprise sans apport total reste rare » — la formule « sans apport » signifie en pratique « avec un apport réduit et complété par des dispositifs de garantie et de dette », pas « zéro risque, zéro engagement personnel ». Un dossier sans apport cash doit être d'autant plus solide sur le reste : rentabilité documentée, cash-flow prévisible, garanties contractuelles propres."] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur aguerri ne présente jamais ces dispositifs À LA BANQUE comme une demande de faveur — il arrive avec le dossier Bpifrance déjà pré-instruit ou en cours, ce qui inverse la dynamique : ce n'est plus « pouvez-vous me faire confiance » mais « voici un dossier où l'État partage déjà le risque avec vous ». La différence de posture change souvent l'issue de la négociation bancaire.</p>` },
      { type:"checkpoint", question:"La différence entre 'la banque finance' et 'Bpifrance garantit/complète' est-elle claire ?",
        helpPrompt:"Je viens de voir la Garantie Transmission et le Prêt Croissance Transmission Bpifrance. Peux-tu m'expliquer concrètement comment monter un dossier Bpifrance en parallèle de mon dossier bancaire ?" },
      { type:"summary",
        summary:"Les dispositifs Bpifrance (Garantie Transmission jusqu'à 60%, Prêt Croissance Transmission jusqu'à 5M€ sans caution) ne remplacent pas la banque : ils renforcent ton dossier et réduisent ce qu'elle exige de toi en cash et en garanties personnelles.",
        nextHint:"La dette investisseur, la trésorerie excédentaire de la cible, et le Prêt d'Honneur à 0% qui peut à lui seul couvrir ton plafond de 30K€." }

  f3: {
    id:"f3", moduleId:7, title:"Dette investisseur, trésorerie excédentaire & prêt d'honneur", duration:"15 min",
    steps:[
      { type:"concept", label:"La dette investisseur (mezzanine)",
        body:`<p>Quand le crédit-vendeur + la dette bancaire ne couvrent pas 100 % du prix, la dette investisseur (parfois appelée mezzanine) comble l'écart : des investisseurs privés (family offices, clubs d'investisseurs, plateformes spécialisées) prêtent, généralement plus cher que la banque (souvent 8 à 15 %, parfois avec un petit % de plus-value en cas de revente — un "BSA" ou bon de souscription d'actions), en échange d'un risque plus élevé et d'une place after la dette senior.</p>
        <p>C'est un outil de dernier recours pour boucler un montage, pas un premier réflexe : plus cher que la dette bancaire, il doit rester une part mineure du financement total.</p>` },
      { type:"concept", label:"La trésorerie excédentaire de la cible",
        body:`<p>Une partie du financement peut venir... de la cible elle-même. Si l'entreprise dispose d'une trésorerie réellement excédentaire (au-delà de son besoin en fonds de roulement), elle peut, après le closing, remonter un dividende vers ta holding pour rembourser une partie de la dette d'acquisition.</p>
        <p><strong>Deux limites strictes à connaître</strong> : (1) juridiquement, ça ne se fait pas le jour même du closing — il faut une assemblée générale et le respect des règles de distribution ; (2) c'est encadré pénalement — utiliser la trésorerie de la cible d'une manière qui nuit à son intérêt social peut caractériser un <strong>abus de biens sociaux</strong>. La trésorerie utilisée doit être RÉELLEMENT excédentaire (vérifiée en due diligence, Module 5), jamais une trésorerie dont l'entreprise a besoin pour tourner.</p>` },
      { type:"numeric", label:"Exercice",
        question:"Une cible a 180 000 € de trésorerie au bilan. Son besoin en fonds de roulement normatif est estimé à 130 000 €. Quelle est la trésorerie réellement excédentaire mobilisable (en €) ?",
        placeholder:"Ex : 50000", answer:50000, tolerance:2000,

const LEVELS = [
  { min:0, title:"Apprenti Repreneur" },
  { min:150, title:"Chasseur de Cibles" },
  { min:400, title:"Lecteur de Bilans" },
  { min:700, title:"Négociateur" },
  { min:1100, title:"Stratège Financier" },
  { min:1600, title:"Repreneur Confirmé" },
  { min:2300, title:"Bâtisseur de Groupe" }
];
function getLevelInfo(xp){
  let idx = 0;
  for(let i=0;i<LEVELS.length;i++){ if(xp >= LEVELS[i].min) idx = i; }
  const cur = LEVELS[idx];
  const next = LEVELS[idx+1] || null;
  const span = next ? (next.min - cur.min) : 1;
  const into = next ? (xp - cur.min) : 1;
  const pct = next ? Math.min(100, Math.round((into/span)*100)) : 100;
  return { title: cur.title, next, pct };
}

async function initApp(){
  if(!sbClient){
    state.view = "config_needed";
    render();
    return;
  }
  try{
    const { data } = await sbClient.auth.getSession();
    if(data && data.session && data.session.user){
      await onSignedIn(data.session.user);
    } else {
      state.view = "login";
      render();
    }
  } catch(e){
    console.error(e);
    state.view = "login";
    render();
  }
  sbClient.auth.onAuthStateChange(async (event, session) => {
    if(event === "SIGNED_IN" && session && session.user){
      await onSignedIn(session.user);
    }
    if(event === "SIGNED_OUT"){
      state.currentUser = null;
      state.progress = JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
      state.chatHistory = [];
      state.view = "login";
      render();
    }
  });

async function onSignedIn(user){
  state.currentUser = user;
  try{
    const { data, error } = await sbClient.from('progress').select('data').eq('user_id', user.id).maybeSingle();
    if(error) throw error;
    if(data && data.data){
      if(data.data.progress) state.progress = Object.assign(JSON.parse(JSON.stringify(DEFAULT_PROGRESS)), data.data.progress);
      if(data.data.chatHistory) state.chatHistory = data.data.chatHistory;
    }
    state.dbStatus = "ok";
  } catch(e){
    console.error("Erreur de lecture Supabase", e);
    state.dbStatus = "error";
  }
  updateStreak();
  state.view = state.progress.onboardingDone ? "dashboard" : "onboarding";
  render();
}

let saveTimeout = null;
function saveToCloud(){
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    if(!state.currentUser || !sbClient) return;
    try{
      const { error } = await sbClient.from('progress').upsert({
        user_id: state.currentUser.id,
        data: { progress: state.progress, chatHistory: state.chatHistory.slice(-30) },
        updated_at: new Date().toISOString()
      }, { onConflict: 'user_id' });
      if(error) throw error;
      state.dbStatus = "ok";
    } catch(e){
      console.error("Erreur de sauvegarde Supabase", e);
      state.dbStatus = "error";
    }
    updateSidebarStats();
  }, 500);
}

function saveProgress(){ saveToCloud(); }

function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  const last = state.progress.lastActiveDate;
  if(last === today) return;
  if(last){
    const diffDays = Math.round((new Date(today) - new Date(last)) / 86400000);
    state.progress.streak = (diffDays === 1) ? (state.progress.streak + 1) : 1;
  } else {
    state.progress.streak = 1;
  }
  state.progress.lastActiveDate = today;
  saveProgress();
}

function awardXP(n){
  state.progress.xp += n;
  saveProgress();
  updateSidebarStats();
}

  if(!confirm("Réinitialiser toute ta progression (XP, leçons terminées, réponses, historique du chat) ? Cette action est irréversible.")) return;
  state.progress = JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
  state.chatHistory = [];
  saveToCloud();
  state.view = "onboarding";
  render();
}

  const pw2 = document.getElementById('newPasswordConfirm').value;
  const fb = document.getElementById('pwFeedback');
  if(pw.length < 8){ fb.textContent = "8 caractères minimum."; return; }
  if(pw !== pw2){ fb.textContent = "Les deux mots de passe ne correspondent pas."; return; }
  fb.textContent = "Enregistrement...";
  try{
    const { error } = await sbClient.auth.updateUser({ password: pw });
    if(error){
      fb.textContent = "Erreur : " + error.message;
    } else {
      fb.textContent = "✓ Mot de passe enregistré. Utilise-le dès maintenant sur tes autres appareils.";
      state.progress.passwordSet = true;
      saveProgress();
      updateSidebarStats();
    }
  } catch(e){
    fb.textContent = "Erreur de connexion à Supabase.";
  }
}

function findNextLesson(){
  for(const m of MODULES){
    if(!m.built) continue;
    for(const lid of m.lessonIds){
      if(!state.progress.completedLessons.includes(lid)) return { lesson: LESSONS[lid], module: m };
    }
  }
  return null;
}
function renderStorageBanner(){
  if(state.dbStatus !== "error") return "";
  return `<div class="storage-warning">
    <strong>Problème de connexion à la base de données.</strong> Ta dernière action n'a peut-être pas été sauvegardée. Vérifie ta connexion internet, et que SUPABASE_URL / SUPABASE_ANON_KEY dans index.html correspondent bien à ton projet Supabase. Recharge la page pour réessayer.
  </div>`;
}

      <div class="stat-card"><div class="stat-num">${state.progress.xp}</div><div class="stat-label">XP total</div></div>

      <div class="stat-card"><div class="stat-num">${state.progress.completedModules.length}</div><div class="stat-label">Modules bouclés</div></div>
    </div>
    ${continueHtml}
    <div class="section-title">Ton parcours en un coup d'œil</div>
    ${renderJourneyMini()}
    <div style="margin-top:26px; display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn-ghost" onclick="goTo('roadmap')">Voir le parcours complet →</button>
      <button class="btn-ghost" id="copyAnswersBtn" onclick="copyAnswersForClaude()">📋 Copier mes réponses pour Claude</button>
    </div>
  `;
}
function collectValidationAnswersText(){
  const lines = [];
  Object.keys(state.progress.validationAnswers || {}).forEach(key => {
    const answer = state.progress.validationAnswers[key];
    if(!answer || !answer.trim()) return;
    const idx = key.lastIndexOf('_');
    const lessonId = key.slice(0, idx);
    const stepIndex = parseInt(key.slice(idx + 1), 10);
    const lesson = LESSONS[lessonId];
    const step = lesson && lesson.steps[stepIndex];
    if(!step) return;
    lines.push("[" + lesson.title + "] " + step.question + "\n→ " + answer.trim());
  });
  if(lines.length === 0) return "Aucune réponse de validation enregistrée pour l'instant.";
  return "Voici mes réponses aux questions de validation dans REPRISE. :\n\n" + lines.join("\n\n");
}
async function copyAnswersForClaude(){
  const text = collectValidationAnswersText();
  const btn = document.getElementById('copyAnswersBtn');
  const restore = (label) => { if(btn){ setTimeout(() => { btn.textContent = "📋 Copier mes réponses pour Claude"; }, 1800); btn.textContent = label; } };
  try{
    await navigator.clipboard.writeText(text);
    restore("✓ Copié !");
  } catch(e){
    try{
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      restore("✓ Copié !");
    } catch(e2){
      alert(text);
    }
  }
}
function renderJourneyMini(){
  return `<div class="journey" style="padding-left:30px;">` + PHASES.map(ph => {
    const doneCount = ph.moduleIds.filter(id => state.progress.completedModules.includes(id)).length;
    return `<div class="module-node ${doneCount===ph.moduleIds.length ? 'done' : (doneCount>0?'current':'')}">
      <div class="module-dot">${doneCount===ph.moduleIds.length ? iconCheck() : ph.id}</div>
      <div class="module-card"><div><div class="module-card-title" style="font-size:15px;">${ph.name}</div>
      <div class="module-card-desc">Modules ${ph.moduleIds.join(', ')}</div></div>
      <div class="module-card-meta">${doneCount}/${ph.moduleIds.length}</div></div></div>`;
  }).join('') + `</div>`;
}
function iconCheck(){ return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg>`; }
function iconLock(){ return `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a5 5 0 00-5 5v3H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2v-9a2 2 0 00-2-2h-2V6a5 5 0 00-5-5zm-3 8V6a3 3 0 016 0v3H9z"/></svg>`; }

/* =========================================================
   ROADMAP (Le Parcours)
   ========================================================= */
function renderRoadmap(){
  let html = `<div class="eyebrow">Le Parcours</div><h1>Ta feuille de route complète.</h1>
  <p class="subtitle">13 modules, répartis en 5 phases — du sourcing jusqu'à la stratégie de sortie. On construit le contenu ensemble, module après module.</p>
  <div class="journey">`;
  PHASES.forEach(ph => {
    html += `<div class="phase-label">Phase ${ph.id} — ${ph.name}</div>`;
    ph.moduleIds.forEach(mid => {
      const m = MODULES.find(x=>x.id===mid);
      const isDone = state.progress.completedModules.includes(mid);
      const lessonsDone = m.lessonIds.filter(l=>state.progress.completedLessons.includes(l)).length;
      const clickable = m.built;
      const cls = isDone ? 'done' : (m.built ? 'current clickable' : 'locked');
      html += `<div class="module-node ${cls}">
        <div class="module-dot">${isDone ? iconCheck() : (m.built ? m.id : iconLock())}</div>
        <div class="module-card" ${clickable ? `onclick="openModule(${m.id})"` : ''}>
          <div><div class="module-card-title">${m.title}</div><div class="module-card-desc">${m.desc}</div></div>
          <div class="module-card-meta">${m.built ? `<span class="badge-built">${lessonsDone}/${m.lessonIds.length} leçons</span>` : `<span class="badge-soon">à construire</span>`}</div>
        </div>
      </div>`;
    });
  });
  html += `</div>`;
  return html;
}
function openModule(moduleId){
  const m = MODULES.find(x=>x.id===moduleId);
  if(!m || !m.built) return;
  const firstUnfinished = m.lessonIds.find(l => !state.progress.completedLessons.includes(l)) || m.lessonIds[0];
  openLesson(firstUnfinished);
}

/* =========================================================
   MOTEUR DE LEÇON
   ========================================================= */
function renderLesson(){
  const app = document.getElementById('app');
  const lesson = LESSONS[state.currentLessonId];
  const stepIndex = state.currentStep;
  const step = lesson.steps[stepIndex];
  const total = lesson.steps.length;
  const pct = Math.round(((stepIndex+1)/total)*100);
  let body = "";
  if(step.type === "intro") body = stepIntro(lesson.id, stepIndex, step);
  else if(step.type === "concept") body = stepConcept(step);
  else if(step.type === "predict") body = stepMCQ(lesson.id, stepIndex, step);
  else if(step.type === "numeric") body = stepNumeric(lesson.id, stepIndex, step);
  else if(step.type === "pitfall") body = stepPitfall(step);
  else if(step.type === "expert") body = stepExpert(step);
  else if(step.type === "checkpoint") body = stepCheckpoint(step);
  else if(step.type === "validation") body = stepValidation(lesson.id, stepIndex, step);
  else if(step.type === "summary") body = stepSummary(lesson.id, step);
  const showFooter = (step.type !== "checkpoint" && step.type !== "summary");
  app.innerHTML = `
    <div class="lesson-view">
      <div class="lesson-header">
        <button class="back-link" onclick="goToRoadmap()">← Retour au parcours</button>
        <h2>${lesson.title}</h2>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="step-counter">ÉTAPE ${stepIndex+1} / ${total}</div>
      </div>
      <div class="lesson-body">${body}</div>
      ${showFooter ? `
      <div class="lesson-footer">
        ${stepIndex>0 ? `<button class="btn-ghost" onclick="prevStep()">← Précédent</button>` : `<span></span>`}
        <button class="btn-primary" onclick="nextStep()">Suivant →</button>
      </div>` : ``}
    </div>`;
}
function stepIntro(lessonId, stepIndex, step){
  const opts = step.mcq.options.map((o,i)=>`<button class="mcq-option" onclick="answerDiag('${lessonId}',${stepIndex},${i})">${o}</button>`).join('');
  return `<div class="step-card predict-card">
    <div class="step-label">${step.label}</div>
    <p style="margin-bottom:14px; color:var(--text-muted); font-size:14px;">${step.body}</p>
    <p class="step-question">${step.mcq.question}</p>
    <div class="mcq-options" id="diagopts-${lessonId}-${stepIndex}">${opts}</div>
  </div>`;
}
function answerDiag(lessonId, stepIndex, i){
  const step = LESSONS[lessonId].steps[stepIndex];
  state.progress.diagnostic[step.mcq.diagKey] = step.mcq.options[i];
  saveProgress();
  const container = document.getElementById(`diagopts-${lessonId}-${stepIndex}`);
  container.querySelectorAll('.mcq-option').forEach((b,idx) => { b.disabled = true; if(idx===i) b.classList.add('correct'); });
}
function stepConcept(step){
  return `<div class="concept-card"><div class="step-label">${step.label}</div>${step.body}</div>`;
}
function stepMCQ(lessonId, stepIndex, step){
  const opts = step.options.map((o,i)=>`<button class="mcq-option" id="opt-${lessonId}-${stepIndex}-${i}" onclick="answerMCQ('${lessonId}',${stepIndex},${i})">${o}</button>`).join('');
  return `<div class="predict-card">
    <div class="step-label">${step.label}</div>
    <p class="step-question">${step.question}</p>
    <div class="mcq-options">${opts}</div>
    <div class="mcq-explanation hidden" id="expl-${lessonId}-${stepIndex}"></div>
  </div>`;
}
function answerMCQ(lessonId, stepIndex, chosen){
  const step = LESSONS[lessonId].steps[stepIndex];
  for(let i=0;i<step.options.length;i++){
    const btn = document.getElementById(`opt-${lessonId}-${stepIndex}-${i}`);
    btn.disabled = true;
    if(i === step.correctIndex) btn.classList.add('correct');
    else if(i === chosen) btn.classList.add('incorrect');
  }
  const expl = document.getElementById(`expl-${lessonId}-${stepIndex}`);
  expl.classList.remove('hidden');
  expl.innerHTML = (chosen === step.correctIndex ? "✓ Exactement. " : "Pas tout à fait. ") + step.explanation;
  awardXP(chosen === step.correctIndex ? 15 : 8);
}
function stepNumeric(lessonId, stepIndex, step){
  return `<div class="exercise-card">
    <div class="step-label">${step.label}</div>
    <p class="step-question">${step.question}</p>
    <div class="numeric-row">
      <input type="number" id="num-${lessonId}-${stepIndex}" placeholder="${step.placeholder||''}">
      <button class="btn-primary" onclick="checkNumeric('${lessonId}',${stepIndex})">Vérifier</button>
    </div>
    <div class="numeric-feedback hidden" id="numfb-${lessonId}-${stepIndex}"></div>
  </div>`;
}
function checkNumeric(lessonId, stepIndex){
  const step = LESSONS[lessonId].steps[stepIndex];
  const input = document.getElementById(`num-${lessonId}-${stepIndex}`);
  const val = parseFloat(input.value);
  const fb = document.getElementById(`numfb-${lessonId}-${stepIndex}`);
  fb.classList.remove('hidden');
  const tol = step.tolerance !== undefined ? step.tolerance : Math.abs(step.answer*0.02);
  if(!isNaN(val) && Math.abs(val - step.answer) <= tol){
    fb.className = 'numeric-feedback success'; fb.innerHTML = "✓ " + step.successMsg; awardXP(20);
  } else {
    fb.className = 'numeric-feedback retry'; fb.innerHTML = step.hint;
  }
}
function stepPitfall(step){
  return `<div class="pitfall-card"><div class="step-label">${step.label}</div><ul>${step.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
}
function stepExpert(step){
  return `<div class="expert-card"><div class="step-label">${step.label}</div>${step.body}</div>`;
}
function stepCheckpoint(step){
  return `<div class="checkpoint-card">
    <div class="step-label">Point d'étape</div>
    <p class="step-question">${step.question}</p>
    <div class="checkpoint-actions">
      <button class="btn-primary" onclick="nextStep()">Oui, c'est clair →</button>
      <button class="btn-ghost" onclick="openChatWithContext(${JSON.stringify(step.helpPrompt||'')})">Pas encore, j'en discute</button>
    </div>
  </div>`;
}
function stepValidation(lessonId, stepIndex, step){
  const saved = state.progress.validationAnswers[lessonId+'_'+stepIndex] || '';
  return `<div class="validation-card">
    <div class="step-label">${step.label}</div>
    <p class="step-question">${step.question}</p>
    <textarea id="val-${lessonId}-${stepIndex}" placeholder="Écris ta réponse avec tes propres mots...">${saved}</textarea>
    <button class="btn-ghost" onclick="discussValidation('${lessonId}',${stepIndex})">Discuter de ma réponse avec le professeur</button>
  </div>`;
}
function discussValidation(lessonId, stepIndex){
  const step = LESSONS[lessonId].steps[stepIndex];
  const ta = document.getElementById(`val-${lessonId}-${stepIndex}`);
  const answer = ta ? ta.value.trim() : '';
  state.progress.validationAnswers[lessonId+'_'+stepIndex] = answer;
  saveProgress();
  const prefill = `Question de validation : "${step.question}"\n\nMa réponse : ${answer || "(je n'ai pas encore d'idée précise)"}\n\nQu'en penses-tu ?`;
  openChatWithContext(prefill);
}
function stepSummary(lessonId, step){
  return `<div class="summary-card">
    <div class="step-label">En résumé</div>
    <p>${step.summary}</p>
    <p class="next-hint">Prochaine étape : ${step.nextHint}</p>
    <button class="btn-primary" onclick="finishLesson('${lessonId}')" style="margin-top:8px;">Terminer la leçon ✓</button>
  </div>`;
}
function nextStep(){
  const lesson = LESSONS[state.currentLessonId];
  // sauvegarder les réponses de validation avant de changer d'étape
  const cur = lesson.steps[state.currentStep];
  if(cur.type === 'validation'){
    const ta = document.getElementById(`val-${lesson.id}-${state.currentStep}`);
    if(ta) { state.progress.validationAnswers[lesson.id+'_'+state.currentStep] = ta.value; saveProgress(); }
  }
  if(state.currentStep < lesson.steps.length - 1){
    state.currentStep++; awardXP(6); render();
  } else {
    render();
  }
}
function prevStep(){
  if(state.currentStep > 0){ state.currentStep--; render(); }
}
function finishLesson(lessonId){
  if(!state.progress.completedLessons.includes(lessonId)){
    state.progress.completedLessons.push(lessonId);
    awardXP(60);
    checkModuleCompletion(LESSONS[lessonId].moduleId);
  }
  saveProgress();
  state.view = "roadmap";
  state.currentLessonId = null; state.currentStep = 0;
  render();
}
function checkModuleCompletion(moduleId){
  const m = MODULES.find(x=>x.id===moduleId);
  const allDone = m.lessonIds.every(l => state.progress.completedLessons.includes(l));
  if(allDone && !state.progress.completedModules.includes(moduleId)){
    state.progress.completedModules.push(moduleId);
    awardXP(200);
  }
}

/* =========================================================
   CHAT AVEC LE PROFESSEUR (appel API en direct)
   ========================================================= */
const CHAT_ENABLED = true;
function renderChatShell(){
  if(!CHAT_ENABLED){
    return `
    <div class="eyebrow">Le professeur</div>
    <h1 style="margin-bottom:16px;">Chat IA — pas encore branché ici.</h1>
    <p class="subtitle">Cette version autonome ne connecte pas encore l'IA : ça demande une petite fonction serveur séparée pour protéger la clé API (sinon n'importe qui pourrait la lire dans le code source de la page). Dis-le à Claude dans ta conversation pour qu'on la branche.</p>
    <div class="onboard-q">
      <p style="color:var(--text-muted); font-size:14px;">En attendant, tout le reste — leçons, exercices, progression, synchro — fonctionne normalement.</p>
    </div>`;
  }
  return `
  <div class="eyebrow">Le professeur</div>
  <h1 style="margin-bottom:16px;">Pose n'importe quelle question.</h1>
  <div class="chat-wrap">
    <div class="chat-hint">Le professeur connaît ton projet (rachat en IDF, 500 K€–3 M€ de CA, profil « belle endormie », financement sans apport). Ce chat utilise ta propre clé API Anthropic (quelques centimes par échange). Pour tout point juridique ou fiscal précis, vérifie toujours avec ton expert-comptable ou ton avocat M&A.</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <textarea id="chatInput" placeholder="Écris ta question..." onkeydown="handleChatKey(event)"></textarea>
      <button class="btn-primary" onclick="sendChatMessage()" id="chatSendBtn">Envoyer</button>
    </div>
  </div>`;
}
function handleChatKey(e){
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendChatMessage(); }
}
function renderChatMessages(){
  const box = document.getElementById('chatMessages');
  if(!box) return;
  if(state.chatHistory.length === 0){
    box.innerHTML = `<div class="chat-empty">Aucune conversation pour l'instant.<br>Essaie par exemple : « Pourquoi une holding plutôt qu'un rachat en direct ? »</div>`;
  } else {
    box.innerHTML = state.chatHistory.map(m => `<div class="msg ${m.role==='user'?'msg-user':'msg-assistant'}">${escapeHtml(m.content).replace(/\n/g,'<br>')}</div>`).join('');
    if(state.chatBusy){ box.innerHTML += `<div class="msg msg-assistant typing">Le professeur réfléchit…</div>`; }
  }
  box.scrollTop = box.scrollHeight;
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
async function sendChatMessage(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text || state.chatBusy) return;
  state.chatHistory.push({role:'user', content:text});
  input.value = '';
  state.chatBusy = true;
  renderChatMessages();
  saveChat();
  const reply = await callProfessor();
  state.chatBusy = false;
  state.chatHistory.push({role:'assistant', content:reply});
  saveChat();
  renderChatMessages();
}
function buildSystemPrompt(){
  const d = state.progress.diagnostic || {};
  return `Tu incarnes "Le Professeur" de REPRISE. — et ce n'est surtout pas un enseignant académique qui récite des définitions de manuel. Parle comme un repreneur d'expérience qui a vu passer un grand nombre de dossiers de rachat de PME, et qui prend le temps de transmettre non seulement la théorie, mais surtout les erreurs qu'on ne voit qu'après les avoir commises — les siennes et celles des autres. Le ton est celui d'un mentor franc qui te dit ce qui va te mordre si tu n'y fais pas attention, pas celui d'un consultant qui lisse tout pour ne froisser personne.

PROJET DE L'UTILISATEUR (contexte permanent à utiliser) :
- Rachat d'une entreprise en Île-de-France, CA entre 500 K€ et 3 M€.
- Profil ciblé : une "belle endormie" — rentable, stable, sans développement récent, peu digitalisée, sans CRM ni prospection structurée, dépendante d'un portefeuille client historique, marché stable ou en croissance, revenus récurrents, EBITDA > 15%, faible dépendance à quelques clients, avantage concurrentiel difficile à copier ou forte demande locale.
- Objectif de deal : racheter à un multiple inférieur à 3x l'EBITDA, SANS mobiliser sa trésorerie personnelle (financement via trésorerie excédentaire de la cible, crédit-vendeur, dette bancaire, dette investisseur, structuré via une holding d'acquisition).
- Après le rachat, deux objectifs possibles selon la suite : (1) faire croître/structurer/adapter l'entreprise pour la revendre avec plus-value entre 1 et 3 ans, ou (2) développer avec un gérant en place (rythme de suivi : quotidien 0-3 mois, hebdomadaire 3-6 mois, trimestriel ensuite) dans une logique de build-up (portefeuille d'entreprises).
- Diagnostic de l'utilisateur : niveau comptable = ${d.comptes||'inconnu'} ; avancement du projet = ${d.avancement||'inconnu'} ; principale crainte = ${d.peur||'inconnue'}.

TON STYLE PEDAGOGIQUE (à respecter scrupuleusement) :
1. Distingue exposition et exploration : si la question porte sur "comment ça marche en général" (normes établies : mécanique d'un LBO, définition d'un terme, fiscalité standard), donne directement la réponse avec confiance — ne transforme jamais une question factuelle en devinette. Réserve les questions en retour aux cas où tu explores SA situation spécifique (ex: "sur CETTE cible, avec CES chiffres, que ferais-tu ?").
2. Honnêteté radicale : si un point est incertain, débattu, dépend du cas précis, ou risque d'avoir changé (taux d'intérêt, seuils fiscaux, jurisprudence), dis-le clairement et recommande de vérifier avec un expert-comptable ou un avocat M&A plutôt que d'inventer un chiffre précis. Tu peux parler avec le recul d'un praticien de terrain ("c'est l'erreur que je vois revenir neuf fois sur dix chez les repreneurs débutants", "voici ce qui arrive presque systématiquement quand..."), mais n'invente JAMAIS un cas personnel précis et vérifiable (nom d'entreprise, date, lieu) présenté comme un fait que tu aurais réellement vécu — reste sur des schémas généraux et des scénarios illustratifs, jamais une fausse biographie.
3. Si l'utilisateur te soumet une réponse à une question de validation ou un raisonnement qui te semble incomplet ou erroné, ne donne pas immédiatement "la bonne réponse" — pose d'abord une question qui l'aide à creuser son propre raisonnement (sauf s'il dit explicitement être bloqué ou demande la réponse directement).
4. Pas de réponse fleuve : va à l'essentiel, structure en points courts si utile, et propose d'approfondir si besoin plutôt que de tout déverser d'un coup.
5. Toujours au moins un exemple concret et chiffré quand c'est pertinent pour ce type de deal (PME IDF, 500K-3M€ de CA) — et ancre-le si possible dans une scène un peu brute et vécue ("si un cédant te sort cette phrase-là, méfie-toi", "voilà exactement ce qui se passe le jour où tu découvres ça après signature") plutôt qu'une définition froide.
6. Ton chaleureux, direct, jamais condescendant — aucune question n'est "basique". Tu peux être franc jusqu'à la brusquerie sur les erreurs qui coûtent cher, tant que ça reste bienveillant.
7. Termine si pertinent par UNE seule question ou piste d'action, jamais plusieurs à la fois.

Réponds toujours en français.`;
}
async function callProfessor(){
  const systemPrompt = buildSystemPrompt();
  const messages = state.chatHistory.slice(-16).map(m => ({role: m.role, content: m.content}));
  try{
    const { data: sessionData } = await sbClient.auth.getSession();
    if(!sessionData || !sessionData.session){
      return "Ta session a expiré. Recharge la page et reconnecte-toi.";
    }
    const functionUrl = SUPABASE_URL + "/functions/v1/chat-proxy";
    const response = await fetch(functionUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + sessionData.session.access_token
      },
      body: JSON.stringify({ system: systemPrompt, messages: messages })
    });
    const data = await response.json();
    if(data && data.content){
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
      if(text) return text;
    }
    if(data && data.error){
      const msg = typeof data.error === 'string' ? data.error : (data.error.message || JSON.stringify(data.error));
      return "Le professeur a rencontré un problème : " + msg;
    }
    return "Je n'ai pas réussi à formuler une réponse claire cette fois-ci. Peux-tu reformuler ta question ?";
  } catch(e){
    console.error(e);
    return "Je n'arrive pas à joindre le professeur pour le moment — vérifie ta connexion et réessaie dans un instant.";
  }
}

function simpleMarkdownToHtml(md){
  let html = escapeHtml(md);
  html = html.replace(/^### (.*)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.*)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.*)$/gm, '<h2>$1</h2>');
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/(https?:\/\/[^\s<]+)/g, (m) => m.startsWith('href="') ? m : `<a href="${m}" target="_blank" rel="noopener">${m}</a>`);
  html = html.replace(/^- (.*)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, (m) => '<ul>' + m + '</ul>');
  html = html.split(/\n{2,}/).map(p => p.match(/^<(h\d|ul|li)/) ? p : `<p>${p}</p>`).join('\n');
  return html;
}
function renderAgentShell(){
  return `
  <div class="eyebrow">Agent de recherche</div>
  <h1 style="margin-bottom:10px;">Fais-le chercher et proposer.</h1>
  <p class="subtitle">Décris un sujet — l'agent fait jusqu'à 18 recherches web, lit ta progression pour personnaliser, et rédige une proposition de contenu. Il ne publie jamais tout seul : la proposition est enregistrée ici pour relecture. Compte 1 à 3 minutes par recherche, et un coût réel de quelques dizaines de centimes sur ta clé API (recherches + traitement).</p>
  <div class="onboard-q" style="margin-bottom:24px;">
    <textarea id="agentTopic" placeholder="Ex : Recherche les meilleures pratiques actuelles de négociation avec un cédant de PME et propose un plan de module avec templates d'approche." style="width:100%; min-height:80px; box-sizing:border-box; padding:12px 14px; background:var(--ink); border:1px solid var(--ink-border); border-radius:var(--radius-sm); color:var(--text-light); font-size:14.5px; margin-bottom:12px; resize:vertical;"></textarea>
    <button class="btn-primary" id="agentLaunchBtn" onclick="launchAgentResearch()">🔎 Lancer la recherche →</button>
  </div>
  <div id="agentResult"></div>
  <div class="section-title">Propositions précédentes</div>
  <div id="agentHistory"><p style="color:var(--text-muted); font-size:14px;">Chargement...</p></div>`;
}
async function launchAgentResearch(){
  const topic = document.getElementById('agentTopic').value.trim();
  const btn = document.getElementById('agentLaunchBtn');
  const resultBox = document.getElementById('agentResult');
  if(!topic){ resultBox.innerHTML = `<p style="color:var(--wine-2);">Décris d'abord un sujet.</p>`; return; }
  btn.disabled = true; btn.textContent = "Recherche en cours (peut prendre plusieurs minutes)...";
  resultBox.innerHTML = `<div class="predict-card"><p style="color:var(--text-muted);">L'agent recherche et rédige — ne quitte pas cette page. Ça peut prendre jusqu'à 2-3 minutes pour une recherche approfondie.</p></div>`;
  try{
    const { data: sessionData } = await sbClient.auth.getSession();
    if(!sessionData || !sessionData.session){ resultBox.innerHTML = `<p style="color:var(--wine-2);">Session expirée, reconnecte-toi.</p>`; btn.disabled=false; btn.textContent="🔎 Lancer la recherche →"; return; }
    const functionUrl = SUPABASE_URL + "/functions/v1/ai-agent";
    const response = await fetch(functionUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + sessionData.session.access_token },
      body: JSON.stringify({ topic })
    });
    const data = await response.json();
    if(data.error){
      const msg = typeof data.error === 'string' ? data.error : (data.error.message || JSON.stringify(data.error));
      resultBox.innerHTML = `<div class="pitfall-card"><p>Erreur : ${escapeHtml(msg)}</p></div>`;
    } else {
      resultBox.innerHTML = `<div class="concept-card"><div class="step-label">Proposition (${data.searches_used || 0} recherches effectuées)</div>${simpleMarkdownToHtml(data.proposal)}</div>`;
      document.getElementById('agentTopic').value = '';
      loadAgentProposals();
    }
  } catch(e){
    resultBox.innerHTML = `<p style="color:var(--wine-2);">Impossible de joindre l'agent. Vérifie ta connexion et réessaie.</p>`;
  }
  btn.disabled = false; btn.textContent = "🔎 Lancer la recherche →";
}
async function loadAgentProposals(){
  const box = document.getElementById('agentHistory');
  if(!box) return;
  try{
    const { data, error } = await sbClient.from('agent_proposals').select('*').order('created_at', { ascending:false }).limit(10);
    if(error || !data || data.length === 0){ box.innerHTML = `<p style="color:var(--text-muted); font-size:14px;">Aucune proposition pour l'instant.</p>`; return; }
    box.innerHTML = data.map(p => `
      <div class="module-card" style="margin-bottom:10px; cursor:pointer;" onclick="document.getElementById('agentResult').innerHTML = document.getElementById('prop-${p.id}').innerHTML; window.scrollTo(0,0);">
        <div><div class="module-card-title" style="font-size:15px;">${escapeHtml(p.topic)}</div>
        <div class="module-card-desc">${new Date(p.created_at).toLocaleDateString('fr-FR')} · ${p.searches_used||0} recherches · ${p.status}</div></div>
      </div>
      <div id="prop-${p.id}" class="hidden"><div class="concept-card"><div class="step-label">${escapeHtml(p.topic)}</div>${simpleMarkdownToHtml(p.content)}</div></div>
    `).join('');
  } catch(e){
    box.innerHTML = `<p style="color:var(--text-muted); font-size:14px;">Impossible de charger l'historique.</p>`;
  }
}
