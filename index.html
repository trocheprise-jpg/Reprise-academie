  h1: {
    id:"h1", moduleId:8, title:"La holding : la mécanique du LBO", duration:"16 min",
    steps:[
      { type:"concept", label:"Pourquoi ne pas acheter en direct",
        body:`<p>Tu pourrais acheter les titres de la cible en ton nom propre. Presque personne ne le fait, pour quatre raisons :</p>
        <ul>
          <li><strong>L'effet de levier</strong> — c'est la holding qui emprunte, et c'est l'entreprise rachetée qui, via ses dividendes, rembourse l'essentiel de la dette. Ton apport limité (30 K€) contrôle un actif de plusieurs centaines de milliers d'euros : c'est le principe même du <span class="term">LBO</span>.</li>
          <li><strong>La fiscalité</strong> — les dividendes qui remontent de la cible vers la holding sont très faiblement imposés grâce au régime dit « mère-fille » (seule une petite quote-part de frais reste imposable), et sous conditions de détention élevée, l'<span class="term">intégration fiscale</span> permet même de compenser le déficit de la holding (ses intérêts d'emprunt) avec le bénéfice de la cible. Les régimes et taux exacts : ton expert-comptable — mais le principe est stable : <strong>en direct, tu rembourserais ta dette avec de l'argent lourdement fiscalisé ; via la holding, avec un flux quasi net.</strong></li>
          <li><strong>L'isolation du risque</strong> — la dette d'acquisition est dans la holding, pas sur ton patrimoine personnel (attention : la banque demandera souvent une caution personnelle partielle — à négocier et plafonner, jamais illimitée).</li>
          <li><strong>La porte du build-up</strong> — ta holding est le véhicule qui rachètera l'entreprise n°2, puis n°3, avec le cash extrait de la n°1. Sans holding, pas de logique de portefeuille.</li>
        </ul>` },
      { type:"concept", label:"Le circuit de l'argent, étape par étape",
        body:`<p>Le schéma complet, avec les flux dans l'ordre :</p>
        <ol>
          <li>Tu crées la <strong>holding</strong> (souvent une SAS) et y apportes ton capital : jusqu'à 30 K€ dans ton cas.</li>
          <li>La holding <strong>collecte les ressources</strong> : dette bancaire, crédit-vendeur, éventuel prêt d'honneur ou dette investisseur (Module 7).</li>
          <li>La holding <strong>achète 100 % des titres</strong> de la cible au cédant.</li>
          <li>Chaque année, la cible verse un <strong>dividende</strong> à la holding (après avoir gardé ce qu'il faut pour son exploitation et ses investissements).</li>
          <li>La holding utilise ce dividende pour <strong>servir la dette</strong> : annuité bancaire + échéances du crédit-vendeur.</li>
          <li>Le surplus, une fois la dette servie, s'accumule dans la holding : c'est ton futur <strong>carburant de build-up</strong> — ou ta rémunération de plus-value à la revente.</li>
        </ol>
        <p>Tout le montage tient sur UNE question : <em>le dividende remontable couvre-t-il confortablement le service de la dette ?</em> C'est le <span class="term">DSCR</span> (taux de couverture du service de la dette) : dividende disponible ÷ service annuel de la dette. Les banques veulent le voir <strong>au-dessus de 1,2-1,3</strong> — en dessous, le moindre trou d'air te met en défaut.</p>` },
      { type:"numeric", label:"Exercice — le DSCR de Thermelec",
        question:"Thermelec peut remonter prudemment ~185 K€ de dividende annuel vers ta holding. Le service de dette total (annuité bancaire 80 K€ + crédit-vendeur 62 K€) est de 142 K€ par an. Quel est le DSCR (arrondi à une décimale) ?",
        placeholder:"Ex : 1.5", answer:1.3, tolerance:0.08,
        successMsg:"Oui : 185 ÷ 142 ≈ 1,30. Au-dessus du seuil bancaire de 1,2-1,3 — le montage tient, avec une marge de sécurité réelle mais pas énorme : une année à -20 % d'EBITDA te met sous tension. C'est exactement le genre de chiffre que ta banque regardera en premier.",
        hint:"DSCR = dividende disponible ÷ service de la dette. Divise 185 par 142." },
      { type:"predict", label:"À toi de jouer",
        question:"Pourquoi la cible ne peut-elle pas simplement prêter sa trésorerie à ta holding pour financer son propre rachat ?",
        options:[
          "Elle le peut sans restriction, c'est même le principe du LBO",
          "Parce qu'une société ne doit pas financer directement l'acquisition de ses propres titres — c'est un terrain juridiquement très encadré (assistance financière, intérêt social, conventions entre la holding et la cible) : les flux passent par des dividendes régulièrement décidés, pas par des prêts de la fille à la mère montés à la va-vite",
          "Parce que la trésorerie de la cible appartient encore au cédant après la vente"
        ],
        correctIndex:1,
        explanation:"C'est LA ligne rouge du LBO. Le remboursement passe par des <b>dividendes</b> (décidés en respectant l'intérêt de la cible, ses réserves distribuables et ses besoins), pas par des ponctions directes. Les mécanismes plus fins (distribution exceptionnelle pré-closing, conventions de trésorerie encadrées) existent mais se structurent avec ton avocat — jamais en griffonnant un virement. Un montage qui assèche la fille pour sauver la mère peut engager ta responsabilité personnelle de dirigeant." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Confondre la trésorerie de la cible avec la tienne dès le closing. Chaque flux fille→mère a une forme juridique précise (dividende, convention réglementée, management fees justifiés). Les « management fees » de complaisance, non corrélés à de vraies prestations, sont un grand classique du redressement fiscal.",
          "Dimensionner la dette sur le dividende MAXIMUM théorique. La cible doit garder de quoi vivre : BFR, investissements de renouvellement, imprévus. Un DSCR calculé sur un dividende d'asphyxie est une fiction.",
          "Oublier que la holding a ses propres frais (comptabilité, juridique, éventuels frais bancaires) — quelques milliers d'euros par an à intégrer au plan.",
          "Accepter une caution personnelle illimitée sans discuter. Tout se négocie : montant plafonné, durée limitée, extinction progressive avec le remboursement.",
          "Monter la structure seul « parce qu'il y a des modèles de statuts en ligne ». Le trio holding + pacte éventuel + documentation de dette est le cœur juridique de ton patrimoine pour 7 ans : expert-comptable et avocat, dès le début."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté ne regarde pas le montage comme un organigramme, mais comme un <strong>tableau de flux sur 7 ans</strong>.</p>
        <p>Pour chaque année : EBITDA prévisionnel prudent → impôt → investissements → variation de BFR → dividende remontable → service de la dette → marge résiduelle. Ligne par ligne, avec un scénario « année moyenne » ET un scénario « mauvaise année » (-15/-20 % d'EBITDA). Si le scénario dégradé passe encore, le montage est sain. S'il ne tient que dans le scénario rose, ce n'est pas un montage, c'est un pari — et la banque, qui fera exactement ce calcul, te le renverra à la figure. Fais-le avant elle.</p>` },
      { type:"checkpoint", question:"Le circuit holding → dette → dividendes → remboursement et la notion de DSCR sont-ils clairs ?",
        helpPrompt:"Je viens de voir la mécanique du LBO via holding (apport, dette dans la holding, dividendes de la cible qui remboursent, DSCR > 1,2-1,3). Peux-tu me refaire dérouler le circuit complet sur le cas Thermelec, année par année, pour que je vérifie que j'ai bien compris ?" },
      { type:"summary",
        summary:"La holding d'acquisition porte la dette, encaisse les dividendes de la cible et rembourse — avec une fiscalité de remontée très favorable (régime mère-fille, intégration fiscale à valider avec ton EC). Tout le montage se juge sur le DSCR : dividende prudent ÷ service de dette > 1,2-1,3, y compris en scénario dégradé. Et la ligne rouge : la cible ne finance jamais directement son propre rachat.",
        nextHint:"Assemblons maintenant les briques une à une : ton montage complet Thermelec à 30 K€ d'apport, chiffre par chiffre." }
    ]
  },

  h2: {
    id:"h2", moduleId:8, title:"Ton montage complet à 30 K€ d'apport", duration:"17 min",
    steps:[
      { type:"concept", label:"D'abord les besoins — tous les besoins",
        body:`<p>Erreur classique : financer le prix, et découvrir les à-côtés. Ton tour de table doit couvrir :</p>
        <ul>
          <li><strong>Le prix des titres</strong> : 850 K€ (Thermelec, négocié depuis les 990 K€ demandés — 2,74x l'EBITDA normalisé de 310 K€).</li>
          <li><strong>Les frais d'acquisition</strong> : conseils (avocat, DD comptable), frais de dossier et de garantie bancaires, constitution de la holding — compte <strong>40 à 80 K€</strong> sur un deal de cette taille. Ici : ~45 K€.</li>
          <li><strong>Un matelas de sécurité</strong> dans la holding pour les premiers mois : ~15 K€.</li>
        </ul>
        <p><strong>Besoin total : ~910 K€.</strong> C'est CE chiffre que ton plan de financement doit boucler — pas 850.</p>` },
      { type:"concept", label:"📌 Fil rouge — le tour de table Thermelec",
        body:`<p>Les ressources, brique par brique :</p>
        <ul>
          <li><strong>Apport personnel : 30 K€</strong> — ton plafond. Il est modeste en proportion (~3 %), mais il existe, et c'est psychologiquement décisif pour la banque : tu as de la peau dans le jeu.</li>
          <li><strong>Prêt d'honneur : 30 K€</strong> — à taux zéro, sans garantie, via les réseaux d'accompagnement à la reprise (Module 7). Son vrai pouvoir : la banque le compte souvent comme du quasi-apport. Tes fonds propres « perçus » doublent : 60 K€.</li>
          <li><strong>Crédit-vendeur : 230 K€</strong> (27 % du prix) — 4 ans, différé de 12 mois, taux modéré. Bernard y gagne un prix défendu et un intérêt ; toi, tu y gagnes 230 K€ de dette souple ET un cédant financièrement intéressé à une transition réussie.</li>
          <li><strong>Distribution exceptionnelle de trésorerie : 140 K€</strong> — sur les 180 K€ de trésorerie excédentaire, 140 K€ sont distribués (opération structurée par tes conseils, en respectant les réserves distribuables et le besoin d'exploitation) ; 40 K€ restent dans Thermelec comme coussin. Mécaniquement, c'est comme si le prix réel était réduit d'autant.</li>
          <li><strong>Dette bancaire senior : 480 K€</strong> — sur 7 ans, annuité ~80 K€. Soit ~1,55x l'EBITDA : très en dessous des plafonds bancaires usuels, ce qui rend le dossier confortable.</li>
        </ul>
        <p><strong>Total : 30 + 30 + 230 + 140 + 480 = 910 K€. Le tour de table boucle</strong> — avec un DSCR de ~1,3 vérifié à la leçon précédente.</p>` },
      { type:"numeric", label:"Exercice — la marge de sécurité",
        question:"Ta banque exige un DSCR minimum de 1,25. Avec un service de dette annuel de 142 K€, quel dividende annuel minimum (en euros) Thermelec doit-elle pouvoir remonter ?",
        placeholder:"Ex : 150000", answer:177500, tolerance:3000,
        successMsg:"Oui : 142 000 × 1,25 = 177 500 €. Thermelec peut en remonter ~185 000 — le montage passe, avec ~7 500 € de marge au-dessus de l'exigence. C'est précisément ce calcul, dans ce sens-là, que le comité de crédit fera.",
        hint:"Dividende minimum = service de dette × DSCR exigé. Multiplie 142 000 par 1,25." },
      { type:"concept", label:"Adapter le montage au profil du cédant",
        body:`<p>Ce tour de table suppose un cédant comme Bernard : pas pressé financièrement, attaché à la suite, ouvert au crédit-vendeur. Tous ne le sont pas — et le montage s'adapte, dans cet ordre de préférence :</p>
        <ul>
          <li><strong>Cédant qui veut plus de cash au closing</strong> → réduire le crédit-vendeur exige de compenser : plus de dette bancaire (si le DSCR tient), une dette investisseur (Module 7 — plus chère et plus exigeante), ou... un prix plus bas en échange du cash immédiat (« 100 % comptant, mais à 780 »).</li>
          <li><strong>Cédant qui refuse tout crédit-vendeur ET tout effort de prix</strong> → c'est une information : il ne croit peut-être pas assez en sa boîte pour la financer 4 ans. Ton pipeline (Module 2) te donne le droit de passer.</li>
          <li><strong>Cible sans trésorerie excédentaire</strong> → la brique distribution disparaît : il faut soit plus de dette (DSCR !), soit un prix ajusté. C'est pour ça que la trésorerie excédentaire fait partie de tes critères de sourcing.</li>
        </ul>
        <p>Règle d'or : <strong>le montage suit le deal, jamais l'inverse.</strong> Tordre un DSCR pour « faire rentrer » un prix trop haut, c'est acheter son propre défaut de paiement.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Boucler « juste » : un tour de table à l'euro près, sans matelas, explose au premier imprévu — et il y a TOUJOURS un imprévu la première année.",
          "Mobiliser 100 % de la trésorerie excédentaire de la cible. Une entreprise sans coussin de trésorerie est une entreprise qui t'appelle en panique au premier gros client qui paie à 90 jours.",
          "Oublier les frais (conseils, garanties, holding) dans le plan — 45-80 K€ qui, non anticipés, sortent... de ta poche, celle qu'on voulait justement préserver.",
          "Empiler les dettes jusqu'au plafond parce que « ça passe sur le papier ». Chaque euro de dette en plus est un euro de liberté en moins pendant 7 ans : garde de la capacité pour les mauvaises années — et pour la cible n°2.",
          "Présenter le crédit-vendeur au cédant comme une contrainte (« je n'ai pas les fonds ») au lieu d'un alignement (« vous restez intéressé à la réussite de la transition ») — revois la leçon négociation (Module 6) : la même brique, mal racontée, fait échouer le deal."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Ce que la banque finance, ce n'est pas un prix — c'est un <strong>couple cash-flow + repreneur</strong>.</p>
        <p>Avec 30 K€ d'apport sur 910, ton pourcentage est faible ; ton dossier doit être irréprochable pour compenser : EBITDA normalisé documenté ligne à ligne, DSCR calculé en scénario dégradé, crédit-vendeur négocié (la banque adore : le cédant croit en sa boîte), GAP solide, et un plan des 100 jours crédible qui montre que tu sais quoi faire dès le lendemain du closing. Un banquier me disait en substance : « je préfère 3 % d'apport avec un dossier carré que 20 % avec un dossier flou ». Ton apport est petit ; que tout le reste soit grand.</p>
        <p style="margin-top:10px;"><button class="btn-primary" onclick="startTraining('banque')">🎭 M'entraîner : défendre ce dossier face au banquier →</button></p>` },
      { type:"validation", label:"Question de validation",
        question:"Bernard t'annonce finalement qu'il veut 80 % du prix comptant au closing (au lieu des 73 % prévus). Recompose le tour de table Thermelec : quelles briques bouges-tu, dans quel ordre, et quel impact sur ton DSCR ? Où est TA limite non négociable ?" },
      { type:"summary",
        summary:"Ton tour de table finance les besoins TOTAUX (prix + frais + matelas ≈ 910 K€) : apport 30 K€ + prêt d'honneur 30 + crédit-vendeur 230 + distribution de trésorerie 140 + dette bancaire 480. Le tout validé par un DSCR ≥ 1,25-1,3 y compris en scénario dégradé. Le montage s'adapte au profil du cédant — mais le montage suit le deal, jamais l'inverse.",

  cl1: {
    id:"cl1", moduleId:9, title:"Le closing : la dernière ligne droite", duration:"15 min",
    steps:[
      { type:"concept", label:"De la LOI à la signature : la séquence",
        body:`<p>Entre ta LOI acceptée et les clés, il se passe 2 à 4 mois, dans cet ordre :</p>
        <ol>
          <li><strong>Due diligence</strong> (Module 5) — tes auditeurs vérifient ; chaque écart documenté alimente la discussion finale sur le prix ou les garanties.</li>
          <li><strong>Protocole de cession</strong> (le « SPA ») — LE contrat définitif : prix ferme et ses ajustements, GAP annexée, conditions suspensives restantes, accompagnement du cédant, non-concurrence. Rédigé par les avocats, négocié clause par clause.</li>
          <li><strong>Levée des conditions suspensives</strong> — au premier rang : l'offre de prêt bancaire ferme, puis son délai de rétractation légal. C'est la période la plus longue et la plus frustrante : tout est d'accord, rien n'est fait.</li>
          <li><strong>Closing</strong> — le jour J : signature des actes, ordre de mouvement des titres, virements (prix, séquestre de la GAP), mise à jour des registres, formalités. En pratique, une matinée dense chez l'avocat — préparée au millimètre par les conseils.</li>
        </ol>
        <p>Point de vigilance légal, à caler tôt avec ton avocat : dans les PME, il existe une <strong>obligation d'information préalable des salariés</strong> avant la vente (délais et modalités précises à respecter — un oubli peut coûter très cher et retarder tout le calendrier).</p>` },
      { type:"concept", label:"Ta checklist du jour J (et des jours d'avant)",
        body:`<ul>
          <li><strong>La veille</strong> : relire le tableau de bouclage des fonds (chaque virement, de qui, vers qui, quel jour), vérifier que le séquestre GAP est prêt, que l'assurance homme-clé et les assurances de l'entreprise sont continues.</li>
          <li><strong>Le jour J</strong> : actes signés dans l'ordre prévu, pouvoirs bancaires transférés (signatures sur les comptes de la cible !), accès pratiques récupérés — serveurs, logiciels, codes, badges, liste que tu as préparée pendant la DD.</li>
          <li><strong>L'annonce aux équipes</strong> : préparée À DEUX avec le cédant, prononcée ensemble, idéalement le jour même ou le lendemain matin. Message : continuité, respect du travail accompli, ta présence à leurs côtés — et Bernard qui dit, devant tous, qu'il te fait confiance. Cette scène de 10 minutes vaut des mois de management.</li>
          <li><strong>L'accompagnement du cédant</strong> : formalisé PAR ÉCRIT dans le protocole (durée, jours de présence, rôle, éventuelle rémunération). Chez Thermelec : 4 mois, mardis et jeudis, centré sur le transfert des relations grands comptes et des chiffrages.</li>
        </ul>` },
      { type:"predict", label:"À toi de jouer",
        question:"Quand faut-il annoncer la vente aux salariés (au-delà des obligations légales d'information à caler avec ton avocat) ?",
        options:[
          "Dès la LOI, par transparence — ils ont le droit de savoir",
          "De manière maîtrisée et préparée avec le cédant, au moment du closing — jamais par une fuite, jamais des semaines d'incertitude avant que le deal soit certain",
          "Jamais formellement : ils s'en rendront compte naturellement"
        ],
        correctIndex:1,
        explanation:"Une annonce trop précoce (ou pire, une fuite) crée des mois d'angoisse — et les meilleurs éléments, ceux qui retrouvent un poste en une semaine, partent les premiers. L'annonce se prépare comme une opération : message écrit, questions anticipées (« mon poste ? mes horaires ? »), cédant et repreneur côte à côte. Attention : ceci concerne la COMMUNICATION managériale — les obligations LÉGALES d'information préalable, elles, ont leurs propres délais que ton avocat doit verrouiller en amont." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Relâcher l'attention entre le protocole et le closing. Il se passe 1 à 2 mois : continue de suivre l'activité (commandes, départs, incidents) — le protocole prévoit d'ailleurs une gestion « en bon père de famille » de la période, vérifie qu'elle est respectée.",
          "Laisser le cédant gérer seul la communication de la vente — à sa façon, avec ses mots, parfois sa nostalgie. Le récit de la transmission t'appartient autant qu'à lui.",

          "Découvrir au closing que les délégations bancaires, les cautions données par le cédant sur des marchés, ou les cartes grises des véhicules n'ont pas été traités. La liste des « détails » administratifs se prépare pendant la DD, pas le jour J."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté négocie l'accompagnement du cédant avec autant de soin que le prix — parce que sur une belle endormie dépendante de son dirigeant, <strong>l'accompagnement EST une partie de l'actif acheté</strong>.</p>
        <p>Les trois erreurs symétriques : trop court (les relations clients ne se transfèrent pas en 3 semaines), trop long (un fondateur qui reste un an reste LE patron aux yeux de tous — tu n'existes pas), et non structuré (il « passe voir » quand il veut). Le bon format sur un dossier comme Thermelec : 3 à 6 mois, dégressif, avec des objectifs de transfert nommés — « les 10 comptes clés présentés et re-signés », « Karim autonome sur les chiffrages », « les fournisseurs critiques rencontrés ». Quand la liste est cochée, l'accompagnement s'arrête — chaleureusement, et complètement.</p>` },
      { type:"checkpoint", question:"La séquence LOI → DD → protocole → levée des conditions → closing, et la préparation du jour J, sont-elles claires ?",
        helpPrompt:"Je viens de voir la séquence du closing (protocole, conditions suspensives, jour J, annonce aux équipes, accompagnement du cédant). Peux-tu me construire une checklist personnalisée des 15 jours avant closing pour un deal type Thermelec ?" },
      { type:"summary",
        summary:"Le closing est une séquence : DD → protocole (avec GAP annexée) → levée des conditions suspensives (l'offre de prêt !) → jour J réglé au millimètre. Les trois pièces maîtresses au-delà des actes : l'annonce aux équipes préparée à deux, l'accompagnement du cédant écrit et structuré par objectifs de transfert, et les obligations d'information des salariés calées en amont avec ton avocat.",

  cl2: {
    id:"cl2", moduleId:9, title:"Les 100 premiers jours", duration:"17 min",
    steps:[
      { type:"concept", label:"La boucle éprouvée : sécuriser → diagnostiquer → quick wins → levier → rythme",
        body:`<p>Les meilleurs systèmes d'accompagnement de dirigeants (celui d'Entrepreneurs.com, par exemple, déroule : diagnostic → quick wins → levier d'impact principal → checkpoints OKR → bilan) et les intégrations post-acquisition des professionnels convergent vers la même boucle. Adaptée à ta reprise :</p>
        <ul>
          <li><strong>Semaines 1-2 — Sécuriser</strong> : l'équipe (entretien individuel avec CHAQUE salarié : son rôle, ses irritants, ses idées — tu apprends et tu rassures en même temps), les clients clés (tournée des 10 plus gros comptes AVEC le cédant), les fournisseurs critiques, la trésorerie (mets en place immédiatement un suivi de trésorerie à 13 semaines — ton instrument de vol n°1).</li>
          <li><strong>Mois 1 — Diagnostiquer</strong> : l'audit terrain des écarts entre ce que la DD annonçait et ce que tu observes. Chaque écart significatif : documenté, chiffré, et si couvert par la GAP → <strong>notifié dans les formes et les délais</strong> (Module 6).</li>
          <li><strong>Mois 2 — Quick wins</strong> : 2 ou 3 victoires visibles et peu risquées : relancer les devis dormants, corriger un tarif oublié depuis 5 ans, régler l'irritant n°1 remonté par les techniciens. Objectif double : du cash, et la démonstration que le nouveau patron améliore la vie.</li>
          <li><strong>Mois 3 — Choisir LE levier</strong> : sur ta thèse, presque toujours la machine commerciale (CRM, relances systématiques, offre packagée — Module 11). Un seul grand chantier à la fois.</li>
          <li><strong>En continu — Le rythme</strong> : un point hebdomadaire chiffré avec l'équipe d'encadrement, et tes premiers objectifs trimestriels écrits (le futur langage de pilotage de ton gérant, Module 13).</li>
        </ul>
        <p>Et la règle d'or transversale : <strong>pas de révolution avant 90 jours.</strong> Pas de réorganisation, pas de changement de nom, pas de refonte des méthodes de travail. D'abord comprendre pourquoi ça marche — ensuite seulement améliorer.</p>` },
      { type:"concept", label:"📌 Fil rouge — tes 100 jours chez Thermelec",
        body:`<p>Extraits de ton journal de bord :</p>
        <p><em>« J+2 : entretiens individuels. Karim confirme qu'il porte la moitié des chiffrages — il attendait "de voir la tête du repreneur" pour décider de rester. Je lui dis que j'ai des projets pour lui. J+9 : tournée des syndics avec Bernard — le deuxième me glisse qu'un concurrent les a démarchés en janvier. Noté. J+20 : écart DD/réel — un litige avec un fournisseur de compresseurs (~18 K€) jamais mentionné dans les déclarations de la GAP. Mon avocat notifie dans les délais : couvert, imputé sur le séquestre. La GAP vient de rembourser une partie de ses honoraires. J+45 : quick wins — 34 K€ de devis dormants relancés et signés, grille tarifaire des contrats revalorisée de 4 % à la reconduction (aucune perte). J+75 : le levier est choisi : CRM + relance systématique des devis + contrats de maintenance proposés à chaque dépannage ponctuel (aujourd'hui : jamais proposé !). J+100 : trésorerie à 13 semaines saine, zéro départ, Bernard passe encore le mardi — et c'est très bien comme ça. »</em></p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Ta toute première action le lundi matin J+1 chez Thermelec ?",
        options:[
          "Analyser les marges ligne à ligne pour trouver les économies",
          "Réunir l'équipe, puis démarrer les entretiens individuels — les gens d'abord, les process ensuite",
          "Lancer le chantier CRM : c'est le levier n°1 identifié, autant gagner du temps"
        ],
        correctIndex:1,
        explanation:"Les 8 techniciens de Thermelec ne se demandent pas ce que dit ton business plan — ils se demandent s'ils garderont leur poste, leurs horaires et leur camion. Tant que cette question flotte, rien d'autre n'avance : les meilleurs se mettent en veille sur le marché de l'emploi, l'information ne circule plus. Les entretiens individuels règlent l'angoisse ET te livrent le vrai diagnostic terrain — celui qu'aucune DD ne contient." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Tout changer tout de suite pour « marquer son territoire ». Chaque process que tu trouves absurde a peut-être une raison d'exister que tu ne connais pas encore — la découvrir après l'avoir cassé coûte cher.",
          "Négliger les anciens détenteurs du savoir non écrit. Chez Thermelec, la moitié de la valeur est dans la tête de Karim et de deux techniciens seniors. Ta tâche la plus rentable des 100 jours : faire écrire ce qui n'est écrit nulle part.",
          "Laisser filer les délais de notification GAP. Le litige fournisseur découvert à J+20 et notifié à J+140 aurait été perdu. Chaque anomalie : réflexe avocat, immédiatement.",
          "Te noyer dans l'opérationnel — faire les dépannages, les devis, les plannings — et t'apercevoir à J+100 que tu as acheté un emploi, pas une entreprise. Bloque des demi-journées de travail SUR l'entreprise, pas dedans.",
          "Sur-promettre à l'équipe au nom de l'enthousiasme (« primes pour tout le monde, personne ne partira jamais »). Relis le piège du premier rendez-vous cédant : même mécanique, mêmes dégâts."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Les 100 jours ne servent pas à faire croître l'entreprise. Ils servent à trois choses, dans cet ordre : <strong>apprendre, sécuriser, documenter.</strong> La croissance vient après — et elle vient d'autant plus vite que ces trois-là sont solides.</p>
        <p>Le test de l'expert à J+100 : peux-tu répondre précisément à ces questions ? D'où vient chaque euro de marge ? Qui sont les 3 personnes dont le départ ferait mal, et que fais-tu pour chacune ? Quel est ton niveau de trésorerie dans 13 semaines ? Qu'est-ce qui n'existe que dans la tête de quelqu'un ? Si oui : tu pilotes. Si non : tu visites encore ta propre entreprise. Et note un effet secondaire précieux : le dossier documenté que tu construis là (chiffres propres, process écrits, dépendances traitées) est <em>exactement</em> ce qui augmentera ton multiple à la revente — ou ce qui permettra à un gérant de prendre le relais.</p>` },
      { type:"validation", label:"Question de validation",
        question:"Construis TON plan 100 jours pour Thermelec sous forme de 10 actions datées maximum — en distinguant ce qui relève de sécuriser / diagnostiquer / quick wins / levier. Quelle est la première chose que tu refuses de faire avant J+90, même si ça te démange ?" },
      { type:"summary",
        summary:"La boucle des 100 jours : sécuriser (équipe, clients, trésorerie 13 semaines) → diagnostiquer les écarts DD/réel (et notifier la GAP dans les délais !) → 2-3 quick wins visibles → choisir UN levier principal → installer le rythme hebdomadaire chiffré. Pas de révolution avant 90 jours : apprendre, sécuriser, documenter — la croissance vient après, et le dossier documenté prépare déjà la revente ou le gérant.",
        nextHint:"L'entreprise est stabilisée et pilotée. Le Module 10 (système Cash-Flow) t'attend si ce n'est pas fait — puis le Module 13 : installer un gérant pour te libérer et préparer le build-up." }
    ]
  },

  g1: {
    id:"g1", moduleId:13, title:"Le gérant : quand, qui, où le trouver", duration:"15 min",
    steps:[
      { type:"concept", label:"Quand — pas avant que la machine tourne sans héroïsme",
        body:`<p>Ta stratégie de build-up repose sur une bascule : toi qui sors de l'opérationnel, un gérant qui y entre. La tentation est de le faire vite. Erreur classique.</p>
        <p>Un gérant ne peut piloter que ce qui est <strong>pilotable</strong> : process documentés, tableau de bord fiable, clients attachés à l'entreprise (plus seulement à une personne), quick wins réalisés. En pratique, sur une belle endormie : rarement avant <strong>6 à 12 mois</strong> post-closing — le temps d'avoir traversé les 100 jours (Module 9), stabilisé le cash-flow (Module 10) et documenté ce qui n'existait que dans les têtes.</p>
        <p>Installer un gérant sur une entreprise non systématisée, c'est remplacer une dépendance (au fondateur) par une autre (à ton gérant) — en payant un salaire de plus au passage. Tu n'as rien délégué : tu as juste changé le nom de ton problème.</p>` },
      { type:"concept", label:"Qui — le profil, et le vivier auquel on ne pense pas assez",
        body:`<p>Le profil pour une PME de 10-20 personnes type Thermelec :</p>
        <ul>
          <li><strong>Expérience de gestion terrain</strong> — a déjà géré une équipe, un planning, des clients mécontents et une marge. Pas nécessairement un diplôme de gestion : une pratique de la gestion.</li>
          <li><strong>À l'aise avec les chiffres du tableau de bord</strong> — il n'a pas besoin de savoir construire un LBO ; il doit savoir lire une marge, un carnet de commandes et une trésorerie à 13 semaines, et réagir quand ça dérive.</li>
          <li><strong>Complémentaire, pas clone</strong> — s'il te ressemble trait pour trait, l'un de vous deux est inutile. Toi : stratégie, finance, acquisitions. Lui : excellence opérationnelle, équipe, clients.</li>
          <li><strong>Compatible avec la culture maison</strong> — un directeur de BU d'un grand groupe peut se noyer dans une PME où l'on fait tout soi-même.</li>
        </ul>
        <p>Les deux viviers : la <strong>promotion interne</strong> (chez Thermelec : Karim — il connaît tout, l'équipe le respecte, et sa promotion envoie un message puissant en interne ; risque : la gestion s'apprend, et tout le monde n'en a pas l'appétence — teste avant de nommer, en lui confiant des responsabilités croissantes pendant 3-6 mois) et le <strong>recrutement externe</strong> (regard neuf, compétences de gestion prêtes à l'emploi ; risque : greffe culturelle, et 3-6 mois d'apprentissage du métier et des clients). Il n'y a pas de bonne réponse universelle — il y a un test honnête à faire dans les deux cas.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Quel est le meilleur test AVANT de nommer Karim gérant de Thermelec ?",
        options:[
          "Le nommer et voir : on ne sait qu'en essayant, et il mérite sa chance",
          "Lui déléguer progressivement de vrais blocs de responsabilité (le planning + la marge d'un périmètre, puis les points hebdo chiffrés) pendant 3-6 mois, avec un droit à l'erreur explicite — et observer ce qu'il fait des chiffres et des décisions difficiles",
          "Lui faire passer des tests de personnalité et un entretien avec un cabinet"
        ],
        correctIndex:1,
        explanation:"La gestion se révèle en gérant. La délégation progressive te montre les trois choses que ni un entretien ni un test ne montrent : va-t-il VERS les chiffres ou les évite-t-il ? Prend-il les décisions inconfortables (recadrer un copain technicien) ? Remonte-t-il les mauvaises nouvelles vite ? Et si le test échoue, tu n'as pas cassé sa légitimité : il n'a jamais été nommé puis rétrogradé — il a juste repris son ancien rôle." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Recruter un « mini-DG » surdimensionné et cher pour une PME de 11 personnes — il s'ennuie, coûte, et repart dans 18 mois.",
          "Promouvoir le meilleur technicien parce qu'il est le meilleur technicien. Compétence métier ≠ appétence de gestion : tu risques de perdre ton meilleur technicien ET de gagner un mauvais gérant.",
          "Rester l'homme-clé de fait : si les clients, les fournisseurs et l'équipe continuent de t'appeler TOI pour tout, ton gérant n'est qu'un titre sur un organigramme. La délégation se protège : redirige systématiquement.",
          "Cacher ta stratégie au gérant. S'il découvre par hasard que tu prépares un build-up et ta sortie partielle, la confiance est morte. Dis-lui le projet : c'est même un argument d'attractivité (« tu pilotes la première entreprise d'un groupe en construction »).",
          "Nommer sans période d'essai réelle du POSTE (au-delà de la période d'essai légale du contrat) : jalonne les 6 premiers mois d'objectifs de prise de fonction explicites."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Le test ultime de la systémisation, avant même de penser au gérant : <strong>pars deux semaines, injoignable.</strong></p>
        <p>Ce qui casse pendant ton absence est la liste exacte de ce qui n'est pas encore systématisé — donc de ce qu'un gérant ne pourrait pas piloter non plus. Les repreneurs en série font ce test régulièrement, et certains vont plus loin : la valeur d'une entreprise (à la revente comme pour un gérant) est inversement proportionnelle à la dépendance à son dirigeant. Chaque procédure écrite, chaque relation client institutionnalisée, chaque décision déléguée augmente simultanément ta liberté, la solidité du futur gérant... et ton multiple de sortie. C'est le même travail qui sert les trois objectifs.</p>` },
      { type:"checkpoint", question:"La logique « systématiser d'abord, tester ensuite, nommer enfin » est-elle claire ?",
        helpPrompt:"Je viens de voir quand et comment choisir un gérant (pas avant 6-12 mois, profil complémentaire, test par délégation progressive, promotion interne vs externe). Peux-tu m'aider à construire le plan de test sur 6 mois pour un candidat interne type Karim ?" },
      { type:"summary",
        summary:"Un gérant ne s'installe que sur une entreprise pilotable : process documentés, tableau de bord fiable — rarement avant 6-12 mois. Profil : gestionnaire de terrain complémentaire de toi, testé par délégation progressive avant toute nomination. Interne (légitimité, culture) ou externe (compétences, regard neuf) : dans les deux cas, on teste, on ne parie pas. Et le test des deux semaines injoignable te dit toujours où tu en es.",
        nextHint:"Le candidat est identifié et testé. Reste le contrat de confiance : sa rémunération, et le rythme de pilotage qui te rend libre sans te rendre aveugle." }
    ]
  },

  g2: {
    id:"g2", moduleId:13, title:"Rémunérer et piloter ton gérant", duration:"16 min",
    steps:[
      { type:"concept", label:"La rémunération : payer la performance qui t'enrichit",
        body:`<p>Le principe : un <strong>fixe au marché</strong> (ni au rabais — tu veux le garder — ni gonflé pour compenser un variable flou), plus un <strong>variable indexé sur ce qui compte pour TA stratégie</strong> :</p>
        <ul>
          <li><strong>L'EBITDA (ou le cash-flow) avant tout</strong> — c'est lui qui rembourse ta dette et finance ton build-up. Jamais le CA seul : un gérant bonusé au CA t'achètera de la croissance à marge nulle avec le sourire.</li>
          <li><strong>Un garde-fou qualitatif</strong> — rétention des clients clés et des salariés clés : pour éviter l'EBITDA de court terme obtenu en pressurant tout le monde (l'entreprise que tu revendras dans 2 ans doit être en meilleur état, pas essorée).</li>
          <li><strong>Éventuellement, un intéressement de long terme</strong> — une participation à la plus-value de sortie ou un mécanisme d'accès au capital pour l'aligner sur des années. Puissant mais technique (fiscalité, pactes) : à structurer avec ton avocat, pas au feeling.</li>
        </ul>
        <p><strong>📌 Fil rouge</strong> — le package de Karim, nommé gérant de Thermelec à M+10 : fixe 55 K€ ; variable = 10 % de l'EBITDA au-delà de 310 K€ (le niveau de la reprise : il n'est payé que sur ce qu'il AJOUTE), plafonné à 25 K€ ; condition de déclenchement : rétention des 10 comptes clés et turnover maîtrisé ; et une clause de revoyure à 24 mois sur un intéressement long terme si le build-up se lance.</p>` },
      { type:"numeric", label:"Exercice",
        question:"Année 1 de Karim : EBITDA de 370 K€ (contre 310 K€ à la reprise), conditions qualitatives remplies. Quel est son bonus (en euros) avec la formule « 10 % au-delà de 310 K€ » ?",
        placeholder:"Ex : 5000", answer:6000, tolerance:200,
        successMsg:"Oui : (370 000 − 310 000) × 10 % = 6 000 €. Et regarde l'alignement : ces 60 K€ d'EBITDA supplémentaires valent, à un multiple de 3x, ~180 K€ de valeur d'entreprise en plus pour toi. Tu paies 6 K€ pour en gagner 180 K€ — c'est ça, un variable bien construit.",
        hint:"Bonus = (EBITDA réalisé − 310 000) × 10 %. Calcule d'abord le dépassement." },
      { type:"concept", label:"Le rythme de pilotage : serré, puis desserré — jamais lâché",
        body:`<p>Ton cadre, directement issu de ta stratégie — et cohérent avec ce que font les meilleurs systèmes d'accompagnement (objectifs trimestriels, checkpoints réguliers, bilan) :</p>
        <ul>
          <li><strong>Mois 0-3 : quotidien, 1 h</strong> — pas du flicage : du transfert. Chaque matin, vous passez les décisions de la veille et du jour ; tu transmets tes arbitrages, il prend progressivement les siens. C'est ta passation de pouvoir, structurée.</li>
          <li><strong>Mois 3-6 : hebdomadaire</strong> — une réunion chiffrée sur LE tableau de bord (voir ci-dessous). Il décide, tu challenges.</li>
          <li><strong>Ensuite : trimestriel</strong> — une vraie revue de gestion : résultats vs objectifs du trimestre, fixation des 2-3 objectifs du suivant (ventes, marge, projets), décisions d'investissement. Entre deux : il pilote, tu reçois le tableau de bord mensuel, et une règle d'alerte claire — « tu m'appelles sans attendre si : perte d'un compte clé, tension de trésorerie, départ d'un homme clé, litige ».</li>
        </ul>
        <p>Le tableau de bord de CHAQUE réunion, une page maximum : trésorerie à 13 semaines, carnet de commandes / devis en cours, CA et marge du mois vs N-1, top 10 clients (signaux faibles), effectif et absences, et l'avancement des 2-3 objectifs du trimestre. <strong>Pas de réunion sans chiffres ; pas de chiffres sans décision.</strong></p>` },
      { type:"predict", label:"À toi de jouer",
        question:"À M+8, Karim gère bien : tu passes le suivi en trimestriel avec tableau de bord mensuel. À M+11, tu découvres qu'un compte clé est parti... six semaines plus tôt, sans que tu en aies entendu parler. Quelle est la bonne lecture ?",
        options:[
          "Karim t'a trahi : il faut le sanctionner, voire le remplacer",
          "C'est d'abord ton système de pilotage qui a échoué : la règle d'alerte n'était pas claire ou pas vivante, et le tableau de bord ne faisait pas ressortir les signaux clients. On corrige le système ET on recadre le fond : les mauvaises nouvelles remontent en premier",
          "C'est le jeu de la délégation : on ne peut pas tout savoir, il gère"
        ],
        correctIndex:1,
        explanation:"La première mauvaise nouvelle cachée est TOUJOURS un double signal : sur la personne, oui — mais d'abord sur ton système. Un gérant cache ce qu'il craint de montrer ou ce qu'on ne lui demande jamais. La réponse durable : réaffirmer la culture (« une mauvaise nouvelle qui remonte vite est une bonne nouvelle »), remettre le top clients dans CHAQUE tableau de bord, re-vivifier la règle d'alerte. Le sanctionner sans corriger le système garantit que le prochain problème sera encore mieux caché." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Le variable sur le CA seul — croissance à marge nulle garantie. Toujours EBITDA/cash + garde-fou qualitatif.",
          "Le variable non plafonné ou sur une base mal définie (EBITDA « avant ou après ta propre rémunération de holding ? avant éléments exceptionnels ? ») — chaque ambiguïté est un conflit programmé. Formule écrite, exemples chiffrés en annexe.",
          "Des réunions sans chiffres (« alors, ça va ? ») ou des chiffres sans décisions. Les deux tuent le pilotage, chacune à sa façon.",
          "Couper le rythme trop tôt par confort mutuel — le passage au trimestriel se MÉRITE par des tableaux de bord fiables et des alertes qui fonctionnent, il ne se décrète pas au calendrier.",
          "Oublier que ce système de pilotage est aussi ton actif de sortie : une entreprise qui tourne avec un gérant performant et un reporting propre se vend mieux et plus cher qu'une entreprise dépendante de son propriétaire. Documente tout."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Tu ne pilotes ni des heures de présence, ni de l'affect : <strong>tu pilotes des chiffres et des décisions.</strong> C'est toute la différence entre déléguer et abdiquer.</p>
        <p>Et voici la bascule mentale du build-up : une fois Karim autonome en pilotage trimestriel, ton vrai poste change. Ton EBITDA remonte en dividendes vers la holding, ta dette s'amortit, ta capacité d'emprunt se reconstitue — et tes journées libérées repartent... au Module 2 : thèse, pipeline, courriers. La boucle de ta stratégie est fermée : <strong>acquérir → stabiliser (100 jours) → systématiser (cash-flow) → déléguer (gérant) → extraire → réinvestir.</strong> Chaque tour de boucle est plus rapide que le précédent, parce que tout ce que tu viens d'apprendre se réutilise.</p>` },
      { type:"validation", label:"Question de validation 1/2",
        question:"Conçois le package complet de rémunération d'un gérant pour une entreprise type Thermelec : fixe, formule de variable (base, taux, seuil, plafond), garde-fous qualitatifs — et justifie chaque choix par le comportement que tu veux (ou ne veux PAS) encourager." },
      { type:"validation", label:"Question de validation 2/2",
        question:"Ta holding reçoit maintenant ~40-50 K€/an de flux libre après service de la dette. Décris ta séquence build-up des 18 prochains mois : que fais-tu de ce cash, quand relances-tu le sourcing, et qu'est-ce qui doit être vrai chez Thermelec AVANT que tu signes une LOI sur la cible n°2 ?" },
      { type:"summary",
        summary:"Rémunération du gérant : fixe au marché + variable sur l'EBITDA au-delà d'un seuil (jamais le CA seul), garde-fous qualitatifs, tout par écrit avec exemples chiffrés. Pilotage : quotidien 0-3 mois (transfert), hebdomadaire 3-6 mois, puis trimestriel avec tableau de bord d'une page et règle d'alerte — pas de réunion sans chiffres, pas de chiffres sans décision. Et la boucle du build-up se referme : le cash extrait et ton temps libéré financent la cible n°2.",

  di1: {
    id:"di1", moduleId:11, title:"La machine commerciale : CRM et relances", duration:"16 min",
    steps:[
      { type:"concept", label:"Ton levier n°1, rappel",
        body:`<p>Reviens à ta thèse : tu as choisi une belle endormie <em>précisément parce qu'elle n'a</em> ni CRM, ni prospection structurée, ni relances systématiques. Ce manque n'est pas un défaut à subir — c'est le gisement de croissance le plus sûr qui existe : <strong>pas un pari sur un marché, juste de la mise en œuvre</strong> de choses qui fonctionnent partout ailleurs.</p>
        <p>Une machine commerciale de PME tient en trois briques, à construire dans cet ordre :</p>
        <ul>
          <li><strong>Une base clients propre</strong> — tous les clients, contacts, contrats et historiques au même endroit (le CRM), au lieu d'Excel, de carnets et de la mémoire de Bernard.</li>
          <li><strong>Un pipeline de devis avec relances systématiques</strong> — chaque devis a un statut et une <em>prochaine action datée</em>. Exactement la discipline de ton pipeline de sourcing (Module 2), appliquée aux ventes.</li>
          <li><strong>Une offre récurrente poussée systématiquement</strong> — chaque prestation ponctuelle est une occasion de proposer un contrat récurrent. Chez une belle endormie, cette proposition n'est presque jamais faite : on répond à la demande, on ne la crée pas.</li>
        </ul>` },
      { type:"concept", label:"Déployer un CRM dans une PME (sans la braquer)",
        body:`<p>Le bon CRM pour une boîte de 11 personnes n'est pas le plus complet — c'est <strong>celui que l'équipe utilisera encore dans 6 mois</strong>. Critères : simple, en français, utilisable sur mobile par les techniciens, et connectable à la facturation. Le nom de l'outil compte moins que les règles d'usage :</p>
        <ul>
          <li><strong>Règle 1 : tout devis vit dans le CRM.</strong> Un devis envoyé par email sans trace CRM n'existe pas.</li>
          <li><strong>Règle 2 : chaque devis a une prochaine action datée</strong> — relance à J+3 (appel : « bien reçu ? des questions ? ») puis J+10. La majorité des devis de PME meurent non pas refusés, mais <em>jamais relancés</em>.</li>
          <li><strong>Règle 3 : c'est TOI (puis le gérant) qui regardes le pipeline chaque semaine</strong> — ce qui n'est pas regardé n'est pas tenu. Le pipeline devis rejoint le tableau de bord hebdomadaire (Module 13).</li>
        </ul>
        <p>Côté conduite du changement : migre les données toi-même (ou avec un prestataire), forme l'équipe sur des cas réels, et commence par UN usage (les devis) avant d'ajouter le reste. Un CRM imposé d'un bloc avec 40 champs obligatoires est mort en trois semaines.</p>` },
      { type:"concept", label:"📌 Fil rouge — la machine Thermelec",
        body:`<p>Souviens-toi des 100 jours : 34 K€ de devis dormants signés juste en <em>relançant</em>. Voici la suite, sur 12 mois :</p>
        <ul>
          <li><strong>CRM déployé au mois 4</strong> — clients, contrats, devis migrés. Karim l'adopte le premier (argument décisif : « tu ne perdras plus jamais un chiffrage »).</li>
          <li><strong>Relance systématique J+3 / J+10</strong> — le taux de transformation des devis passe de ~31 % (mesuré sur l'historique reconstitué) à ~45 %. Aucun devis supplémentaire produit : juste moins de devis perdus par silence.</li>
          <li><strong>Le contrat proposé à chaque dépannage</strong> — Thermelec fait ~220 dépannages ponctuels par an chez des clients SANS contrat de maintenance. Nouveau réflexe scripté pour les techniciens et l'accueil : chaque intervention se conclut par la proposition d'un contrat (~2 400 €/an en moyenne). C'est le CA récurrent — celui qui nourrit ton EBITDA ET ton futur multiple de sortie — fabriqué à partir de clients déjà conquis.</li>
        </ul>` },
      { type:"numeric", label:"Exercice",
        question:"220 dépannages ponctuels par an, 15 % des clients acceptent le contrat de maintenance proposé, à 2 400 €/an en moyenne. Combien de CA récurrent annuel supplémentaire (en euros) cette seule habitude crée-t-elle ?",
        placeholder:"Ex : 50000", answer:79200, tolerance:2000,
        successMsg:"Oui : 220 × 15 % × 2 400 € = 79 200 € de CA récurrent nouveau — soit +4 % de CA, à marge de contrat (élevée), sans dépenser un euro de publicité. Et comme c'est du récurrent, ça se retrouve presque intégralement dans la valeur de revente. Une phrase apprise aux techniciens vaut ici 79 K€/an.",
        hint:"CA = nombre de dépannages × taux d'acceptation × prix moyen du contrat. Calcule 220 × 0,15 × 2 400." },
      { type:"predict", label:"À toi de jouer",
        question:"Budget limité, énergie limitée : par quoi commencer pour générer du CA supplémentaire chez une belle endormie ?",
        options:[
          "Un nouveau site web et de la publicité locale pour attirer des prospects",
          "Exploiter la base existante : relancer les devis en cours, réactiver les clients dormants, proposer le contrat récurrent aux clients ponctuels — le site et la pub viendront après",
          "Recruter un commercial pour prospecter de nouveaux clients"
        ],
        correctIndex:1,
        explanation:"L'ordre est presque toujours celui-là : le CA le moins cher du monde est celui qui dort dans ta base — devis non relancés, clients ponctuels jamais convertis en contrat, anciens clients jamais recontactés. Coût d'acquisition : zéro. Le site, la pub et le commercial servent à remplir un entonnoir : commence par réparer l'entonnoir qui fuit, sinon tu paies pour perdre plus vite." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Choisir un CRM « complet » de grand groupe pour une PME de 11 personnes. Six mois de paramétrage, adoption zéro, retour à Excel — et 5 K€/an d'abonnement pour rien.",
          "Installer l'outil sans installer le process. Le CRM ne relance pas les devis : la RÈGLE « chaque devis a une prochaine action datée » les relance. L'outil ne fait que la rendre visible.",
          "Déléguer entièrement l'adoption (« Karim, tu t'en occupes ») sans l'utiliser toi-même. L'équipe utilise ce que le patron regarde.",
          "Acheter des leads ou de la pub avant d'avoir exploité la base existante — payer pour de nouveaux prospects pendant que les anciens partent en silence.",
          "Mesurer l'activité (nombre de devis) au lieu du résultat (taux de transformation, CA récurrent net). C'est le taux qui dit si ta machine fonctionne."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>L'actif le plus sous-exploité d'une belle endormie n'est ni son matériel ni sa marque : c'est <strong>sa base clients historique</strong> — des années de clients servis, satisfaits, jamais recontactés.</p>
        <p>Un repreneur expérimenté fait ce calcul dès la due diligence commerciale : combien de clients actifs il y a 3 ans ne commandent plus aujourd'hui ? Chez la plupart des belles endormies, réactiver 10 % de ces dormants par une simple campagne d'appels (« on ne s'est pas vus depuis deux ans, votre installation approche de la révision... ») rapporte plus que n'importe quel budget publicitaire — et c'est mesurable dès le premier mois. La croissance d'une belle endormie ne se cherche pas dehors ; elle se ramasse dedans.</p>` },
      { type:"checkpoint", question:"Les trois briques (base propre, pipeline relancé, récurrent systématique) et l'ordre de déploiement sont-ils clairs ?",
        helpPrompt:"Je viens de voir la machine commerciale d'une PME (CRM, relances J+3/J+10, proposition systématique de contrats récurrents). Peux-tu m'aider à construire le plan de déploiement sur 90 jours pour une entreprise type Thermelec, semaine par semaine ?" },
      { type:"summary",
        summary:"La machine commerciale d'une belle endormie se construit dans l'ordre : base clients propre (CRM simple + règles d'usage), pipeline de devis avec relances datées (la majorité des devis meurent de silence, pas de refus), et offre récurrente proposée à chaque prestation ponctuelle. Le CA le moins cher dort déjà dans la base — chez Thermelec : +79 K€/an de récurrent avec une phrase apprise aux techniciens.",
        nextHint:"Deuxième chantier de digitalisation : automatiser les opérations — facturation, relances d'impayés, planning — pour libérer du cash et des heures facturables." }
    ]
  },

  di2: {
    id:"di2", moduleId:11, title:"Automatiser les opérations (sans casser la boîte)", duration:"15 min",
    steps:[
      { type:"concept", label:"Où l'automatisation paie vraiment",
        body:`<p>Dans une PME de services, quatre chantiers d'automatisation ont un retour quasi garanti — dans cet ordre de priorité :</p>
        <ul>
          <li><strong>Facturation immédiate + relance des impayés</strong> — facturer le jour de l'intervention (pas en fin de mois), avec relances automatiques à J+30 et J+45 et appel humain à J+60. C'est le prolongement direct du système Cash-Flow (Module 10) : chaque jour de délai client en moins est de la trésorerie rendue.</li>
          <li><strong>Planning et ordres d'intervention</strong> — tournées optimisées, fiches d'intervention sur mobile, photos et signature client sur place. Moins de kilomètres, moins de ressaisie, zéro « bon papier perdu ».</li>
          <li><strong>Comptes-rendus et devis générés depuis le terrain</strong> — le technicien dicte ou coche, le document part propre le jour même (on y reviendra avec l'IA, leçon suivante).</li>
          <li><strong>Reporting automatique</strong> — ton tableau de bord (Module 13) alimenté tout seul depuis la facturation et le CRM, au lieu d'une demi-journée de ressaisie mensuelle.</li>
        </ul>` },
      { type:"concept", label:"La méthode : simplifier AVANT d'automatiser",
        body:`<p>Règle absolue : <strong>automatiser un process cassé, c'est accélérer le chaos.</strong> La séquence pour chaque chantier :</p>
        <ol>
          <li><strong>Cartographier</strong> le process actuel en 30 minutes avec ceux qui le font : qui fait quoi, quand, avec quel outil, où ça coince.</li>
          <li><strong>Simplifier</strong> d'abord : supprimer les étapes inutiles, les doubles saisies, les validations qui ne valident rien. Souvent, 40 % du gain est là, gratuitement.</li>
          <li><strong>Automatiser</strong> ensuite ce qui reste — et seulement si le process est : <em>fréquent</em> (au moins hebdomadaire), <em>régi par des règles claires</em>, et <em>à faible enjeu unitaire</em> (une erreur se rattrape).</li>
          <li><strong>Mesurer</strong> : un chiffre avant, le même chiffre après (jours de délai de paiement, heures de ressaisie, kilomètres par intervention).</li>
        </ol>
        <p>Et une contrainte de rythme : <strong>un chantier à la fois</strong>, ancré avant de passer au suivant. L'équipe d'une belle endormie a 25 ans d'habitudes — trois révolutions simultanées, c'est une mutinerie.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Premier chantier d'automatisation chez Thermelec : lequel choisis-tu ?",
        options:[
          "Le planning optimisé des tournées — les techniciens perdent du temps en trajets",
          "La facturation le jour de l'intervention + relances automatiques d'impayés — c'est du cash immédiat, mesurable, et personne n'aime faire les relances de toute façon",
          "Le reporting automatique — pour piloter, il faut voir"
        ],
        correctIndex:1,
        explanation:"Les trois sont bons — mais le premier chantier doit cocher trois cases : impact cash rapide, mesurable en semaines, et faible résistance de l'équipe (automatiser une corvée que personne n'aime = zéro opposition). La facturation/relance coche les trois. Le planning touche aux habitudes des techniciens (plus sensible, à faire une fois la confiance installée), et le reporting sert le pilote plus que l'équipe — il vient naturellement après." },
      { type:"concept", label:"📌 Fil rouge — le cash caché dans les délais",
        body:`<p>Diagnostic chez Thermelec : les factures partaient <strong>en fin de mois</strong> (parfois le mois suivant), et les relances se faisaient « quand Bernard y pensait ». Résultat : un délai moyen d'encaissement (<span class="term">DSO</span>) de <strong>68 jours</strong>.</p>
        <p>Après le chantier — facture émise le jour de l'intervention depuis le mobile, relances automatiques J+30 et J+45, appel de l'assistante à J+60, et prélèvement proposé sur les contrats de maintenance — le DSO tombe à <strong>41 jours</strong> en 5 mois.</p>
        <p>Traduction en cash : 27 jours de CA en moins dans l'encours clients, soit 1 820 000 ÷ 365 × 27 ≈ <strong>135 K€ de trésorerie libérée</strong>, une fois pour toutes. À comparer aux 140 K€ de distribution mobilisés dans ton montage : ce seul chantier reconstitue quasiment le coussin de la société — sans vendre un euro de plus.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Automatiser le chaos : mettre un outil sur un process que personne ne comprend. Cartographie et simplifie d'abord — c'est la moitié du gain, et c'est gratuit.",
          "Empiler les abonnements : un outil par problème, 9 logiciels qui ne se parlent pas, 800 €/mois de SaaS. Privilégie peu d'outils qui couvrent large et s'intègrent (CRM + facturation + planning du même écosystème si possible).",
          "Zéro humain dans la boucle côté client : une relance d'impayé automatique envoyée à ton meilleur client en litige légitime peut coûter le client. Les cas sensibles s'escaladent vers un humain — toujours.",
          "Négliger la formation : une heure d'outil non expliquée = un retour au papier dans le camion. Forme sur des cas réels, avec les plus réticents en premier.",
          "Vouloir tout faire en 3 mois. Ton horizon est 18-36 mois (revente ou gérant) : un chantier ancré par trimestre bat quatre chantiers à moitié faits."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Dans une entreprise de services, l'automatisation se mesure en deux unités — et deux seulement : <strong>les heures rendues au terrain</strong> (chaque heure administrative économisée à un technicien est une heure facturable, à 60-90 €) et <strong>les jours de DSO gagnés</strong> (du cash pur).</p>
        <p>Tout le reste — le « gain de confort », la « modernité », le « temps réel » — est agréable mais ne se finance pas. Un repreneur expérimenté chiffre chaque chantier dans ces deux unités AVANT de le lancer, et vérifie le chiffre APRÈS. C'est aussi ce qui rend ces chantiers finançables : une banque ou un futur acheteur comprend « DSO passé de 68 à 41 jours » instantanément — c'est une ligne de plus dans le dossier qui augmente ton multiple de sortie.</p>` },
      { type:"validation", label:"Question de validation",
        question:"Choisis un process opérationnel d'une entreprise type Thermelec (facturation, planning, devis, commandes fournisseurs...). Cartographie-le en 5-8 étapes telles qu'elles se passent probablement aujourd'hui, indique ce que tu simplifies, ce que tu automatises, et le chiffre unique (avant/après) qui prouvera le gain." },
      { type:"summary",
        summary:"Automatiser dans l'ordre du cash : facturation immédiate + relances d'impayés (chez Thermelec : DSO de 68 à 41 jours = 135 K€ de trésorerie libérée), puis planning, terrain et reporting. Méthode : cartographier → simplifier → automatiser → mesurer — un chantier à la fois, jamais un outil sur un process cassé. Deux unités de mesure : heures rendues au terrain et jours de DSO.",
        nextHint:"Troisième étage de la fusée : ce que l'IA sait faire aujourd'hui, concrètement et sans risque, dans une PME de services." }
    ]
  },

  di3: {
    id:"di3", moduleId:11, title:"L'IA au quotidien dans ta PME", duration:"15 min",
    steps:[
      { type:"concept", label:"Les cas d'usage rentables aujourd'hui",
        body:`<p>Oublie la « transformation IA » des conférences. Dans une PME de services de 10-20 personnes, l'IA rapporte sur des tâches précises — celles qui consomment du temps qualifié pour produire du texte ou trier de l'information :</p>
        <ul>
          <li><strong>Devis et emails</strong> — un premier jet propre en 2 minutes à partir de quelques notes, relu et ajusté par l'humain. Le gain n'est pas que le temps : c'est aussi la réactivité (le devis qui part à J+0 se signe plus souvent que celui qui part à J+6).</li>
          <li><strong>Comptes-rendus d'intervention</strong> — le technicien dicte 60 secondes dans son téléphone en remontant dans le camion ; l'IA structure : constat, actions, pièces, recommandations. Fini les fiches griffonnées ressaisies le vendredi.</li>
          <li><strong>Qualification des demandes entrantes</strong> — trier les emails et messages : urgence réelle, demande de devis, question contractuelle, réclamation — et préparer un projet de réponse qu'un humain valide.</li>
          <li><strong>Veille</strong> — appels d'offres, consultations de syndics, évolutions réglementaires du secteur, résumés en 10 lignes chaque semaine.</li>
          <li><strong>Préparation du pilotage</strong> — synthèse du tableau de bord, questions à poser au point hebdo, premier jet des OKR trimestriels (Module 13).</li>
        </ul>` },
      { type:"concept", label:"La grille de sélection — et les deux règles non négociables",
        body:`<p>Pour chaque idée d'usage, trois questions : <em>gain par occurrence × fréquence ÷ risque d'erreur</em>. Un usage quotidien à petit gain et risque nul (compte-rendu) bat un usage rare à gros gain et gros risque (réponse à un litige client).</p>
        <p>Deux règles s'appliquent quoi qu'il arrive :</p>
        <ul>
          <li><strong>Humain dans la boucle</strong> pour tout ce qui part vers un client, un fournisseur ou un salarié — au minimum les 2-3 premiers mois. L'IA propose, l'humain dispose. Tu relâcheras la validation usage par usage, quand les statistiques le justifient.</li>
          <li><strong>Prudence sur les données</strong> — pas de données clients sensibles ni de documents confidentiels dans des outils grand public non cadrés. Utilise des offres professionnelles avec engagement de confidentialité, cadre l'usage par écrit pour l'équipe, et vérifie tes obligations (RGPD) avec ton conseil habituel. Cinq minutes de cadrage évitent un incident qui coûte la confiance d'un syndic.</li>
        </ul>` },
      { type:"predict", label:"À toi de jouer",
        question:"Quel usage IA faut-il éviter de déployer en premier dans une PME comme Thermelec ?",
        options:[
          "Les comptes-rendus d'intervention dictés par les techniciens",
          "Les réponses automatiques aux clients envoyées sans validation humaine",
          "La veille hebdomadaire sur les appels d'offres du secteur"
        ],
        correctIndex:1,
        explanation:"Les comptes-rendus (usage interne, erreur rattrapable) et la veille (aucun destinataire externe) sont des terrains d'apprentissage parfaits. La réponse client 100 % automatique cumule tout ce qu'on évite au départ : destinataire externe, enjeu relationnel, cas particuliers imprévisibles. Une seule réponse à côté de la plaque chez ton principal syndic peut coûter plus que deux ans de gains de productivité. On y viendra peut-être — après des mois de validation humaine et des statistiques solides." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "L'IA-washing : adopter des outils « parce qu'il faut faire de l'IA », sans problème précis à résoudre ni chiffre à améliorer. L'outil cherche son usage pendant que l'abonnement tourne.",
          "Confier des données sensibles sans cadre — le devis d'un client dans un outil grand public, le contrat d'un fournisseur dans un autre. Cadre écrit, outils pro, point RGPD fait avec ton conseil.",
          "Croire que l'IA remplace le process : elle accélère un process clair, elle amplifie un process flou. Les leçons di1 et di2 passent AVANT celle-ci pour une raison.",
          "Quinze expérimentations, zéro ancrage. Deux ou trois usages ancrés, mesurés et adoptés par l'équipe valent mieux que quinze démos impressionnantes.",
          "Ne rien mesurer : chaque usage a son chiffre (minutes par compte-rendu, délai d'envoi des devis, taux de réponse à J+0). Sans chiffre, impossible de savoir quoi garder."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Ton avantage de repreneur est paradoxal : <strong>tu arrives sans habitudes</strong>. Le dirigeant en place depuis 25 ans doit désapprendre pour adopter ces outils ; toi, tu écris les nouvelles habitudes sur une page blanche — et l'équipe attend de toute façon du changement d'un nouveau patron. Cette fenêtre des 12-18 premiers mois ne se rouvrira pas : les habitudes que TU installes deviendront aussi dures à changer que les anciennes.</p>
        <p>Et garde l'œil sur la sortie : « comptes-rendus générés en 2 minutes, devis à J+0, veille appels d'offres automatisée » — chaque usage ancré et documenté est une ligne de plus qui différencie ta boîte des concurrents artisanaux le jour de la revente. L'acheteur suivant paie pour une machine qui tourne, pas pour des promesses de modernisation.</p>` },
      { type:"checkpoint", question:"La grille gain × fréquence ÷ risque et les deux règles (humain dans la boucle, prudence données) sont-elles claires ?",
        helpPrompt:"Je viens de voir les cas d'usage IA rentables pour une PME de services (devis, comptes-rendus, qualification, veille, pilotage) et la grille de sélection. Peux-tu m'aider à prioriser les 3 premiers usages pour une entreprise type Thermelec et à définir le chiffre de mesure de chacun ?" },
      { type:"summary",
        summary:"L'IA rentable en PME cible les tâches fréquentes, à règles claires et faible risque : devis, comptes-rendus dictés, qualification des demandes, veille, préparation du pilotage. Grille de choix : gain × fréquence ÷ risque. Deux règles absolues : humain dans la boucle vers l'extérieur, et cadrage des données (outils pro, RGPD vu avec ton conseil). Deux usages ancrés valent mieux que quinze tests.",
        nextHint:"Le Module 12 passe à l'atelier : construire toi-même tes agents IA — anatomie d'un bon agent, puis ton premier agent complet pour Thermelec, prompt inclus." }
    ]
  },

  ia1: {
    id:"ia1", moduleId:12, title:"Anatomie d'un agent IA utile", duration:"14 min",
    steps:[
      { type:"concept", label:"Assistant vs agent",
        body:`<p>Un <strong>assistant</strong>, tu lui poses une question, il répond — c'est le chat que tu utilises déjà. Un <span class="term">agent</span>, tu lui confies une <strong>mission récurrente</strong> avec un cadre : il reçoit des informations (un devis en attente, une fiche d'intervention dictée), applique des règles écrites, et produit un résultat dans un format défini — tous les jours, de la même façon, sans qu'on lui redemande.</p>
        <p>La différence n'est pas la technologie : c'est le <strong>cadrage</strong>. Le même moteur d'IA devient un agent fiable ou un générateur d'à-peu-près selon la qualité de sa fiche de mission. Bonne nouvelle : écrire cette fiche ne demande aucune compétence technique — ça demande exactement ce que tu sais déjà faire : décrire un process proprement (Module 11).</p>` },
      { type:"concept", label:"Les 5 composants d'un agent",
        body:`<p>Tout agent utile tient en cinq blocs — retiens-les, c'est la grille de l'atelier de la prochaine leçon :</p>
        <ul>
          <li><strong>1. La mission et le rôle</strong> — une phrase : qui il est, ce qu'il produit, pour qui. « Tu es l'assistant de relance commerciale de Thermelec ; tu rédiges les messages de relance des devis en attente. »</li>
          <li><strong>2. Le contexte et les données</strong> — ce qu'il doit savoir (l'entreprise, l'offre, le ton maison) et ce qu'il reçoit à chaque fois (le devis, l'historique client).</li>
          <li><strong>3. Les règles et garde-fous</strong> — ce qu'il fait toujours, ce qu'il ne fait jamais, et quand il passe la main à un humain. C'est le bloc qui fait la fiabilité.</li>
          <li><strong>4. Le format de sortie</strong> — la structure exacte du livrable, pour qu'il soit utilisable sans retouche.</li>

      { type:"concept", label:"Les 4 agents les plus rentables pour Thermelec",
        body:`<ul>
          <li><strong>L'agent relance devis</strong> — reçoit chaque devis sans réponse à J+3 et J+10, rédige la relance personnalisée (référence au besoin exprimé, proposition d'appel), la met en attente de validation. Chiffre suivi : taux de transformation des devis.</li>

      { type:"expert", label:"Œil d'expert",
        body:`<p>Écris chaque agent comme la <strong>fiche de poste d'un employé brillant, ultra-rapide... et parfaitement littéral</strong> : il fera exactement ce qui est écrit, y compris ce que tu as mal écrit, et il improvisera sur tout ce que tu n'as pas écrit.</p>

  ia2: {

      { type:"concept", label:"La méthode en 5 étapes",
        body:`<ol>
          <li><strong>Choisir le process</strong> — fréquent, règles claires, faible risque unitaire, chiffre de succès évident. Pour l'atelier : la relance des devis (di1 a montré l'enjeu : de 31 % à 45 % de transformation).</li>
          <li><strong>Écrire la fiche de mission</strong> — les 5 blocs de la leçon précédente. C'est 80 % du travail.</li>

          <li><strong>Corriger la fiche</strong> — chaque écart devient une règle ou un exemple supplémentaire. Deux ou trois itérations suffisent généralement.</li>

        </ol>` },
      { type:"concept", label:"📌 La fiche de mission complète — à réutiliser",
        body:`<p>Voici la fiche de l'agent de relance devis Thermelec. C'est un modèle : remplace les éléments spécifiques et tu as ton propre agent.</p>
        <div style="background:var(--ink); border:1px solid var(--ink-border); border-radius:8px; padding:16px; font-family:var(--font-mono); font-size:12.5px; line-height:1.65; white-space:pre-wrap;">RÔLE : Tu es l'assistant de relance commerciale de Thermelec, entreprise de maintenance CVC pour copropriétés et PME en Essonne. Tu rédiges les messages de relance des devis restés sans réponse.

CONTEXTE : Nos clients sont des syndics, gestionnaires et dirigeants de PME — occupés, sollicités, attachés à la fiabilité plus qu'au prix. Ton maison : professionnel, direct, chaleureux sans familiarité. On ne brade jamais, on facilite la décision.

DONNÉES REÇUES À CHAQUE FOIS : le devis (objet, montant, date d'envoi), le nom et la fonction du contact, l'historique client (client existant ou prospect, dernier échange).

RÈGLES :
- Relance J+3 : angle « disponibilité » — proposer un appel de 10 minutes pour répondre aux questions. Jamais de pression.
- Relance J+10 : angle « planning » — mentionner honnêtement la charge du planning des techniciens et proposer de réserver un créneau, sans urgence artificielle.
- TOUJOURS : rappeler en une phrase le besoin exprimé par le client (jamais un message générique).
- JAMAIS : accorder une remise, modifier le devis, promettre un délai précis — si le client le demande, transmettre à Karim.
- ESCALADE : si le message du client exprime un mécontentement, une comparaison concurrentielle ou une négociation → ne pas répondre, transmettre à Karim avec un résumé en 2 lignes.

FORMAT DE SORTIE : Objet (max 8 mots) + corps (max 110 mots) + une seule question finale claire. Signature : Karim, Thermelec.

EXEMPLE (devis n°2417, remplacement pompe de circulation, 3 840 €, syndic Cabinet Perrin, J+3) :
Objet : Votre devis pompe — Résidence des Tilleuls
Bonjour Madame Perrin,
Vous avez reçu mardi notre devis pour le remplacement de la pompe de circulation de la Résidence des Tilleuls (3 840 € TTC). Comme le circuit de chauffage fonctionne actuellement sur la pompe de secours, je préfère m'assurer que vous avez tous les éléments pour décider sereinement.
Auriez-vous 10 minutes cette semaine pour que je réponde à vos questions — jeudi matin, par exemple ?
Bien cordialement,
Karim — Thermelec</div>
        <p style="margin-top:12px;">Relis la fiche avec la grille de la leçon précédente : les 5 blocs y sont, l'escalade est explicite, et l'exemple cale le ton mieux que n'importe quelle consigne abstraite.</p>` },
      { type:"numeric", label:"Exercice — le ROI de cet agent",
        question:"Thermelec émet ~380 K€ de devis « hors contrat » par an. La relance systématique portée par l'agent fait passer la transformation de 31 % à 43 %, soit 12 points de mieux. Combien de CA annuel supplémentaire (en euros) cela représente-t-il ?",

        successMsg:"Oui : 380 000 × 12 % = 45 600 € de CA en plus par an — sans un devis de plus produit, sans un euro de publicité. Ajoute les 79 K€ de contrats récurrents (di1) et les 135 K€ de trésorerie libérée (di2) : la « digitalisation » de ta belle endormie n'est pas un concept, c'est une addition.",
        hint:"CA supplémentaire = volume de devis × points de transformation gagnés. Calcule 380 000 × 0,12." },
      { type:"pitfall", label:"⚠ Pièges classiques",

          "Laisser l'agent envoyer directement dès le premier mois. La validation humaine coûte 2 minutes par message et t'évite LE message malheureux chez ton principal syndic. Tu la relâcheras avec les statistiques, pas avec l'enthousiasme.",

      { type:"expert", label:"Œil d'expert",
        body:`<p>Le vrai livrable de cet atelier n'est pas l'agent — c'est la <strong>compétence de cadrage</strong> que tu viens d'acquérir : choisir un process, l'écrire sans ambiguïté, le tester sur du réel, le mesurer. Cette compétence se réapplique à l'infini : chaque trimestre, un agent de plus, toujours par la même méthode.</p>
        <p>Et projette-toi 24 mois plus loin : une PME de maintenance avec un CRM tenu, des relances automatisées, des comptes-rendus générés, un DSO à 41 jours et un classeur de fiches d'agents documentées — face aux concurrents qui font des devis sous Excel. C'est cette différence-là qu'un acheteur paie au-dessus du barème sectoriel, et c'est cette machine-là qu'un gérant peut piloter sans toi. La boucle du programme se referme : tout ce que tu construis ici sert les deux sorties du Module 14.</p>` },
      { type:"validation", label:"Question de validation",
        question:"À toi : rédige la fiche de mission complète de l'agent compte-rendu d'intervention de Thermelec (les 5 blocs : rôle, contexte/données, règles avec escalade, format de sortie, un exemple). Soumets-la au professeur pour une critique bloc par bloc." },
      { type:"summary",
        summary:"La méthode de l'atelier : choisir un process à règles claires, écrire la fiche de mission (5 blocs), tester sur 20 cas réels, corriger, déployer avec validation humaine et mesurer 30 jours. L'agent de relance devis de Thermelec : +45 K€/an de CA à lui seul. Le vrai livrable est la compétence de cadrage — réapplicable chaque trimestre, et chaque fiche d'agent est une procédure qui reste dans la boîte que tu vendras ou confieras.",

      { type:"concept", label:"Vendre se prépare le jour de l'achat",

      { type:"concept", label:"Ce que ta holding a accumulé sans bruit",
        body:`<p>Pendant que Thermelec tournait, ta holding a construit quatre actifs :</p>

        hint:"Flux libre = dividende remonté − service de la dette. Calcule 210 000 − 142 000." },
      { type:"concept", label:"La cible n°2 : synergie réelle ou dispersion",
        body:`<p>Deux logiques saines pour la cible n°2 — et une toxique :</p>
        <ul>
          <li><strong>La consolidation</strong> — même métier, zone voisine : un concurrent CVC dans le 77 ou le 94. Synergies évidentes (achats groupés, planning mutualisé, astreintes partagées, marque), intégration que tu sais faire les yeux fermés. C'est la voie des build-ups les plus réussis... et les plus ennuyeux.</li>

const LEVELS = [
  { min:0, title:"Apprenti Repreneur" },
  { min:150, title:"Chasseur de Cibles" },
  { min:400, title:"Lecteur de Bilans" },
  { min:700, title:"Négociateur" },
  { min:1100, title:"Stratège Financier" },
  { min:1600, title:"Repreneur Confirmé" },
  { min:2300, title:"Bâtisseur de Groupe" }
];
function getLevelInfo(xp){
  let idx = 0;
  for(let i=0;i<LEVELS.length;i++){ if(xp >= LEVELS[i].min) idx = i; }
  const cur = LEVELS[idx];
  const next = LEVELS[idx+1] || null;
  const span = next ? (next.min - cur.min) : 1;
  const into = next ? (xp - cur.min) : 1;
  const pct = next ? Math.min(100, Math.round((into/span)*100)) : 100;
  return { title: cur.title, next, pct };
}

async function onSignedIn(user){
  state.currentUser = user;
  try{
    const { data, error } = await sbClient.from('progress').select('data').eq('user_id', user.id).maybeSingle();
    if(error) throw error;
    if(data && data.data){
      if(data.data.progress) state.progress = Object.assign(JSON.parse(JSON.stringify(DEFAULT_PROGRESS)), data.data.progress);
      if(data.data.chatHistory) state.chatHistory = data.data.chatHistory;
    }
    state.dbStatus = "ok";
  } catch(e){
    console.error("Erreur de lecture Supabase", e);
    state.dbStatus = "error";
  }
  updateStreak();
  state.view = state.progress.onboardingDone ? "dashboard" : "onboarding";
  render();

let saveTimeout = null;
function saveToCloud(){
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    if(!state.currentUser || !sbClient) return;
    try{
      const { error } = await sbClient.from('progress').upsert({
        user_id: state.currentUser.id,
        data: { progress: state.progress, chatHistory: state.chatHistory.slice(-30) },
        updated_at: new Date().toISOString()
      }, { onConflict: 'user_id' });
      if(error) throw error;
      state.dbStatus = "ok";
    } catch(e){
      console.error("Erreur de sauvegarde Supabase", e);
      state.dbStatus = "error";
    }
    updateSidebarStats();
  }, 500);
}

function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  const last = state.progress.lastActiveDate;
  if(last === today) return;
  if(last){
    const diffDays = Math.round((new Date(today) - new Date(last)) / 86400000);
    state.progress.streak = (diffDays === 1) ? (state.progress.streak + 1) : 1;
  } else {
    state.progress.streak = 1;
  }
  state.progress.lastActiveDate = today;
  saveProgress();
}

function findNextLesson(){
  const saved = state.progress.lastPosition;
  if(saved && saved.lessonId && LESSONS[saved.lessonId] && !state.progress.completedLessons.includes(saved.lessonId)){
    const lesson = LESSONS[saved.lessonId];
    const module = MODULES.find(m => m.id === lesson.moduleId);
    if(module && module.built) return { lesson, module, resuming: saved.stepIndex > 0, stepIndex: saved.stepIndex };
  }
  for(const m of MODULES){
    if(!m.built) continue;
    for(const lid of m.lessonIds){
      if(!state.progress.completedLessons.includes(lid)) return { lesson: LESSONS[lid], module: m, resuming: false };
    }
  }
  return null;
}

}
