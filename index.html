<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>REPRISE. — Ton académie de rachat d'entreprise</title>

<!-- Installation sur écran d'accueil (Android/Chrome) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#11162A">

<!-- Installation sur écran d'accueil (iOS/Safari) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REPRISE.">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
  :root{
    --ink: #11162A;
    --ink-2: #1A2140;
    --ink-3: #232C54;
    --ink-border: #333E6E;
    --paper: #EFE8D6;
    --paper-2: #E5DAC0;
    --paper-border: #CBB98E;
    --gold: #C99A3E;
    --gold-2: #E2BE6E;
    --wine: #96434D;
    --wine-2: #B96269;
    --forest: #3D7A5C;
    --forest-2: #5AA07C;
    --text-light: #F2EDDF;
    --text-muted: #9BA3C4;
    --text-dark: #241F33;
    --text-dark-muted: #7A6F53;
    --radius: 16px;
    --radius-sm: 9px;
    --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "Roboto Mono", "Courier New", monospace;
  }
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
  html, body { height:100%; }
  body{
    font-family: var(--font-body);
    background: var(--ink);
    background-image:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(201,154,62,0.10), transparent),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(61,122,92,0.09), transparent);
    color: var(--text-light);
    min-height: 100vh;
    line-height: 1.55;
  }
  button, input, textarea { font-family: inherit; color: inherit; }
  button { cursor: pointer; }
  ::selection{ background: var(--gold); color: var(--ink); }
  a { color: var(--gold-2); }

  /* ---------- Shell layout ---------- */
  .shell{ display:flex; min-height:100vh; }
  .sidebar{
    width: 250px; flex-shrink:0;
    background: linear-gradient(180deg, var(--ink-2), var(--ink));
    border-right: 1px solid var(--ink-border);
    display:flex; flex-direction:column;
    padding: 28px 20px;
    position: sticky; top:0; height:100vh;
  }
  .brand{ display:flex; align-items:baseline; gap:8px; margin-bottom: 6px; }
  .brand-mark{
    font-family: var(--font-display); font-size: 26px; letter-spacing: 0.5px;
    color: var(--text-light);
  }
  .brand-dot{ color: var(--gold); }
  .brand-tagline{ font-size: 12px; color: var(--text-muted); margin-bottom: 34px; }
  .nav-item{
    display:flex; align-items:center; gap:12px;
    padding: 11px 14px; border-radius: var(--radius-sm);
    color: var(--text-muted); background: transparent; border: none; text-align:left;
    font-size: 14.5px; font-weight: 500; width:100%;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .nav-item svg{ flex-shrink:0; opacity: 0.85; }
  .nav-item:hover{ background: rgba(255,255,255,0.04); color: var(--text-light); }
  .nav-item.active{ background: var(--ink-3); color: var(--gold-2); }
  .nav-item.active svg{ opacity:1; }
  .sidebar-footer{ margin-top:auto; padding-top: 20px; border-top: 1px solid var(--ink-border); }
  .mini-level{ font-size: 12.5px; color: var(--text-muted); margin-bottom: 8px; }
  .mini-level b{ color: var(--gold-2); font-family: var(--font-display); }
  .mini-xp-bar{ height:6px; border-radius:4px; background: var(--ink-3); overflow:hidden; margin-bottom: 12px;}
  .mini-xp-fill{ height:100%; background: linear-gradient(90deg, var(--gold), var(--gold-2)); border-radius:4px; transition: width 0.5s ease; }
  .reset-link{ font-size: 11.5px; color: var(--text-muted); background:none; border:none; text-decoration: underline; opacity:0.7; padding:0; }
  .reset-link:hover{ opacity:1; color: var(--wine-2); }

  .main{ flex:1; min-width:0; padding: 40px 44px 100px; max-width: 920px; }
  @media (max-width: 900px){ .main{ padding: 28px 20px 100px; } }

  /* ---------- Mobile bottom nav ---------- */
  .bottom-nav{ display:none; }
  @media (max-width: 767px){
    .sidebar{ display:none; }
    .bottom-nav{
      display:flex; position:fixed; bottom:0; left:0; right:0; z-index: 50;
      background: var(--ink-2); border-top: 1px solid var(--ink-border);
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
    }
    .bottom-nav button{
      flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
      background:none; border:none; color: var(--text-muted); font-size: 11px; padding: 6px 2px;
      border-radius: var(--radius-sm);
    }
    .bottom-nav button.active{ color: var(--gold-2); }
    .main{ padding-bottom: 90px; }
  }

  /* ---------- Typography ---------- */
  h1,h2,h3{ font-family: var(--font-display); font-weight:400; letter-spacing:0.2px; }
  h1{ font-size: 30px; margin-bottom: 6px; }
  h2{ font-size: 22px; }
  .eyebrow{ font-size: 11.5px; text-transform: uppercase; letter-spacing: 1.6px; color: var(--gold-2); font-weight:600; margin-bottom:10px; }
  .subtitle{ color: var(--text-muted); font-size: 15px; margin-bottom: 28px; }

  /* ---------- Buttons ---------- */
  .btn-primary{
    background: linear-gradient(180deg, var(--gold-2), var(--gold));
    color: #21170a; border:none; font-weight:700; font-size:14.5px;
    padding: 12px 22px; border-radius: 999px; box-shadow: 0 4px 14px rgba(201,154,62,0.28);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 6px 18px rgba(201,154,62,0.38); }
  .btn-primary:active{ transform: translateY(0); }
  .btn-ghost{
    background: transparent; border: 1px solid var(--ink-border); color: var(--text-light);
    font-size: 14px; padding: 11px 20px; border-radius: 999px; font-weight:500;
  }
  .btn-ghost:hover{ border-color: var(--gold-2); color: var(--gold-2); }
  button:focus-visible, .nav-item:focus-visible, input:focus-visible, textarea:focus-visible{
    outline: 2px solid var(--gold-2); outline-offset: 2px;
  }
  button:disabled{ opacity:0.55; cursor: default; }

  /* ---------- Dashboard ---------- */
  .stat-row{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom: 30px; }
  .stat-card{
    background: var(--ink-2); border: 1px solid var(--ink-border); border-radius: var(--radius);
    padding: 18px 20px; flex:1; min-width:140px;
  }
  .stat-num{ font-family: var(--font-mono); font-size: 26px; color: var(--gold-2); font-variant-numeric: tabular-nums; }
  .stat-label{ font-size: 12px; color: var(--text-muted); margin-top:2px; }
  .continue-card{
    background: linear-gradient(135deg, var(--ink-3), var(--ink-2));
    border: 1px solid var(--ink-border); border-radius: var(--radius);
    padding: 26px 28px; margin-bottom: 34px; position:relative; overflow:hidden;
  }
  .continue-card::before{
    content:""; position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%;
    background: radial-gradient(circle, rgba(201,154,62,0.18), transparent 70%);
  }
  .continue-eyebrow{ font-size:11.5px; text-transform:uppercase; letter-spacing:1.4px; color: var(--text-muted); margin-bottom:8px; }
  .continue-title{ font-family: var(--font-display); font-size:21px; margin-bottom:14px; }
  .section-title{ font-family: var(--font-display); font-size:17px; color: var(--text-light); margin: 34px 0 16px; display:flex; align-items:center; gap:10px; }

  /* ---------- Roadmap (journey) ---------- */
  .journey{ position:relative; padding-left: 30px; }
  .journey::before{
    content:""; position:absolute; left:13px; top:10px; bottom:10px; width:2px;
    background: linear-gradient(180deg, var(--gold) 0%, var(--ink-border) 100%);
  }
  .phase-block{ margin-bottom: 8px; }
  .phase-label{
    font-size: 12px; text-transform: uppercase; letter-spacing:1.3px; color: var(--text-muted);
    margin: 26px 0 14px -30px; padding-left: 0; font-weight:600;
  }
  .phase-label:first-child{ margin-top:0; }
  .module-node{ position:relative; margin-bottom: 14px; }
  .module-dot{
    position:absolute; left:-30px; top: 18px; width:26px; height:26px; border-radius:50%;
    background: var(--ink-3); border: 2px solid var(--ink-border);
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
    color: var(--text-muted); z-index:2;
  }
  .module-node.done .module-dot{ background: var(--forest); border-color: var(--forest-2); color:#eafff2; }
  .module-node.current .module-dot{ background: var(--gold); border-color: var(--gold-2); color:#21170a; box-shadow: 0 0 0 4px rgba(201,154,62,0.18); }
  .module-card{
    background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius);
    padding: 16px 18px; display:flex; justify-content:space-between; align-items:center; gap: 14px;
    transition: border-color 0.15s ease;
  }
  .module-node.clickable .module-card{ cursor:pointer; }
  .module-node.clickable .module-card:hover{ border-color: var(--gold); }
  .module-card-title{ font-family: var(--font-display); font-size:16.5px; margin-bottom:4px; }
  .module-card-desc{ font-size: 13px; color: var(--text-muted); }
  .module-card-meta{ font-size: 11.5px; color: var(--text-muted); white-space:nowrap; text-align:right; flex-shrink:0; }
  .module-node.locked .module-card{ opacity: 0.55; }
  .module-node.locked .module-card-meta{ color: var(--text-muted); }
  .badge-built{ background: var(--forest); color:#eafff2; font-size:10.5px; padding:2px 9px; border-radius:999px; font-weight:700; letter-spacing:0.4px; }
  .badge-soon{ background: var(--ink-3); border:1px solid var(--ink-border); color: var(--text-muted); font-size:10.5px; padding:2px 9px; border-radius:999px; }

  /* ---------- Lesson view ---------- */
  .lesson-header{ margin-bottom: 26px; }
  .back-link{ background:none; border:none; color: var(--text-muted); font-size:13px; margin-bottom:14px; padding:0; }
  .back-link:hover{ color: var(--gold-2); }
  .progress-bar{ height:5px; background: var(--ink-3); border-radius:4px; overflow:hidden; margin: 12px 0 6px; }
  .progress-fill{ height:100%; background: linear-gradient(90deg, var(--gold), var(--forest-2)); transition: width 0.4s ease; }
  .step-counter{ font-size:12px; color: var(--text-muted); font-family: var(--font-mono); }

  .step-card{ animation: rise 0.25s ease; }
  @keyframes rise{ from{ opacity:0; transform: translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .step-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:1.3px; color: var(--gold-2); font-weight:700; margin-bottom: 12px; }
  .step-question{ font-size: 17px; margin-bottom: 18px; }

  .concept-card{
    background: var(--paper); color: var(--text-dark); border-radius: var(--radius);
    padding: 26px 28px; box-shadow: 0 10px 34px rgba(0,0,0,0.28);
  }
  .concept-card .step-label{ color: var(--wine); }
  .concept-card p{ margin-bottom: 14px; font-size:15.5px; }
  .concept-card p:last-child{ margin-bottom:0; }
  .concept-card ol, .concept-card ul{ padding-left: 20px; margin: 10px 0 14px; }
  .concept-card li{ margin-bottom:8px; font-size:15px; }
  .concept-card strong{ color: var(--wine); }
  .concept-card .term{ font-family: var(--font-mono); background: var(--paper-2); padding:1px 6px; border-radius:5px; font-size:0.92em; }

  .predict-card, .exercise-card, .checkpoint-card, .validation-card{
    background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius); padding: 24px 26px;
  }
  .mcq-options{ display:flex; flex-direction:column; gap:9px; }
  .mcq-option{
    background: var(--ink-3); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 12px 16px; text-align:left; font-size:14.5px; color: var(--text-light);
    transition: border-color 0.15s ease;
  }
  .mcq-option:hover:not(:disabled){ border-color: var(--gold-2); }
  .mcq-option.correct{ border-color: var(--forest-2); background: rgba(61,122,92,0.22); }
  .mcq-option.incorrect{ border-color: var(--wine-2); background: rgba(150,67,77,0.2); }
  .mcq-explanation{ margin-top:16px; padding:14px 16px; background: var(--ink); border-radius: var(--radius-sm); font-size:14px; border-left:3px solid var(--gold); }
  .mcq-explanation.hidden{ display:none; }

  .numeric-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .numeric-row input{
    background: var(--ink); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 11px 14px; font-family: var(--font-mono); font-size:15px; color: var(--text-light); width:170px;
  }
  .numeric-feedback{ margin-top:14px; padding:13px 16px; border-radius: var(--radius-sm); font-size:14px; }
  .numeric-feedback.hidden{ display:none; }
  .numeric-feedback.success{ background: rgba(61,122,92,0.22); border-left:3px solid var(--forest-2); }
  .numeric-feedback.retry{ background: rgba(150,67,77,0.16); border-left:3px solid var(--wine-2); }

  .pitfall-card{ background: rgba(150,67,77,0.14); border:1px solid var(--wine-2); border-radius: var(--radius); padding:22px 26px; }
  .pitfall-card .step-label{ color: var(--wine-2); }
  .pitfall-card ul{ padding-left:20px; }
  .pitfall-card li{ margin-bottom:10px; font-size:14.5px; }

  .expert-card{ background: rgba(201,154,62,0.10); border:1px solid var(--gold); border-radius: var(--radius); padding:22px 26px; }
  .expert-card p{ font-size:15px; margin-bottom:10px; }
  .expert-card p:last-child{ margin-bottom:0; }

  .checkpoint-card{ text-align:center; }
  .checkpoint-actions{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:6px; }

  .validation-card textarea{
    width:100%; min-height:100px; background: var(--ink); border:1px solid var(--ink-border);
    border-radius: var(--radius-sm); padding:13px 15px; font-size:14.5px; color: var(--text-light);
    resize: vertical; margin-bottom: 14px;
  }
  .summary-card{ background: var(--ink-2); border:1px solid var(--gold); border-radius: var(--radius); padding: 26px 28px; }
  .summary-card p{ font-size:15.5px; margin-bottom:14px; }
  .next-hint{ color: var(--text-muted); font-size:14px; font-style:italic; }

  .lesson-footer{ display:flex; justify-content:space-between; margin-top:24px; }

  /* ---------- Onboarding ---------- */
  .onboard-wrap{ max-width: 620px; }
  .onboard-q{ background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius); padding:22px 24px; margin-bottom:18px; }
  .onboard-q p{ font-size:15px; margin-bottom:14px; }

  /* ---------- Chat ---------- */
  .chat-wrap{ display:flex; flex-direction:column; height: calc(100vh - 80px); max-height: 780px; }
  .chat-messages{ flex:1; overflow-y:auto; padding: 6px 2px 16px; display:flex; flex-direction:column; gap:14px; }
  .msg{ max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size:14.5px; line-height:1.5; }
  .msg-user{ align-self:flex-end; background: linear-gradient(180deg, var(--gold-2), var(--gold)); color:#21170a; border-bottom-right-radius:4px; }
  .msg-assistant{ align-self:flex-start; background: var(--paper); color: var(--text-dark); border-bottom-left-radius:4px; box-shadow: 0 4px 16px rgba(0,0,0,0.22); }
  .msg-assistant.typing{ color: var(--text-dark-muted); font-style: italic; }
  .chat-empty{ color: var(--text-muted); text-align:center; margin-top: 50px; font-size:14.5px; }
  .chat-input-row{ display:flex; gap:10px; border-top:1px solid var(--ink-border); padding-top:14px; }
  .chat-input-row textarea{
    flex:1; background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 12px 14px; color: var(--text-light); font-size:14.5px; resize:none; min-height:46px; max-height:140px;
  }
  .chat-hint{ font-size:12px; color: var(--text-muted); margin-bottom:10px; }

  .hidden{ display:none !important; }
  .icon{ display:inline-flex; vertical-align:middle; }
  .storage-warning{
    background: rgba(150,67,77,0.16); border:1px solid var(--wine-2); border-radius: var(--radius);
    padding:16px 20px; margin-bottom:26px; font-size:13.5px; line-height:1.6; color: var(--text-light);
  }
  .storage-warning strong{ color: var(--wine-2); }
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="brand"><span class="brand-mark">REPRISE<span class="brand-dot">.</span></span></div>
    <div class="brand-tagline">Ton académie de rachat d'entreprise</div>
    <button class="nav-item" id="nav-dashboard" onclick="goTo('dashboard')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Tableau de bord
    </button>
    <button class="nav-item" id="nav-roadmap" onclick="goTo('roadmap')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16M4 6c3-2 5 2 8 0s5 2 8 0V4c-3 2-5-2-8 0S7 2 4 4Z"/></svg>
      Parcours
    </button>
    <button class="nav-item" id="nav-chat" onclick="goTo('chat')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>
      Prof IA
    </button>
    <div class="sidebar-footer">
      <div class="mini-level">Niveau <b id="sidebar-level-title">—</b></div>
      <div class="mini-xp-bar"><div class="mini-xp-fill" id="sidebar-xp-fill" style="width:0%"></div></div>
      <div id="sidebar-account" style="font-size:11px; color:var(--text-muted); margin-bottom:8px; word-break:break-all;"></div>

  </nav>

  <main class="main" id="app"></main>
</div>

<div class="bottom-nav">
  <button id="bnav-dashboard" onclick="goTo('dashboard')">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
    Accueil
  </button>
  <button id="bnav-roadmap" onclick="goTo('roadmap')">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16M4 6c3-2 5 2 8 0s5 2 8 0V4c-3 2-5-2-8 0S7 2 4 4Z"/></svg>
    Parcours
  </button>
  <button id="bnav-chat" onclick="goTo('chat')">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>
    Prof
  </button>
</div>

<script>
/* =========================================================
   DONNEES DU PROGRAMME
   ========================================================= */
const PHASES = [
  { id:1, name:"Comprendre & Cibler", moduleIds:[1,2,3] },
  { id:2, name:"Valoriser & Sécuriser", moduleIds:[4,5,6] },
  { id:3, name:"Financer & Structurer", moduleIds:[7,8] },
  { id:4, name:"Reprendre & Piloter", moduleIds:[9,10] },
  { id:5, name:"Développer & Sortir", moduleIds:[11,12,13] }
];

const MODULES = [
  { id:1, title:"Les fondamentaux du rachat", desc:"Le vocabulaire clé, le processus global, et pourquoi viser une « belle endormie ».", built:true, lessonIds:["l1","l2","l3"] },
  { id:2, title:"Définir sa thèse & sourcer les cibles", desc:"Tes critères précis, et où trouver les entreprises qui y correspondent en Île-de-France.", built:false, lessonIds:[] },
  { id:3, title:"Lire les comptes & la vraie rentabilité", desc:"Bilan, compte de résultat, EBITDA retraité, dépendance client.", built:false, lessonIds:[] },

const LEVELS = [
  { min:0, title:"Apprenti Repreneur" },
  { min:150, title:"Chasseur de Cibles" },
  { min:400, title:"Lecteur de Bilans" },
  { min:700, title:"Négociateur" },
  { min:1100, title:"Stratège Financier" },
  { min:1600, title:"Repreneur Confirmé" },
  { min:2300, title:"Bâtisseur de Groupe" }
];
function getLevelInfo(xp){
  let idx = 0;
  for(let i=0;i<LEVELS.length;i++){ if(xp >= LEVELS[i].min) idx = i; }
  const cur = LEVELS[idx];
  const next = LEVELS[idx+1] || null;
  const span = next ? (next.min - cur.min) : 1;
  const into = next ? (xp - cur.min) : 1;
  const pct = next ? Math.min(100, Math.round((into/span)*100)) : 100;
  return { title: cur.title, next, pct };
}

let saveTimeout = null;
function saveToCloud(){
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    if(!state.currentUser || !sbClient) return;
    try{
      const { error } = await sbClient.from('progress').upsert({
        user_id: state.currentUser.id,
        data: { progress: state.progress, chatHistory: state.chatHistory.slice(-30) },
        updated_at: new Date().toISOString()
      }, { onConflict: 'user_id' });
      if(error) throw error;
      state.dbStatus = "ok";
    } catch(e){
      console.error("Erreur de sauvegarde Supabase", e);
      state.dbStatus = "error";
    }
    updateSidebarStats();
  }, 500);
}

async function doSignOut(){
  if(sbClient) await sbClient.auth.signOut();
}

function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  const last = state.progress.lastActiveDate;
  if(last === today) return;
  if(last){
    const diffDays = Math.round((new Date(today) - new Date(last)) / 86400000);
    state.progress.streak = (diffDays === 1) ? (state.progress.streak + 1) : 1;
  } else {
    state.progress.streak = 1;
  }
  state.progress.lastActiveDate = today;
  saveProgress();
}

function awardXP(n){
  state.progress.xp += n;
  saveProgress();
  updateSidebarStats();
}

  if(!confirm("Réinitialiser toute ta progression (XP, leçons terminées, réponses, historique du chat) ? Cette action est irréversible.")) return;
  state.progress = JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
  state.chatHistory = [];
  saveToCloud();
  state.view = "onboarding";
  render();
}

  state.currentStep = 0;
  state.view = "lesson";
  render();
}

function openChatWithContext(prefill){
  state.view = "chat";
  render();
  if(prefill){
    setTimeout(() => {
      const box = document.getElementById('chatInput');
      if(box){ box.value = prefill; box.focus(); }
    }, 30);
  }
}

/* =========================================================
   RENDU PRINCIPAL
   ========================================================= */
function updateSidebarStats(){
  const info = getLevelInfo(state.progress.xp);
  const t1 = document.getElementById('sidebar-level-title');
  const f1 = document.getElementById('sidebar-xp-fill');
  const acc = document.getElementById('sidebar-account');
  const pwHint = document.getElementById('password-hint-wrap');
  if(t1) t1.textContent = info.title;
  if(f1) f1.style.width = info.pct + "%";
  if(acc) acc.textContent = state.currentUser ? ("Connecté : " + state.currentUser.email) : "";
  if(pwHint) pwHint.classList.toggle('hidden', !!state.progress.passwordSet);
  ["dashboard","roadmap","chat"].forEach(v => {
    const a = document.getElementById('nav-'+v); if(a) a.classList.toggle('active', state.view===v);
    const b = document.getElementById('bnav-'+v); if(b) b.classList.toggle('active', state.view===v);
  });
}

function render(){
  const app = document.getElementById('app');
  if(state.view === "loading"){ app.innerHTML = ""; return; }
  if(state.view === "config_needed") app.innerHTML = renderConfigNeeded();
  else if(state.view === "login") app.innerHTML = renderLogin();
  else if(state.view === "onboarding") app.innerHTML = renderOnboarding();
  else if(state.view === "dashboard") app.innerHTML = renderDashboard();
  else if(state.view === "roadmap") app.innerHTML = renderRoadmap();
  else if(state.view === "lesson") { app.innerHTML = ""; renderLesson(); }
  else if(state.view === "chat") { app.innerHTML = renderChatShell(); renderChatMessages(); }
  else if(state.view === "password_setup") app.innerHTML = renderPasswordSetup();
  updateSidebarStats();
  window.scrollTo(0,0);
}

async function signInWithPasswordUI(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const fb = document.getElementById('loginFeedback');
  if(!email || email.indexOf('@') === -1){ fb.textContent = "Entre un email valide."; return; }
  if(!password){ fb.textContent = "Entre ton mot de passe (ou utilise le lien par email ci-dessous si tu n'en as pas encore défini)."; return; }
  fb.textContent = "Connexion en cours...";
  try{
    const { error } = await sbClient.auth.signInWithPassword({ email, password });
    if(error) fb.textContent = "Erreur : " + (error.message === "Invalid login credentials" ? "email ou mot de passe incorrect." : error.message);
  } catch(e){
    fb.textContent = "Erreur de connexion à Supabase. Vérifie SUPABASE_URL et SUPABASE_ANON_KEY dans index.html.";
  }
}
async function sendMagicLink(){
  const emailInput = document.getElementById('loginEmail');
  const email = emailInput.value.trim();
  const fb = document.getElementById('loginFeedback');
  if(!email || email.indexOf('@') === -1){ fb.textContent = "Entre un email valide."; return; }
  fb.textContent = "Envoi en cours...";
  try{
    const redirectUrl = window.location.href.split('#')[0].split('?')[0];
    const { error } = await sbClient.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectUrl } });
    fb.textContent = error ? ("Erreur : " + error.message) : "Lien envoyé ! Vérifie ta boîte mail (et les spams) — clique sur le lien depuis l'appareil sur lequel tu veux te connecter.";
  } catch(e){
    fb.textContent = "Erreur de connexion à Supabase. Vérifie SUPABASE_URL et SUPABASE_ANON_KEY dans index.html.";
  }
}

async function submitPasswordSetup(){
  const pw = document.getElementById('newPassword').value;
  const pw2 = document.getElementById('newPasswordConfirm').value;
  const fb = document.getElementById('pwFeedback');
  if(pw.length < 8){ fb.textContent = "8 caractères minimum."; return; }
  if(pw !== pw2){ fb.textContent = "Les deux mots de passe ne correspondent pas."; return; }
  fb.textContent = "Enregistrement...";
  try{
    const { error } = await sbClient.auth.updateUser({ password: pw });
    if(error){
      fb.textContent = "Erreur : " + error.message;
    } else {
      fb.textContent = "✓ Mot de passe enregistré. Utilise-le dès maintenant sur tes autres appareils.";
      state.progress.passwordSet = true;
      saveProgress();
      updateSidebarStats();
    }
  } catch(e){
    fb.textContent = "Erreur de connexion à Supabase.";
  }
}

function findNextLesson(){
  for(const m of MODULES){
    if(!m.built) continue;
    for(const lid of m.lessonIds){
      if(!state.progress.completedLessons.includes(lid)) return { lesson: LESSONS[lid], module: m };
    }
  }
  return null;
}
function renderStorageBanner(){
  if(state.dbStatus !== "error") return "";
  return `<div class="storage-warning">
    <strong>Problème de connexion à la base de données.</strong> Ta dernière action n'a peut-être pas été sauvegardée. Vérifie ta connexion internet, et que SUPABASE_URL / SUPABASE_ANON_KEY dans index.html correspondent bien à ton projet Supabase. Recharge la page pour réessayer.
  </div>`;
}
function renderDashboard(){
  const info = getLevelInfo(state.progress.xp);
  const totalBuilt = MODULES.filter(m=>m.built).reduce((a,m)=>a+m.lessonIds.length,0);
  const doneBuilt = state.progress.completedLessons.length;

    <p class="subtitle">Niveau <b style="color:var(--gold-2); font-family:var(--font-display);">${info.title}</b>${info.next ? ' · encore ' + (LEVELS.find(l=>l.title===info.next.title).min - state.progress.xp) + ' XP avant ' + info.next.title : ''}</p>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${state.progress.xp}</div><div class="stat-label">XP total</div></div>

      <div class="stat-card"><div class="stat-num">${state.progress.completedModules.length}</div><div class="stat-label">Modules bouclés</div></div>
    </div>
    ${continueHtml}
    <div class="section-title">Ton parcours en un coup d'œil</div>
    ${renderJourneyMini()}
    <div style="margin-top:26px; display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn-ghost" onclick="goTo('roadmap')">Voir le parcours complet →</button>
      <button class="btn-ghost" id="copyAnswersBtn" onclick="copyAnswersForClaude()">📋 Copier mes réponses pour Claude</button>
    </div>
  `;
}
function collectValidationAnswersText(){
  const lines = [];
  Object.keys(state.progress.validationAnswers || {}).forEach(key => {
    const answer = state.progress.validationAnswers[key];
    if(!answer || !answer.trim()) return;
    const idx = key.lastIndexOf('_');
    const lessonId = key.slice(0, idx);
    const stepIndex = parseInt(key.slice(idx + 1), 10);
    const lesson = LESSONS[lessonId];
    const step = lesson && lesson.steps[stepIndex];
    if(!step) return;
    lines.push("[" + lesson.title + "] " + step.question + "\n→ " + answer.trim());
  });
  if(lines.length === 0) return "Aucune réponse de validation enregistrée pour l'instant.";
  return "Voici mes réponses aux questions de validation dans REPRISE. :\n\n" + lines.join("\n\n");
}
async function copyAnswersForClaude(){
  const text = collectValidationAnswersText();
  const btn = document.getElementById('copyAnswersBtn');
  const restore = (label) => { if(btn){ setTimeout(() => { btn.textContent = "📋 Copier mes réponses pour Claude"; }, 1800); btn.textContent = label; } };
  try{
    await navigator.clipboard.writeText(text);
    restore("✓ Copié !");
  } catch(e){
    try{
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      restore("✓ Copié !");
    } catch(e2){
      alert(text);
    }
  }
}
function renderJourneyMini(){
  return `<div class="journey" style="padding-left:30px;">` + PHASES.map(ph => {
    const doneCount = ph.moduleIds.filter(id => state.progress.completedModules.includes(id)).length;
    return `<div class="module-node ${doneCount===ph.moduleIds.length ? 'done' : (doneCount>0?'current':'')}">
      <div class="module-dot">${doneCount===ph.moduleIds.length ? iconCheck() : ph.id}</div>
      <div class="module-card"><div><div class="module-card-title" style="font-size:15px;">${ph.name}</div>
      <div class="module-card-desc">Modules ${ph.moduleIds.join(', ')}</div></div>
      <div class="module-card-meta">${doneCount}/${ph.moduleIds.length}</div></div></div>`;
  }).join('') + `</div>`;
}
function iconCheck(){ return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg>`; }
function iconLock(){ return `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a5 5 0 00-5 5v3H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2v-9a2 2 0 00-2-2h-2V6a5 5 0 00-5-5zm-3 8V6a3 3 0 016 0v3H9z"/></svg>`; }

/* =========================================================
   ROADMAP (Le Parcours)
   ========================================================= */
function renderRoadmap(){
  let html = `<div class="eyebrow">Le Parcours</div><h1>Ta feuille de route complète.</h1>
  <p class="subtitle">13 modules, répartis en 5 phases — du sourcing jusqu'à la stratégie de sortie. On construit le contenu ensemble, module après module.</p>
  <div class="journey">`;
  PHASES.forEach(ph => {
    html += `<div class="phase-label">Phase ${ph.id} — ${ph.name}</div>`;
    ph.moduleIds.forEach(mid => {
      const m = MODULES.find(x=>x.id===mid);
      const isDone = state.progress.completedModules.includes(mid);
      const lessonsDone = m.lessonIds.filter(l=>state.progress.completedLessons.includes(l)).length;
      const clickable = m.built;
      const cls = isDone ? 'done' : (m.built ? 'current clickable' : 'locked');
      html += `<div class="module-node ${cls}">
        <div class="module-dot">${isDone ? iconCheck() : (m.built ? m.id : iconLock())}</div>
        <div class="module-card" ${clickable ? `onclick="openModule(${m.id})"` : ''}>
          <div><div class="module-card-title">${m.title}</div><div class="module-card-desc">${m.desc}</div></div>
          <div class="module-card-meta">${m.built ? `<span class="badge-built">${lessonsDone}/${m.lessonIds.length} leçons</span>` : `<span class="badge-soon">à construire</span>`}</div>
        </div>
      </div>`;
    });
  });
  html += `</div>`;
  return html;
}
function openModule(moduleId){
  const m = MODULES.find(x=>x.id===moduleId);
  if(!m || !m.built) return;
  const firstUnfinished = m.lessonIds.find(l => !state.progress.completedLessons.includes(l)) || m.lessonIds[0];
  openLesson(firstUnfinished);
}

/* =========================================================
   MOTEUR DE LEÇON
   ========================================================= */
function renderLesson(){
  const app = document.getElementById('app');
  const lesson = LESSONS[state.currentLessonId];
  const stepIndex = state.currentStep;
  const step = lesson.steps[stepIndex];
  const total = lesson.steps.length;
  const pct = Math.round(((stepIndex+1)/total)*100);
  let body = "";
  if(step.type === "intro") body = stepIntro(lesson.id, stepIndex, step);
  else if(step.type === "concept") body = stepConcept(step);
  else if(step.type === "predict") body = stepMCQ(lesson.id, stepIndex, step);
  else if(step.type === "numeric") body = stepNumeric(lesson.id, stepIndex, step);
  else if(step.type === "pitfall") body = stepPitfall(step);
  else if(step.type === "expert") body = stepExpert(step);
  else if(step.type === "checkpoint") body = stepCheckpoint(step);
  else if(step.type === "validation") body = stepValidation(lesson.id, stepIndex, step);
  else if(step.type === "summary") body = stepSummary(lesson.id, step);
  const showFooter = (step.type !== "checkpoint" && step.type !== "summary");
  app.innerHTML = `
    <div class="lesson-view">
      <div class="lesson-header">
        <button class="back-link" onclick="goToRoadmap()">← Retour au parcours</button>
        <h2>${lesson.title}</h2>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="step-counter">ÉTAPE ${stepIndex+1} / ${total}</div>
      </div>
      <div class="lesson-body">${body}</div>
      ${showFooter ? `
      <div class="lesson-footer">
        ${stepIndex>0 ? `<button class="btn-ghost" onclick="prevStep()">← Précédent</button>` : `<span></span>`}
        <button class="btn-primary" onclick="nextStep()">Suivant →</button>
      </div>` : ``}
    </div>`;
}
function stepIntro(lessonId, stepIndex, step){
  const opts = step.mcq.options.map((o,i)=>`<button class="mcq-option" onclick="answerDiag('${lessonId}',${stepIndex},${i})">${o}</button>`).join('');
  return `<div class="step-card predict-card">
    <div class="step-label">${step.label}</div>
    <p style="margin-bottom:14px; color:var(--text-muted); font-size:14px;">${step.body}</p>
    <p class="step-question">${step.mcq.question}</p>
    <div class="mcq-options" id="diagopts-${lessonId}-${stepIndex}">${opts}</div>
  </div>`;
}
function answerDiag(lessonId, stepIndex, i){
  const step = LESSONS[lessonId].steps[stepIndex];
  state.progress.diagnostic[step.mcq.diagKey] = step.mcq.options[i];
  saveProgress();
  const container = document.getElementById(`diagopts-${lessonId}-${stepIndex}`);
  container.querySelectorAll('.mcq-option').forEach((b,idx) => { b.disabled = true; if(idx===i) b.classList.add('correct'); });
}
function stepConcept(step){
  return `<div class="concept-card"><div class="step-label">${step.label}</div>${step.body}</div>`;
}
function stepMCQ(lessonId, stepIndex, step){
  const opts = step.options.map((o,i)=>`<button class="mcq-option" id="opt-${lessonId}-${stepIndex}-${i}" onclick="answerMCQ('${lessonId}',${stepIndex},${i})">${o}</button>`).join('');
  return `<div class="predict-card">
    <div class="step-label">${step.label}</div>
    <p class="step-question">${step.question}</p>
    <div class="mcq-options">${opts}</div>
    <div class="mcq-explanation hidden" id="expl-${lessonId}-${stepIndex}"></div>
  </div>`;
}
function answerMCQ(lessonId, stepIndex, chosen){
  const step = LESSONS[lessonId].steps[stepIndex];
  for(let i=0;i<step.options.length;i++){
    const btn = document.getElementById(`opt-${lessonId}-${stepIndex}-${i}`);
    btn.disabled = true;
    if(i === step.correctIndex) btn.classList.add('correct');
    else if(i === chosen) btn.classList.add('incorrect');
  }
  const expl = document.getElementById(`expl-${lessonId}-${stepIndex}`);
  expl.classList.remove('hidden');
  expl.innerHTML = (chosen === step.correctIndex ? "✓ Exactement. " : "Pas tout à fait. ") + step.explanation;
  awardXP(chosen === step.correctIndex ? 15 : 8);
}
function stepNumeric(lessonId, stepIndex, step){
  return `<div class="exercise-card">
    <div class="step-label">${step.label}</div>
    <p class="step-question">${step.question}</p>
    <div class="numeric-row">
      <input type="number" id="num-${lessonId}-${stepIndex}" placeholder="${step.placeholder||''}">
      <button class="btn-primary" onclick="checkNumeric('${lessonId}',${stepIndex})">Vérifier</button>
    </div>
    <div class="numeric-feedback hidden" id="numfb-${lessonId}-${stepIndex}"></div>
  </div>`;
}
function checkNumeric(lessonId, stepIndex){
  const step = LESSONS[lessonId].steps[stepIndex];
  const input = document.getElementById(`num-${lessonId}-${stepIndex}`);
  const val = parseFloat(input.value);
  const fb = document.getElementById(`numfb-${lessonId}-${stepIndex}`);
  fb.classList.remove('hidden');
  const tol = step.tolerance !== undefined ? step.tolerance : Math.abs(step.answer*0.02);
  if(!isNaN(val) && Math.abs(val - step.answer) <= tol){
    fb.className = 'numeric-feedback success'; fb.innerHTML = "✓ " + step.successMsg; awardXP(20);
  } else {
    fb.className = 'numeric-feedback retry'; fb.innerHTML = step.hint;
  }
}
function stepPitfall(step){
  return `<div class="pitfall-card"><div class="step-label">${step.label}</div><ul>${step.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
}
function stepExpert(step){
  return `<div class="expert-card"><div class="step-label">${step.label}</div>${step.body}</div>`;
}
function stepCheckpoint(step){
  return `<div class="checkpoint-card">
    <div class="step-label">Point d'étape</div>
    <p class="step-question">${step.question}</p>
    <div class="checkpoint-actions">
      <button class="btn-primary" onclick="nextStep()">Oui, c'est clair →</button>
      <button class="btn-ghost" onclick="openChatWithContext(${JSON.stringify(step.helpPrompt||'')})">Pas encore, j'en discute</button>
    </div>
  </div>`;
}
function stepValidation(lessonId, stepIndex, step){
  const saved = state.progress.validationAnswers[lessonId+'_'+stepIndex] || '';
  return `<div class="validation-card">
    <div class="step-label">${step.label}</div>
    <p class="step-question">${step.question}</p>
    <textarea id="val-${lessonId}-${stepIndex}" placeholder="Écris ta réponse avec tes propres mots...">${saved}</textarea>
    <button class="btn-ghost" onclick="discussValidation('${lessonId}',${stepIndex})">Discuter de ma réponse avec le professeur</button>
  </div>`;
}
function discussValidation(lessonId, stepIndex){
  const step = LESSONS[lessonId].steps[stepIndex];
  const ta = document.getElementById(`val-${lessonId}-${stepIndex}`);
  const answer = ta ? ta.value.trim() : '';
  state.progress.validationAnswers[lessonId+'_'+stepIndex] = answer;
  saveProgress();
  const prefill = `Question de validation : "${step.question}"\n\nMa réponse : ${answer || "(je n'ai pas encore d'idée précise)"}\n\nQu'en penses-tu ?`;
  openChatWithContext(prefill);
}
function stepSummary(lessonId, step){
  return `<div class="summary-card">
    <div class="step-label">En résumé</div>
    <p>${step.summary}</p>
    <p class="next-hint">Prochaine étape : ${step.nextHint}</p>
    <button class="btn-primary" onclick="finishLesson('${lessonId}')" style="margin-top:8px;">Terminer la leçon ✓</button>
  </div>`;
}
function nextStep(){
  const lesson = LESSONS[state.currentLessonId];
  // sauvegarder les réponses de validation avant de changer d'étape
  const cur = lesson.steps[state.currentStep];
  if(cur.type === 'validation'){
    const ta = document.getElementById(`val-${lesson.id}-${state.currentStep}`);
    if(ta) { state.progress.validationAnswers[lesson.id+'_'+state.currentStep] = ta.value; saveProgress(); }
  }
  if(state.currentStep < lesson.steps.length - 1){
    state.currentStep++; awardXP(6); render();
  } else {
    render();
  }
}
function prevStep(){
  if(state.currentStep > 0){ state.currentStep--; render(); }
}
function finishLesson(lessonId){
  if(!state.progress.completedLessons.includes(lessonId)){
    state.progress.completedLessons.push(lessonId);
    awardXP(60);
    checkModuleCompletion(LESSONS[lessonId].moduleId);
  }
  saveProgress();
  state.view = "roadmap";
  state.currentLessonId = null; state.currentStep = 0;
  render();
}
function checkModuleCompletion(moduleId){
  const m = MODULES.find(x=>x.id===moduleId);
  const allDone = m.lessonIds.every(l => state.progress.completedLessons.includes(l));
  if(allDone && !state.progress.completedModules.includes(moduleId)){
    state.progress.completedModules.push(moduleId);
    awardXP(200);
  }
}

/* =========================================================
   CHAT AVEC LE PROFESSEUR (appel API en direct)
   ========================================================= */
const CHAT_ENABLED = true;
function renderChatShell(){
  if(!CHAT_ENABLED){
    return `
    <div class="eyebrow">Le professeur</div>
    <h1 style="margin-bottom:16px;">Chat IA — pas encore branché ici.</h1>
    <p class="subtitle">Cette version autonome ne connecte pas encore l'IA : ça demande une petite fonction serveur séparée pour protéger la clé API (sinon n'importe qui pourrait la lire dans le code source de la page). Dis-le à Claude dans ta conversation pour qu'on la branche.</p>
    <div class="onboard-q">
      <p style="color:var(--text-muted); font-size:14px;">En attendant, tout le reste — leçons, exercices, progression, synchro — fonctionne normalement.</p>
    </div>`;
  }
  return `
  <div class="eyebrow">Le professeur</div>
  <h1 style="margin-bottom:16px;">Pose n'importe quelle question.</h1>
  <div class="chat-wrap">
    <div class="chat-hint">Le professeur connaît ton projet (rachat en IDF, 500 K€–3 M€ de CA, profil « belle endormie », financement sans apport). Ce chat utilise ta propre clé API Anthropic (quelques centimes par échange). Pour tout point juridique ou fiscal précis, vérifie toujours avec ton expert-comptable ou ton avocat M&A.</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <textarea id="chatInput" placeholder="Écris ta question..." onkeydown="handleChatKey(event)"></textarea>
      <button class="btn-primary" onclick="sendChatMessage()" id="chatSendBtn">Envoyer</button>
    </div>
  </div>`;
}
function handleChatKey(e){
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendChatMessage(); }
}
function renderChatMessages(){
  const box = document.getElementById('chatMessages');
  if(!box) return;
  if(state.chatHistory.length === 0){
    box.innerHTML = `<div class="chat-empty">Aucune conversation pour l'instant.<br>Essaie par exemple : « Pourquoi une holding plutôt qu'un rachat en direct ? »</div>`;
  } else {
    box.innerHTML = state.chatHistory.map(m => `<div class="msg ${m.role==='user'?'msg-user':'msg-assistant'}">${escapeHtml(m.content).replace(/\n/g,'<br>')}</div>`).join('');
    if(state.chatBusy){ box.innerHTML += `<div class="msg msg-assistant typing">Le professeur réfléchit…</div>`; }
  }
  box.scrollTop = box.scrollHeight;
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
async function sendChatMessage(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text || state.chatBusy) return;
  state.chatHistory.push({role:'user', content:text});
  input.value = '';
  state.chatBusy = true;
  renderChatMessages();
  saveChat();
  const reply = await callProfessor();
  state.chatBusy = false;
  state.chatHistory.push({role:'assistant', content:reply});
  saveChat();
  renderChatMessages();
}
function buildSystemPrompt(){
  const d = state.progress.diagnostic || {};
  return `Tu incarnes "Le Professeur" de REPRISE. — et ce n'est surtout pas un enseignant académique qui récite des définitions de manuel. Parle comme un repreneur d'expérience qui a vu passer un grand nombre de dossiers de rachat de PME, et qui prend le temps de transmettre non seulement la théorie, mais surtout les erreurs qu'on ne voit qu'après les avoir commises — les siennes et celles des autres. Le ton est celui d'un mentor franc qui te dit ce qui va te mordre si tu n'y fais pas attention, pas celui d'un consultant qui lisse tout pour ne froisser personne.

PROJET DE L'UTILISATEUR (contexte permanent à utiliser) :
- Rachat d'une entreprise en Île-de-France, CA entre 500 K€ et 3 M€.
- Profil ciblé : une "belle endormie" — rentable, stable, sans développement récent, peu digitalisée, sans CRM ni prospection structurée, dépendante d'un portefeuille client historique, marché stable ou en croissance, revenus récurrents, EBITDA > 15%, faible dépendance à quelques clients, avantage concurrentiel difficile à copier ou forte demande locale.
- Objectif de deal : racheter à un multiple inférieur à 3x l'EBITDA, SANS mobiliser sa trésorerie personnelle (financement via trésorerie excédentaire de la cible, crédit-vendeur, dette bancaire, dette investisseur, structuré via une holding d'acquisition).
- Après le rachat, deux objectifs possibles selon la suite : (1) faire croître/structurer/adapter l'entreprise pour la revendre avec plus-value entre 1 et 3 ans, ou (2) développer avec un gérant en place (rythme de suivi : quotidien 0-3 mois, hebdomadaire 3-6 mois, trimestriel ensuite) dans une logique de build-up (portefeuille d'entreprises).
- Diagnostic de l'utilisateur : niveau comptable = ${d.comptes||'inconnu'} ; avancement du projet = ${d.avancement||'inconnu'} ; principale crainte = ${d.peur||'inconnue'}.

TON STYLE PEDAGOGIQUE (à respecter scrupuleusement) :
1. Distingue exposition et exploration : si la question porte sur "comment ça marche en général" (normes établies : mécanique d'un LBO, définition d'un terme, fiscalité standard), donne directement la réponse avec confiance — ne transforme jamais une question factuelle en devinette. Réserve les questions en retour aux cas où tu explores SA situation spécifique (ex: "sur CETTE cible, avec CES chiffres, que ferais-tu ?").
2. Honnêteté radicale : si un point est incertain, débattu, dépend du cas précis, ou risque d'avoir changé (taux d'intérêt, seuils fiscaux, jurisprudence), dis-le clairement et recommande de vérifier avec un expert-comptable ou un avocat M&A plutôt que d'inventer un chiffre précis. Tu peux parler avec le recul d'un praticien de terrain ("c'est l'erreur que je vois revenir neuf fois sur dix chez les repreneurs débutants", "voici ce qui arrive presque systématiquement quand..."), mais n'invente JAMAIS un cas personnel précis et vérifiable (nom d'entreprise, date, lieu) présenté comme un fait que tu aurais réellement vécu — reste sur des schémas généraux et des scénarios illustratifs, jamais une fausse biographie.
3. Si l'utilisateur te soumet une réponse à une question de validation ou un raisonnement qui te semble incomplet ou erroné, ne donne pas immédiatement "la bonne réponse" — pose d'abord une question qui l'aide à creuser son propre raisonnement (sauf s'il dit explicitement être bloqué ou demande la réponse directement).
4. Pas de réponse fleuve : va à l'essentiel, structure en points courts si utile, et propose d'approfondir si besoin plutôt que de tout déverser d'un coup.
5. Toujours au moins un exemple concret et chiffré quand c'est pertinent pour ce type de deal (PME IDF, 500K-3M€ de CA) — et ancre-le si possible dans une scène un peu brute et vécue ("si un cédant te sort cette phrase-là, méfie-toi", "voilà exactement ce qui se passe le jour où tu découvres ça après signature") plutôt qu'une définition froide.
6. Ton chaleureux, direct, jamais condescendant — aucune question n'est "basique". Tu peux être franc jusqu'à la brusquerie sur les erreurs qui coûtent cher, tant que ça reste bienveillant.
7. Termine si pertinent par UNE seule question ou piste d'action, jamais plusieurs à la fois.

Réponds toujours en français.`;
}
async function callProfessor(){
  const systemPrompt = buildSystemPrompt();
  const messages = state.chatHistory.slice(-16).map(m => ({role: m.role, content: m.content}));
  try{
    const { data: sessionData } = await sbClient.auth.getSession();
    if(!sessionData || !sessionData.session){
      return "Ta session a expiré. Recharge la page et reconnecte-toi.";
    }
    const functionUrl = SUPABASE_URL + "/functions/v1/chat-proxy";
    const response = await fetch(functionUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + sessionData.session.access_token
      },
      body: JSON.stringify({ system: systemPrompt, messages: messages })
    });
    const data = await response.json();
    if(data && data.content){
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
      if(text) return text;
    }
    if(data && data.error){
      const msg = typeof data.error === 'string' ? data.error : (data.error.message || JSON.stringify(data.error));
      return "Le professeur a rencontré un problème : " + msg;
    }
    return "Je n'ai pas réussi à formuler une réponse claire cette fois-ci. Peux-tu reformuler ta question ?";
  } catch(e){
    console.error(e);
    return "Je n'arrive pas à joindre le professeur pour le moment — vérifie ta connexion et réessaie dans un instant.";
  }
}
