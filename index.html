<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>REPRISE. — Ton académie de rachat d'entreprise</title>

<!-- Installation sur écran d'accueil (Android/Chrome) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#11162A">

<!-- Installation sur écran d'accueil (iOS/Safari) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REPRISE.">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
  :root{
    --ink: #11162A;
    --ink-2: #1A2140;
    --ink-3: #232C54;
    --ink-border: #333E6E;
    --paper: #EFE8D6;
    --paper-2: #E5DAC0;
    --paper-border: #CBB98E;
    --gold: #C99A3E;
    --gold-2: #E2BE6E;
    --wine: #96434D;
    --wine-2: #B96269;
    --forest: #3D7A5C;
    --forest-2: #5AA07C;
    --text-light: #F2EDDF;
    --text-muted: #9BA3C4;
    --text-dark: #241F33;
    --text-dark-muted: #7A6F53;
    --radius: 16px;
    --radius-sm: 9px;
    --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "Roboto Mono", "Courier New", monospace;
  }
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
  html, body { height:100%; }
  body{
    font-family: var(--font-body);
    background: var(--ink);
    background-image:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(201,154,62,0.10), transparent),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(61,122,92,0.09), transparent);
    color: var(--text-light);
    min-height: 100vh;
    line-height: 1.55;
  }
  button, input, textarea { font-family: inherit; color: inherit; }
  button { cursor: pointer; }
  ::selection{ background: var(--gold); color: var(--ink); }
  a { color: var(--gold-2); }

  /* ---------- Shell layout ---------- */
  .shell{ display:flex; min-height:100vh; }
  .sidebar{
    width: 250px; flex-shrink:0;
    background: linear-gradient(180deg, var(--ink-2), var(--ink));
    border-right: 1px solid var(--ink-border);
    display:flex; flex-direction:column;
    padding: 28px 20px;
    position: sticky; top:0; height:100vh;
  }
  .brand{ display:flex; align-items:baseline; gap:8px; margin-bottom: 6px; }
  .brand-mark{
    font-family: var(--font-display); font-size: 26px; letter-spacing: 0.5px;
    color: var(--text-light);
  }
  .brand-dot{ color: var(--gold); }
  .brand-tagline{ font-size: 12px; color: var(--text-muted); margin-bottom: 34px; }
  .nav-item{
    display:flex; align-items:center; gap:12px;
    padding: 11px 14px; border-radius: var(--radius-sm);
    color: var(--text-muted); background: transparent; border: none; text-align:left;
    font-size: 14.5px; font-weight: 500; width:100%;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .nav-item svg{ flex-shrink:0; opacity: 0.85; }
  .nav-item:hover{ background: rgba(255,255,255,0.04); color: var(--text-light); }
  .nav-item.active{ background: var(--ink-3); color: var(--gold-2); }
  .nav-item.active svg{ opacity:1; }
  .sidebar-footer{ margin-top:auto; padding-top: 20px; border-top: 1px solid var(--ink-border); }
  .mini-level{ font-size: 12.5px; color: var(--text-muted); margin-bottom: 8px; }
  .mini-level b{ color: var(--gold-2); font-family: var(--font-display); }
  .mini-xp-bar{ height:6px; border-radius:4px; background: var(--ink-3); overflow:hidden; margin-bottom: 12px;}
  .mini-xp-fill{ height:100%; background: linear-gradient(90deg, var(--gold), var(--gold-2)); border-radius:4px; transition: width 0.5s ease; }
  .reset-link{ font-size: 11.5px; color: var(--text-muted); background:none; border:none; text-decoration: underline; opacity:0.7; padding:0; }
  .reset-link:hover{ opacity:1; color: var(--wine-2); }

  .main{ flex:1; min-width:0; padding: 40px 44px 100px; max-width: 920px; }
  @media (max-width: 900px){ .main{ padding: 28px 20px 100px; } }

  /* ---------- Mobile bottom nav ---------- */
  .bottom-nav{ display:none; }
  @media (max-width: 767px){
    .sidebar{ display:none; }
    .bottom-nav{
      display:flex; position:fixed; bottom:0; left:0; right:0; z-index: 50;
      background: var(--ink-2); border-top: 1px solid var(--ink-border);
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
    }
    .bottom-nav button{
      flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
      background:none; border:none; color: var(--text-muted); font-size: 11px; padding: 6px 2px;
      border-radius: var(--radius-sm);
    }
    .bottom-nav button.active{ color: var(--gold-2); }
    .main{ padding-bottom: 90px; }
  }

  /* ---------- Typography ---------- */
  h1,h2,h3{ font-family: var(--font-display); font-weight:400; letter-spacing:0.2px; }
  h1{ font-size: 30px; margin-bottom: 6px; }
  h2{ font-size: 22px; }
  .eyebrow{ font-size: 11.5px; text-transform: uppercase; letter-spacing: 1.6px; color: var(--gold-2); font-weight:600; margin-bottom:10px; }
  .subtitle{ color: var(--text-muted); font-size: 15px; margin-bottom: 28px; }

  /* ---------- Buttons ---------- */
  .btn-primary{
    background: linear-gradient(180deg, var(--gold-2), var(--gold));
    color: #21170a; border:none; font-weight:700; font-size:14.5px;
    padding: 12px 22px; border-radius: 999px; box-shadow: 0 4px 14px rgba(201,154,62,0.28);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 6px 18px rgba(201,154,62,0.38); }
  .btn-primary:active{ transform: translateY(0); }
  .btn-ghost{
    background: transparent; border: 1px solid var(--ink-border); color: var(--text-light);
    font-size: 14px; padding: 11px 20px; border-radius: 999px; font-weight:500;
  }
  .btn-ghost:hover{ border-color: var(--gold-2); color: var(--gold-2); }
  button:focus-visible, .nav-item:focus-visible, input:focus-visible, textarea:focus-visible{
    outline: 2px solid var(--gold-2); outline-offset: 2px;
  }
  button:disabled{ opacity:0.55; cursor: default; }

  /* ---------- Dashboard ---------- */
  .stat-row{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom: 30px; }
  .stat-card{
    background: var(--ink-2); border: 1px solid var(--ink-border); border-radius: var(--radius);
    padding: 18px 20px; flex:1; min-width:140px;
  }
  .stat-num{ font-family: var(--font-mono); font-size: 26px; color: var(--gold-2); font-variant-numeric: tabular-nums; }
  .stat-label{ font-size: 12px; color: var(--text-muted); margin-top:2px; }
  .continue-card{
    background: linear-gradient(135deg, var(--ink-3), var(--ink-2));
    border: 1px solid var(--ink-border); border-radius: var(--radius);
    padding: 26px 28px; margin-bottom: 34px; position:relative; overflow:hidden;
  }
  .continue-card::before{
    content:""; position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%;
    background: radial-gradient(circle, rgba(201,154,62,0.18), transparent 70%);
  }
  .continue-eyebrow{ font-size:11.5px; text-transform:uppercase; letter-spacing:1.4px; color: var(--text-muted); margin-bottom:8px; }
  .continue-title{ font-family: var(--font-display); font-size:21px; margin-bottom:14px; }
  .section-title{ font-family: var(--font-display); font-size:17px; color: var(--text-light); margin: 34px 0 16px; display:flex; align-items:center; gap:10px; }

  /* ---------- Roadmap (journey) ---------- */
  .journey{ position:relative; padding-left: 30px; }
  .journey::before{
    content:""; position:absolute; left:13px; top:10px; bottom:10px; width:2px;
    background: linear-gradient(180deg, var(--gold) 0%, var(--ink-border) 100%);
  }
  .phase-block{ margin-bottom: 8px; }
  .phase-label{
    font-size: 12px; text-transform: uppercase; letter-spacing:1.3px; color: var(--text-muted);
    margin: 26px 0 14px -30px; padding-left: 0; font-weight:600;
  }
  .phase-label:first-child{ margin-top:0; }
  .module-node{ position:relative; margin-bottom: 14px; }
  .module-dot{
    position:absolute; left:-30px; top: 18px; width:26px; height:26px; border-radius:50%;
    background: var(--ink-3); border: 2px solid var(--ink-border);
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
    color: var(--text-muted); z-index:2;
  }
  .module-node.done .module-dot{ background: var(--forest); border-color: var(--forest-2); color:#eafff2; }
  .module-node.current .module-dot{ background: var(--gold); border-color: var(--gold-2); color:#21170a; box-shadow: 0 0 0 4px rgba(201,154,62,0.18); }
  .module-card{
    background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius);
    padding: 16px 18px; display:flex; justify-content:space-between; align-items:center; gap: 14px;
    transition: border-color 0.15s ease;
  }
  .module-node.clickable .module-card{ cursor:pointer; }
  .module-node.clickable .module-card:hover{ border-color: var(--gold); }
  .module-card-title{ font-family: var(--font-display); font-size:16.5px; margin-bottom:4px; }
  .module-card-desc{ font-size: 13px; color: var(--text-muted); }
  .module-card-meta{ font-size: 11.5px; color: var(--text-muted); white-space:nowrap; text-align:right; flex-shrink:0; }
  .module-node.locked .module-card{ opacity: 0.55; }
  .module-node.locked .module-card-meta{ color: var(--text-muted); }
  .badge-built{ background: var(--forest); color:#eafff2; font-size:10.5px; padding:2px 9px; border-radius:999px; font-weight:700; letter-spacing:0.4px; }
  .badge-soon{ background: var(--ink-3); border:1px solid var(--ink-border); color: var(--text-muted); font-size:10.5px; padding:2px 9px; border-radius:999px; }

  /* ---------- Lesson view ---------- */
  .lesson-header{ margin-bottom: 26px; }
  .back-link{ background:none; border:none; color: var(--text-muted); font-size:13px; margin-bottom:14px; padding:0; }
  .back-link:hover{ color: var(--gold-2); }
  .progress-bar{ height:5px; background: var(--ink-3); border-radius:4px; overflow:hidden; margin: 12px 0 6px; }
  .progress-fill{ height:100%; background: linear-gradient(90deg, var(--gold), var(--forest-2)); transition: width 0.4s ease; }
  .step-counter{ font-size:12px; color: var(--text-muted); font-family: var(--font-mono); }

  .step-card{ animation: rise 0.25s ease; }
  @keyframes rise{ from{ opacity:0; transform: translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .step-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:1.3px; color: var(--gold-2); font-weight:700; margin-bottom: 12px; }
  .step-question{ font-size: 17px; margin-bottom: 18px; }

  .concept-card{
    background: var(--paper); color: var(--text-dark); border-radius: var(--radius);
    padding: 26px 28px; box-shadow: 0 10px 34px rgba(0,0,0,0.28);
  }
  .concept-card .step-label{ color: var(--wine); }
  .concept-card p{ margin-bottom: 14px; font-size:15.5px; }
  .concept-card p:last-child{ margin-bottom:0; }
  .concept-card ol, .concept-card ul{ padding-left: 20px; margin: 10px 0 14px; }
  .concept-card li{ margin-bottom:8px; font-size:15px; }
  .concept-card strong{ color: var(--wine); }
  .concept-card .term{ font-family: var(--font-mono); background: var(--paper-2); padding:1px 6px; border-radius:5px; font-size:0.92em; }

  .predict-card, .exercise-card, .checkpoint-card, .validation-card{
    background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius); padding: 24px 26px;
  }
  .mcq-options{ display:flex; flex-direction:column; gap:9px; }
  .mcq-option{
    background: var(--ink-3); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 12px 16px; text-align:left; font-size:14.5px; color: var(--text-light);
    transition: border-color 0.15s ease;
  }
  .mcq-option:hover:not(:disabled){ border-color: var(--gold-2); }
  .mcq-option.correct{ border-color: var(--forest-2); background: rgba(61,122,92,0.22); }
  .mcq-option.incorrect{ border-color: var(--wine-2); background: rgba(150,67,77,0.2); }
  .mcq-explanation{ margin-top:16px; padding:14px 16px; background: var(--ink); border-radius: var(--radius-sm); font-size:14px; border-left:3px solid var(--gold); }
  .mcq-explanation.hidden{ display:none; }

  .numeric-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .numeric-row input{
    background: var(--ink); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 11px 14px; font-family: var(--font-mono); font-size:15px; color: var(--text-light); width:170px;
  }
  .numeric-feedback{ margin-top:14px; padding:13px 16px; border-radius: var(--radius-sm); font-size:14px; }
  .numeric-feedback.hidden{ display:none; }
  .numeric-feedback.success{ background: rgba(61,122,92,0.22); border-left:3px solid var(--forest-2); }
  .numeric-feedback.retry{ background: rgba(150,67,77,0.16); border-left:3px solid var(--wine-2); }

  .pitfall-card{ background: rgba(150,67,77,0.14); border:1px solid var(--wine-2); border-radius: var(--radius); padding:22px 26px; }
  .pitfall-card .step-label{ color: var(--wine-2); }
  .pitfall-card ul{ padding-left:20px; }
  .pitfall-card li{ margin-bottom:10px; font-size:14.5px; }

  .expert-card{ background: rgba(201,154,62,0.10); border:1px solid var(--gold); border-radius: var(--radius); padding:22px 26px; }
  .expert-card p{ font-size:15px; margin-bottom:10px; }
  .expert-card p:last-child{ margin-bottom:0; }

  .checkpoint-card{ text-align:center; }
  .checkpoint-actions{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:6px; }

  .validation-card textarea{
    width:100%; min-height:100px; background: var(--ink); border:1px solid var(--ink-border);
    border-radius: var(--radius-sm); padding:13px 15px; font-size:14.5px; color: var(--text-light);
    resize: vertical; margin-bottom: 14px;
  }
  .summary-card{ background: var(--ink-2); border:1px solid var(--gold); border-radius: var(--radius); padding: 26px 28px; }
  .summary-card p{ font-size:15.5px; margin-bottom:14px; }
  .next-hint{ color: var(--text-muted); font-size:14px; font-style:italic; }

  .lesson-footer{ display:flex; justify-content:space-between; margin-top:24px; }

  /* ---------- Onboarding ---------- */
  .onboard-wrap{ max-width: 620px; }
  .onboard-q{ background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius); padding:22px 24px; margin-bottom:18px; }
  .onboard-q p{ font-size:15px; margin-bottom:14px; }

  /* ---------- Chat ---------- */
  .chat-wrap{ display:flex; flex-direction:column; height: calc(100vh - 80px); max-height: 780px; }
  .chat-messages{ flex:1; overflow-y:auto; padding: 6px 2px 16px; display:flex; flex-direction:column; gap:14px; }
  .msg{ max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size:14.5px; line-height:1.5; }
  .msg-user{ align-self:flex-end; background: linear-gradient(180deg, var(--gold-2), var(--gold)); color:#21170a; border-bottom-right-radius:4px; }
  .msg-assistant{ align-self:flex-start; background: var(--paper); color: var(--text-dark); border-bottom-left-radius:4px; box-shadow: 0 4px 16px rgba(0,0,0,0.22); }
  .msg-assistant.typing{ color: var(--text-dark-muted); font-style: italic; }
  .chat-empty{ color: var(--text-muted); text-align:center; margin-top: 50px; font-size:14.5px; }
  .chat-input-row{ display:flex; gap:10px; border-top:1px solid var(--ink-border); padding-top:14px; }
  .chat-input-row textarea{
    flex:1; background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 12px 14px; color: var(--text-light); font-size:14.5px; resize:none; min-height:46px; max-height:140px;
  }
  .chat-hint{ font-size:12px; color: var(--text-muted); margin-bottom:10px; }

  .hidden{ display:none !important; }
  .icon{ display:inline-flex; vertical-align:middle; }
  .storage-warning{
    background: rgba(150,67,77,0.16); border:1px solid var(--wine-2); border-radius: var(--radius);
    padding:16px 20px; margin-bottom:26px; font-size:13.5px; line-height:1.6; color: var(--text-light);
  }
  .storage-warning strong{ color: var(--wine-2); }
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="brand"><span class="brand-mark">REPRISE<span class="brand-dot">.</span></span></div>
    <div class="brand-tagline">Ton académie de rachat d'entreprise</div>
    <button class="nav-item" id="nav-dashboard" onclick="goTo('dashboard')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Tableau de bord
    </button>
    <button class="nav-item" id="nav-roadmap" onclick="goTo('roadmap')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16M4 6c3-2 5 2 8 0s5 2 8 0V4c-3 2-5-2-8 0S7 2 4 4Z"/></svg>
      Parcours
    </button>
    <button class="nav-item" id="nav-chat" onclick="goTo('chat')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>
      Prof IA
    </button>
    <button class="nav-item" id="nav-agent" onclick="goTo('agent')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      Agent
    </button>
    <button class="nav-item" id="nav-analyzer" onclick="goTo('analyzer')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
      Analyseur
    </button>
    <button class="nav-item" id="nav-revision" onclick="goTo('revision')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      Révision
    </button>
    <div class="sidebar-footer">
      <div class="mini-level">Niveau <b id="sidebar-level-title">—</b></div>
      <div class="mini-xp-bar"><div class="mini-xp-fill" id="sidebar-xp-fill" style="width:0%"></div></div>
      <div id="sidebar-account" style="font-size:11px; color:var(--text-muted); margin-bottom:8px; word-break:break-all;"></div>
      <button class="reset-link" onclick="confirmReset()">Réinitialiser ma progression</button>
      <button class="reset-link" onclick="doSignOut()" style="margin-left:12px;">Se déconnecter</button>
      <div id="password-hint-wrap" style="margin-top:8px;"><button class="reset-link" onclick="goTo('password_setup')">🔒 Définir un mot de passe</button></div>
    </div>
  </nav>

  <main class="main" id="app"></main>
</div>

<div class="bottom-nav">
  <button id="bnav-dashboard" onclick="goTo('dashboard')">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
    Accueil
  </button>
  <button id="bnav-roadmap" onclick="goTo('roadmap')">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16M4 6c3-2 5 2 8 0s5 2 8 0V4c-3 2-5-2-8 0S7 2 4 4Z"/></svg>
    Parcours
  </button>
  <button id="bnav-chat" onclick="goTo('chat')">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>
    Prof
  </button>
  <button id="bnav-agent" onclick="goTo('agent')">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    Agent
  </button>
</div>

<script>
/* =========================================================
   DONNEES DU PROGRAMME
   ========================================================= */
const PHASES = [

      { type:"concept", label:"Le principe qui change tout",
        body:`<p>Voici l'idée centrale de tout ce module, et probablement la plus rentable de tout ce programme : <strong>il ne s'agit pas de créer de la croissance, mais de révéler du cash déjà présent dans l'entreprise.</strong></p>

        body:`<p><strong>Objectif : sécuriser l'existant et préserver le cash.</strong> Rien d'autre ne compte encore.</p>

  cf2: {
    id:"cf2", moduleId:10, title:"Phase 2 : Extraction de cash", duration:"15 min",
    steps:[
      { type:"concept", label:"Le levier le plus puissant de tout le système",
        body:`<p><strong>Objectif de la Phase 2 (1 à 3 mois) : augmenter le cash-flow SANS croissance.</strong> Tu n'as pas encore besoin d'un seul client de plus.</p>
        <p>Le levier principal, et de loin le plus puissant : <strong>le pricing.</strong> Voici pourquoi il domine tous les autres leviers : une augmentation de prix va (presque) intégralement dans ta marge, alors qu'un euro de chiffre d'affaires supplémentaire par la croissance traîne avec lui des coûts additionnels (acquisition, production, service). Prix et volume ne se valent pas du tout, euro pour euro.</p>` },
      { type:"numeric", label:"Exercice — l'effet de levier du pricing",
        question:"Une entreprise fait 800 000 € de CA avec 20% de marge nette (160 000 €). Tu augmentes tous les prix de 8%, sans perdre un seul client et sans coût supplémentaire. Quelle est la nouvelle marge nette en euros (arrondis) ?",
        placeholder:"Ex : 200000", answer:224000, tolerance:2000,
        successMsg:"224 000 € (160 000 € + 8% × 800 000 €). Ta marge nette augmente de 40% alors que le CA n'a bougé que de 8%. C'est ça, l'effet de levier du pricing : un petit mouvement sur le prix a un effet démultiplié sur ce qui te reste réellement en poche.",
        hint:"Indice : les 8% d'augmentation de prix (64 000 €) s'ajoutent presque intégralement à la marge existante, puisque les coûts ne changent pas." },
      { type:"concept", label:"Comment augmenter les prix sans perdre ses clients",
        body:`<p><strong>Le levier pricing en pratique :</strong></p>
        <ul>
          <li><strong>Augmentation des prix de 5 à 15%</strong> — la fourchette qui fonctionne dans la majorité des PME sans provoquer de départs massifs.</li>
          <li><strong>Segmentation clients</strong> — n'augmente pas tout le monde pareil. Un client fidèle depuis 10 ans avec un fort coût de changement de fournisseur tolère plus qu'un client récent et opportuniste.</li>
          <li><strong>Réduction des remises injustifiées</strong> — dans la plupart des PME rachetées, des remises historiques traînent sans plus aucune justification commerciale.</li>
          <li><strong>Correction des oublis de facturation</strong> — des prestations réalisées mais jamais refacturées, plus fréquent qu'on ne le pense dans les structures peu digitalisées.</li>
        </ul>
        <p>En parallèle, <strong>optimise le besoin en fonds de roulement (BFR)</strong> : réduis les délais de paiement clients, allonge (raisonnablement) les délais fournisseurs, optimise les niveaux de stock. Ce sont des leviers de trésorerie immédiate, sans toucher au compte de résultat.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Augmenter les prix de façon uniforme et brutale, sans tester ni segmenter — c'est le meilleur moyen de perdre exactement les clients qu'il ne fallait pas perdre.",
          "Annoncer une hausse sans justification ni accompagnement : une hausse expliquée (qualité, coûts, valeur ajoutée) passe presque toujours mieux qu'une hausse silencieuse qu'on découvre sur une facture."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté ne fait jamais une hausse de prix « à l'aveugle ». Il segmente d'abord sa base clients en trois groupes : les clients captifs (fort coût de changement, faible sensibilité prix), les clients loyaux mais sensibles, et les clients opportunistes (déjà en train de comparer). Il augmente fortement le premier groupe, modérément le deuxième, et retravaille l'offre plutôt que le prix pour le troisième.</p>
        <p>Un débutant augmente tout le monde pareil et découvre la segmentation... après avoir perdu les clients qu'il n'aurait jamais dû toucher en premier.</p>` },
      { type:"checkpoint", question:"L'idée que le pricing soit le levier n°1 (avant même la croissance) te semble-t-elle claire ?",
        helpPrompt:"Je viens de voir que le pricing est présenté comme le levier n°1 pour extraire du cash, avant même de chercher de nouveaux clients. Peux-tu m'aider à réfléchir à comment je testerais une hausse de prix sur une cible réelle, étape par étape ?" },
      { type:"summary",
        summary:"Le pricing est le levier le plus puissant du système : un euro de prix va presque intégralement dans ta marge, contrairement à un euro de croissance qui traîne des coûts avec lui. Segmenter avant d'augmenter fait toute la différence entre une hausse réussie et une hausse qui fait fuir les clients.",
        nextHint:"La Phase 3 : comment faire croître le cash, pas seulement le chiffre d'affaires, sur 3 à 12 mois." }
    ]
  },

  cf3: {

      { type:"concept", label:"Croissance intelligente ≠ chiffre d'affaires",
        body:`<p><strong>Objectif de la Phase 3 (3 à 12 mois) : augmenter le CASH, pas uniquement le chiffre d'affaires.</strong> C'est une distinction essentielle : un CA en hausse avec des délais de paiement clients qui s'allongent, des remises qui repartent, ou des coûts d'acquisition mal maîtrisés peut très bien générer... moins de cash qu'avant.</p>`  },
      { type:"predict", label:"À toi de jouer",
        question:"Pourquoi une entreprise peut-elle voir son chiffre d'affaires augmenter de 20% tout en ayant MOINS de cash en banque qu'avant ?",
        options:["C'est impossible si le CA augmente","Parce que les nouveaux clients paient plus tard, ou que les coûts d'acquisition et de livraison ont augmenté plus vite que le CA","Parce que la comptabilité est forcément fausse"],
        correctIndex:1,
        explanation:"Exactement. Le CA est une opinion comptable ; le cash est un fait bancaire. C'est pour ça que la Phase 3 doit toujours être pilotée avec les indicateurs de cash de la Phase 4, jamais avec le seul chiffre d'affaires comme boussole." },
      { type:"concept", label:"Les 5 chantiers de la croissance intelligente",
        body:`<ul>
          <li><strong>Activation de la base clients existante</strong> — un CRM (HubSpot, Pipedrive) pour segmenter (clients top, dormants, récents) et lancer upsell, cross-sell, réactivation. C'est souvent le chantier le plus rentable : il coûte moins cher de réactiver un client dormant que d'en acquérir un nouveau.</li>
          <li><strong>Structuration de l'acquisition</strong> — un vrai funnel de vente : acquisition (SEO, ads, outbound), conversion, closing. La plupart des « belles endormies » n'ont littéralement aucun processus ici — c'est ton terrain de jeu le plus vierge.</li>

        </ul>` },
      { type:"pitfall", label:"⚠ Piège classique",

      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté pilote la Phase 3 avec un seul réflexe permanent : à chaque nouvelle action de croissance, il se demande « est-ce que ça génère du cash à 90 jours, ou est-ce que ça génère seulement du chiffre d'affaires qui deviendra du cash... un jour, peut-être » ? Une facture émise n'est pas du cash. Un client signé n'est pas du cash. Le cash, c'est ce qui est réellement encaissé.</p>` },
      { type:"checkpoint", question:"La distinction cash vs chiffre d'affaires est-elle claire à ce stade ?",
        helpPrompt:"Je viens de voir la différence entre 'faire du chiffre d'affaires' et 'générer du cash' en Phase 3. Peux-tu me donner un exemple chiffré concret où le CA monte mais le cash baisse, pour bien fixer l'idée ?" },
      { type:"summary",
        summary:"La croissance intelligente se juge en cash généré, pas en chiffre d'affaires signé. Activation client, funnel structuré, standardisation dosée, automatisation et structuration managériale sont les 5 chantiers — chacun jugé à l'aune du cash qu'il produit réellement, pas de sa promesse.",
        nextHint:"Les Phases 4 et 5 : comment piloter durablement par le cash, et rendre tout le système reproductible pour ta prochaine acquisition." }

      { type:"concept", label:"Phase 4 — Piloter par le cash, pas par le CA",
        body:`<p>À partir de ce stade, ton tableau de bord change de nature : on <strong>transitionne vers un pilotage entièrement orienté cash-flow</strong>, plutôt que vers les indicateurs comptables classiques.</p>

          <li><strong>Coût d'acquisition</strong> — combien te coûte réellement un nouveau client, tous canaux confondus.</li>

  f1: {
    id:"f1", moduleId:7, title:"Le crédit-vendeur, en profondeur", duration:"14 min",
    steps:[
      { type:"concept", label:"Le pilier le plus sous-estimé de ton montage",
        body:`<p>Tu connais déjà le principe (Module 1) : le vendeur accepte d'être payé sur une partie du prix, dans le temps, plutôt que 100 % cash au closing. Ce module va beaucoup plus loin : comment le dimensionner, le sécuriser, et t'en servir comme véritable pierre angulaire d'un montage à faible apport.</p>
        <p><strong>Ordres de grandeur observés en pratique sur des PME comme ta cible</strong> : 10 à 30 % du prix, remboursé sur 2 à 5 ans, à un taux souvent inférieur au marché bancaire (parfois 0 à 3 %). Rien n'est figé par la loi — tout se négocie, et c'est justement l'objet de ce module.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Pourquoi un vendeur accepterait-il d'être payé sur 3 ans plutôt que cash immédiat, alors qu'il pourrait dire non ?",
        options:["Il n'a pas le choix, c'est une obligation légale","Cela peut lui permettre d'obtenir un prix facial plus élevé, d'étaler sa fiscalité selon son régime, et c'est un signal qu'il croit en la pérennité de sa boîte","Les banques l'exigent systématiquement du vendeur"],
        correctIndex:1,
        explanation:"Exactement — et c'est ton principal levier de négociation. Un vendeur qui exige 100 % cash renonce à ces trois avantages. En pratique, beaucoup de cédants qui n'ont pas un besoin immédiat de liquidités (retraite déjà financée, pas de nouveau projet à financer) sont plus ouverts que tu ne le penses." },
      { type:"concept", label:"Comment le sécuriser juridiquement",
        body:`<p>Un crédit-vendeur se formalise par une <span class="term">convention de crédit-vendeur</span>, annexée à l'acte de cession, précisant montant, durée, taux, échéancier, et garanties.</p>
        <p><strong>Point essentiel à négocier : la subordination.</strong> En pratique, ta banque (si tu as un prêt LBO en parallèle) va presque toujours exiger que le crédit-vendeur soit <em>subordonné</em> — c'est-à-dire remboursé après la dette bancaire en cas de difficulté. C'est normal et attendu, mais assure-toi que l'échéancier du crédit-vendeur reste réaliste une fois cette priorité posée : ne promets pas un remboursement que ton cash-flow, après avoir servi la banque, ne pourra pas tenir.</p>
        <p><strong>Ta meilleure protection : la compensation avec la GAP.</strong> Si un vice caché apparaît après la vente et déclenche la garantie d'actif et de passif (Module 6), tu peux généralement compenser ce que le vendeur te doit avec ce que tu lui dois encore sur le crédit-vendeur — au lieu d'avoir à le poursuivre en justice pour récupérer de l'argent qu'il a peut-être déjà dépensé. C'est une des raisons pour lesquelles un crédit-vendeur généreux te protège, il ne fait pas que financer.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Négocier un crédit-vendeur élevé en durée sans vérifier que le cash-flow post-Phase-1 (Module 10) peut réellement le tenir EN PLUS de la dette bancaire — un montage qui a l'air malin sur le papier peut t'étrangler à l'usage.",
          "Utiliser un crédit-vendeur trop long pour compenser un prix trop élevé plutôt que pour financer une entreprise saine : le crédit-vendeur finance une acquisition, il ne répare pas une valorisation excessive."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté présente TOUJOURS le crédit-vendeur comme un partenariat, jamais comme une faveur qu'on demande. La formule qui fonctionne : « Je vous propose un prix de X, dont Y % réglés immédiatement et Z % étalés sur N ans — cette structure me permet de sécuriser le financement bancaire du solde, et vous garantit un complément de revenu régulier. » C'est un échange de valeur, présenté comme tel.</p>` },
      { type:"checkpoint", question:"La logique du crédit-vendeur comme pierre angulaire (pas juste un complément) est-elle claire ?",
        helpPrompt:"Je viens de voir le crédit-vendeur en profondeur (subordination, compensation avec la GAP). Peux-tu m'aider à réfléchir à comment je le dimensionnerais sur une cible à 220K€ d'EBITDA et un multiple de 2,5x ?" },
      { type:"summary",
        summary:"Le crédit-vendeur n'est pas qu'un outil de financement : bien négocié (subordination claire, compensable avec la GAP), c'est aussi ta meilleure protection contre les vices cachés et ton principal levier pour réduire l'apport personnel exigé par la banque.",
        nextHint:"La dette bancaire et les dispositifs publics (Bpifrance) qui réduisent encore l'apport demandé." }
    ]
  },

  f2: {
    id:"f2", moduleId:7, title:"La dette bancaire & les dispositifs Bpifrance", duration:"16 min",
    steps:[
      { type:"concept", label:"Pourquoi le marché impose souvent 30 % d'apport",
        body:`<p>Une banque qui finance un rachat de PME prend un risque réel : et si le repreneur échoue à faire tourner l'affaire ? L'apport personnel sert de coussin d'absorption des premiers aléas, et c'est aussi un signal d'engagement. C'est pour ça que 20 à 30 % d'apport reste une demande fréquente — ce n'est pas arbitraire, c'est de la gestion du risque bancaire.</p>
        <p>La bonne nouvelle : il existe des leviers concrets, publics, pour réduire ce chiffre — sans que ça relève seulement d'un « discours rassurant ».</p>` },
      { type:"concept", label:"La Garantie Transmission Bpifrance",
        body:`<p>Bpifrance peut garantir une partie du prêt bancaire — <strong>jusqu'à 60 % du montant financé</strong> selon le dossier (chiffre confirmé sur le site officiel Bpifrance Création, dans le cadre du "Plan Objectif reprises" annoncé par Bercy en avril 2026 pour fluidifier les transmissions de TPE/PME ; certaines sources antérieures citent plutôt 40-50 %, le plafond semble avoir été relevé récemment — à reconfirmer avec ta banque au moment du dossier, ces dispositifs évoluent).</p>
        <p><strong>Ce que ça change concrètement pour toi</strong> : en partageant le risque avec la banque, cette garantie peut réduire l'apport en cash exigé, et parfois alléger la caution personnelle demandée — la banque est plus encline à financer un dossier déjà partiellement garanti par un tiers public.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"La Garantie Transmission Bpifrance remplace-t-elle ton dossier bancaire, ou vient-elle en plus ?",

        correctIndex:1,
        explanation:"Exactement. Tu négocies toujours avec une banque ; la garantie Bpifrance est un argument que TU apportes dans cette négociation pour obtenir de meilleures conditions, pas un guichet de financement direct qui remplace la banque." },
      { type:"concept", label:"Deux autres outils Bpifrance à connaître",
        body:`<p><strong>Le Prêt Croissance Transmission</strong> : jusqu'à 5 M€, <strong>sans garantie ni caution personnelle demandée sur ce prêt</strong>, pour financer la reprise de PME/ETI — un outil taillé pour exactement ton profil de deal (source : Bpifrance Création).</p>
        <p><strong>Le Prêt d'Honneur Reprise</strong> : à <strong>taux zéro</strong>, jusqu'à <strong>80 000 €</strong>, pour soutenir le porteur de projet personnellement (source : Bpifrance Création). C'est un prêt personnel, généralement sans garantie ni caution, qui peut littéralement couvrir ton plafond de 30 000 € d'apport — à 0 % d'intérêt. On y revient en détail dans la prochaine leçon.</p>` },
      { type:"pitfall", label:"⚠ À garder en tête",
        items:["Une source d'avocat spécialisé le résume bien : « une reprise sans apport total reste rare » — la formule « sans apport » signifie en pratique « avec un apport réduit et complété par des dispositifs de garantie et de dette », pas « zéro risque, zéro engagement personnel ». Un dossier sans apport cash doit être d'autant plus solide sur le reste : rentabilité documentée, cash-flow prévisible, garanties contractuelles propres."] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur aguerri ne présente jamais ces dispositifs À LA BANQUE comme une demande de faveur — il arrive avec le dossier Bpifrance déjà pré-instruit ou en cours, ce qui inverse la dynamique : ce n'est plus « pouvez-vous me faire confiance » mais « voici un dossier où l'État partage déjà le risque avec vous ». La différence de posture change souvent l'issue de la négociation bancaire.</p>` },
      { type:"checkpoint", question:"La différence entre 'la banque finance' et 'Bpifrance garantit/complète' est-elle claire ?",
        helpPrompt:"Je viens de voir la Garantie Transmission et le Prêt Croissance Transmission Bpifrance. Peux-tu m'expliquer concrètement comment monter un dossier Bpifrance en parallèle de mon dossier bancaire ?" },
      { type:"summary",
        summary:"Les dispositifs Bpifrance (Garantie Transmission jusqu'à 60%, Prêt Croissance Transmission jusqu'à 5M€ sans caution) ne remplacent pas la banque : ils renforcent ton dossier et réduisent ce qu'elle exige de toi en cash et en garanties personnelles.",

  f3: {
    id:"f3", moduleId:7, title:"Dette investisseur, trésorerie excédentaire & prêt d'honneur", duration:"15 min",
    steps:[
      { type:"concept", label:"La dette investisseur (mezzanine)",
        body:`<p>Quand le crédit-vendeur + la dette bancaire ne couvrent pas 100 % du prix, la dette investisseur (parfois appelée mezzanine) comble l'écart : des investisseurs privés (family offices, clubs d'investisseurs, plateformes spécialisées) prêtent, généralement plus cher que la banque (souvent 8 à 15 %, parfois avec un petit % de plus-value en cas de revente — un "BSA" ou bon de souscription d'actions), en échange d'un risque plus élevé et d'une place after la dette senior.</p>
        <p>C'est un outil de dernier recours pour boucler un montage, pas un premier réflexe : plus cher que la dette bancaire, il doit rester une part mineure du financement total.</p>` },
      { type:"concept", label:"La trésorerie excédentaire de la cible",
        body:`<p>Une partie du financement peut venir... de la cible elle-même. Si l'entreprise dispose d'une trésorerie réellement excédentaire (au-delà de son besoin en fonds de roulement), elle peut, après le closing, remonter un dividende vers ta holding pour rembourser une partie de la dette d'acquisition.</p>
        <p><strong>Deux limites strictes à connaître</strong> : (1) juridiquement, ça ne se fait pas le jour même du closing — il faut une assemblée générale et le respect des règles de distribution ; (2) c'est encadré pénalement — utiliser la trésorerie de la cible d'une manière qui nuit à son intérêt social peut caractériser un <strong>abus de biens sociaux</strong>. La trésorerie utilisée doit être RÉELLEMENT excédentaire (vérifiée en due diligence, Module 5), jamais une trésorerie dont l'entreprise a besoin pour tourner.</p>` },
      { type:"numeric", label:"Exercice",
        question:"Une cible a 180 000 € de trésorerie au bilan. Son besoin en fonds de roulement normatif est estimé à 130 000 €. Quelle est la trésorerie réellement excédentaire mobilisable (en €) ?",
        placeholder:"Ex : 50000", answer:50000, tolerance:2000,
        successMsg:"50 000 € (180 000 - 130 000). C'est ce chiffre-là, pas la trésorerie totale au bilan, qui peut raisonnablement être mobilisé — le reste doit rester dans l'entreprise pour qu'elle continue de fonctionner normalement.",
        hint:"Indice : trésorerie totale moins besoin en fonds de roulement normatif." },
      { type:"concept", label:"Le Prêt d'Honneur Reprise : ton meilleur ami pour un plafond à 30K€",
        body:`<p>C'est probablement l'outil le plus directement utile pour ton objectif précis. Le <strong>Prêt d'Honneur Reprise</strong> (Bpifrance, via des réseaux comme Réseau Entreprendre ou Initiative France selon les territoires) est un prêt <strong>personnel, à taux zéro, sans garantie ni caution demandée</strong>, pouvant aller <strong>jusqu'à 80 000 €</strong> (source : Bpifrance Création).</p>
        <p>Concrètement : ton plafond de 30 000 € d'apport personnel peut être intégralement couvert par ce type de prêt d'honneur, sans mobiliser un centime de ta trésorerie personnelle réelle — et sans intérêt. Beaucoup de repreneurs débutants ignorent ce dispositif et pensent devoir sortir du cash de leur poche alors qu'il existe un circuit dédié pour ça.</p>
        <p>Point important : les montants, plafonds et réseaux exacts varient selon les régions et évoluent — vérifie l'offre actuelle sur bpifrance-creation.fr ou auprès de Réseau Entreprendre / Initiative France au moment de monter ton dossier.</p>` },
      { type:"pitfall", label:"⚠ Piège classique",
        items:["Empiler crédit-vendeur + dette bancaire + dette investisseur + trésorerie excédentaire sans jamais faire l'exercice global de cash-flow disponible pour TOUT rembourser en même temps. Chaque brique semble raisonnable isolément ; c'est la Leçon 4 qui t'apprend à les assembler et vérifier que ça tient."] },
      { type:"checkpoint", question:"Le rôle spécifique du Prêt d'Honneur Reprise pour ton plafond de 30K€ est-il clair ?",
        helpPrompt:"Je viens de voir le Prêt d'Honneur Reprise Bpifrance (0%, jusqu'à 80K€) qui pourrait couvrir mon plafond de 30K€ d'apport. Comment se déroule concrètement le dossier pour l'obtenir, et avec quel timing par rapport au reste du montage ?" },
      { type:"summary",
        summary:"La dette investisseur comble un écart résiduel mais coûte cher — à minimiser. La trésorerie excédentaire de la cible peut financer une partie du deal, dans un cadre légal strict. Le Prêt d'Honneur Reprise (0%, jusqu'à 80K€) peut, à lui seul, couvrir ton plafond de 30K€ d'apport personnel.",
        nextHint:"La dernière leçon assemble toutes ces briques dans un montage complet, chiffré, qui tient la route." }
    ]
  },

  f4: {
    id:"f4", moduleId:7, title:"Construire ton montage à moins de 30K€ d'apport", duration:"17 min",
    steps:[
      { type:"concept", label:"Assembler les briques : un exemple complet chiffré",
        body:`<p>Prenons une cible fidèle à ta thèse : EBITDA retraité de 300 000 €, prix négocié à 2,5x = <strong>750 000 €</strong>.</p>
        <p><strong>Un montage possible :</strong></p>
        <ul>
          <li>Crédit-vendeur (25 % du prix) : <strong>187 500 €</strong>, remboursé sur 4 ans</li>
          <li>Dette bancaire senior (65 % du prix) : <strong>487 500 €</strong>, appuyée par la Garantie Transmission Bpifrance pour réduire la caution personnelle exigée</li>
          <li>Prêt d'Honneur Reprise (0 %) : <strong>30 000 €</strong> — exactement ton plafond, sans sortir un centime de ta poche</li>
          <li>Reste à financer : <strong>45 000 €</strong> — à combler par un ajustement du crédit-vendeur (le porter à 31 % au lieu de 25), une petite dette investisseur, ou une renégociation du prix</li>
        </ul>
        <p>Ce n'est pas une formule magique universelle — c'est UNE façon d'assembler les briques. Le bon montage dépend toujours du profil du dirigeant, de sa banque, et de ce que révèle ta due diligence.</p>` },
      { type:"numeric", label:"Exercice — à toi de compléter le montage",
        question:"Sur ce même deal à 750 000 €, si tu portes le crédit-vendeur à 30 % (225 000 €) au lieu de 25 %, la dette bancaire reste à 487 500 €, et le prêt d'honneur à 30 000 €, quel montant reste-t-il à combler (en €) ?",
        placeholder:"Ex : 10000", answer:7500, tolerance:1000,
        successMsg:"7 500 € (750 000 - 225 000 - 487 500 - 30 000). À ce niveau, un ajustement mineur du prix, un délai de paiement fournisseur en Phase 1, ou une petite dette investisseur suffit à boucler le montage — sans toucher à ton plafond de 30K€.",
        hint:"Indice : Prix total moins la somme des 3 briques déjà posées." },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté ne présente jamais ce montage brique par brique à sa banque dans l'ordre où il l'a construit — il le présente en partant de LA DETTE BANCAIRE (celle qui intéresse la banque), en montrant que le reste (crédit-vendeur, garantie Bpifrance, prêt d'honneur) réduit SON risque à elle. Le montage est le même ; la présentation change tout dans la façon dont il est reçu.</p>` },
      { type:"validation", label:"Question de validation 1/2",
        question:"Sur une cible à 500K€ de CA que tu identifierais, avec un EBITDA de 90K€ et un multiple visé de 2,5x, esquisse ton propre montage pour rester sous 30K€ d'apport. Quelles briques utiliserais-tu, et dans quelles proportions approximatives ?" },
      { type:"validation", label:"Question de validation 2/2",
        question:"Pourquoi la Garantie Transmission Bpifrance n'est-elle pas, à elle seule, une source de financement — et pourquoi est-ce important de bien comprendre cette nuance avant de rencontrer ta banque ?" },
      { type:"summary",
        summary:"Un montage à faible apport combine généralement plusieurs briques — crédit-vendeur, dette bancaire appuyée par une garantie Bpifrance, et un Prêt d'Honneur Reprise à 0% — plutôt qu'une seule solution miracle. Le bon dosage dépend toujours du deal réel, jamais d'une formule figée.",
        nextHint:"Le Module 6 montre maintenant comment négocier ce montage avec le vendeur — avec de vrais scripts d'approche." }
    ]
  },

  n1: {
    id:"n1", moduleId:6, title:"Négocier le montage avec le vendeur : scripts et objections", duration:"16 min",
    steps:[
      { type:"concept", label:"Le lien entre financement et négociation",
        body:`<p>Tout ce que tu viens de voir au Module 7 n'a de valeur que si tu sais l'amener au vendeur sans le braquer. Un montage à faible apport, mal présenté, sonne comme « je n'ai pas les moyens de vous racheter ». Bien présenté, il sonne comme « voici une offre structurée, sécurisée, et rapide ».</p>
        <p>Rappel de ta proposition de valeur (Module 2) : une sortie fiable, rapide et structurée vaut souvent plus, pour un cédant, qu'un prix légèrement supérieur avec un acheteur incertain.</p>` },
      { type:"concept", label:"Script d'approche — proposer un crédit-vendeur élevé",
        body:`<p>Voici un canevas à adapter, pas un texte à réciter mot pour mot :</p>
        <p><em>« Sur la base de ce que j'ai vu de votre entreprise, je vous propose [X €], avec [Y %] réglés à la signature et [Z %] étalés sur [N] ans à un taux de [T %]. Cette structure me permet de sécuriser rapidement le financement bancaire du solde — via un dossier déjà engagé avec ma banque et Bpifrance — donc de vous garantir un closing dans les [3 à 6] mois. En échange, elle vous assure un complément de revenu régulier sur la durée, et [si pertinent] un prix légèrement supérieur à une offre 100% cash. »</em></p>
        <p>Les trois éléments qui font la force de ce script : un prix concret (pas vague), une preuve de sérieux (dossier déjà engagé), et un bénéfice réciproque explicite (pas juste "moi j'ai besoin de temps").</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Un vendeur te répond : « Je préfère être payé cash, je ne veux pas dépendre de la réussite de votre gestion pour toucher mon argent. » Quelle est la MEILLEURE réponse ?",
        options:["Insister en répétant que le crédit-vendeur est avantageux pour lui","Reconnaître le risque qu'il soulève, et proposer une garantie concrète (nantissement des titres de la holding, GAP réciproque, échéancier plus court) plutôt que de nier le risque","Menacer de retirer l'offre s'il n'accepte pas"],
        correctIndex:1,
        explanation:"Exactement. Le risque qu'il évoque est réel et légitime — le nier fait perdre en crédibilité. Le rassurer avec des garanties concrètes (les titres de la holding peuvent être nantis en sa faveur, par exemple) répond directement à SA préoccupation, pas à une préoccupation générique." },
      { type:"pitfall", label:"⚠ Objections classiques et comment y répondre",
        items:[
          "« Pourquoi je vous ferais confiance avec si peu d'apport ? » → Ne le prends pas comme une attaque : montre les garanties concrètes (Bpifrance, nantissement, nombre d'échéances déjà anticipées) plutôt que de te justifier sur ta trésorerie personnelle.",
          "« J'ai un autre acheteur qui paie tout cash. » → Ne baisse jamais ta garde sur la vérification (Module 5) juste pour aller plus vite ; mais tu peux répondre en valorisant la rapidité et la certitude d'exécution de ton dossier déjà structuré, si c'est vrai."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un négociateur expérimenté ne présente jamais tout le montage financier en une seule fois lors du premier contact (Module 2). Il sonde d'abord ce qui compte vraiment pour LE cédant spécifiquement — certains veulent avant tout la certitude que leurs salariés seront préservés, d'autres veulent surtout la rapidité, d'autres encore veulent maximiser le prix facial même si le cash immédiat est moindre. Le montage financier vient ensuite, calé sur cette priorité identifiée — pas l'inverse.</p>` },
      { type:"validation", label:"Question de validation",
        question:"Reprends le script d'approche ci-dessus et adapte-le à un montage avec 30% de crédit-vendeur, un closing visé à 4 mois, et un vendeur que tu sais pressé de partir à la retraite. Qu'est-ce que tu changerais dans la formulation ?" },
      { type:"summary",
        summary:"Un montage à faible apport se négocie en le présentant comme une structure sécurisée et réciproque, jamais comme une contrainte que tu imposes. Écouter la vraie priorité du cédant avant de dérouler le montage change tout dans la façon dont il est reçu.",
        nextHint:"La suite du Module 6 (LOI, garantie d'actif et de passif) arrive dans une prochaine session." }
    ]
  },

  dd1: {
    id:"dd1", moduleId:5, title:"La DD financière : vérifier que les chiffres disent vrai", duration:"16 min",
    steps:[
      { type:"concept", label:"À quoi sert vraiment la due diligence",
        body:`<p>Souviens-toi de la phrase du Module 1 : <strong>« Le prix se négocie. La qualité du cash-flow, elle, ne se négocie pas — elle se vérifie. »</strong> La due diligence, c'est le « se vérifie ». Ce n'est pas une formalité administrative : c'est la vérification systématique que ce qu'on t'a montré correspond à la réalité — la seule barrière réelle entre toi et un vice caché.</p>
        <p><strong>Quand ?</strong> Après la lettre d'intention (LOI), pendant la période d'exclusivité, AVANT la signature définitive. C'est ta fenêtre pour tout vérifier — après, il ne te reste que la GAP.</p>
        <p><strong>Les 5 chantiers de ce module :</strong> financière (cette leçon), juridique et sociale-fiscale (leçon 2), commerciale et opérationnelle (leçon 3), puis comment orchestrer le tout et savoir renoncer (leçon 4).</p>` },
      { type:"concept", label:"La DD financière : les vérifications qui comptent",
        body:`<ul>
          <li><strong>3 derniers exercices, jamais un seul</strong> — tu le sais déjà (Module 1) : une seule « bonne année » ne prouve rien, une tendance sur 3 ans si.</li>
          <li><strong>La liasse fiscale ne suffit pas</strong> — demande le grand livre, les balances, et surtout les <strong>relevés bancaires</strong>. Croise le chiffre d'affaires comptabilisé avec les encaissements réels : les écarts inexpliqués sont un signal majeur.</li>
          <li><strong>Refais toi-même les retraitements d'EBITDA</strong> — ne prends jamais l'« EBITDA normalisé » présenté par le vendeur ou son conseil. Salaire du dirigeant vs marché, charges personnelles logées dans la boîte, éléments exceptionnels : recalcule tout.</li>
          <li><strong>Traque les dettes cachées</strong> — comptes courants d'associés (l'entreprise doit-elle de l'argent au dirigeant ?), engagements hors bilan, crédits-baux en cours, cautions données par la société.</li>
          <li><strong>Trésorerie réelle vs BFR normatif</strong> — la trésorerie affichée est-elle vraiment excédentaire (Module 7), ou est-ce le fonds de roulement dont la boîte a besoin pour tourner ?</li>
        </ul>` },
      { type:"numeric", label:"Exercice — refais le retraitement toi-même",
        question:"Une cible affiche un EBITDA de 250 000 €. Tu découvres que le dirigeant se verse 20 000 €/an alors qu'un dirigeant au prix du marché coûterait 80 000 €, et que 15 000 € de charges personnelles (véhicule, voyages) sont passées dans l'entreprise. Quel est l'EBITDA réellement normalisé (en €) ?",
        placeholder:"Ex : 200000", answer:205000, tolerance:2000,
        successMsg:"205 000 € (250 000 - 60 000 de salaire manquant + 15 000 de charges perso à réintégrer). À 2,5x, le prix passe de 625 000 € à 512 500 € — soit 112 500 € d'écart. C'est exactement ce que coûte le fait de ne pas refaire le calcul soi-même.",
        hint:"Indice : retire l'écart de salaire (80K - 20K = 60K en moins), puis réintègre les 15K de charges personnelles (en plus)." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Accepter les documents comptables préparés « pour la vente » sans les croiser avec les données brutes (grand livre, relevés bancaires). Un dossier de cession est un document commercial, pas un audit.",
          "Faire la DD financière seul pour économiser. Sur un deal à 500-750K€, un expert-comptable côté acheteur coûte typiquement quelques milliers d'euros (ordre de grandeur, à confirmer sur devis) — une fraction du coût d'un seul retraitement manqué, comme l'exercice ci-dessus vient de le montrer."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté demande systématiquement une chose que les débutants n'osent pas demander : <strong>l'accès aux relevés bancaires des 12-24 derniers mois</strong>. Le compte de résultat est une construction comptable ; le relevé bancaire est un fait. Si le vendeur refuse cet accès en phase de DD exclusive, ce refus EST une information — et rarement une bonne.</p>` },
      { type:"checkpoint", question:"La logique « ne jamais prendre un chiffre présenté sans le recalculer » est-elle claire ?",
        helpPrompt:"Je viens de voir la DD financière (retraitements d'EBITDA, relevés bancaires, dettes cachées). Peux-tu me faire la liste précise des documents financiers à demander au vendeur dès l'entrée en exclusivité ?" },
      { type:"summary",
        summary:"La DD financière repose sur un principe : recalculer soi-même, à partir des données brutes (grand livre, relevés bancaires), tout ce que le vendeur présente — en particulier l'EBITDA normalisé qui détermine ton prix. Un seul retraitement manqué peut coûter six chiffres.",
        nextHint:"Les vices cachés juridiques et sociaux — ceux qui ne se voient pas dans les comptes." }
    ]
  },

  dd2: {
    id:"dd2", moduleId:5, title:"La DD juridique, sociale & fiscale", duration:"15 min",
    steps:[
      { type:"concept", label:"Les vices cachés qui ne sont pas dans les comptes",
        body:`<p>Les pièges les plus coûteux d'une reprise ne se voient souvent PAS dans les chiffres. Ils sont dans les contrats, les statuts, et les engagements sociaux.</p>
        <p><strong>Côté juridique, vérifie en priorité :</strong></p>
        <ul>
          <li><strong>Le bail commercial</strong> — contient-il une clause restreignant la cession ? Un bail qui expire dans 18 mois sans droit clair au renouvellement peut vider la valeur d'un fonds de commerce dépendant de son emplacement.</li>
          <li><strong>Les clauses de changement de contrôle</strong> dans les contrats clients et fournisseurs — on y revient juste après, c'est LE piège de ta cible type.</li>
          <li><strong>La propriété réelle des actifs</strong> — la marque est-elle déposée, et au nom de la société ou du dirigeant personnellement ? Le matériel est-il possédé ou en crédit-bail ?</li>
          <li><strong>Les litiges en cours ou latents</strong> — demande une déclaration écrite, et vérifie auprès du greffe.</li>
        </ul>` },
      { type:"predict", label:"Le piège classique de ta cible type",
        question:"Ta « belle endormie » dépend d'un portefeuille de clients historiques. Tu découvres que le contrat de son plus gros client (25% du CA) contient une « clause de changement de contrôle ». Qu'est-ce que ça signifie concrètement ?",
        options:["Rien de grave, c'est une clause standard sans effet","Le client peut résilier ou renégocier son contrat du seul fait que l'entreprise change de propriétaire — ton rachat peut donc déclencher la perte du client","Cette clause t'oblige à garder le même dirigeant pendant 5 ans"],
        correctIndex:1,
        explanation:"Exactement — et c'est particulièrement critique sur ton profil de cible : une entreprise dont la valeur repose sur des clients historiques peut voir cette valeur s'évaporer LE JOUR MÊME du rachat si ces clauses existent. La parade : les identifier en DD, puis obtenir l'accord écrit préalable des clients concernés (ou une condition suspensive dans l'acte), avant de signer." },
      { type:"concept", label:"La DD sociale et fiscale",
        body:`<p><strong>Côté social</strong> — tu connais déjà L1224-1 (Module 10) : tous les contrats de travail te suivent automatiquement. La DD sociale vérifie ce que tu reprends exactement :</p>
        <ul>
          <li>Passifs sociaux latents : heures supplémentaires non payées, primes d'usage jamais écrites mais dues, contentieux prud'homaux en germe.</li>
          <li>Les « hommes-clés » : qui détient les relations clients, les savoir-faire critiques ? Que se passe-t-il s'ils partent au closing ?</li>
          <li>Conventions collectives et avantages acquis : ce qui a toujours été accordé oralement peut être juridiquement dû.</li>
        </ul>
        <p><strong>Côté fiscal</strong> : contrôles fiscaux passés ou en cours, cohérence TVA, dispositifs utilisés de façon agressive (CIR, exonérations). Un redressement portant sur une période antérieure à ton achat te tombera dessus — c'est exactement ce que la <strong>GAP</strong> (Module 6) doit couvrir, avec la compensation possible sur le crédit-vendeur (Module 7). Tu vois maintenant comment les trois modules s'emboîtent.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Négliger la vérification du bail commercial parce que « l'entreprise est là depuis 20 ans ». L'ancienneté ne crée pas de droit automatique si le bail dit autre chose.",
          "Découvrir les clauses de changement de contrôle APRÈS le closing. Elles se négocient AVANT — soit par accord écrit des clients, soit par condition suspensive, soit par ajustement du prix."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un avocat M&A expérimenté lit les contrats clients dans un ordre précis : d'abord ceux des clients qui pèsent le plus dans le CA (ta due diligence commerciale lui dit lesquels), et il cherche trois clauses avant tout : changement de contrôle, exclusivité, et durée/préavis de résiliation. Un débutant lit tout dans l'ordre du classeur — et s'épuise sur des contrats à 2 000 € pendant que le contrat à 200 000 € attend.</p>` },
      { type:"checkpoint", question:"Le risque des clauses de changement de contrôle sur TON profil de cible est-il bien clair ?",
        helpPrompt:"Je viens de voir les clauses de changement de contrôle dans les contrats clients. Comment je m'y prends concrètement pour obtenir l'accord d'un client clé avant le closing sans l'inquiéter sur la solidité de la reprise ?" },
      { type:"summary",
        summary:"Les vices cachés les plus chers ne sont pas dans les comptes : bail commercial, clauses de changement de contrôle (critiques sur une cible à clients historiques), passifs sociaux latents, risque fiscal. Tout ce qui ne peut pas être levé avant le closing doit être couvert par la GAP ou une condition suspensive.",
        nextHint:"La DD commerciale et opérationnelle : le business tient-il debout sans son dirigeant actuel ?" }
    ]
  },

  dd3: {
    id:"dd3", moduleId:5, title:"La DD commerciale & opérationnelle", duration:"14 min",
    steps:[
      { type:"concept", label:"La question centrale pour une « belle endormie »",
        body:`<p>Toute la DD commerciale d'une cible comme la tienne tient en une question : <strong>« Que se passe-t-il le jour où le dirigeant part ? »</strong></p>
        <p>Dans une PME de 500K€ à 3M€ dirigée par la même personne depuis 20 ans, une partie de la valeur est souvent... dans sa tête et son carnet d'adresses. Ta DD doit mesurer précisément quelle partie :</p>
        <ul>
          <li><strong>Qui détient la relation avec chaque client clé ?</strong> Le dirigeant seul, ou l'équipe ? Si c'est lui seul, la transition (Module 9) devient LE sujet du deal.</li>
          <li><strong>La récurrence des revenus est-elle contractuelle ou habituelle ?</strong> Un client « fidèle depuis 15 ans » sans contrat peut partir demain. Vérifie ce qui est écrit vs ce qui est supposé.</li>
          <li><strong>Le churn réel</strong> — combien de clients perdus par an sur les 3 dernières années ? Le vendeur le sait rarement précisément ; reconstitue-le depuis la facturation.</li>
          <li><strong>La dépendance fournisseurs</strong> — un fournisseur unique sur un composant critique est un risque miroir de la concentration client.</li>
        </ul>` },
      { type:"concept", label:"Le capex caché : le piège opérationnel n°1",
        body:`<p>Une « belle endormie » qui n'a pas investi depuis des années cache souvent un coût invisible : <strong>le rattrapage d'investissement</strong>. Machines en fin de vie, véhicules à remplacer, informatique obsolète, mises aux normes repoussées.</p>
        <p>Ce capex de rattrapage n'apparaît nulle part dans le compte de résultat — l'EBITDA peut être superbe précisément PARCE QUE rien n'a été investi. Mais c'est toi qui paieras la facture dans les 24 mois. Il doit donc venir <strong>en déduction du prix</strong>, ou au minimum être connu et budgété avant de signer.</p>
        <p>Concrètement : fais l'inventaire du parc (âge, état, valeur de remplacement) avec un œil technique — le tien si tu connais le métier, celui d'un expert sinon.</p>` },
      { type:"numeric", label:"Exercice — l'impact du capex caché",
        question:"Ta cible a un EBITDA normalisé de 205 000 € (leçon 1). Prix négocié à 2,5x = 512 500 €. Ta DD opérationnelle révèle 80 000 € de machines à remplacer dans les 18 mois. Quel prix ajusté devrais-tu viser en intégrant ce capex caché (en €) ?",
        placeholder:"Ex : 450000", answer:432500, tolerance:5000,
        successMsg:"432 500 € (512 500 - 80 000). Le capex de rattrapage se déduit du prix quasiment euro pour euro : c'est du cash que TU devras sortir, que le vendeur aurait dû investir. C'est un des arguments de renégociation les plus factuels et les moins contestables qui existent.",
        hint:"Indice : le capex caché vient en déduction directe du prix négocié." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Croire le vendeur sur parole quand il dit « les clients resteront, ils sont fidèles ». Demande à parler à 2-3 clients clés (avec son accord, en phase avancée) — leur réaction à l'annonce d'une transmission t'en dira plus que toutes les affirmations.",
          "Évaluer le parc matériel sur sa valeur comptable (souvent amortie à zéro) au lieu de sa valeur de remplacement réelle. Une machine amortie qui fonctionne encore 10 ans est un cadeau ; une machine amortie qui lâche dans 6 mois est une dette déguisée."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté fait un test simple pendant ses visites : il demande au dirigeant de le laisser passer une heure avec les équipes SANS lui. La façon dont le dirigeant réagit à cette demande (naturelle ? crispée ? refusée ?) et ce que disent les équipes en son absence révèlent la vraie dépendance de la boîte à son patron — bien mieux que n'importe quel document de la data room.</p>` },
      { type:"checkpoint", question:"La notion de capex caché comme levier de renégociation est-elle claire ?",
        helpPrompt:"Je viens de voir le capex caché (matériel à remplacer non visible dans les comptes). Comment je le chiffre concrètement si je ne connais pas techniquement le métier de la cible ?" },
      { type:"summary",
        summary:"La DD commerciale mesure ce qui reste de la valeur quand le dirigeant part : relations clients transférables ou non, récurrence contractuelle vs habituelle, churn réel. La DD opérationnelle chasse le capex caché — l'investissement de rattrapage qui se déduit du prix quasi euro pour euro.",
