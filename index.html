<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>REPRISE. — Ton académie de rachat d'entreprise</title>

<!-- Installation sur écran d'accueil (Android/Chrome) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#11162A">

<!-- Installation sur écran d'accueil (iOS/Safari) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REPRISE.">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
  :root{
    --ink: #11162A;
    --ink-2: #1A2140;
    --ink-3: #232C54;
    --ink-border: #333E6E;
    --paper: #EFE8D6;
    --paper-2: #E5DAC0;
    --paper-border: #CBB98E;
    --gold: #C99A3E;
    --gold-2: #E2BE6E;
    --wine: #96434D;
    --wine-2: #B96269;
    --forest: #3D7A5C;
    --forest-2: #5AA07C;
    --text-light: #F2EDDF;
    --text-muted: #9BA3C4;
    --text-dark: #241F33;
    --text-dark-muted: #7A6F53;
    --radius: 16px;
    --radius-sm: 9px;
    --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "Roboto Mono", "Courier New", monospace;
  }
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
  html, body { height:100%; }
  body{
    font-family: var(--font-body);
    background: var(--ink);
    background-image:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(201,154,62,0.10), transparent),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(61,122,92,0.09), transparent);
    color: var(--text-light);
    min-height: 100vh;
    line-height: 1.55;
  }
  button, input, textarea { font-family: inherit; color: inherit; }
  button { cursor: pointer; }
  ::selection{ background: var(--gold); color: var(--ink); }
  a { color: var(--gold-2); }

  /* ---------- Shell layout ---------- */
  .shell{ display:flex; min-height:100vh; }
  .sidebar{
    width: 250px; flex-shrink:0;
    background: linear-gradient(180deg, var(--ink-2), var(--ink));
    border-right: 1px solid var(--ink-border);
    display:flex; flex-direction:column;
    padding: 28px 20px;
    position: sticky; top:0; height:100vh;
  }
  .brand{ display:flex; align-items:baseline; gap:8px; margin-bottom: 6px; }
  .brand-mark{
    font-family: var(--font-display); font-size: 26px; letter-spacing: 0.5px;
    color: var(--text-light);
  }
  .brand-dot{ color: var(--gold); }
  .brand-tagline{ font-size: 12px; color: var(--text-muted); margin-bottom: 34px; }
  .nav-item{
    display:flex; align-items:center; gap:12px;
    padding: 11px 14px; border-radius: var(--radius-sm);
    color: var(--text-muted); background: transparent; border: none; text-align:left;
    font-size: 14.5px; font-weight: 500; width:100%;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .nav-item svg{ flex-shrink:0; opacity: 0.85; }
  .nav-item:hover{ background: rgba(255,255,255,0.04); color: var(--text-light); }
  .nav-item.active{ background: var(--ink-3); color: var(--gold-2); }
  .nav-item.active svg{ opacity:1; }
  .sidebar-footer{ margin-top:auto; padding-top: 20px; border-top: 1px solid var(--ink-border); }
  .mini-level{ font-size: 12.5px; color: var(--text-muted); margin-bottom: 8px; }
  .mini-level b{ color: var(--gold-2); font-family: var(--font-display); }
  .mini-xp-bar{ height:6px; border-radius:4px; background: var(--ink-3); overflow:hidden; margin-bottom: 12px;}
  .mini-xp-fill{ height:100%; background: linear-gradient(90deg, var(--gold), var(--gold-2)); border-radius:4px; transition: width 0.5s ease; }
  .reset-link{ font-size: 11.5px; color: var(--text-muted); background:none; border:none; text-decoration: underline; opacity:0.7; padding:0; }
  .reset-link:hover{ opacity:1; color: var(--wine-2); }

  .main{ flex:1; min-width:0; padding: 40px 44px 100px; max-width: 920px; }
  @media (max-width: 900px){ .main{ padding: 28px 20px 100px; } }

  /* ---------- Mobile bottom nav ---------- */
  .bottom-nav{ display:none; }
  @media (max-width: 767px){
    .sidebar{ display:none; }
    .bottom-nav{
      display:flex; position:fixed; bottom:0; left:0; right:0; z-index: 50;
      background: var(--ink-2); border-top: 1px solid var(--ink-border);
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
    }
    .bottom-nav button{
      flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
      background:none; border:none; color: var(--text-muted); font-size: 11px; padding: 6px 2px;
      border-radius: var(--radius-sm);
    }
    .bottom-nav button.active{ color: var(--gold-2); }
    .main{ padding-bottom: 90px; }
  }

  /* ---------- Typography ---------- */
  h1,h2,h3{ font-family: var(--font-display); font-weight:400; letter-spacing:0.2px; }
  h1{ font-size: 30px; margin-bottom: 6px; }
  h2{ font-size: 22px; }
  .eyebrow{ font-size: 11.5px; text-transform: uppercase; letter-spacing: 1.6px; color: var(--gold-2); font-weight:600; margin-bottom:10px; }
  .subtitle{ color: var(--text-muted); font-size: 15px; margin-bottom: 28px; }

  /* ---------- Buttons ---------- */
  .btn-primary{
    background: linear-gradient(180deg, var(--gold-2), var(--gold));
    color: #21170a; border:none; font-weight:700; font-size:14.5px;
    padding: 12px 22px; border-radius: 999px; box-shadow: 0 4px 14px rgba(201,154,62,0.28);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 6px 18px rgba(201,154,62,0.38); }
  .btn-primary:active{ transform: translateY(0); }
  .btn-ghost{
    background: transparent; border: 1px solid var(--ink-border); color: var(--text-light);
    font-size: 14px; padding: 11px 20px; border-radius: 999px; font-weight:500;
  }
  .btn-ghost:hover{ border-color: var(--gold-2); color: var(--gold-2); }
  button:focus-visible, .nav-item:focus-visible, input:focus-visible, textarea:focus-visible{
    outline: 2px solid var(--gold-2); outline-offset: 2px;
  }
  button:disabled{ opacity:0.55; cursor: default; }

  /* ---------- Dashboard ---------- */
  .stat-row{ display:flex; gap:14px; flex-wrap:wrap; margin-bottom: 30px; }
  .stat-card{
    background: var(--ink-2); border: 1px solid var(--ink-border); border-radius: var(--radius);
    padding: 18px 20px; flex:1; min-width:140px;
  }
  .stat-num{ font-family: var(--font-mono); font-size: 26px; color: var(--gold-2); font-variant-numeric: tabular-nums; }
  .stat-label{ font-size: 12px; color: var(--text-muted); margin-top:2px; }
  .continue-card{
    background: linear-gradient(135deg, var(--ink-3), var(--ink-2));
    border: 1px solid var(--ink-border); border-radius: var(--radius);
    padding: 26px 28px; margin-bottom: 34px; position:relative; overflow:hidden;
  }
  .continue-card::before{
    content:""; position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%;
    background: radial-gradient(circle, rgba(201,154,62,0.18), transparent 70%);
  }
  .continue-eyebrow{ font-size:11.5px; text-transform:uppercase; letter-spacing:1.4px; color: var(--text-muted); margin-bottom:8px; }
  .continue-title{ font-family: var(--font-display); font-size:21px; margin-bottom:14px; }
  .section-title{ font-family: var(--font-display); font-size:17px; color: var(--text-light); margin: 34px 0 16px; display:flex; align-items:center; gap:10px; }

  /* ---------- Roadmap (journey) ---------- */
  .journey{ position:relative; padding-left: 30px; }
  .journey::before{
    content:""; position:absolute; left:13px; top:10px; bottom:10px; width:2px;
    background: linear-gradient(180deg, var(--gold) 0%, var(--ink-border) 100%);
  }
  .phase-block{ margin-bottom: 8px; }
  .phase-label{
    font-size: 12px; text-transform: uppercase; letter-spacing:1.3px; color: var(--text-muted);
    margin: 26px 0 14px -30px; padding-left: 0; font-weight:600;
  }
  .phase-label:first-child{ margin-top:0; }
  .module-node{ position:relative; margin-bottom: 14px; }
  .module-dot{
    position:absolute; left:-30px; top: 18px; width:26px; height:26px; border-radius:50%;
    background: var(--ink-3); border: 2px solid var(--ink-border);
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
    color: var(--text-muted); z-index:2;
  }
  .module-node.done .module-dot{ background: var(--forest); border-color: var(--forest-2); color:#eafff2; }
  .module-node.current .module-dot{ background: var(--gold); border-color: var(--gold-2); color:#21170a; box-shadow: 0 0 0 4px rgba(201,154,62,0.18); }
  .module-card{
    background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius);
    padding: 16px 18px; display:flex; justify-content:space-between; align-items:center; gap: 14px;
    transition: border-color 0.15s ease;
  }
  .module-node.clickable .module-card{ cursor:pointer; }
  .module-node.clickable .module-card:hover{ border-color: var(--gold); }
  .module-card-title{ font-family: var(--font-display); font-size:16.5px; margin-bottom:4px; }
  .module-card-desc{ font-size: 13px; color: var(--text-muted); }
  .bookmark-comment{
    margin-top:8px; font-size:13px; color: var(--gold-2); font-style:italic;
    background: rgba(226,190,110,0.08); border-left:2px solid var(--gold-2); padding:6px 10px; border-radius:4px;
  }
  .module-card-meta{ font-size: 11.5px; color: var(--text-muted); white-space:nowrap; text-align:right; flex-shrink:0; }
  .module-node.locked .module-card{ opacity: 0.55; }
  .module-node.locked .module-card-meta{ color: var(--text-muted); }
  .badge-built{ background: var(--forest); color:#eafff2; font-size:10.5px; padding:2px 9px; border-radius:999px; font-weight:700; letter-spacing:0.4px; }
  .badge-soon{ background: var(--ink-3); border:1px solid var(--ink-border); color: var(--text-muted); font-size:10.5px; padding:2px 9px; border-radius:999px; }

  /* ---------- Lesson view ---------- */
  .lesson-header{ margin-bottom: 26px; }
  .back-link{ background:none; border:none; color: var(--text-muted); font-size:13px; margin-bottom:14px; padding:0; }
  .back-link:hover{ color: var(--gold-2); }
  .progress-bar{ height:5px; background: var(--ink-3); border-radius:4px; overflow:hidden; margin: 12px 0 6px; }
  .progress-fill{ height:100%; background: linear-gradient(90deg, var(--gold), var(--forest-2)); transition: width 0.4s ease; }
  .step-counter{ font-size:12px; color: var(--text-muted); font-family: var(--font-mono); }
  .step-counter-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .step-actions{ display:flex; gap:8px; flex-wrap:wrap; }
  .tag-btn{
    background: transparent; border: 1px solid var(--ink-border); color: var(--text-muted);
    font-size: 11.5px; padding: 4px 11px; border-radius: 999px; cursor:pointer; white-space:nowrap;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  .tag-btn:hover{ border-color: var(--gold-2); color: var(--gold-2); }
  .tag-btn.tagged{ background: rgba(226,190,110,0.14); border-color: var(--gold-2); color: var(--gold-2); }
  .comment-zone{ margin-top:14px; padding-top:14px; border-top:1px solid var(--ink-border); }
  .comment-zone textarea{
    width:100%; box-sizing:border-box; min-height:90px; background: var(--ink); border:1px solid var(--ink-border);
    border-radius: var(--radius-sm); padding:12px 14px; font-size:14px; color: var(--text-light);
    resize: vertical; font-family:inherit;
  }
  .comment-zone-actions{ display:flex; gap:16px; align-items:center; margin-top:8px; flex-wrap:wrap; }

  .step-card{ animation: rise 0.25s ease; }
  @keyframes rise{ from{ opacity:0; transform: translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .step-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:1.3px; color: var(--gold-2); font-weight:700; margin-bottom: 12px; }
  .step-question{ font-size: 17px; margin-bottom: 18px; }

  .concept-card{
    background: var(--paper); color: var(--text-dark); border-radius: var(--radius);
    padding: 26px 28px; box-shadow: 0 10px 34px rgba(0,0,0,0.28);
  }
  .concept-card .step-label{ color: var(--wine); }
  .concept-card p{ margin-bottom: 14px; font-size:15.5px; }
  .concept-card p:last-child{ margin-bottom:0; }
  .concept-card ol, .concept-card ul{ padding-left: 20px; margin: 10px 0 14px; }
  .concept-card li{ margin-bottom:8px; font-size:15px; }
  .concept-card strong{ color: var(--wine); }
  .concept-card .term{ font-family: var(--font-mono); background: var(--paper-2); padding:1px 6px; border-radius:5px; font-size:0.92em; }

  .predict-card, .exercise-card, .checkpoint-card, .validation-card{
    background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius); padding: 24px 26px;
  }
  .mcq-options{ display:flex; flex-direction:column; gap:9px; }
  .mcq-option{
    background: var(--ink-3); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 12px 16px; text-align:left; font-size:14.5px; color: var(--text-light);
    transition: border-color 0.15s ease;
  }
  .mcq-option:hover:not(:disabled){ border-color: var(--gold-2); }
  .mcq-option.correct{ border-color: var(--forest-2); background: rgba(61,122,92,0.22); }
  .mcq-option.incorrect{ border-color: var(--wine-2); background: rgba(150,67,77,0.2); }
  .mcq-explanation{ margin-top:16px; padding:14px 16px; background: var(--ink); border-radius: var(--radius-sm); font-size:14px; border-left:3px solid var(--gold); }
  .mcq-explanation.hidden{ display:none; }

  .numeric-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .numeric-row input{
    background: var(--ink); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 11px 14px; font-family: var(--font-mono); font-size:15px; color: var(--text-light); width:170px;
  }
  .numeric-feedback{ margin-top:14px; padding:13px 16px; border-radius: var(--radius-sm); font-size:14px; }
  .numeric-feedback.hidden{ display:none; }
  .numeric-feedback.success{ background: rgba(61,122,92,0.22); border-left:3px solid var(--forest-2); }
  .numeric-feedback.retry{ background: rgba(150,67,77,0.16); border-left:3px solid var(--wine-2); }

  .pitfall-card{ background: rgba(150,67,77,0.14); border:1px solid var(--wine-2); border-radius: var(--radius); padding:22px 26px; }
  .pitfall-card .step-label{ color: var(--wine-2); }
  .pitfall-card ul{ padding-left:20px; }
  .pitfall-card li{ margin-bottom:10px; font-size:14.5px; }

  .expert-card{ background: rgba(201,154,62,0.10); border:1px solid var(--gold); border-radius: var(--radius); padding:22px 26px; }
  .expert-card p{ font-size:15px; margin-bottom:10px; }
  .expert-card p:last-child{ margin-bottom:0; }

  .checkpoint-card{ text-align:center; }
  .checkpoint-actions{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:6px; }

  .validation-card textarea{
    width:100%; min-height:100px; background: var(--ink); border:1px solid var(--ink-border);
    border-radius: var(--radius-sm); padding:13px 15px; font-size:14.5px; color: var(--text-light);
    resize: vertical; margin-bottom: 14px;
  }
  .summary-card{ background: var(--ink-2); border:1px solid var(--gold); border-radius: var(--radius); padding: 26px 28px; }
  .summary-card p{ font-size:15.5px; margin-bottom:14px; }
  .next-hint{ color: var(--text-muted); font-size:14px; font-style:italic; }

  .lesson-footer{ display:flex; justify-content:space-between; margin-top:24px; }

  /* ---------- Onboarding ---------- */
  .onboard-wrap{ max-width: 620px; }
  .onboard-q{ background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius); padding:22px 24px; margin-bottom:18px; }
  .onboard-q p{ font-size:15px; margin-bottom:14px; }

  /* ---------- Chat ---------- */
  .chat-wrap{ display:flex; flex-direction:column; height: calc(100vh - 80px); max-height: 780px; }
  .chat-messages{ flex:1; overflow-y:auto; padding: 6px 2px 16px; display:flex; flex-direction:column; gap:14px; }
  .msg{ max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size:14.5px; line-height:1.5; }
  .msg-user{ align-self:flex-end; background: linear-gradient(180deg, var(--gold-2), var(--gold)); color:#21170a; border-bottom-right-radius:4px; }
  .msg-assistant{ align-self:flex-start; background: var(--paper); color: var(--text-dark); border-bottom-left-radius:4px; box-shadow: 0 4px 16px rgba(0,0,0,0.22); }
  .msg-assistant.typing{ color: var(--text-dark-muted); font-style: italic; }
  .chat-empty{ color: var(--text-muted); text-align:center; margin-top: 50px; font-size:14.5px; }
  .chat-input-row{ display:flex; gap:10px; border-top:1px solid var(--ink-border); padding-top:14px; }
  .chat-input-row textarea{
    flex:1; background: var(--ink-2); border:1px solid var(--ink-border); border-radius: var(--radius-sm);
    padding: 12px 14px; color: var(--text-light); font-size:14.5px; resize:none; min-height:46px; max-height:140px;
  }
  .chat-hint{ font-size:12px; color: var(--text-muted); margin-bottom:10px; }

  .hidden{ display:none !important; }
  .icon{ display:inline-flex; vertical-align:middle; }
  .storage-warning{
    background: rgba(150,67,77,0.16); border:1px solid var(--wine-2); border-radius: var(--radius);
    padding:16px 20px; margin-bottom:26px; font-size:13.5px; line-height:1.6; color: var(--text-light);
  }
  .storage-warning strong{ color: var(--wine-2); }
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="brand"><span class="brand-mark">REPRISE<span class="brand-dot">.</span></span></div>
    <div class="brand-tagline">Ton académie de rachat d'entreprise</div>
    <button class="nav-item" id="nav-dashboard" onclick="goTo('dashboard')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Tableau de bord
    </button>
    <button class="nav-item" id="nav-roadmap" onclick="goTo('roadmap')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16M4 6c3-2 5 2 8 0s5 2 8 0V4c-3 2-5-2-8 0S7 2 4 4Z"/></svg>
      Parcours
    </button>
    <button class="nav-item" id="nav-chat" onclick="goTo('chat')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>
      Prof IA
    </button>
    <button class="nav-item" id="nav-training" onclick="goTo('training')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="3.2"/><path d="M2.5 20c0-3.5 3-5.5 6.5-5.5s6.5 2 6.5 5.5"/><circle cx="17.5" cy="8.5" r="2.4"/><path d="M15.5 14.8c2.8.2 6 1.7 6 5.2"/></svg>
      Entraînement
    </button>
    <button class="nav-item" id="nav-agent" onclick="goTo('agent')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      Agent
    </button>
    <button class="nav-item" id="nav-analyzer" onclick="goTo('analyzer')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
      Analyseur
    </button>
    <button class="nav-item" id="nav-revision" onclick="goTo('revision')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
      Révision
    </button>
    <button class="nav-item" id="nav-bookmarks" onclick="goTo('bookmarks')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1Z"/></svg>
      Repères
    </button>
    <div class="sidebar-footer">

      { type:"intro", label:"Avant de commencer",
        body:`Pas de mauvaise réponse ici — ça m'aide juste à savoir d'où on part.`,

      { type:"concept", label:"Une image pour commencer",
        body:`<p>Racheter une entreprise, c'est un peu comme acheter un immeuble locatif déjà occupé — sauf que « l'immeuble », ce sont des clients, des salariés et une réputation.</p>
        <p>Comme pour un bien immobilier : il y a une visite <span class="term">(sourcing)</span>, une expertise avant achat <span class="term">(due diligence)</span>, une négociation de prix, un financement, une signature chez le notaire <span class="term">(closing)</span> — puis tu emménages et tu gères.</p>
        <p>Concrètement, un rachat de PME se découpe en <strong>6 grandes étapes</strong> :</p>

      { type:"predict", label:"À toi de jouer",

      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[

      { type:"expert", label:"Œil d'expert",
        body:`<p>Un débutant regarde d'abord <strong>le prix</strong>.</p>
        <p>Un repreneur qui a déjà vécu un ou deux deals regarde d'abord <strong>la qualité et la prévisibilité du cash-flow</strong> — parce que c'est ce cash-flow qui va rembourser la dette, payer le crédit-vendeur, et déterminer si tu dors tranquille dans 18 mois.</p>
        <p>Retiens cette phrase, tu vas l'entendre souvent dans ce programme : <strong>« Le prix se négocie. La qualité du cash-flow, elle, ne se négocie pas — elle se vérifie. »</strong> Celui qui néglige ça découvre généralement la vérité au pire moment possible : quand il doit rembourser une échéance et que la caisse est vide.</p>` },
      { type:"checkpoint", question:"Est-ce que l'enchaînement des 6 étapes est clair jusqu'ici ?",

      { type:"summary",
        summary:"Un rachat de PME suit toujours la même trame en 6 étapes : cibler, sourcer, valoriser/négocier, auditer, financer/structurer, puis reprendre et piloter. Retiens surtout ceci : le prix se négocie, la qualité du cash-flow se vérifie.",
        nextHint:"Le vocabulaire clé pour parler le même langage que ton expert-comptable et ton avocat : EBITDA, multiple, LBO, holding, crédit-vendeur, due diligence, GAP." }

  l2: {
    id:"l2", moduleId:1, title:"Le vocabulaire qui va te sauver", duration:"16 min",
    steps:[
      { type:"concept", label:"EBITDA : le vrai carburant de la boîte",
        body:`<p><strong>EBITDA</strong> (à peu près l'équivalent français de l'<span class="term">Excédent Brut d'Exploitation</span>), c'est <strong>le cash que l'activité dégage vraiment</strong>, avant les artifices comptables : impôts, intérêts d'emprunt, amortissements.</p>
        <p>Autrement dit : si on retirait totalement la façon dont la boîte est financée (avec ou sans dette) et l'âge de son matériel (amorti ou neuf), combien gagnerait-elle sur sa seule activité ?</p>
        <p>C'est <strong>l'indicateur central</strong> de tout ce programme, parce que c'est lui qui sert de base à la valorisation et qui doit rembourser ta dette d'acquisition.</p>` },
      { type:"predict", label:"Vrai ou faux ?",
        question:"Une entreprise avec 500 K€ de chiffre d'affaires et une marge nette de 5 % (résultat net) a forcément un EBITDA proche de 25 K€.",

        explanation:"<b>Faux</b>, et c'est un piège fréquent. Le résultat net (25 K€ ici) est calculé <i>après</i> intérêts, impôts et amortissements. L'EBITDA, lui, est calculé <i>avant</i> ces trois éléments — il est donc presque toujours nettement plus élevé. Exemple : si cette boîte a 40 K€ d'amortissements et 10 K€ d'intérêts, son EBITDA tourne plutôt autour de 75-90 K€, pas 25 K€." },
      { type:"concept", label:"Le multiple de valorisation",
        body:`<p>Le <strong>multiple</strong>, c'est simplement : <em>« combien de fois l'EBITDA annuel j'accepte de payer pour racheter la boîte »</em>.</p>

      { type:"concept", label:"LBO, Holding, Crédit-vendeur",
        body:`<p><span class="term">LBO</span> (Leverage Buy-Out) : utiliser la capacité de remboursement <strong>future de la cible elle-même</strong> pour financer une bonne partie de son propre rachat — comme un investissement locatif où le loyer rembourse le crédit.</p>
        <p><span class="term">Holding d'acquisition</span> : une société que tu crées spécialement pour acheter la cible. La dette d'acquisition est logée dans la holding ; les dividendes remontent de la cible vers la holding pour la rembourser. Elle sert aussi à optimiser fiscalement et à isoler le risque.</p>
        <p><span class="term">Crédit-vendeur</span> : une partie du prix que le cédant accepte d'être payé étalée dans le temps — en clair, <strong>le vendeur te fait un prêt</strong>. Ça réduit ton besoin de cash immédiat, et son accord est un signal de confiance dans la pérennité de sa boîte.</p>` },
      { type:"concept", label:"Due Diligence et GAP",
        body:`<p><span class="term">Due Diligence (DD)</span> : la phase d'expertise avant signature — vérifier les comptes, les contrats, le juridique, le social, le commercial — pour éviter les mauvaises surprises après. C'est ton principal rempart contre les vices cachés.</p>
        <p><span class="term">GAP</span> (Garantie d'Actif et de Passif) : une clause contractuelle qui te protège après la vente. Si un passif caché apparaît (ex : redressement fiscal portant sur une période antérieure à ton achat), le vendeur doit t'indemniser — dans une limite (plafond) et une durée définies à l'avance.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[

          "Prendre le chiffre d'EBITDA transmis par l'expert-comptable du vendeur tel quel, sans le questionner. Ce chiffre a été préparé pour te vendre la boîte, pas pour te protéger."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur qui a l'habitude <strong>retraite toujours l'EBITDA</strong> (on parle d'« EBITDA normalisé ») avant de s'en servir pour quoi que ce soit : il retire le salaire du dirigeant s'il est anormalement bas ou haut par rapport au marché, les charges exceptionnelles, et les dépenses personnelles parfois logées dans l'entreprise (véhicule, notes de frais, voyages « professionnels »...).</p>
        <p>Un débutant prend le chiffre communiqué tel quel — et paie souvent plus cher qu'il ne le devrait, ou à l'inverse se fait une fausse idée du potentiel réel et passe à côté d'une bonne affaire. Prends l'habitude de toujours demander : « ce chiffre, il vient d'où, et qu'est-ce qui a été retiré ou ajouté dedans ? »</p>` },
      { type:"checkpoint", question:"Ce vocabulaire (EBITDA, multiple, LBO, holding, crédit-vendeur, DD, GAP) te semble-t-il clair ?",
        helpPrompt:"Je viens de voir le vocabulaire de base du rachat d'entreprise (EBITDA, multiple, LBO, holding, crédit-vendeur, due diligence, GAP) mais j'ai encore un peu de mal à tout relier. Peux-tu me faire une synthèse avec un exemple chiffré unique qui utilise tous ces termes ensemble ?" },
      { type:"summary",
        summary:"Tu connais maintenant le langage du rachat : l'EBITDA (le vrai cash généré par l'activité), le multiple (combien de fois cet EBITDA tu payes), le LBO et la holding (comment structurer le financement), le crédit-vendeur et la GAP (comment te protéger et réduire ton apport).",
        nextHint:"Pourquoi cibler précisément une « belle endormie » — et ce que ça change concrètement pour ta stratégie de financement." }

  l3: {
    id:"l3", moduleId:1, title:"Pourquoi cibler une « belle endormie » ?", duration:"14 min",

      { type:"concept", label:"Ton cahier des charges",

        <p>C'est ce qu'on appelle une <strong>« belle endormie »</strong>. Voyons pourquoi ce profil précis colle exactement à ta stratégie.</p>` },
      { type:"concept", label:"Le raisonnement, critère par critère",
        body:`<ul>
          <li><strong>Stable, rentable, EBITDA > 15 %</strong> → un cash-flow prévisible et solide, donc « bancable » : une banque ou un investisseur prête sur une capacité de remboursement démontrée, pas sur une promesse de croissance.</li>
          <li><strong>Absence de digital / CRM / prospection structurée</strong> → ce n'est pas une faiblesse gênante, c'est ton <strong>levier de création de valeur</strong> le plus sûr : tu sais déjà quoi améliorer, et ça ne demande pas un pari risqué, juste de la mise en œuvre.</li>
          <li><strong>« Sans développement récent »</strong> → moins d'acheteurs concurrents à l'achat (la plupart sont attirés par la croissance visible), donc un multiple de négociation plus bas pour toi.</li>

          <li><strong>Marché stable ou en croissance + revenus récurrents</strong> → tu n'as pas besoin de parier sur un pivot pour que le cash-flow continue de couvrir ta dette.</li>
          <li><strong>Avantage concurrentiel difficile à copier / forte demande locale</strong> → protège la pérennité du cash-flow dans la durée (le fameux « moat »).</li>
        </ul>` },

        correctIndex:1,
        explanation:"Exactement. La majorité du marché cherche de la croissance déjà visible — c'est plus facile à vendre à un board ou un comité d'investissement. Une « belle endormie » stable mais sans momentum apparent est souvent délaissée... alors qu'elle cache un potentiel réel. C'est précisément ce qui te permet de négocier un multiple plus bas." },
      { type:"pitfall", label:"⚠ Le piège à éviter absolument",
        items:[
          "Ne confonds jamais « pas de croissance récente » avec « mauvaise affaire ». Ici, stabilité + rentabilité + faible digitalisation sont un atout pour TA stratégie précise, pas un red flag en soi.",
          "Mais ne confonds pas non plus « stable » avec « en déclin » : une érosion progressive du chiffre d'affaires sur 3 ans, elle, EST un vrai red flag, quelle que soit la belle histoire que te raconte le cédant. Regarde toujours les 3 derniers exercices comptables, jamais un seul — celui qui a quelque chose à cacher adore te montrer « la meilleure année »."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Face à une cible « pas de digital, dirigeant vieillissant, pas de succession visible », un repreneur expérimenté pose <strong>immédiatement</strong> une question simple, presque brutale, que les débutants n'osent presque jamais poser assez tôt ou assez frontalement :</p>
        <p><strong>« Pourquoi vendez-vous, et pourquoi maintenant ? »</strong></p>
        <p>Écoute très attentivement la réponse — et surtout la manière dont elle est donnée. Une hésitation, une réponse trop rodée, ou au contraire trop évasive, t'apprend parfois plus que dix pages de due diligence. Cette seule question révèle à la fois le risque (fuit-il un problème ?) et l'opportunité réelle (est-ce simplement un dirigeant fatigué, sans repreneur familial ?). On y reviendra en profondeur au Module 5 sur la due diligence.</p>` },
      { type:"validation", label:"Question de validation 1/3",
        question:"Une cible affiche un EBITDA de 300 000 €, mais son dirigeant se verse un salaire de 15 000 €/an — largement sous le marché pour ce poste. Qu'est-ce que ça change dans ton analyse, et pourquoi ?" },
      { type:"validation", label:"Question de validation 2/3",

      { type:"validation", label:"Question de validation 3/3",

      { type:"summary",
