  l4: {
    id:"l4", moduleId:1, title:"Réalisme : pourquoi ce prix est-il bas ?", duration:"15 min",
    steps:[
      { type:"concept", label:"Le triangle que tout le monde cherche",
        body:`<p>Sois lucide dès maintenant sur une chose : <strong>belle endormie rentable</strong> (EBITDA &gt; 15 %, revenus récurrents) + <strong>multiple inférieur à 3x</strong> + <strong>apport limité à 30 K€</strong> — les trois ensemble, c'est le deal que tout le marché cherche.</p>
        <p>Il existe. Mais il n'existe presque que dans des situations précises, et ton travail de repreneur consiste à savoir les reconnaître — et surtout à comprendre <strong>pourquoi</strong> le prix est bas avant de t'en réjouir.</p>
        <p>Retiens cette règle simple : <strong>un prix bas sans raison identifiée n'est pas une bonne affaire, c'est un signal d'alerte.</strong> Le marché des PME est imparfait, mais il n'est pas stupide.</p>` },
      { type:"concept", label:"Les 4 bonnes raisons d'une décote (et les mauvaises)",
        body:`<p>Les décotes <strong>saines</strong> — celles que tu cherches :</p>
        <ul>
          <li><strong>Départ à la retraite sans successeur</strong> — le gisement n°1 en France : des dizaines de milliers de dirigeants de PME partent à la retraite chaque année sans repreneur familial. Le cédant privilégie souvent la pérennité de sa boîte et de ses équipes sur les 10 derniers pourcents de prix.</li>
          <li><strong>Dépendance au dirigeant</strong> — la boîte vaut moins parce qu'elle repose sur lui. C'est une décote justifiée... et c'est TON principal risque post-rachat. Elle se paie en travail de transition, pas seulement en euros.</li>
          <li><strong>Activité « pas sexy »</strong> — maintenance, nettoyage, contrôle, négoce technique : peu d'acheteurs se battent pour ces boîtes, alors que leurs cash-flows sont souvent les plus stables. C'est toute la philosophie des « boring businesses » popularisée par des investisseurs comme Codie Sanchez : l'ennui se paie moins cher que le rêve, à cash-flow égal.</li>
          <li><strong>Vente discrète et contrainte de calendrier</strong> — santé, mésentente d'associés, divorce : le cédant veut vendre vite et sans publicité. Prix plus bas contre discrétion et exécution rapide.</li>
        </ul>
        <p>Les décotes <strong>toxiques</strong> — celles qui expliquent un prix bas pour de mauvaises raisons : CA en érosion masquée par une bonne dernière année, litige en cours, client majeur sur le départ, redressement fiscal qui couve, matériel en fin de vie non provisionné. Même mécanique de prix, résultat opposé.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Tu repères une annonce à 2,1x l'EBITDA dans un secteur où la médiane tourne autour de 4x. Quelle est ta PREMIÈRE réaction de repreneur entraîné ?",
        options:[
          "Foncer : à ce prix, même avec des défauts, l'affaire est bonne",
          "Chercher activement la raison de la décote avant toute chose — et ne poursuivre que si c'est une décote « saine » que je sais gérer",
          "Proposer encore moins, puisque le vendeur est manifestement aux abois"
        ],
        correctIndex:1,
        explanation:"Un écart de presque 2x avec le marché n'est jamais gratuit. Ta première mission n'est pas de négocier, c'est de <b>diagnostiquer</b> : pourquoi ce prix ? Si la réponse est « retraite sans successeur, boîte peu digitalisée, dépendance au dirigeant », c'est exactement ta cible — la décote est saine et tu sais la travailler. Si tu ne trouves pas la raison, c'est que tu ne l'as pas encore trouvée — pas qu'elle n'existe pas." },
      { type:"concept", label:"Ce que tu peux prendre à Tapie — et ce que tu dois lui laisser",
        body:`<p>Bernard Tapie a bâti sa réputation en rachetant des entreprises pour une bouchée de pain — parfois le franc symbolique. Beaucoup de repreneurs débutants rêvent de reproduire ça. Il faut trier.</p>
        <p><strong>Ce qui est transposable à ton projet :</strong></p>
        <ul>
          <li><strong>L'audace du montage</strong> — financer un rachat avec très peu d'argent personnel, en combinant crédit-vendeur, dette et la capacité de la cible elle-même. C'est exactement ta logique de LBO (Module 8).</li>
          <li><strong>La vitesse d'exécution</strong> — quand un dossier est bon, celui qui avance vite et proprement rafle la mise face aux acheteurs qui tergiversent.</li>
          <li><strong>La négociation sur les faits</strong> — chiffres en main, sans se laisser impressionner par le prix affiché ni par le statut du vendeur.</li>
        </ul>
        <p><strong>Ce que tu dois lui laisser :</strong> le franc symbolique s'appliquait à des entreprises <em>en grande difficulté</em>, où l'acheteur reprenait surtout des dettes et des problèmes. Une belle endormie <em>rentable</em> avec des revenus récurrents ne se vendra jamais à ce prix — et un cédant en bonne santé financière n'a aucune raison de brader. Vise une décote justifiée (2 à 3x au lieu de 4-5x), pas un miracle.</p>` },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Devant un prix attractif, un repreneur expérimenté se pose toujours la même double question, presque paranoïaque :</p>
        <p><strong>« Qu'est-ce que je vois que le marché ne voit pas — ou qu'est-ce que le vendeur sait que je ne sais pas encore ? »</strong></p>
        <p>Il n'y a que deux réponses possibles, et il faut savoir laquelle est la tienne. Soit tu as un vrai avantage (tu connais le secteur, tu as vu le potentiel digital que les autres négligent, tu es le seul acheteur crédible qui s'est présenté) — soit il y a une information qui te manque. Les fonds de recherche (« search funds »), qui font ça de manière quasi industrielle depuis des décennies, ont une discipline stricte là-dessus : chaque décote doit être <em>expliquée et documentée</em> avant d'aller plus loin. Pas d'explication écrite noir sur blanc = pas de LOI. Adopte la même règle.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Confondre « pas cher » et « bonne affaire ». Le prix n'est bon que rapporté à la qualité du cash-flow et aux risques réels — un multiple de 2x sur un cash-flow qui s'évapore est infiniment plus cher qu'un 3x solide.",
          "Passer 18 mois à chercher le deal parfait qui coche 100 % des cases au prix rêvé — et laisser filer trois bonnes affaires à 90 %. Le réalisme, c'est aussi savoir qu'un très bon deal imparfait bat un deal parfait imaginaire.",
          "Se raconter que « le vendeur ne connaît pas la valeur de sa boîte ». Ça arrive — mais c'est l'hypothèse la plus dangereuse à faire par défaut, parce qu'elle t'arrange.",
          "Oublier que la dépendance au dirigeant, principale source de décote sur tes cibles, ne disparaît pas à la signature : elle te tombe dessus. Le prix bas d'aujourd'hui se paie en heures de transition demain — prévois-les."
        ] },
      { type:"validation", label:"Question de validation 1/2",
        question:"Une entreprise de maintenance affiche un EBITDA normalisé de 250 K€ et se vend 550 K€ (2,2x). Liste au moins 3 hypothèses qui pourraient expliquer ce prix — et pour chacune, dis si elle ferait de ce dossier une cible à creuser ou à fuir." },
      { type:"validation", label:"Question de validation 2/2",
        question:"Avec tes propres mots : pourquoi la stratégie « racheter au franc symbolique comme Tapie » est-elle incompatible avec ta thèse de la belle endormie rentable — et qu'est-ce que tu gardes malgré tout de cette approche ?" },
      { type:"summary",
        summary:"Un prix bas a toujours une raison. Ton métier de repreneur commence par la diagnostiquer : retraite sans successeur, dépendance au dirigeant, activité peu séduisante ou vente discrète sont des décotes saines que tu sais travailler ; tout le reste exige une enquête. Décote inexpliquée = danger, pas opportunité.",
        nextHint:"Le Module 2 transforme ta cible idéale en machine à trouver : thèse écrite, canaux de sourcing en Île-de-France, pipeline chiffré et premier rendez-vous cédant." }
    ]
  },

  s1: {
    id:"s1", moduleId:2, title:"Ta thèse d'acquisition, noire sur blanc", duration:"14 min",
    steps:[
      { type:"concept", label:"Pourquoi écrire une thèse (la leçon des search funds)",
        body:`<p>Les repreneurs les plus systématiques au monde sont les <span class="term">search funds</span> : des repreneurs financés par des investisseurs pour chercher UNE entreprise à racheter, à plein temps, pendant 18 à 30 mois. Ce modèle, étudié depuis des décennies par Stanford, a une discipline fondatrice :</p>
        <p><strong>Avant de chercher, on écrit sa thèse d'acquisition — une page, pas plus — et on s'y tient.</strong></p>
        <p>Pourquoi ? Parce que le sourcing va te mettre sous les yeux des dizaines de dossiers séduisants qui ne correspondent PAS à ta stratégie. Sans thèse écrite, tu vas dériver : un jour une boîte de e-commerce en croissance, le lendemain un restaurant « à fort potentiel ». La thèse sert d'abord à dire <strong>non vite</strong> — et à concentrer ton temps sur les 5 % de dossiers qui méritent une vraie analyse.</p>` },
      { type:"concept", label:"Ta thèse, structurée",
        body:`<p>Ta thèse tient en 5 blocs. Voici la tienne, déjà largement définie — à toi de la finaliser noir sur blanc :</p>
        <ul>
          <li><strong>Quoi</strong> : PME de services B2B ou technique à revenus récurrents (maintenance, contrats d'entretien, abonnements, prestations régulières), rentable et stable — une belle endormie, pas un redressement.</li>
          <li><strong>Taille</strong> : CA 500 K€ – 3 M€, EBITDA normalisé &gt; 15 % du CA — et idéalement &gt; 120 K€ en valeur absolue, pour que le montage bancaire tienne (une dette se rembourse en euros, pas en pourcentages).</li>
          <li><strong>Où</strong> : Île-de-France, à distance raisonnable de chez toi — tu vas y passer tes journées les 6 premiers mois.</li>
          <li><strong>Situation du cédant</strong> : départ retraite sans successeur en priorité — c'est là que se trouvent tes multiples sous 3x.</li>
          <li><strong>Exclusions fermes</strong> : CA en érosion sur 3 ans, top 3 clients &gt; 40 % du CA, litiges significatifs en cours, dépendance à une compétence technique que tu ne pourras ni garder ni remplacer, secteur en déclin structurel.</li>
        </ul>
        <p>Une thèse n'interdit pas les exceptions — elle t'oblige à les <em>justifier par écrit</em> au lieu de les subir par enthousiasme.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Pourquoi fixer un EBITDA minimum en valeur absolue (ex : 120 K€) en plus du critère de marge (> 15 %) ?",
        options:[
          "Parce qu'en dessous, l'entreprise n'est légalement pas cessible",
          "Parce que la dette d'acquisition se rembourse en euros : sous ~100-120 K€ d'EBITDA, même une très belle marge laisse trop peu de cash pour servir une dette ET te rémunérer ET absorber un imprévu",
          "Parce que les banques n'ont pas le droit de prêter en dessous de ce seuil"
        ],
        correctIndex:1,
        explanation:"Une boîte à 550 K€ de CA et 17 % de marge dégage ~95 K€ d'EBITDA. Retire l'annuité de dette, ta rémunération, un imprévu — il ne reste rien, et la moindre mauvaise année te met en défaut. La marge mesure la qualité ; la valeur absolue mesure la capacité à porter un montage. Il te faut les deux." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "La thèse « open bar » : « toute belle PME rentable en IDF ». Trop large = tu ne deviens expert de rien, tes courriers d'approche sonnent génériques, et tu ne sais pas comparer les dossiers entre eux.",
          "La thèse trop étroite : « maintenance CVC pour copropriétés, uniquement dans le 91, EBITDA 18-20 % ». Il y a peut-être 4 cibles qui existent. Vise un vivier d'au moins 200-400 entreprises identifiables — sinon élargis un cran.",
          "Changer de thèse à chaque dossier séduisant croisé. Si tu veux la modifier, fais-le à froid, une fois par trimestre, jamais à chaud devant une annonce.",
          "Garder sa thèse dans sa tête. Non écrite, elle ne filtre rien — elle se plie à ton envie du moment."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté utilise sa thèse comme un outil <strong>commercial</strong>, pas seulement comme un filtre.</p>
        <p>Face à un expert-comptable, un notaire ou un cédant, dire « je cherche une PME de services techniques à contrats récurrents, 1 à 2 M€ de CA, dont le dirigeant part à la retraite, en Essonne ou dans le sud de l'IDF » te rend <em>mémorable et crédible</em>. Dire « je cherche une boîte rentable à racheter » te rend invisible — tu ressembles aux cinquante curieux qu'ils croisent chaque année et qui n'achèteront jamais rien.</p>
        <p>La précision de ta thèse est le premier signal, pour tout ton écosystème, que tu es un acheteur sérieux. Et les intermédiaires réservent leurs meilleurs dossiers aux acheteurs sérieux.</p>` },
      { type:"checkpoint", question:"Est-ce que la logique « thèse écrite = filtre + outil commercial » est claire ?",
        helpPrompt:"Je viens de voir la notion de thèse d'acquisition (5 blocs : quoi, taille, où, situation du cédant, exclusions). Peux-tu m'aider à rédiger la mienne en une page, en me posant les bonnes questions une par une ?" },
      { type:"summary",
        summary:"Une thèse d'acquisition écrite — quoi, taille, zone, situation du cédant, exclusions — sert d'abord à dire non vite, ensuite à te rendre crédible et mémorable auprès de tout l'écosystème. C'est la discipline fondatrice des search funds, et elle vaut autant pour un repreneur individuel.",
        nextHint:"Maintenant que tu sais QUOI chercher : OÙ chercher en Île-de-France — le marché visible, et surtout le marché caché." }
    ]
  },

  s2: {
    id:"s2", moduleId:2, title:"Où chasser en Île-de-France", duration:"15 min",
    steps:[
      { type:"concept", label:"Le marché visible : les annonces",
        body:`<p>Premier terrain de chasse, le <strong>marché visible</strong> — les entreprises officiellement à vendre :</p>
        <ul>
          <li><strong>Les plateformes d'annonces</strong> : Fusacq, Transentreprise (réseau des CCI/CMA), la bourse du CRA (Cédants et Repreneurs d'Affaires — association de référence, avec antennes en IDF), les rubriques cession de Bpifrance. Crée des alertes sur tes critères et consulte-les chaque semaine.</li>
          <li><strong>Les intermédiaires</strong> : cabinets de cession spécialisés PME, qui portent des mandats de vente. Fais-toi connaître d'eux avec ta thèse — mais garde en tête qu'ils travaillent pour le vendeur, et que leurs dossiers sont vus par beaucoup d'acheteurs.</li>
          <li><strong>Le CRA en tant que réseau</strong> : au-delà des annonces, leurs réunions et formations te mettent en contact avec des cédants ET des repreneurs passés par là — retour d'expérience inestimable.</li>
        </ul>
        <p>Le marché visible a un avantage (les vendeurs sont vraiment vendeurs) et un défaut majeur : <strong>tu y es en concurrence</strong>, donc les prix y sont plus tendus. C'est là qu'on trouve des deals corrects — rarement les meilleurs.</p>` },
      { type:"concept", label:"Le marché caché : là où sont les multiples sous 3x",
        body:`<p>L'immense majorité des PME qui vont changer de mains dans les 5 ans <strong>ne sont sur aucune plateforme</strong>. Leur dirigeant approche de la retraite, sait confusément qu'il devra vendre, mais n'a rien engagé — par attachement, par manque de temps, ou parce qu'il ne sait pas par où commencer. C'est le marché caché, et c'est ton vrai terrain.</p>
        <p>Deux voies pour y accéder :</p>
        <ul>
          <li><strong>Les prescripteurs</strong> — ceux à qui les dirigeants se confient en premier : experts-comptables (le canal n°1 : ils savent avant tout le monde qui veut vendre), notaires, avocats d'affaires, banquiers pro, courtiers en assurance pro, fédérations et syndicats professionnels de ton secteur cible. Rencontre-les avec ta thèse d'une page ; propose-leur d'être leur « solution » quand un client cédant se présente.</li>
          <li><strong>L'approche directe (off-market)</strong> — identifier toi-même les cibles et écrire au dirigeant. Avec les données publiques (registre du commerce, comptes déposés via Pappers ou societe.com), tu peux filtrer : secteur, département, tranche de CA, date de création ancienne, âge du dirigeant. Un courrier <em>papier</em>, personnalisé, courtois — pas un email de masse — obtient des taux de réponse étonnants auprès de dirigeants de 58-67 ans.</li>
        </ul>` },
      { type:"predict", label:"À toi de jouer",
        question:"Pourquoi un courrier papier personnalisé fonctionne-t-il mieux qu'un email pour approcher un dirigeant de PME proche de la retraite ?",
        options:[
          "Parce que ces dirigeants n'ont pas d'adresse email",
          "Parce qu'un courrier signé, nominatif, qui montre qu'on connaît SON entreprise, est rare, flatteur et discret — il arrive sur son bureau sans passer par un assistant ni un filtre anti-spam, et il peut le relire à tête reposée",
          "Parce que la loi encadre la prospection par email entre entreprises"
        ],
        correctIndex:1,
        explanation:"La vente de sa boîte est un sujet intime pour un fondateur — souvent tenu secret même vis-à-vis des salariés. Un courrier discret et respectueux colle à cette psychologie ; un email de prospection la heurte. Et mécaniquement : il reçoit 200 emails par jour et 2 courriers personnels par mois. Devine lequel il lit." },
      { type:"concept", label:"📌 Fil rouge — l'apparition de Thermelec",
        body:`<p>À partir de maintenant, un dossier va nous suivre tout au long du programme — un cas d'école construit pour ressembler trait pour trait à ta cible.</p>
        <p>Ton expert-comptable, que tu as rencontré avec ta thèse d'une page trois mois plus tôt, t'appelle : <em>« J'ai peut-être quelque chose pour vous. Un client, Bernard Lemoine, 61 ans — il ne l'a dit à personne, mais sa femme veut qu'il lève le pied et son fils ne reprendra pas. »</em></p>
        <ul>
          <li><strong>Thermelec</strong> — maintenance et dépannage CVC (chauffage-ventilation-climatisation) pour copropriétés et PME, basée à Corbeil-Essonnes (91), créée en 1998.</li>
          <li>11 salariés, dont 8 techniciens. <strong>CA : 1,82 M€.</strong></li>
          <li>~70 % du CA en <strong>contrats de maintenance récurrents</strong> annuels reconduits.</li>
          <li>Pas de site web à jour, pas de CRM, devis sous Excel, planning papier.</li>
          <li>Aucune annonce publiée nulle part : <strong>pur marché caché.</strong></li>
        </ul>
        <p>Tu ne connais ni le prix, ni l'EBITDA réel, ni les dépendances. On va dérouler ce dossier ensemble, module après module, jusqu'aux 100 premiers jours et à la mise en place d'un gérant.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Ne chasser que sur les plateformes d'annonces — c'est-à-dire exactement là où chassent tous les autres, avec les prix qui vont avec.",
          "Approcher les prescripteurs les mains vides (« si vous entendez parler de quelque chose... »). Sans thèse précise, tu es oublié avant la fin du café.",
          "Envoyer 300 courriers génériques d'un coup au lieu de 15 courriers vraiment personnalisés par semaine. Le taux de réponse s'effondre, et tu grilles des cibles qu'un courrier soigné aurait ouvertes.",
          "Négliger la confidentialité : mentionner à un tiers qu'une entreprise précise « serait à vendre » peut griller le cédant auprès de ses salariés ou clients — et te griller définitivement avec lui."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Le meilleur deal ne porte presque jamais de panneau « à vendre ».</p>
        <p>Un repreneur expérimenté raisonne en <strong>années de retard sur le marché</strong> : quand un dossier arrive sur une plateforme, le cédant y pense depuis 2 ou 3 ans — et parfois plusieurs acheteurs ont déjà refusé. Quand c'est TOI qui déclenches la réflexion du cédant par un courrier ou via son expert-comptable, tu es seul en face de lui, sans enchère, et la relation démarre sur la confiance plutôt que sur un rapport de force. C'est précisément dans cette configuration que se signent les multiples sous 3x avec crédit-vendeur — pas dans les data rooms disputées.</p>` },
      { type:"validation", label:"Question de validation",
        question:"Construis ton plan de sourcing concret pour les 30 prochains jours : quels canaux actives-tu, dans quel ordre, avec quelles actions précises chaque semaine ? (Sois concret : qui tu contactes, ce que tu leur envoies, ce que tu leur dis.)" },
      { type:"summary",
        summary:"Deux marchés : le visible (plateformes, intermédiaires — vendeurs certains mais concurrence et prix tendus) et le caché (prescripteurs + approche directe — là où se trouvent les vraies décotes). Ton expert-comptable et le courrier papier personnalisé sont tes deux armes les plus rentables. Et Thermelec vient d'entrer dans ta vie.",
        nextHint:"Un canal ne suffit pas : il faut un pipeline chiffré, avec une cadence hebdomadaire — la prospection du repreneur, exactement comme un commercial gère la sienne." }
    ]
  },

  s3: {
    id:"s3", moduleId:2, title:"Ton pipeline : la prospection du repreneur", duration:"14 min",
    steps:[
      { type:"concept", label:"Le sourcing est un entonnoir, pas une loterie",
        body:`<p>Les search funds ont documenté leur entonnoir depuis des années, et les ordres de grandeur sont têtus. Pour UN rachat signé, compte grosso modo :</p>
        <ul>
          <li><strong>200 à 400 entreprises identifiées</strong> correspondant à la thèse ;</li>
          <li><strong>100+ approches</strong> réellement envoyées (courriers, mises en relation) ;</li>
          <li><strong>10 à 20 rendez-vous cédants</strong> ;</li>
          <li><strong>3 à 6 dossiers analysés en profondeur</strong> (comptes en main) ;</li>
          <li><strong>1 à 3 LOI envoyées</strong> ;</li>
          <li><strong>1 signature</strong> — le tout en 9 à 18 mois.</li>
        </ul>
        <p>La bonne nouvelle : ce n'est <strong>pas de la chance, c'est du débit</strong>. Si tu tiens la cadence en haut de l'entonnoir, le bas finit par tomber. La mauvaise nouvelle : si tu envoies 10 courriers puis attends, il ne se passera rien — et tu concluras à tort que « le marché est bouché ».</p>` },
      { type:"concept", label:"Ta routine hebdomadaire",
        body:`<p>Traite ta recherche comme un commercial traite sa prospection — avec un rythme non négociable :</p>
        <ul>
          <li><strong>10 à 15 nouvelles cibles</strong> identifiées et qualifiées (comptes déposés consultés, dirigeant identifié) ;</li>
          <li><strong>10 à 15 courriers personnalisés</strong> envoyés ;</li>
          <li><strong>Relance systématique à J+10 ou J+15</strong> — par téléphone de préférence : la moitié des rendez-vous se prennent à la relance, pas au premier courrier ;</li>
          <li><strong>1 contact prescripteur</strong> entretenu ou créé (un café avec un expert-comptable vaut 50 courriers) ;</li>
          <li><strong>Un tableau de suivi tenu à jour</strong> : cible, date d'approche, statut, prochaine action datée. Sans prochaine action datée, une ligne est morte.</li>
        </ul>
        <p>Compte 6 à 10 heures par semaine si tu recherches en parallèle d'une activité. C'est un marathon cadencé, pas un sprint d'enthousiasme.</p>` },
      { type:"numeric", label:"Exercice",
        question:"Avec ces taux : 12 % des courriers donnent un rendez-vous, 25 % des rendez-vous donnent un dossier analysé, 40 % des dossiers analysés donnent une LOI. Combien de courriers faut-il envoyer (environ) pour aboutir à 2 LOI ?",
        placeholder:"Ex : 100", answer:167, tolerance:15,
        successMsg:"Oui — environ 165-170 courriers : 2 LOI ÷ 40 % = 5 dossiers ; 5 ÷ 25 % = 20 rendez-vous ; 20 ÷ 12 % ≈ 167 courriers. À 12-15 courriers par semaine, c'est environ 3 mois de cadence tenue. Le sourcing, c'est de l'arithmétique.",
        hint:"Remonte l'entonnoir : combien de dossiers analysés pour 2 LOI ? Puis combien de rendez-vous ? Puis combien de courriers ?" },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Arrêter toute prospection dès qu'un dossier devient chaud. Si ce dossier meurt (et la majorité meurent), tu repars de zéro avec 2 mois de retard — et pendant la négociation, le cédant sent que tu n'as pas d'alternative.",
          "Mesurer son avancement au nombre d'annonces consultées plutôt qu'au nombre d'approches envoyées. Regarder n'est pas prospecter.",
          "Ne pas relancer « pour ne pas déranger ». Un dirigeant de 61 ans qui n'a pas répondu n'a pas dit non — il a posé ton courrier sur une pile. La relance téléphonique courtoise est attendue, pas intrusive.",
          "Tenir son pipeline de tête. Au-delà de 10 cibles actives, tu perds des relances — donc des deals."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un pipeline plein est ton <strong>meilleur outil de négociation</strong> — bien avant tout script.</p>
        <p>Celui qui n'a qu'un dossier négocie avec la peur de le perdre, et ça se sent à chaque concession. Celui qui a trois discussions en cours peut dire calmement : « à ces conditions, je ne suis pas preneur » — la phrase la plus puissante de toute négociation. Les search funds appellent ça le pouvoir de l'alternative ; les négociateurs, la BATNA. Toi, appelle ça simplement : ne jamais dépendre d'un seul deal.</p>
        <p>Règle pratique : tant que tu n'as pas signé de LOI avec exclusivité, la prospection continue, sans exception. Après la LOI, tu mets en pause — l'exclusivité t'y engage moralement et souvent contractuellement — mais ton tableau reste prêt à redémarrer.</p>` },
      { type:"checkpoint", question:"La logique d'entonnoir chiffré et de cadence hebdomadaire est-elle claire ?",
        helpPrompt:"Je viens de voir le pipeline de sourcing (entonnoir : ~167 courriers pour 2 LOI, routine hebdomadaire, relances). Peux-tu m'aider à dimensionner MON pipeline selon le temps dont je dispose réellement chaque semaine ?" },
      { type:"summary",
        summary:"Le sourcing est un entonnoir arithmétique : ~100+ approches pour 10-20 rendez-vous, 3-6 dossiers, 1-3 LOI, 1 deal. Ce qui le fait tourner : une cadence hebdomadaire non négociable et des relances systématiques. Et un pipeline plein est ton premier levier de négociation — il te donne le droit de dire non.",
        nextHint:"Ton courrier a fonctionné : Bernard Lemoine accepte de te rencontrer. Le premier rendez-vous cédant est un exercice à part entière — et tout peut s'y jouer." }
    ]
  },

  s4: {
    id:"s4", moduleId:2, title:"Le premier rendez-vous cédant", duration:"16 min",
    steps:[
      { type:"concept", label:"Ce que ce rendez-vous est — et n'est pas",
        body:`<p>Ton expert-comptable a organisé la rencontre : un déjeuner discret avec <strong>Bernard Lemoine, fondateur de Thermelec</strong>. Avant d'y aller, cale l'objectif :</p>
        <p>Le premier rendez-vous n'est <strong>ni une négociation, ni un audit</strong>. C'est un rendez-vous de <em>confiance et de collecte</em>. Un fondateur ne vend pas sa boîte de 27 ans au plus offrant — il la confie à quelqu'un qu'il juge capable de ne pas la détruire. Tant que ce jugement n'est pas rendu en ta faveur, aucun chiffre sérieux ne sortira.</p>
        <p>Trois objectifs, dans l'ordre : (1) qu'il ait envie d'un second rendez-vous, (2) comprendre <em>pourquoi il vend et pourquoi maintenant</em>, (3) repérer — sans creuser lourdement — les grandes masses : activité, récurrence, équipe, dépendances.</p>
        <p>Règle des 80/20 : <strong>il parle 80 % du temps.</strong> Et le prix n'est PAS un sujet du premier rendez-vous — si lui l'aborde, écoute, note, ne contre-propose rien.</p>` },
      { type:"concept", label:"Les questions qui font parler",
        body:`<p>Des questions ouvertes, dans un ordre qui va du plaisir vers le sensible :</p>
        <ul>
          <li><em>« Racontez-moi comment vous avez démarré. »</em> — il adore cette histoire, elle installe la confiance, et elle est bourrée d'informations.</li>
          <li><em>« À quoi ressemble votre semaine type aujourd'hui ? »</em> — LA question qui mesure la dépendance au dirigeant sans la nommer. S'il fait encore les devis, les gros dépannages et la relation avec les principaux clients, tu sais à quoi t'attendre.</li>
          <li><em>« Comment viennent les nouveaux clients ? »</em> — s'il répond « le bouche-à-oreille, on n'a jamais eu besoin de prospecter », tu entends à la fois le risque (zéro machine commerciale) et TON levier de création de valeur.</li>
          <li><em>« Parlez-moi de votre équipe — qui fait tourner quoi ? »</em> — cherche le bras droit officieux, celui sans qui rien ne tourne.</li>
          <li><em>« Qu'est-ce qui vous ferait dire, dans quelques années, que la transmission a été réussie ? »</em> — sa réponse te dit ce qu'il faudra sécuriser dans le deal (l'équipe ? le nom ? le prix ? sa tranquillité ?).</li>
          <li>Et en douceur, vers la fin : <em>« Pourquoi maintenant ? »</em></li>
        </ul>` },
      { type:"concept", label:"📌 Fil rouge — le déjeuner avec Bernard",
        body:`<p>Extraits de ce que tu notes en sortant du déjeuner :</p>
        <p><em>« 61 ans. Sa femme le pousse à arrêter, problème de dos, son fils est ingénieur ailleurs et ne reprendra pas. Fier de sa boîte — il a répété trois fois "on n'a jamais perdu un contrat de maintenance". Semaine type : il fait encore TOUS les chiffrages des grosses affaires et gère personnellement les deux syndics principaux. L'équipe : "Karim, mon chargé d'affaires, c'est mon couteau suisse." Les clients : "que du bouche-à-oreille, jamais fait de pub en 27 ans." Sur le prix : "je ne brade pas, j'ai vu qu'une boîte comme la mienne était partie à 1 million." Il n'a mandaté personne. Deuxième rendez-vous accepté — il me montrera l'atelier. »</em></p>
        <p>Tout y est déjà : la motivation réelle (santé + famille = décote saine), la dépendance au dirigeant (chiffrages + relation grands comptes), l'homme-clé (Karim), le levier (zéro commercial structuré), et une ancre de prix (« 1 million ») posée sans qu'on lui demande.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Bernard affirme : « Mes clients sont fidèles, c'est du solide, on n'a jamais perdu un contrat. » Quelle est la vraie question que cette phrase doit déclencher dans ta tête (pour plus tard, pas forcément à table) ?",
        options:[
          "Aucune : des clients fidèles, c'est exactement ce que je cherche",
          "Les clients sont-ils fidèles à l'ENTREPRISE — ou à Bernard ? Que reste-t-il de cette fidélité le jour où il part ?",
          "Pourquoi n'a-t-il pas augmenté ses prix si les clients sont si fidèles ?"
        ],
        correctIndex:1,
        explanation:"C'est LA question centrale sur toutes tes cibles. La fidélité portée par une relation personnelle de 25 ans ne se rachète pas — elle se transfère, lentement, pendant la période d'accompagnement. La réponse conditionne la durée d'accompagnement à négocier, le poids du crédit-vendeur (qui l'intéresse à la transition), et une partie de la due diligence commerciale (Module 5)." },
      { type:"pitfall", label:"⚠ Pièges classiques du premier rendez-vous",
        items:[
          "Dérouler ton montage financier (« crédit-vendeur, holding, LBO... ») dès le premier contact. Le cédant entend : « il n'a pas d'argent et parle de ma boîte comme d'un produit financier. » Le montage viendra quand la confiance sera là (Module 6).",
          "Pointer les faiblesses (« votre site date de 2011... ») pour préparer une négociation. Tu crois marquer un point, tu insultes 27 ans de travail. Les faiblesses, tu les notes en silence — elles serviront, plus tard, chiffrées et sans mépris.",
          "Poser des questions de due diligence (marges, salaires, litiges) à table. Trop tôt = méfiance immédiate.",
          "Promettre pour séduire (« je garderai toute l'équipe, je ne changerai rien »). Tout ce que tu promets aujourd'hui te sera opposé pendant 18 mois.",
          "Oublier de conclure sur une suite concrète et datée. Un « on se rappelle » sans date est un dossier qui refroidit."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté écoute surtout <strong>ce qui n'est pas dit</strong>.</p>
        <p>Bernard a parlé de tout — sauf de ses chiffres, et c'est normal à ce stade. Mais note les zones qu'il a survolées ou éludées : a-t-il parlé de ses fournisseurs ? D'un client perdu récemment ? De la santé de Karim ou de son envie de rester ? Chaque silence est une ligne à inscrire dans ta future due diligence. Et une astuce de terrain : demande toujours à <strong>visiter</strong> (atelier, bureaux). L'état du matériel, l'ambiance entre les gars, la façon dont les salariés le saluent t'apprennent des choses qu'aucun bilan ne montre — et accepter de te faire entrer chez lui est, pour un fondateur, un signal d'engagement bien plus fort qu'un deuxième déjeuner.</p>` },
      { type:"concept", label:"🎭 Passe à la pratique",
        body:`<p>La théorie du premier rendez-vous s'oublie en cinq minutes face à un vrai cédant. La <strong>Salle d'entraînement</strong> de l'app te permet de jouer ce rendez-vous en conditions réelles : l'IA incarne Bernard Lemoine — avec son attachement, ses fiertés, ses esquives et une ou deux choses qu'il ne dira que si tu poses les bonnes questions. À la fin, tu demandes le débrief du coach.</p>
        <p style="margin-top:10px;"><button class="btn-primary" onclick="startTraining('rdv1')">🎭 M'entraîner : premier rendez-vous avec Bernard →</button></p>` },
      { type:"validation", label:"Question de validation",
        question:"Prépare tes 6 questions pour un premier rendez-vous avec le dirigeant d'une entreprise de ta thèse, dans l'ordre où tu les poserais — et pour chacune, note en une ligne ce que tu cherches vraiment à apprendre derrière la question." },
      { type:"summary",
        summary:"Le premier rendez-vous sert à créer la confiance et à comprendre pourquoi il vend — pas à négocier ni à auditer. Règle des 80/20, questions ouvertes (la « semaine type » mesure la dépendance au dirigeant), zéro montage financier, zéro critique, et une suite datée. Chez Thermelec, tout l'essentiel est apparu en un déjeuner : décote saine, dépendance, homme-clé, levier commercial, et une ancre de prix à 1 M€.",
        nextHint:"Tu as les Modules 3, 4 et 5 pour analyser les comptes que Bernard va te transmettre. Ensuite, le Module 6 s'enrichit : structurer ta lettre d'intention, puis la GAP — ton assurance anti-vices cachés." }
    ]
  },

  cf1: {
    id:"cf1", moduleId:10, title:"Le principe fondamental & Phase 1 : Stabilisation", duration:"16 min",
    steps:[
      { type:"concept", label:"Le principe qui change tout",
        body:`<p>Voici l'idée centrale de tout ce module, et probablement la plus rentable de tout ce programme : <strong>il ne s'agit pas de créer de la croissance, mais de révéler du cash déjà présent dans l'entreprise.</strong></p>
        <p>Imagine une maison déjà meublée, où certaines pièces sont simplement fermées à clé depuis des années. Ton travail n'est pas de construire une extension — c'est d'abord d'ouvrir les portes qui existent déjà.</p>
        <p>Dans l'immense majorité des PME rachetées (et c'est particulièrement vrai pour une « belle endormie »), on retrouve systématiquement les mêmes quatre pièces fermées à clé :</p>
        <ul>
          <li><strong>Pricing sous-exploité</strong> — les prix n'ont pas bougé depuis des années, par confort ou par peur</li>
          <li><strong>Clients peu activés</strong> — une base de clients qui pourraient acheter plus, mais qu'on ne sollicite jamais</li>
          <li><strong>Coûts mal pilotés</strong> — personne ne les a challengés depuis longtemps</li>
          <li><strong>Absence de stratégie marketing</strong> — aucune structure pour transformer la réputation en nouveaux clients</li>
        </ul>` },
      { type:"predict", label:"À toi de jouer",
        question:"Tu reprends une entreprise demain. Qu'est-ce que tu fais en PREMIER, dans les 60 premiers jours ?",
        options:["J'augmente les prix immédiatement, pendant que j'ai l'élan du changement","Je sécurise ce qui existe déjà : clients clés, équipe, trésorerie réelle","Je lance une nouvelle offre pour marquer le coup","Je remplace le management en place pour imposer ma vision"],
        correctIndex:1,
        explanation:"Exactement. Tout le reste (pricing, croissance, structuration) ne vaut rien si tu perds tes clients clés ou ton équipe pendant la transition. La Phase 1 n'est pas la phase excitante — c'est la phase qui protège tout ce que tu vas construire ensuite." },
      { type:"concept", label:"Phase 1 — Stabilisation (0 à 60 jours)",
        body:`<p><strong>Objectif : sécuriser l'existant et préserver le cash.</strong> Rien d'autre ne compte encore.</p>
        <p><strong>Actions concrètes :</strong></p>
        <ul>
          <li><strong>Sécurisation des clients clés</strong> — identifie-les avant même le closing (tu les connais déjà grâce à ta due diligence commerciale du Module 5), et prépare une communication de transition rassurante, pas une surprise.</li>
          <li><strong>Fidélisation des équipes essentielles</strong> — repère qui détient une relation client critique ou un savoir-faire clé. Ce sont eux qu'il faut rassurer en priorité, individuellement.</li>
          <li><strong>Analyse des flux financiers réels</strong> — ne te fie pas qu'à la comptabilité : regarde les relevés bancaires réels des 12 derniers mois. C'est souvent différent de ce que montre le compte de résultat.</li>
        </ul>
        <p><strong>Optimisations rapides et à faible risque :</strong> réduction des dépenses inutiles (abonnements non utilisés, doublons), renégociation fournisseurs (souvent jamais challengés depuis des années), arrêt des activités structurellement non rentables.</p>
        <p><strong>Indicateurs à suivre dès le jour 1 :</strong> niveau de trésorerie, taux de churn client, concentration client (quelle part du CA dépend de tes 3 plus gros clients).</p>` },
      { type:"expert", label:"Œil d'expert : l'angle mort juridique",
        body:`<p>Un point que la plupart des repreneurs débutants découvrent trop tard, parfois à leurs dépens : en France, l'<strong>article L1224-1 du Code du travail</strong> impose le <strong>transfert automatique de tous les contrats de travail</strong> lors d'une cession — ancienneté, avantages acquis, tout est repris tel quel, tu n'as pas le choix de « faire le tri ».</p>
        <p>Ce n'est pas une option de gestion RH, c'est une obligation légale à connaître AVANT le closing, pas à découvrir en Phase 1. Ça doit être vérifié pendant la due diligence sociale (Module 5), pour que tu arrives en Phase 1 sans surprise sur la masse salariale ou les engagements sociaux repris.</p>` },
      { type:"pitfall", label:"⚠ Le piège qui coûte le plus cher",
        items:[
          "Vouloir tout changer en même temps dès le jour 1 : augmenter les prix, couper des coûts, ET changer le management, la même semaine. C'est la meilleure façon de perdre les équipes ET les clients simultanément — chaque changement génère de l'incertitude, et l'incertitude cumulée dépasse vite ce que les gens tolèrent.",
          "La bonne séquence : Phase 1 rassure et observe. Phase 2 (le module suivant) commence à extraire du cash, une fois que tu as la confiance des équipes et une vision claire des vrais chiffres."
        ] },
      { type:"numeric", label:"Exercice",
        question:"Une cible réalise 900 000 € de CA. Ses 3 plus gros clients représentent à eux seuls 450 000 € de ce CA. Quel est le pourcentage de concentration sur ces 3 clients ?",
        placeholder:"Ex : 50", answer:50, tolerance:1,
        successMsg:"50 %. À ce niveau de concentration, la perte d'un seul de ces 3 clients pendant ta transition serait un choc sérieux — c'est exactement pourquoi la sécurisation des clients clés est la toute première action de la Phase 1, avant même de penser pricing.",
        hint:"Indice : (450 000 / 900 000) × 100." },
      { type:"checkpoint", question:"La logique de la Phase 1 (sécuriser avant tout) est-elle claire ?",
        helpPrompt:"Je viens de voir la Phase 1 du système cash-flow (Stabilisation, 0-60 jours) mais je veux m'assurer d'avoir bien compris pourquoi on sécurise avant d'optimiser. Peux-tu me donner un exemple concret de ce qui peut mal tourner si on brûle cette étape ?" },
      { type:"summary",
        summary:"La Phase 1 ne cherche pas à créer de la valeur — elle protège celle qui existe déjà : clients clés, équipe, trésorerie réelle. C'est cette protection qui rend possible tout ce qui vient après.",
        nextHint:"La Phase 2 : comment extraire du cash en 1 à 3 mois, sans attendre un seul client de plus." }
    ]
  },

  cf2: {
    id:"cf2", moduleId:10, title:"Phase 2 : Extraction de cash", duration:"15 min",
    steps:[
      { type:"concept", label:"Le levier le plus puissant de tout le système",
        body:`<p><strong>Objectif de la Phase 2 (1 à 3 mois) : augmenter le cash-flow SANS croissance.</strong> Tu n'as pas encore besoin d'un seul client de plus.</p>
        <p>Le levier principal, et de loin le plus puissant : <strong>le pricing.</strong> Voici pourquoi il domine tous les autres leviers : une augmentation de prix va (presque) intégralement dans ta marge, alors qu'un euro de chiffre d'affaires supplémentaire par la croissance traîne avec lui des coûts additionnels (acquisition, production, service). Prix et volume ne se valent pas du tout, euro pour euro.</p>` },
      { type:"numeric", label:"Exercice — l'effet de levier du pricing",
        question:"Une entreprise fait 800 000 € de CA avec 20% de marge nette (160 000 €). Tu augmentes tous les prix de 8%, sans perdre un seul client et sans coût supplémentaire. Quelle est la nouvelle marge nette en euros (arrondis) ?",
        placeholder:"Ex : 200000", answer:224000, tolerance:2000,
        successMsg:"224 000 € (160 000 € + 8% × 800 000 €). Ta marge nette augmente de 40% alors que le CA n'a bougé que de 8%. C'est ça, l'effet de levier du pricing : un petit mouvement sur le prix a un effet démultiplié sur ce qui te reste réellement en poche.",
        hint:"Indice : les 8% d'augmentation de prix (64 000 €) s'ajoutent presque intégralement à la marge existante, puisque les coûts ne changent pas." },
      { type:"concept", label:"Comment augmenter les prix sans perdre ses clients",
        body:`<p><strong>Le levier pricing en pratique :</strong></p>
        <ul>
          <li><strong>Augmentation des prix de 5 à 15%</strong> — la fourchette qui fonctionne dans la majorité des PME sans provoquer de départs massifs.</li>
          <li><strong>Segmentation clients</strong> — n'augmente pas tout le monde pareil. Un client fidèle depuis 10 ans avec un fort coût de changement de fournisseur tolère plus qu'un client récent et opportuniste.</li>
          <li><strong>Réduction des remises injustifiées</strong> — dans la plupart des PME rachetées, des remises historiques traînent sans plus aucune justification commerciale.</li>
          <li><strong>Correction des oublis de facturation</strong> — des prestations réalisées mais jamais refacturées, plus fréquent qu'on ne le pense dans les structures peu digitalisées.</li>
        </ul>
        <p>En parallèle, <strong>optimise le besoin en fonds de roulement (BFR)</strong> : réduis les délais de paiement clients, allonge (raisonnablement) les délais fournisseurs, optimise les niveaux de stock. Ce sont des leviers de trésorerie immédiate, sans toucher au compte de résultat.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Augmenter les prix de façon uniforme et brutale, sans tester ni segmenter — c'est le meilleur moyen de perdre exactement les clients qu'il ne fallait pas perdre.",
          "Annoncer une hausse sans justification ni accompagnement : une hausse expliquée (qualité, coûts, valeur ajoutée) passe presque toujours mieux qu'une hausse silencieuse qu'on découvre sur une facture."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté ne fait jamais une hausse de prix « à l'aveugle ». Il segmente d'abord sa base clients en trois groupes : les clients captifs (fort coût de changement, faible sensibilité prix), les clients loyaux mais sensibles, et les clients opportunistes (déjà en train de comparer). Il augmente fortement le premier groupe, modérément le deuxième, et retravaille l'offre plutôt que le prix pour le troisième.</p>
        <p>Un débutant augmente tout le monde pareil et découvre la segmentation... après avoir perdu les clients qu'il n'aurait jamais dû toucher en premier.</p>` },
      { type:"checkpoint", question:"L'idée que le pricing soit le levier n°1 (avant même la croissance) te semble-t-elle claire ?",
        helpPrompt:"Je viens de voir que le pricing est présenté comme le levier n°1 pour extraire du cash, avant même de chercher de nouveaux clients. Peux-tu m'aider à réfléchir à comment je testerais une hausse de prix sur une cible réelle, étape par étape ?" },
      { type:"summary",
        summary:"Le pricing est le levier le plus puissant du système : un euro de prix va presque intégralement dans ta marge, contrairement à un euro de croissance qui traîne des coûts avec lui. Segmenter avant d'augmenter fait toute la différence entre une hausse réussie et une hausse qui fait fuir les clients.",
        nextHint:"La Phase 3 : comment faire croître le cash, pas seulement le chiffre d'affaires, sur 3 à 12 mois." }
    ]
  },

  cf3: {
    id:"cf3", moduleId:10, title:"Phase 3 : Croissance intelligente", duration:"14 min",
    steps:[
      { type:"concept", label:"Croissance intelligente ≠ chiffre d'affaires",
        body:`<p><strong>Objectif de la Phase 3 (3 à 12 mois) : augmenter le CASH, pas uniquement le chiffre d'affaires.</strong> C'est une distinction essentielle : un CA en hausse avec des délais de paiement clients qui s'allongent, des remises qui repartent, ou des coûts d'acquisition mal maîtrisés peut très bien générer... moins de cash qu'avant.</p>`  },
      { type:"predict", label:"À toi de jouer",
        question:"Pourquoi une entreprise peut-elle voir son chiffre d'affaires augmenter de 20% tout en ayant MOINS de cash en banque qu'avant ?",
        options:["C'est impossible si le CA augmente","Parce que les nouveaux clients paient plus tard, ou que les coûts d'acquisition et de livraison ont augmenté plus vite que le CA","Parce que la comptabilité est forcément fausse"],
        correctIndex:1,
        explanation:"Exactement. Le CA est une opinion comptable ; le cash est un fait bancaire. C'est pour ça que la Phase 3 doit toujours être pilotée avec les indicateurs de cash de la Phase 4, jamais avec le seul chiffre d'affaires comme boussole." },
      { type:"concept", label:"Les 5 chantiers de la croissance intelligente",
        body:`<ul>
          <li><strong>Activation de la base clients existante</strong> — un CRM (HubSpot, Pipedrive) pour segmenter (clients top, dormants, récents) et lancer upsell, cross-sell, réactivation. C'est souvent le chantier le plus rentable : il coûte moins cher de réactiver un client dormant que d'en acquérir un nouveau.</li>
          <li><strong>Structuration de l'acquisition</strong> — un vrai funnel de vente : acquisition (SEO, ads, outbound), conversion, closing. La plupart des « belles endormies » n'ont littéralement aucun processus ici — c'est ton terrain de jeu le plus vierge.</li>
          <li><strong>Standardisation de l'offre</strong> — réduire le sur-mesure quand c'est possible, pour améliorer les marges et simplifier le discours commercial. Attention cependant : certains clients historiques sont justement fidèles À CAUSE du sur-mesure — à doser, pas à supprimer en bloc.</li>
          <li><strong>Optimisation opérationnelle</strong> — automatisation des tâches répétitives, réallocation des ressources vers ce qui génère réellement du cash. (On y reviendra en profondeur au Module 11 avec les agents IA, taillés pour exactement ce type de chantier.)</li>
          <li><strong>Structuration managériale</strong> — nommer un responsable opérationnel, clarifier les rôles, mettre en place des indicateurs simples que tout le monde comprend.</li>
        </ul>` },
      { type:"pitfall", label:"⚠ Piège classique",
        items:["Standardiser l'offre de façon trop agressive et trop rapide, en oubliant que certains de tes meilleurs clients historiques sont fidèles précisément parce qu'ils ont un traitement sur-mesure. Segmente : standardise ce qui peut l'être, préserve ce qui ne le doit pas."]},
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté pilote la Phase 3 avec un seul réflexe permanent : à chaque nouvelle action de croissance, il se demande « est-ce que ça génère du cash à 90 jours, ou est-ce que ça génère seulement du chiffre d'affaires qui deviendra du cash... un jour, peut-être » ? Une facture émise n'est pas du cash. Un client signé n'est pas du cash. Le cash, c'est ce qui est réellement encaissé.</p>` },
      { type:"checkpoint", question:"La distinction cash vs chiffre d'affaires est-elle claire à ce stade ?",
        helpPrompt:"Je viens de voir la différence entre 'faire du chiffre d'affaires' et 'générer du cash' en Phase 3. Peux-tu me donner un exemple chiffré concret où le CA monte mais le cash baisse, pour bien fixer l'idée ?" },
      { type:"summary",
        summary:"La croissance intelligente se juge en cash généré, pas en chiffre d'affaires signé. Activation client, funnel structuré, standardisation dosée, automatisation et structuration managériale sont les 5 chantiers — chacun jugé à l'aune du cash qu'il produit réellement, pas de sa promesse.",
        nextHint:"Les Phases 4 et 5 : comment piloter durablement par le cash, et rendre tout le système reproductible pour ta prochaine acquisition." }

      { type:"concept", label:"Phase 4 — Piloter par le cash, pas par le CA",
        body:`<p>À partir de ce stade, ton tableau de bord change de nature : on <strong>transitionne vers un pilotage entièrement orienté cash-flow</strong>, plutôt que vers les indicateurs comptables classiques.</p>
        <p><strong>4 indicateurs à suivre en continu :</strong></p>

          <li><strong>Marge par client</strong> — tous les clients ne se valent pas ; certains coûtent plus cher à servir qu'ils ne rapportent.</li>
          <li><strong>Coût d'acquisition</strong> — combien te coûte réellement un nouveau client, tous canaux confondus.</li>
          <li><strong>Valeur client (LTV)</strong> — combien un client rapporte sur toute sa durée de vie, pas seulement sur sa première commande.</li>
        </ul>` },

        <p><strong>Documentation des processus</strong> dans 4 domaines : acquisition, vente, production, finance. Si un processus n'est écrit nulle part, il n'existe que dans une tête — la tienne, ou celle d'un employé qui peut partir.</p>
        <p><strong>Finalité de cette phase :</strong> la délégation devient possible (quelqu'un d'autre peut exécuter sans toi), la scalabilité devient réelle (le système tient la charge si l'activité double), et la multiplication des acquisitions devient réaliste (tu peux réappliquer ce même système à une 2e entreprise sans repartir de zéro).</p>

  f1: {
    id:"f1", moduleId:7, title:"Le crédit-vendeur, en profondeur", duration:"14 min",
    steps:[
      { type:"concept", label:"Le pilier le plus sous-estimé de ton montage",
        body:`<p>Tu connais déjà le principe (Module 1) : le vendeur accepte d'être payé sur une partie du prix, dans le temps, plutôt que 100 % cash au closing. Ce module va beaucoup plus loin : comment le dimensionner, le sécuriser, et t'en servir comme véritable pierre angulaire d'un montage à faible apport.</p>
        <p><strong>Ordres de grandeur observés en pratique sur des PME comme ta cible</strong> : 10 à 30 % du prix, remboursé sur 2 à 5 ans, à un taux souvent inférieur au marché bancaire (parfois 0 à 3 %). Rien n'est figé par la loi — tout se négocie, et c'est justement l'objet de ce module.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Pourquoi un vendeur accepterait-il d'être payé sur 3 ans plutôt que cash immédiat, alors qu'il pourrait dire non ?",
        options:["Il n'a pas le choix, c'est une obligation légale","Cela peut lui permettre d'obtenir un prix facial plus élevé, d'étaler sa fiscalité selon son régime, et c'est un signal qu'il croit en la pérennité de sa boîte","Les banques l'exigent systématiquement du vendeur"],
        correctIndex:1,
        explanation:"Exactement — et c'est ton principal levier de négociation. Un vendeur qui exige 100 % cash renonce à ces trois avantages. En pratique, beaucoup de cédants qui n'ont pas un besoin immédiat de liquidités (retraite déjà financée, pas de nouveau projet à financer) sont plus ouverts que tu ne le penses." },
      { type:"concept", label:"Comment le sécuriser juridiquement",
        body:`<p>Un crédit-vendeur se formalise par une <span class="term">convention de crédit-vendeur</span>, annexée à l'acte de cession, précisant montant, durée, taux, échéancier, et garanties.</p>
        <p><strong>Point essentiel à négocier : la subordination.</strong> En pratique, ta banque (si tu as un prêt LBO en parallèle) va presque toujours exiger que le crédit-vendeur soit <em>subordonné</em> — c'est-à-dire remboursé après la dette bancaire en cas de difficulté. C'est normal et attendu, mais assure-toi que l'échéancier du crédit-vendeur reste réaliste une fois cette priorité posée : ne promets pas un remboursement que ton cash-flow, après avoir servi la banque, ne pourra pas tenir.</p>
        <p><strong>Ta meilleure protection : la compensation avec la GAP.</strong> Si un vice caché apparaît après la vente et déclenche la garantie d'actif et de passif (Module 6), tu peux généralement compenser ce que le vendeur te doit avec ce que tu lui dois encore sur le crédit-vendeur — au lieu d'avoir à le poursuivre en justice pour récupérer de l'argent qu'il a peut-être déjà dépensé. C'est une des raisons pour lesquelles un crédit-vendeur généreux te protège, il ne fait pas que financer.</p>` },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Négocier un crédit-vendeur élevé en durée sans vérifier que le cash-flow post-Phase-1 (Module 10) peut réellement le tenir EN PLUS de la dette bancaire — un montage qui a l'air malin sur le papier peut t'étrangler à l'usage.",
          "Utiliser un crédit-vendeur trop long pour compenser un prix trop élevé plutôt que pour financer une entreprise saine : le crédit-vendeur finance une acquisition, il ne répare pas une valorisation excessive."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté présente TOUJOURS le crédit-vendeur comme un partenariat, jamais comme une faveur qu'on demande. La formule qui fonctionne : « Je vous propose un prix de X, dont Y % réglés immédiatement et Z % étalés sur N ans — cette structure me permet de sécuriser le financement bancaire du solde, et vous garantit un complément de revenu régulier. » C'est un échange de valeur, présenté comme tel.</p>` },
      { type:"checkpoint", question:"La logique du crédit-vendeur comme pierre angulaire (pas juste un complément) est-elle claire ?",
        helpPrompt:"Je viens de voir le crédit-vendeur en profondeur (subordination, compensation avec la GAP). Peux-tu m'aider à réfléchir à comment je le dimensionnerais sur une cible à 220K€ d'EBITDA et un multiple de 2,5x ?" },
      { type:"summary",
        summary:"Le crédit-vendeur n'est pas qu'un outil de financement : bien négocié (subordination claire, compensable avec la GAP), c'est aussi ta meilleure protection contre les vices cachés et ton principal levier pour réduire l'apport personnel exigé par la banque.",
        nextHint:"La dette bancaire et les dispositifs publics (Bpifrance) qui réduisent encore l'apport demandé." }
    ]
  },

  f2: {
    id:"f2", moduleId:7, title:"La dette bancaire & les dispositifs Bpifrance", duration:"16 min",
    steps:[
      { type:"concept", label:"Pourquoi le marché impose souvent 30 % d'apport",
        body:`<p>Une banque qui finance un rachat de PME prend un risque réel : et si le repreneur échoue à faire tourner l'affaire ? L'apport personnel sert de coussin d'absorption des premiers aléas, et c'est aussi un signal d'engagement. C'est pour ça que 20 à 30 % d'apport reste une demande fréquente — ce n'est pas arbitraire, c'est de la gestion du risque bancaire.</p>
        <p>La bonne nouvelle : il existe des leviers concrets, publics, pour réduire ce chiffre — sans que ça relève seulement d'un « discours rassurant ».</p>` },
      { type:"concept", label:"La Garantie Transmission Bpifrance",
        body:`<p>Bpifrance peut garantir une partie du prêt bancaire. Le produit standard actuel affiche <strong>60 %</strong> (catalogue officiel Bpifrance, confirmé par le "Plan Objectif reprises" de Bercy, avril 2026). D'autres sources officielles (economie.gouv.fr, rapport du Sénat) montrent que la quotité réellement accordée <strong>varie en pratique entre 40 % et 70 % selon le fonds de garantie mobilisé et le dossier</strong> — 60 % est le repère à retenir, pas une garantie automatique. Vérifie le taux exact avec ta banque au moment du dossier ; ces dispositifs évoluent.</p>
        <p><strong>Ce que ça change concrètement pour toi</strong> : en partageant le risque avec la banque, cette garantie peut réduire l'apport en cash exigé, et parfois alléger la caution personnelle demandée — la banque est plus encline à financer un dossier déjà partiellement garanti par un tiers public.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"La Garantie Transmission Bpifrance remplace-t-elle ton dossier bancaire, ou vient-elle en plus ?",
        options:["Elle remplace entièrement le besoin de convaincre une banque","Elle vient en soutien d'un dossier bancaire classique : elle rassure la banque, elle ne se substitue pas à elle","Elle n'est accessible qu'aux entreprises de plus de 50 salariés"],
        correctIndex:1,
        explanation:"Exactement. Tu négocies toujours avec une banque ; la garantie Bpifrance est un argument que TU apportes dans cette négociation pour obtenir de meilleures conditions, pas un guichet de financement direct qui remplace la banque." },
      { type:"concept", label:"Deux autres outils Bpifrance à connaître",
        body:`<p><strong>Le Prêt Croissance Transmission</strong> : de 50 000 € à 5 M€, <strong>sans garantie ni caution personnelle</strong>, pour financer la reprise de PME/ETI (source : Bpifrance, catalogue officiel).</p>
        <p><strong>Deux limites réelles à connaître</strong> — trouvées en vérifiant les conditions exactes, et absentes de la plupart des résumés qu'on en fait : (1) ce prêt <strong>ne peut pas dépasser 40 % du montant total de la dette liée au montage</strong> — ce n'est pas une source de financement autonome illimitée, il vient compléter, pas remplacer, le reste ; (2) il exige un <strong>cofinancement bancaire au moins équivalent</strong> (partenariat environ 1 pour 1 à 1 pour 1,5) — tu auras donc de toute façon besoin d'une banque qui suit, ce prêt seul ne suffit jamais.</p>
        <p><strong>Le Prêt d'Honneur Reprise</strong> : à <strong>taux zéro</strong>, jusqu'à <strong>80 000 €</strong> au niveau national (source : Bpifrance Création). C'est un prêt personnel, généralement sans garantie ni caution. Nuance importante : il est distribué via des réseaux régionaux (Réseau Entreprendre, Initiative France...), et le montant réellement accordé dépend du réseau et du dossier — certaines sources plus généralistes citent plutôt un plafond autour de 50 000 € selon le réseau. Vérifie le montant exact disponible dans TA région avant de compter dessus pour TON plafond de 30 000 €. On y revient en détail dans la prochaine leçon.</p>` },
      { type:"pitfall", label:"⚠ À garder en tête",
        items:["Une source d'avocat spécialisé le résume bien : « une reprise sans apport total reste rare » — la formule « sans apport » signifie en pratique « avec un apport réduit et complété par des dispositifs de garantie et de dette », pas « zéro risque, zéro engagement personnel ». Un dossier sans apport cash doit être d'autant plus solide sur le reste : rentabilité documentée, cash-flow prévisible, garanties contractuelles propres."] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur aguerri ne présente jamais ces dispositifs À LA BANQUE comme une demande de faveur — il arrive avec le dossier Bpifrance déjà pré-instruit ou en cours, ce qui inverse la dynamique : ce n'est plus « pouvez-vous me faire confiance » mais « voici un dossier où l'État partage déjà le risque avec vous ». La différence de posture change souvent l'issue de la négociation bancaire.</p>` },
      { type:"checkpoint", question:"La différence entre 'la banque finance' et 'Bpifrance garantit/complète' est-elle claire ?",
        helpPrompt:"Je viens de voir la Garantie Transmission et le Prêt Croissance Transmission Bpifrance. Peux-tu m'expliquer concrètement comment monter un dossier Bpifrance en parallèle de mon dossier bancaire ?" },
      { type:"summary",
        summary:"Les dispositifs Bpifrance (Garantie Transmission jusqu'à 60%, Prêt Croissance Transmission jusqu'à 5M€ sans caution) ne remplacent pas la banque : ils renforcent ton dossier et réduisent ce qu'elle exige de toi en cash et en garanties personnelles.",
        nextHint:"La dette investisseur, la trésorerie excédentaire de la cible, et le Prêt d'Honneur à 0% qui peut à lui seul couvrir ton plafond de 30K€." }
    ]
  },

  f3: {
    id:"f3", moduleId:7, title:"Dette investisseur, trésorerie excédentaire & prêt d'honneur", duration:"15 min",
    steps:[
      { type:"concept", label:"La dette investisseur (mezzanine)",
        body:`<p>Quand le crédit-vendeur + la dette bancaire ne couvrent pas 100 % du prix, la dette investisseur (parfois appelée mezzanine) comble l'écart : des investisseurs privés (family offices, clubs d'investisseurs, plateformes spécialisées) prêtent, généralement plus cher que la banque (souvent 8 à 15 %, parfois avec un petit % de plus-value en cas de revente — un "BSA" ou bon de souscription d'actions), en échange d'un risque plus élevé et d'une place after la dette senior.</p>
        <p>C'est un outil de dernier recours pour boucler un montage, pas un premier réflexe : plus cher que la dette bancaire, il doit rester une part mineure du financement total.</p>` },
      { type:"concept", label:"La trésorerie excédentaire de la cible",
        body:`<p>Une partie du financement peut venir... de la cible elle-même. Si l'entreprise dispose d'une trésorerie réellement excédentaire (au-delà de son besoin en fonds de roulement), elle peut, après le closing, remonter un dividende vers ta holding pour rembourser une partie de la dette d'acquisition.</p>
        <p><strong>Deux limites strictes à connaître</strong> : (1) juridiquement, ça ne se fait pas le jour même du closing — il faut une assemblée générale et le respect des règles de distribution ; (2) c'est encadré pénalement — utiliser la trésorerie de la cible d'une manière qui nuit à son intérêt social peut caractériser un <strong>abus de biens sociaux</strong>. La trésorerie utilisée doit être RÉELLEMENT excédentaire (vérifiée en due diligence, Module 5), jamais une trésorerie dont l'entreprise a besoin pour tourner.</p>` },
      { type:"numeric", label:"Exercice",
        question:"Une cible a 180 000 € de trésorerie au bilan. Son besoin en fonds de roulement normatif est estimé à 130 000 €. Quelle est la trésorerie réellement excédentaire mobilisable (en €) ?",
        placeholder:"Ex : 50000", answer:50000, tolerance:2000,
        successMsg:"50 000 € (180 000 - 130 000). C'est ce chiffre-là, pas la trésorerie totale au bilan, qui peut raisonnablement être mobilisé — le reste doit rester dans l'entreprise pour qu'elle continue de fonctionner normalement.",
        hint:"Indice : trésorerie totale moins besoin en fonds de roulement normatif." },
      { type:"concept", label:"Le Prêt d'Honneur Reprise : ton meilleur ami pour un plafond à 30K€",
        body:`<p>C'est probablement l'outil le plus directement utile pour ton objectif précis. Le <strong>Prêt d'Honneur Reprise</strong> (Bpifrance, via des réseaux comme Réseau Entreprendre ou Initiative France selon les territoires) est un prêt <strong>personnel, à taux zéro, sans garantie ni caution demandée</strong>, pouvant aller <strong>jusqu'à 80 000 €</strong> (source : Bpifrance Création).</p>
        <p>Concrètement : ton plafond de 30 000 € d'apport personnel peut être intégralement couvert par ce type de prêt d'honneur, sans mobiliser un centime de ta trésorerie personnelle réelle — et sans intérêt. Beaucoup de repreneurs débutants ignorent ce dispositif et pensent devoir sortir du cash de leur poche alors qu'il existe un circuit dédié pour ça.</p>
        <p>Point important : les montants, plafonds et réseaux exacts varient selon les régions et évoluent — vérifie l'offre actuelle sur bpifrance-creation.fr ou auprès de Réseau Entreprendre / Initiative France au moment de monter ton dossier.</p>` },
      { type:"pitfall", label:"⚠ Piège classique",
        items:["Empiler crédit-vendeur + dette bancaire + dette investisseur + trésorerie excédentaire sans jamais faire l'exercice global de cash-flow disponible pour TOUT rembourser en même temps. Chaque brique semble raisonnable isolément ; c'est la Leçon 4 qui t'apprend à les assembler et vérifier que ça tient."] },
      { type:"checkpoint", question:"Le rôle spécifique du Prêt d'Honneur Reprise pour ton plafond de 30K€ est-il clair ?",
        helpPrompt:"Je viens de voir le Prêt d'Honneur Reprise Bpifrance (0%, jusqu'à 80K€) qui pourrait couvrir mon plafond de 30K€ d'apport. Comment se déroule concrètement le dossier pour l'obtenir, et avec quel timing par rapport au reste du montage ?" },
      { type:"summary",
        summary:"La dette investisseur comble un écart résiduel mais coûte cher — à minimiser. La trésorerie excédentaire de la cible peut financer une partie du deal, dans un cadre légal strict. Le Prêt d'Honneur Reprise (0%, jusqu'à 80K€) peut, à lui seul, couvrir ton plafond de 30K€ d'apport personnel.",
        nextHint:"La dernière leçon assemble toutes ces briques dans un montage complet, chiffré, qui tient la route." }
    ]
  },

  f4: {
    id:"f4", moduleId:7, title:"Construire ton montage à moins de 30K€ d'apport", duration:"17 min",
    steps:[
      { type:"concept", label:"Assembler les briques : un exemple complet chiffré",
        body:`<p>Prenons une cible fidèle à ta thèse : EBITDA retraité de 300 000 €, prix négocié à 2,5x = <strong>750 000 €</strong>.</p>
        <p><strong>Un montage possible :</strong></p>
        <ul>
          <li>Crédit-vendeur (25 % du prix) : <strong>187 500 €</strong>, remboursé sur 4 ans</li>
          <li>Dette bancaire senior (65 % du prix) : <strong>487 500 €</strong>, appuyée par la Garantie Transmission Bpifrance pour réduire la caution personnelle exigée</li>
          <li>Prêt d'Honneur Reprise (0 %) : <strong>30 000 €</strong> — exactement ton plafond, sans sortir un centime de ta poche</li>
          <li>Reste à financer : <strong>45 000 €</strong> — à combler par un ajustement du crédit-vendeur (le porter à 31 % au lieu de 25), une petite dette investisseur, ou une renégociation du prix</li>
        </ul>
        <p>Ce n'est pas une formule magique universelle — c'est UNE façon d'assembler les briques. Le bon montage dépend toujours du profil du dirigeant, de sa banque, et de ce que révèle ta due diligence.</p>` },
      { type:"expert", label:"⚠ Le test que ce module n'avait pas assez mis en avant",
        body:`<p>Jusqu'ici, chaque leçon a montré qu'une brique est <em>obtenable</em> séparément. Ça ne prouve pas que l'ensemble est <em>soutenable</em>. Le vrai test : ton cash-flow annuel (Module 10) peut-il servir TOUTES les dettes EN MÊME TEMPS — crédit-vendeur ET dette bancaire ET Prêt Croissance Transmission s'il y en a un — sans étrangler l'entreprise ?</p>
        <p>Le repère utilisé par les financiers pour ça s'appelle le <span class="term">ratio de couverture du service de la dette</span> : EBITDA ÷ (annuités de toutes les dettes réunies, capital + intérêts). Un repère courant (pas une règle absolue, à affiner avec ton expert-comptable) : <strong>en dessous de 1,2x, c'est tendu</strong> ; <strong>en dessous de 1x, ça ne tient pas</strong> — l'EBITDA ne suffit même plus à rembourser, avant même de te payer un salaire.</p>` },
      { type:"numeric", label:"Exercice — le montage tient-il vraiment ?",
        question:"Sur ce même deal (EBITDA 300 000 €), le service de la dette annuel total (crédit-vendeur + annuité bancaire, capital et intérêts compris) est estimé à 145 000 €/an. Quel est le ratio de couverture (EBITDA ÷ service de la dette, arrondi à 2 décimales) ?",
        placeholder:"Ex : 1.50", answer:2.07, tolerance:0.05,
        successMsg:"≈ 2,07x (300 000 ÷ 145 000). Confortablement au-dessus du repère de 1,2x — mais attention, ce chiffre ne couvre pas encore ton propre salaire ni le capex de rattrapage identifié en DD (dd3). Refais toujours ce calcul en soustrayant D'ABORD ces deux postes de l'EBITDA disponible.",
        hint:"Indice : EBITDA ÷ service de la dette annuel total." },
      { type:"numeric", label:"Exercice — à toi de compléter le montage",
        question:"Sur ce même deal à 750 000 €, si tu portes le crédit-vendeur à 30 % (225 000 €) au lieu de 25 %, la dette bancaire reste à 487 500 €, et le prêt d'honneur à 30 000 €, quel montant reste-t-il à combler (en €) ?",
        placeholder:"Ex : 10000", answer:7500, tolerance:1000,
        successMsg:"7 500 € (750 000 - 225 000 - 487 500 - 30 000). À ce niveau, un ajustement mineur du prix, un délai de paiement fournisseur en Phase 1, ou une petite dette investisseur suffit à boucler le montage — sans toucher à ton plafond de 30K€.",
        hint:"Indice : Prix total moins la somme des 3 briques déjà posées." },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté ne présente jamais ce montage brique par brique à sa banque dans l'ordre où il l'a construit — il le présente en partant de LA DETTE BANCAIRE (celle qui intéresse la banque), en montrant que le reste (crédit-vendeur, garantie Bpifrance, prêt d'honneur) réduit SON risque à elle. Le montage est le même ; la présentation change tout dans la façon dont il est reçu.</p>` },
      { type:"validation", label:"Question de validation 1/2",
        question:"Sur une cible à 500K€ de CA que tu identifierais, avec un EBITDA de 90K€ et un multiple visé de 2,5x, esquisse ton propre montage pour rester sous 30K€ d'apport. Quelles briques utiliserais-tu, et dans quelles proportions approximatives ?" },
      { type:"validation", label:"Question de validation 2/2",
        question:"Pourquoi la Garantie Transmission Bpifrance n'est-elle pas, à elle seule, une source de financement — et pourquoi est-ce important de bien comprendre cette nuance avant de rencontrer ta banque ?" },
      { type:"summary",
        summary:"Un montage à faible apport combine généralement plusieurs briques — crédit-vendeur, dette bancaire appuyée par une garantie Bpifrance, et un Prêt d'Honneur Reprise à 0% — plutôt qu'une seule solution miracle. Le bon dosage dépend toujours du deal réel, jamais d'une formule figée.",
        nextHint:"Le Module 6 montre maintenant comment négocier ce montage avec le vendeur — avec de vrais scripts d'approche." }
    ]

  n1: {
    id:"n1", moduleId:6, title:"Négocier le montage avec le vendeur : scripts et objections", duration:"16 min",
    steps:[
      { type:"concept", label:"Le lien entre financement et négociation",
        body:`<p>Tout ce que tu viens de voir au Module 7 n'a de valeur que si tu sais l'amener au vendeur sans le braquer. Un montage à faible apport, mal présenté, sonne comme « je n'ai pas les moyens de vous racheter ». Bien présenté, il sonne comme « voici une offre structurée, sécurisée, et rapide ».</p>
        <p>Rappel de ta proposition de valeur (Module 2) : une sortie fiable, rapide et structurée vaut souvent plus, pour un cédant, qu'un prix légèrement supérieur avec un acheteur incertain.</p>` },
      { type:"concept", label:"Script d'approche — proposer un crédit-vendeur élevé",
        body:`<p>Voici un canevas à adapter, pas un texte à réciter mot pour mot :</p>
        <p><em>« Sur la base de ce que j'ai vu de votre entreprise, je vous propose [X €], avec [Y %] réglés à la signature et [Z %] étalés sur [N] ans à un taux de [T %]. Cette structure me permet de sécuriser rapidement le financement bancaire du solde — via un dossier déjà engagé avec ma banque et Bpifrance — donc de vous garantir un closing dans les [3 à 6] mois. En échange, elle vous assure un complément de revenu régulier sur la durée, et [si pertinent] un prix légèrement supérieur à une offre 100% cash. »</em></p>
        <p>Les trois éléments qui font la force de ce script : un prix concret (pas vague), une preuve de sérieux (dossier déjà engagé), et un bénéfice réciproque explicite (pas juste "moi j'ai besoin de temps").</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Un vendeur te répond : « Je préfère être payé cash, je ne veux pas dépendre de la réussite de votre gestion pour toucher mon argent. » Quelle est la MEILLEURE réponse ?",
        options:["Insister en répétant que le crédit-vendeur est avantageux pour lui","Reconnaître le risque qu'il soulève, et proposer une garantie concrète (nantissement des titres de la holding, GAP réciproque, échéancier plus court) plutôt que de nier le risque","Menacer de retirer l'offre s'il n'accepte pas"],
        correctIndex:1,
        explanation:"Exactement. Le risque qu'il évoque est réel et légitime — le nier fait perdre en crédibilité. Le rassurer avec des garanties concrètes (les titres de la holding peuvent être nantis en sa faveur, par exemple) répond directement à SA préoccupation, pas à une préoccupation générique." },
      { type:"pitfall", label:"⚠ Objections classiques et comment y répondre",
        items:[
          "« Pourquoi je vous ferais confiance avec si peu d'apport ? » → Ne le prends pas comme une attaque : montre les garanties concrètes (Bpifrance, nantissement, nombre d'échéances déjà anticipées) plutôt que de te justifier sur ta trésorerie personnelle.",
          "« J'ai un autre acheteur qui paie tout cash. » → Ne baisse jamais ta garde sur la vérification (Module 5) juste pour aller plus vite ; mais tu peux répondre en valorisant la rapidité et la certitude d'exécution de ton dossier déjà structuré, si c'est vrai."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un négociateur expérimenté ne présente jamais tout le montage financier en une seule fois lors du premier contact (Module 2). Il sonde d'abord ce qui compte vraiment pour LE cédant spécifiquement — certains veulent avant tout la certitude que leurs salariés seront préservés, d'autres veulent surtout la rapidité, d'autres encore veulent maximiser le prix facial même si le cash immédiat est moindre. Le montage financier vient ensuite, calé sur cette priorité identifiée — pas l'inverse.</p>` },

      { type:"summary",
        summary:"Un montage à faible apport se négocie en le présentant comme une structure sécurisée et réciproque, jamais comme une contrainte que tu imposes. Écouter la vraie priorité du cédant avant de dérouler le montage change tout dans la façon dont il est reçu.",
        nextHint:"La leçon suivante : la lettre d'intention — le document qui fige le terrain de jeu de tout le deal." }
