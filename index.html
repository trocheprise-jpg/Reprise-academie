function collectValidationAnswersText(){
  const lines = [];
  Object.keys(state.progress.validationAnswers || {}).forEach(key => {
    const answer = state.progress.validationAnswers[key];
    if(!answer || !answer.trim()) return;
    const idx = key.lastIndexOf('_');
    const lessonId = key.slice(0, idx);
    const stepIndex = parseInt(key.slice(idx + 1), 10);
    const lesson = LESSONS[lessonId];
    const step = lesson && lesson.steps[stepIndex];
    if(!step) return;
    lines.push("[" + lesson.title + "] " + step.question + "\n→ " + answer.trim());
  });
  if(lines.length === 0) return "Aucune réponse de validation enregistrée pour l'instant.";
  return "Voici mes réponses aux questions de validation dans REPRISE. :\n\n" + lines.join("\n\n");
}
async function copyAnswersForClaude(){
  const text = collectValidationAnswersText();
  const btn = document.getElementById('copyAnswersBtn');
  const restore = (label) => { if(btn){ setTimeout(() => { btn.textContent = "📋 Copier mes réponses pour Claude"; }, 1800); btn.textContent = label; } };
  try{
    await navigator.clipboard.writeText(text);
    restore("✓ Copié !");
  } catch(e){
    try{
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      restore("✓ Copié !");
    } catch(e2){
      alert(text);
    }
  }
}
function renderJourneyMini(){
  return `<div class="journey" style="padding-left:30px;">` + PHASES.map(ph => {
    const doneCount = ph.moduleIds.filter(id => state.progress.completedModules.includes(id)).length;
    return `<div class="module-node ${doneCount===ph.moduleIds.length ? 'done' : (doneCount>0?'current':'')}">
      <div class="module-dot">${doneCount===ph.moduleIds.length ? iconCheck() : ph.id}</div>
      <div class="module-card"><div><div class="module-card-title" style="font-size:15px;">${ph.name}</div>
      <div class="module-card-desc">Modules ${ph.moduleIds.join(', ')}</div></div>
      <div class="module-card-meta">${doneCount}/${ph.moduleIds.length}</div></div></div>`;
  }).join('') + `</div>`;
}
function iconCheck(){ return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg>`; }
function iconLock(){ return `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a5 5 0 00-5 5v3H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2v-9a2 2 0 00-2-2h-2V6a5 5 0 00-5-5zm-3 8V6a3 3 0 016 0v3H9z"/></svg>`; }

/* =========================================================
   ROADMAP (Le Parcours)
   ========================================================= */
function renderRoadmap(){
  let html = `<div class="eyebrow">Le Parcours</div><h1>Ta feuille de route complète.</h1>
  <p class="subtitle">14 modules, répartis en 5 phases — du sourcing jusqu'à la stratégie de sortie. On construit le contenu ensemble, module après module.</p>
  <div class="journey">`;
  PHASES.forEach(ph => {
    html += `<div class="phase-label">Phase ${ph.id} — ${ph.name}</div>`;
    ph.moduleIds.forEach(mid => {
      const m = MODULES.find(x=>x.id===mid);
      const isDone = state.progress.completedModules.includes(mid);
      const lessonsDone = m.lessonIds.filter(l=>state.progress.completedLessons.includes(l)).length;
      const clickable = m.built;
      const cls = isDone ? 'done' : (m.built ? 'current clickable' : 'locked');
      html += `<div class="module-node ${cls}">
        <div class="module-dot">${isDone ? iconCheck() : (m.built ? m.id : iconLock())}</div>
        <div class="module-card" ${clickable ? `onclick="openModule(${m.id})"` : ''}>
          <div><div class="module-card-title">${m.title}</div><div class="module-card-desc">${m.desc}</div></div>
          <div class="module-card-meta">${m.built ? `<span class="badge-built">${lessonsDone}/${m.lessonIds.length} leçons</span>` : `<span class="badge-soon">à construire</span>`}</div>
        </div>
      </div>`;
    });
  });
  html += `</div>`;
  return html;
}
function openModule(moduleId){
  const m = MODULES.find(x=>x.id===moduleId);
  if(!m || !m.built) return;
  const firstUnfinished = m.lessonIds.find(l => !state.progress.completedLessons.includes(l)) || m.lessonIds[0];
  openLesson(firstUnfinished);
}

/* =========================================================
   MOTEUR DE LEÇON
   ========================================================= */
function renderLesson(){
  const app = document.getElementById('app');
  const lesson = LESSONS[state.currentLessonId];
  const stepIndex = state.currentStep;
  const step = lesson.steps[stepIndex];
  const total = lesson.steps.length;
  const pct = Math.round(((stepIndex+1)/total)*100);
  let body = "";
  if(step.type === "intro") body = stepIntro(lesson.id, stepIndex, step);
  else if(step.type === "concept") body = stepConcept(step);
  else if(step.type === "predict") body = stepMCQ(lesson.id, stepIndex, step);
  else if(step.type === "numeric") body = stepNumeric(lesson.id, stepIndex, step);
  else if(step.type === "pitfall") body = stepPitfall(step);
  else if(step.type === "expert") body = stepExpert(step);
  else if(step.type === "checkpoint") body = stepCheckpoint(lesson.id, stepIndex, step);
  else if(step.type === "validation") body = stepValidation(lesson.id, stepIndex, step);
  else if(step.type === "summary") body = stepSummary(lesson.id, step);
  const showFooter = (step.type !== "checkpoint" && step.type !== "summary");
  const tagKey = lesson.id + '_' + stepIndex;
  const isTagged = !!(state.progress.taggedSteps && state.progress.taggedSteps[tagKey]);
  const hasComment = !!((state.progress.stepComments||{})[tagKey] && state.progress.stepComments[tagKey].text);
  app.innerHTML = `
    <div class="lesson-view">
      <div class="lesson-header">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
          <button class="back-link" onclick="goToRoadmap()" style="margin-bottom:0;">← Retour au parcours</button>
          <button class="back-link" onclick="restartLesson()" style="margin-bottom:0;" title="Revenir à la première étape de cette leçon">↺ Recommencer cette leçon</button>
        </div>
        <h2>${lesson.title}</h2>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="step-counter-row">
          <div class="step-counter">ÉTAPE ${stepIndex+1} / ${total}</div>
          <div class="step-actions">
            <button class="tag-btn ${isTagged?'tagged':''}" id="tagbtn-${lesson.id}-${stepIndex}" onclick="toggleStepTag('${lesson.id}',${stepIndex})" title="${isTagged ? 'Retirer ce repère' : 'Taguer cette étape comme repère'}">${isTagged ? '🔖 Taguée' : '🔖 Taguer'}</button>
            <button class="tag-btn" id="commentbtn-${lesson.id}-${stepIndex}" onclick="toggleCommentZone('${lesson.id}',${stepIndex})" title="Ajouter ou revoir ta note personnelle">${hasComment ? '💬 Note' : '💬 Commenter'}</button>
          </div>
        </div>
        ${stepCommentZone(lesson.id, stepIndex)}
      </div>
      <div class="lesson-body">${body}</div>
      ${showFooter ? `
      <div class="lesson-footer">
        ${stepIndex>0 ? `<button class="btn-ghost" onclick="prevStep()">← Précédent</button>` : `<span></span>`}
        <button class="btn-primary" onclick="nextStep()">Suivant →</button>
      </div>` : ``}
    </div>`;
}
function stepIntro(lessonId, stepIndex, step){
  const opts = step.mcq.options.map((o,i)=>`<button class="mcq-option" onclick="answerDiag('${lessonId}',${stepIndex},${i})">${o}</button>`).join('');
  return `<div class="step-card predict-card">
    <div class="step-label">${step.label}</div>
    <p style="margin-bottom:14px; color:var(--text-muted); font-size:14px;">${step.body}</p>
    <p class="step-question">${step.mcq.question}</p>
    <div class="mcq-options" id="diagopts-${lessonId}-${stepIndex}">${opts}</div>
  </div>`;
}
function answerDiag(lessonId, stepIndex, i){
  const step = LESSONS[lessonId].steps[stepIndex];
  state.progress.diagnostic[step.mcq.diagKey] = step.mcq.options[i];
  saveProgress();
  const container = document.getElementById(`diagopts-${lessonId}-${stepIndex}`);
  container.querySelectorAll('.mcq-option').forEach((b,idx) => { b.disabled = true; if(idx===i) b.classList.add('correct'); });
}
function stepConcept(step){
  return `<div class="concept-card"><div class="step-label">${step.label}</div>${step.body}</div>`;
}
function stepMCQ(lessonId, stepIndex, step){
  const opts = step.options.map((o,i)=>`<button class="mcq-option" id="opt-${lessonId}-${stepIndex}-${i}" onclick="answerMCQ('${lessonId}',${stepIndex},${i})">${o}</button>`).join('');
  return `<div class="predict-card">
    <div class="step-label">${step.label}</div>
    <p class="step-question">${step.question}</p>
    <div class="mcq-options">${opts}</div>
    <div class="mcq-explanation hidden" id="expl-${lessonId}-${stepIndex}"></div>
  </div>`;
}
function answerMCQ(lessonId, stepIndex, chosen){
  const step = LESSONS[lessonId].steps[stepIndex];
  for(let i=0;i<step.options.length;i++){
    const btn = document.getElementById(`opt-${lessonId}-${stepIndex}-${i}`);
    btn.disabled = true;
    if(i === step.correctIndex) btn.classList.add('correct');
    else if(i === chosen) btn.classList.add('incorrect');
  }
  const expl = document.getElementById(`expl-${lessonId}-${stepIndex}`);
  expl.classList.remove('hidden');
  expl.innerHTML = (chosen === step.correctIndex ? "✓ Exactement. " : "Pas tout à fait. ") + step.explanation;
  awardXP(chosen === step.correctIndex ? 15 : 8);
}
function stepNumeric(lessonId, stepIndex, step){
  return `<div class="exercise-card">
    <div class="step-label">${step.label}</div>
    <p class="step-question">${step.question}</p>
    <div class="numeric-row">
      <input type="number" id="num-${lessonId}-${stepIndex}" placeholder="${step.placeholder||''}">
      <button class="btn-primary" onclick="checkNumeric('${lessonId}',${stepIndex})">Vérifier</button>
    </div>
    <div class="numeric-feedback hidden" id="numfb-${lessonId}-${stepIndex}"></div>
  </div>`;
}
function checkNumeric(lessonId, stepIndex){
  const step = LESSONS[lessonId].steps[stepIndex];
  const input = document.getElementById(`num-${lessonId}-${stepIndex}`);
  const val = parseFloat(input.value);
  const fb = document.getElementById(`numfb-${lessonId}-${stepIndex}`);
  fb.classList.remove('hidden');
  const tol = step.tolerance !== undefined ? step.tolerance : Math.abs(step.answer*0.02);
  if(!isNaN(val) && Math.abs(val - step.answer) <= tol){
    fb.className = 'numeric-feedback success'; fb.innerHTML = "✓ " + step.successMsg; awardXP(20);
  } else {
    fb.className = 'numeric-feedback retry'; fb.innerHTML = step.hint;
  }
}
function stepPitfall(step){
  return `<div class="pitfall-card"><div class="step-label">${step.label}</div><ul>${step.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
}
function stepExpert(step){
  return `<div class="expert-card"><div class="step-label">${step.label}</div>${step.body}</div>`;
}
function stepCheckpoint(lessonId, stepIndex, step){
  return `<div class="checkpoint-card">
    <div class="step-label">Point d'étape</div>
    <p class="step-question">${step.question}</p>
    <div class="checkpoint-actions">
      <button class="btn-primary" onclick="nextStep()">Oui, c'est clair →</button>
      <button class="btn-ghost" onclick="discussCheckpoint('${lessonId}',${stepIndex})">Pas encore, j'en discute</button>
    </div>
  </div>`;
}
function discussCheckpoint(lessonId, stepIndex){
  const step = LESSONS[lessonId].steps[stepIndex];
  openChatWithContext(step.helpPrompt || '');
}
function stepValidation(lessonId, stepIndex, step){
  const saved = state.progress.validationAnswers[lessonId+'_'+stepIndex] || '';
  return `<div class="validation-card">
    <div class="step-label">${step.label}</div>
    <p class="step-question">${step.question}</p>
    <textarea id="val-${lessonId}-${stepIndex}" placeholder="Écris ta réponse avec tes propres mots...">${saved}</textarea>
    <button class="btn-ghost" onclick="discussValidation('${lessonId}',${stepIndex})">Discuter de ma réponse avec le professeur</button>
  </div>`;
}
function discussValidation(lessonId, stepIndex){
  const step = LESSONS[lessonId].steps[stepIndex];
  const ta = document.getElementById(`val-${lessonId}-${stepIndex}`);
  const answer = ta ? ta.value.trim() : '';
  state.progress.validationAnswers[lessonId+'_'+stepIndex] = answer;
  saveProgress();
  const prefill = `Question de validation : "${step.question}"\n\nMa réponse : ${answer || "(je n'ai pas encore d'idée précise)"}\n\nQu'en penses-tu ?`;
  openChatWithContext(prefill);
}
function stepSummary(lessonId, step){
  return `<div class="summary-card">
    <div class="step-label">En résumé</div>
    <p>${step.summary}</p>
    <p class="next-hint">Prochaine étape : ${step.nextHint}</p>
    <button class="btn-primary" onclick="finishLesson('${lessonId}')" style="margin-top:8px;">Terminer la leçon ✓</button>
  </div>`;
}
function nextStep(){
  const lesson = LESSONS[state.currentLessonId];
  // sauvegarder les réponses de validation avant de changer d'étape
  const cur = lesson.steps[state.currentStep];
  if(cur.type === 'validation'){
    const ta = document.getElementById(`val-${lesson.id}-${state.currentStep}`);
    if(ta) { state.progress.validationAnswers[lesson.id+'_'+state.currentStep] = ta.value; saveProgress(); }
  }
  if(state.currentStep < lesson.steps.length - 1){
    state.currentStep++; awardXP(6);
  }
  saveLastPosition();
  render();
}
function prevStep(){
  if(state.currentStep > 0){ state.currentStep--; saveLastPosition(); render(); }
}
function finishLesson(lessonId){
  if(!state.progress.completedLessons.includes(lessonId)){
    state.progress.completedLessons.push(lessonId);
    awardXP(60);
    checkModuleCompletion(LESSONS[lessonId].moduleId);
    addLessonToRevisionBank(lessonId);
  }
  if(state.progress.lastPosition && state.progress.lastPosition.lessonId === lessonId){
    state.progress.lastPosition = null;
  }
  saveProgress();
  state.view = "roadmap";
  state.currentLessonId = null; state.currentStep = 0;
  render();
}
function checkModuleCompletion(moduleId){
  const m = MODULES.find(x=>x.id===moduleId);
  const allDone = m.lessonIds.every(l => state.progress.completedLessons.includes(l));
  if(allDone && !state.progress.completedModules.includes(moduleId)){
    state.progress.completedModules.push(moduleId);
    awardXP(200);
  }
}

/* =========================================================
   REPÈRES (étapes taguées, pour les retrouver facilement)
   ========================================================= */
function toggleStepTag(lessonId, stepIndex){
  state.progress.taggedSteps = state.progress.taggedSteps || {};
  const key = lessonId + '_' + stepIndex;
  const nowTagged = !state.progress.taggedSteps[key];
  if(nowTagged){ state.progress.taggedSteps[key] = { taggedAt: new Date().toISOString() }; }
  else { delete state.progress.taggedSteps[key]; }
  saveProgress();
  const btn = document.getElementById(`tagbtn-${lessonId}-${stepIndex}`);
  if(btn){
    btn.classList.toggle('tagged', nowTagged);
    btn.textContent = nowTagged ? '🔖 Taguée' : '🔖 Taguer';
    btn.title = nowTagged ? 'Retirer ce repère' : 'Taguer cette étape comme repère';
  }
}
function stepCommentZone(lessonId, stepIndex){
  const key = lessonId + '_' + stepIndex;
  const existing = (state.progress.stepComments || {})[key];
  const text = existing ? existing.text : '';
  const hasComment = !!text;
  return `<div class="comment-zone ${hasComment ? '' : 'hidden'}" id="commentzone-${lessonId}-${stepIndex}">
    <textarea id="commentinput-${lessonId}-${stepIndex}" placeholder="Ta remarque personnelle sur cette étape — visible seulement par toi...">${escapeHtml(text)}</textarea>
    <div class="comment-zone-actions">
      <button class="btn-ghost" onclick="saveStepComment('${lessonId}',${stepIndex})">Enregistrer la note</button>
      <button class="reset-link ${hasComment ? '' : 'hidden'}" id="commentdel-${lessonId}-${stepIndex}" onclick="deleteStepComment('${lessonId}',${stepIndex})">Supprimer</button>
      <button class="reset-link" onclick="hideCommentZone('${lessonId}',${stepIndex})">Masquer</button>
    </div>
  </div>`;
}
function toggleCommentZone(lessonId, stepIndex){
  const zone = document.getElementById(`commentzone-${lessonId}-${stepIndex}`);
  if(!zone) return;
  const willShow = zone.classList.contains('hidden');
  zone.classList.toggle('hidden', !willShow);
  if(willShow){
    const ta = document.getElementById(`commentinput-${lessonId}-${stepIndex}`);
    if(ta) ta.focus();
  }
}
function hideCommentZone(lessonId, stepIndex){
  const zone = document.getElementById(`commentzone-${lessonId}-${stepIndex}`);
  if(zone) zone.classList.add('hidden');
}
function saveStepComment(lessonId, stepIndex){
  const key = lessonId + '_' + stepIndex;
  const ta = document.getElementById(`commentinput-${lessonId}-${stepIndex}`);
  const text = ta ? ta.value.trim() : '';
  state.progress.stepComments = state.progress.stepComments || {};
  if(text){ state.progress.stepComments[key] = { text, updatedAt: new Date().toISOString() }; }
  else { delete state.progress.stepComments[key]; }
  saveProgress();
  const btn = document.getElementById(`commentbtn-${lessonId}-${stepIndex}`);
  if(btn) btn.textContent = text ? '💬 Note' : '💬 Commenter';
  const delLink = document.getElementById(`commentdel-${lessonId}-${stepIndex}`);
  if(delLink) delLink.classList.toggle('hidden', !text);
  if(!text){
    const zone = document.getElementById(`commentzone-${lessonId}-${stepIndex}`);
    if(zone) zone.classList.add('hidden');
  }
}
function deleteStepComment(lessonId, stepIndex){
  const key = lessonId + '_' + stepIndex;
  if(state.progress.stepComments) delete state.progress.stepComments[key];
  saveProgress();
  const ta = document.getElementById(`commentinput-${lessonId}-${stepIndex}`);
  if(ta) ta.value = '';
  const btn = document.getElementById(`commentbtn-${lessonId}-${stepIndex}`);
  if(btn) btn.textContent = '💬 Commenter';
  const delLink = document.getElementById(`commentdel-${lessonId}-${stepIndex}`);
  if(delLink) delLink.classList.add('hidden');
  hideCommentZone(lessonId, stepIndex);
}
function stepPreviewLabel(step){
  if(step.label) return step.label;
  if(step.type === 'checkpoint') return "Point d'étape";
  if(step.type === 'summary') return "En résumé";
  return step.question || 'Étape';
}
function stepPreviewExcerpt(step){
  let raw = '';
  if(step.type === 'concept' || step.type === 'expert') raw = step.body || '';
  else if(step.type === 'pitfall') raw = (step.items||[]).join(' ');
  else if(step.type === 'predict' || step.type === 'numeric' || step.type === 'checkpoint' || step.type === 'validation') raw = step.question || '';
  else if(step.type === 'summary') raw = step.summary || '';
  else if(step.type === 'intro') raw = (step.mcq && step.mcq.question) || step.body || '';
  const text = raw.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  return text.length > 150 ? text.slice(0,150) + '…' : text;
}
function getMarkedStepsList(){
  const tagged = state.progress.taggedSteps || {};
  const commented = state.progress.stepComments || {};
  const keys = {};
  Object.keys(tagged).forEach(k => keys[k] = true);
  Object.keys(commented).forEach(k => keys[k] = true);
  const out = [];
  Object.keys(keys).forEach(key => {
    const idx = key.lastIndexOf('_');
    const lessonId = key.slice(0, idx);
    const stepIndex = parseInt(key.slice(idx+1), 10);
    const lesson = LESSONS[lessonId];
    const step = lesson && lesson.steps[stepIndex];
    if(!lesson || !step) return;
    const isTagged = !!tagged[key];
    const comment = (commented[key] && commented[key].text) || '';
    const sortDate = (commented[key] && commented[key].updatedAt) || (tagged[key] && tagged[key].taggedAt) || '';
    out.push({ key, lessonId, stepIndex, lesson, step, isTagged, comment, sortDate });
  });
  out.sort((a,b) => (b.sortDate||'').localeCompare(a.sortDate||''));
  return out;
}
function removeMarkedStep(lessonId, stepIndex){
  const key = lessonId + '_' + stepIndex;
  if(state.progress.taggedSteps) delete state.progress.taggedSteps[key];
  if(state.progress.stepComments) delete state.progress.stepComments[key];
  saveProgress();
  render();
}
function renderBookmarksShell(){
  const list = getMarkedStepsList();
  if(list.length === 0){

  return `<div class="eyebrow">Repères</div><h1>${list.length} étape${list.length>1?'s':''} marquée${list.length>1?'s':''}.</h1>

/* =========================================================
   RÉVISION ESPACÉE (rappel actif)
   ========================================================= */
function getPredictQuestionsForLesson(lessonId){
  const lesson = LESSONS[lessonId];
  if(!lesson) return [];
  const out = [];
  lesson.steps.forEach((step, idx) => {
    if(step.type === 'predict'){
      out.push({ key: lessonId+'_'+idx, lessonId, stepIndex: idx, lessonTitle: lesson.title,
        question: step.question, options: step.options, correctIndex: step.correctIndex, explanation: step.explanation });
    }
  });
  return out;
}
function addLessonToRevisionBank(lessonId){
  const questions = getPredictQuestionsForLesson(lessonId);
  const today = new Date().toISOString().slice(0,10);
  questions.forEach(q => {
    if(!state.progress.revisionBank[q.key]){
      state.progress.revisionBank[q.key] = { interval: 2, nextDue: today, timesCorrect: 0, timesWrong: 0 };
    }
  });
}
function getDueRevisionQuestions(){
  const today = new Date().toISOString().slice(0,10);
  const due = [];
  Object.keys(state.progress.revisionBank).forEach(key => {
    const record = state.progress.revisionBank[key];
    if(record.nextDue <= today){
      const idx = key.lastIndexOf('_');
      const lessonId = key.slice(0, idx);
      const stepIndex = parseInt(key.slice(idx+1), 10);
      const lesson = LESSONS[lessonId];
      const step = lesson && lesson.steps[stepIndex];
      if(step && step.type === 'predict'){
        due.push({ key, lessonId, stepIndex, lessonTitle: lesson.title,
          question: step.question, options: step.options, correctIndex: step.correctIndex, explanation: step.explanation });
      }
    }
  });
  return due;
}
function answerRevisionQuestion(key, chosenIndex){
  const q = state.currentRevisionQueue.find(x => x.key === key);
  const record = state.progress.revisionBank[key];
  const correct = chosenIndex === q.correctIndex;
  if(correct){
    record.timesCorrect++;
    record.interval = Math.min(record.interval * 2, 60);
    awardXP(12);
  } else {
    record.timesWrong++;
    record.interval = 1;
    awardXP(4);
  }
  const nextDate = new Date();
  nextDate.setDate(nextDate.getDate() + record.interval);
  record.nextDue = nextDate.toISOString().slice(0,10);
  saveProgress();

  document.querySelectorAll(`.mcq-option[data-revkey="${key}"]`).forEach((btn,i) => {
    btn.disabled = true;
    if(i === q.correctIndex) btn.classList.add('correct');
    else if(i === chosenIndex) btn.classList.add('incorrect');
  });
  const expl = document.getElementById('revExplanation');
  expl.classList.remove('hidden');
  expl.innerHTML = (correct ? "✓ Exactement. " : "Pas tout à fait. ") + q.explanation + `<div style="margin-top:14px;"><button class="btn-primary" onclick="nextRevisionQuestion()">${state.currentRevisionIndex < state.currentRevisionQueue.length-1 ? 'Question suivante →' : 'Terminer la session →'}</button></div>`;
}
function nextRevisionQuestion(){
  state.currentRevisionIndex++;
  renderRevisionSession();
}
function startRevisionSession(){
  state.currentRevisionQueue = getDueRevisionQuestions().sort(() => Math.random() - 0.5).slice(0, 5);
  state.currentRevisionIndex = 0;
  renderRevisionSession();
}
function renderRevisionSession(){
  const container = document.getElementById('revisionArea');
  if(!container) return;
  const queue = state.currentRevisionQueue;
  const idx = state.currentRevisionIndex;
  if(idx >= queue.length){
    container.innerHTML = `<div class="summary-card"><div class="step-label">Session terminée</div><p>Bien joué — les questions correctement répondues reviendront plus tard, celles ratées reviendront demain.</p><button class="btn-primary" onclick="goTo('dashboard')">Retour au tableau de bord →</button></div>`;
    return;
  }
  const q = queue[idx];
  const opts = q.options.map((o,i) => `<button class="mcq-option" data-revkey="${q.key}" onclick="answerRevisionQuestion('${q.key}',${i})">${o}</button>`).join('');
  container.innerHTML = `
    <div class="predict-card">
      <div class="step-label">Révision — ${escapeHtml(q.lessonTitle)} · Question ${idx+1}/${queue.length}</div>
      <p class="step-question">${q.question}</p>
      <div class="mcq-options">${opts}</div>
      <div class="mcq-explanation hidden" id="revExplanation"></div>
    </div>`;
}
function renderRevisionShell(){
  const dueCount = getDueRevisionQuestions().length;
  const totalTracked = Object.keys(state.progress.revisionBank).length;
  if(dueCount === 0){
    return `<div class="eyebrow">Révision</div><h1>Rien à réviser pour l'instant.</h1>
    <p class="subtitle">${totalTracked === 0 ? "Termine des leçons pour constituer ta banque de révision — chaque question à choix révisée pendant une leçon y sera ajoutée automatiquement." : `${totalTracked} question(s) suivie(s) au total. Reviens quand une prochaine sera due — la révision espacée fonctionne mieux en laissant l'intervalle faire son travail.`}</p>`;
  }
  return `<div class="eyebrow">Révision</div><h1>${dueCount} question(s) prête(s).</h1>
  <p class="subtitle">Rappel actif sur des notions déjà vues — pas une relecture, un vrai test.</p>
  <button class="btn-primary" onclick="startRevisionSession()">Commencer la session →</button>
  <div id="revisionArea" style="margin-top:24px;"></div>`;
}

function renderAnalyzerHistory(){

function fmtEuro(n){ return Math.round(n).toLocaleString('fr-FR') + ' €'; }
function runDealAnalysis(){
  const ca = parseFloat(document.getElementById('an_ca').value);
  const ebitda = parseFloat(document.getElementById('an_ebitda').value);
  const prix = parseFloat(document.getElementById('an_prix').value);
  const concentration = parseFloat(document.getElementById('an_concentration').value);
  const tresoExcedentaire = parseFloat(document.getElementById('an_treso').value) || 0;
  const resultBox = document.getElementById('analyzerResult');

  if(isNaN(ca) || isNaN(ebitda) || isNaN(prix) || ebitda <= 0){
    resultBox.innerHTML = `<div class="pitfall-card"><p>Renseigne au moins le CA, l'EBITDA (&gt; 0) et le prix demandé.</p></div>`;
    return;
  }

  const multiple = prix / ebitda;
  const ecartMultiple = multiple - 3;
  const margeEbitda = (ebitda / ca) * 100;

  // Esquisse de montage (Module 7) : prêt d'honneur fixe, crédit-vendeur 25%,
  // dette bancaire plafonnée à 4x EBITDA (ordre de grandeur indicatif)
  const apportPerso = Math.min(30000, prix);
  const pretHonneur = Math.min(30000, Math.max(0, prix - apportPerso));
  const creditVendeur = prix * 0.25;
  const detteBancairePlafond = ebitda * 4;
  const resteAvantBanque = Math.max(0, prix - apportPerso - pretHonneur - creditVendeur - tresoExcedentaire);
  const detteBancaire = Math.min(resteAvantBanque, detteBancairePlafond);
  const ecartResiduel = resteAvantBanque - detteBancaire;

  const redFlags = [];
  if(multiple > 3.3) redFlags.push(`Multiple de ${multiple.toFixed(2)}x, au-dessus de ton objectif de 3x (Module 4). Vérifie le barème sectoriel réel de cette cible avant d'accepter — ou renégocie.`);
  if(margeEbitda < 15) redFlags.push(`Marge EBITDA de ${margeEbitda.toFixed(1)}%, sous ton critère de 15% (Module 1). Vérifie si l'EBITDA a bien été retraité (Module 3) — le vrai chiffre est peut-être différent.`);
  if(!isNaN(concentration)){
    if(concentration > 40) redFlags.push(`Concentration client de ${concentration}% sur le top 3 : risque élevé (Module 1, Module 5). Vérifie en priorité les clauses de changement de contrôle dans leurs contrats.`);
    else if(concentration > 20) redFlags.push(`Concentration client de ${concentration}% : à surveiller sans être rédhibitoire seul — croise avec l'ancienneté et la récurrence contractuelle de ces clients.`);
  }
  if(ebitda < 100000) redFlags.push(`EBITDA sous 100 K€ : les fonds d'investissement désertent ce ticket (Module 4) — moins de compétition institutionnelle, mais vérifie que ta banque suit sur cette taille.`);
  if(ecartResiduel > 1000) redFlags.push(`Le montage esquissé ne boucle pas avec ces seules briques : il manque ${fmtEuro(ecartResiduel)}. À combler via une dette investisseur, un crédit-vendeur plus élevé, ou une renégociation du prix (Module 7).`);
  if(redFlags.length === 0) redFlags.push("Aucune alerte automatique sur ces chiffres — ça ne remplace pas une vraie due diligence (Module 5).");

  resultBox.innerHTML = `
    <div class="concept-card">
      <div class="step-label">Résultat</div>
      <p><strong>Multiple implicite : ${multiple.toFixed(2)}x</strong> l'EBITDA (écart de ${ecartMultiple >= 0 ? '+' : ''}${ecartMultiple.toFixed(2)}x par rapport à ton objectif de 3x). Marge EBITDA : ${margeEbitda.toFixed(1)}% du CA.</p>
      <p><strong>Esquisse de montage sous 30K€ d'apport :</strong></p>
      <ul>
        <li>Apport personnel (plafonné à 30 K€) : ${fmtEuro(apportPerso)}</li>
        <li>Prêt d'Honneur (0%) : ${fmtEuro(pretHonneur)}</li>
        <li>Crédit-vendeur (25% indicatif) : ${fmtEuro(creditVendeur)}</li>
        ${tresoExcedentaire > 0 ? `<li>Trésorerie excédentaire mobilisée : ${fmtEuro(tresoExcedentaire)}</li>` : ''}
        <li>Dette bancaire (plafonnée à titre indicatif à 4x EBITDA) : ${fmtEuro(detteBancaire)}</li>
        ${ecartResiduel > 1000 ? `<li style="color:var(--wine-2);">Écart non financé : ${fmtEuro(ecartResiduel)}</li>` : `<li style="color:var(--forest-2);">Montage bouclé avec ces briques.</li>`}
      </ul>
    </div>
    <div class="pitfall-card" style="margin-top:16px;">
      <div class="step-label">⚠ Alertes automatiques</div>
      <ul>${redFlags.map(f => `<li>${f}</li>`).join('')}</ul>
    </div>
    <p style="color:var(--text-muted); font-size:12.5px; margin-top:14px;">Esquisse indicative basée sur des règles simples (Modules 4 et 7) — ne remplace ni un dossier bancaire réel, ni une due diligence (Module 5), ni l'avis de ton expert-comptable.</p>`;

  state.progress.dealAnalyses = state.progress.dealAnalyses || [];
  state.progress.dealAnalyses.push({ date: new Date().toISOString(), ca, ebitda, prix, concentration: isNaN(concentration)?null:concentration, multiple, redFlags });
  saveProgress();
  document.getElementById('analyzerHistory').innerHTML = renderAnalyzerHistory();
}

async function callProfessor(){
  const systemPrompt = buildSystemPrompt();
  const messages = state.chatHistory.slice(-16).map(m => ({role: m.role, content: m.content}));
  try{
    const { data: sessionData } = await sbClient.auth.getSession();
    if(!sessionData || !sessionData.session){
      return "Ta session a expiré. Recharge la page et reconnecte-toi.";
    }
    const functionUrl = SUPABASE_URL + "/functions/v1/chat-proxy";
    const response = await fetch(functionUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + sessionData.session.access_token
      },
      body: JSON.stringify({ system: systemPrompt, messages: messages })
    });
    const data = await response.json();
    if(data && data.content){
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
      if(text) return text;
    }
    if(data && data.error){
      const msg = typeof data.error === 'string' ? data.error : (data.error.message || JSON.stringify(data.error));
      return "Le professeur a rencontré un problème : " + msg;
    }
    return "Je n'ai pas réussi à formuler une réponse claire cette fois-ci. Peux-tu reformuler ta question ?";
  } catch(e){
    console.error(e);
    return "Je n'arrive pas à joindre le professeur pour le moment — vérifie ta connexion et réessaie dans un instant.";
  }
}

function simpleMarkdownToHtml(md){
  let html = escapeHtml(md);
  html = html.replace(/^### (.*)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.*)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.*)$/gm, '<h2>$1</h2>');
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/(https?:\/\/[^\s<]+)/g, (m) => m.startsWith('href="') ? m : `<a href="${m}" target="_blank" rel="noopener">${m}</a>`);
  html = html.replace(/^- (.*)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, (m) => '<ul>' + m + '</ul>');
  html = html.split(/\n{2,}/).map(p => p.match(/^<(h\d|ul|li)/) ? p : `<p>${p}</p>`).join('\n');
  return html;
}

async function launchAgentResearch(){

  const resultBox = document.getElementById('agentResult');
  if(!topic){ resultBox.innerHTML = `<p style="color:var(--wine-2);">Décris d'abord un sujet.</p>`; return; }

  try{

    if(!sessionData || !sessionData.session){ resultBox.innerHTML = `<p style="color:var(--wine-2);">Session expirée, reconnecte-toi.</p>`; btn.disabled=false; btn.textContent="🔎 Lancer la recherche →"; return; }
    const functionUrl = SUPABASE_URL + "/functions/v1/ai-agent";

    resultBox.innerHTML = `<p style="color:var(--wine-2);">Impossible de joindre l'agent. Vérifie ta connexion et réessaie.</p>`;

async function loadAgentProposals(){
  const box = document.getElementById('agentHistory');
  if(!box) return;
  try{
    const { data, error } = await sbClient.from('agent_proposals').select('*').order('created_at', { ascending:false }).limit(10);
    if(error || !data || data.length === 0){ box.innerHTML = `<p style="color:var(--text-muted); font-size:14px;">Aucune proposition pour l'instant.</p>`; return; }
    box.innerHTML = data.map(p => `

      <div id="prop-${p.id}" class="hidden"><div class="concept-card"><div class="step-label">${escapeHtml(p.topic)}</div>${simpleMarkdownToHtml(p.content)}</div></div>

}

      const sc = TRAINING_SCENARIOS[id];
      return `<div class="module-card" style="margin-bottom:12px; cursor:pointer;" onclick="startTraining('${id}')">
        <div><div class="module-card-title" style="font-size:15.5px;">${sc.icon} ${sc.title}</div>
        <div class="module-card-desc">${sc.desc}<br><span style="opacity:0.7;">${sc.lessonRef}</span></div></div>
        <div class="module-card-meta"><span class="badge-built">Jouer →</span></div>
      </div>`;
    }).join('');
    return `
    <div class="eyebrow">Salle d'entraînement</div>
    <h1 style="margin-bottom:8px;">Joue le rendez-vous avant de le vivre.</h1>
    <p class="subtitle">L'IA incarne la partie adverse — cédant, banquière, avocate — avec son caractère, ses résistances et des informations qu'elle ne lâchera que si tu poses les bonnes questions. À la fin, demande le débrief du coach (+40 XP). Session non sauvegardée : c'est un bac à sable, ose tout. Écris STOP pour sortir du personnage.</p>
    ${cards}`;
  }
  const sc = TRAINING_SCENARIOS[state.trainingScenario];
  return `
  <div class="eyebrow">Salle d'entraînement</div>
  <h1 style="margin-bottom:16px;">${sc.icon} ${sc.title}</h1>
  <div class="chat-wrap">
    <div class="chat-hint">${sc.desc} — Reste dans le jeu : ton interlocuteur ne sortira pas de son rôle. Quand tu as terminé, clique sur « Débrief du coach ».</div>
    <div class="chat-messages" id="trainingMessages"></div>
    <div class="chat-input-row">
      <textarea id="trainingInput" placeholder="Ta réplique..." onkeydown="handleTrainingKey(event)"></textarea>
      <button class="btn-primary" onclick="sendTrainingMessage()" id="trainingSendBtn">Envoyer</button>
    </div>
    <div style="display:flex; gap:10px; margin-top:12px; flex-wrap:wrap;">
      <button class="btn-ghost" onclick="endTrainingDebrief()" id="trainingDebriefBtn">🎓 Terminer & débrief du coach</button>
      <button class="btn-ghost" onclick="quitTraining()">← Changer de scénario</button>
    </div>
  </div>`;
}
function renderTrainingMessages(){
  const box = document.getElementById('trainingMessages');
  if(!box) return;
  box.innerHTML = state.trainingHistory.map(m => `<div class="msg ${m.role==='user'?'msg-user':'msg-assistant'}">${escapeHtml(m.content).replace(/\*(.*?)\*/g,'<em style="opacity:0.75;">$1</em>').replace(/\n/g,'<br>')}</div>`).join('');
  if(state.trainingBusy){ box.innerHTML += `<div class="msg msg-assistant typing">…</div>`; }
  box.scrollTop = box.scrollHeight;
}
function handleTrainingKey(e){
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendTrainingMessage(); }
}
async function sendTrainingMessage(){
  const input = document.getElementById('trainingInput');
  const text = input.value.trim();
  if(!text || state.trainingBusy) return;
  state.trainingHistory.push({role:'user', content:text});
  input.value = '';
  state.trainingBusy = true;
  renderTrainingMessages();
  const sc = TRAINING_SCENARIOS[state.trainingScenario];
  const reply = await callRoleplay(sc.system, state.trainingHistory.slice(-24));
  state.trainingBusy = false;
  state.trainingHistory.push({role:'assistant', content:reply});
  renderTrainingMessages();
}
async function endTrainingDebrief(){
  if(state.trainingBusy) return;
  const played = state.trainingHistory.filter(m => m.role === 'user').length;
  if(played < 2){
    state.trainingHistory.push({role:'assistant', content:"(Coach) Joue au moins quelques répliques avant de demander le débrief — lance-toi, c'est un bac à sable."});
    renderTrainingMessages();
    return;
  }
  state.trainingBusy = true;
  renderTrainingMessages();
  const sc = TRAINING_SCENARIOS[state.trainingScenario];
  const transcript = state.trainingHistory.map(m => (m.role === 'user' ? "REPRENEUR : " : "PERSONNAGE : ") + m.content).join("\n");
  const debriefMessages = [{ role:'user', content: "Scénario joué : " + sc.title + "\n\nTranscript :\n" + transcript + "\n\nFais le débrief." }];
  const reply = await callRoleplay(TRAINING_DEBRIEF_SYSTEM, debriefMessages);
  state.trainingBusy = false;
  state.trainingHistory.push({role:'assistant', content:"🎓 DÉBRIEF DU COACH\n\n" + reply});
  if(!state.trainingDebriefed){ state.trainingDebriefed = true; awardXP(40); }
  renderTrainingMessages();
}
async function callRoleplay(systemPrompt, messages){
  try{
    const { data: sessionData } = await sbClient.auth.getSession();
    if(!sessionData || !sessionData.session){
      return "Ta session a expiré. Recharge la page et reconnecte-toi.";
    }
    const functionUrl = SUPABASE_URL + "/functions/v1/chat-proxy";
    const response = await fetch(functionUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + sessionData.session.access_token
      },
      body: JSON.stringify({ system: systemPrompt, messages: messages.map(m => ({role: m.role, content: m.content})) })
    });
    const data = await response.json();
    if(data && data.content){
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
      if(text) return text;
    }
    if(data && data.error){
      const msg = typeof data.error === 'string' ? data.error : (data.error.message || JSON.stringify(data.error));
      return "(Problème technique : " + msg + ")";
    }
    return "(Je n'ai pas réussi à répondre — réessaie.)";
  } catch(e){
    console.error(e);
    return "(Connexion impossible pour le moment — vérifie ta connexion et réessaie.)";
  }
}


/* =========================================================
   INIT
   ========================================================= */
window.__debug = function(){ return { state, LESSONS, MODULES, PHASES }; };
initApp();
</script>
