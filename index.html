  dd4: {
    id:"dd4", moduleId:5, title:"Orchestrer sa DD, les red flags & savoir renoncer", duration:"15 min",
    steps:[
      { type:"concept", label:"Qui fait quoi, et pour quel budget",
        body:`<p>Tu ne fais pas tout toi-même — et tu ne délègues pas tout non plus. La répartition qui fonctionne sur un deal de ta taille :</p>
        <ul>
          <li><strong>Toi</strong> : la DD commerciale et opérationnelle (visites, entretiens, compréhension du business), et le pilotage d'ensemble. Personne ne peut le faire à ta place.</li>
          <li><strong>Ton expert-comptable</strong> : la DD financière (retraitements, croisements bancaires, dettes cachées).</li>
          <li><strong>Ton avocat M&A</strong> : la DD juridique et sociale (contrats, bail, clauses, passifs sociaux) — et ensuite la rédaction de la GAP.</li>
        </ul>
        <p><strong>Budget total réaliste</strong> sur un deal à 500-750K€ : compte plusieurs milliers à une dizaine de milliers d'euros pour l'ensemble (ordre de grandeur indicatif — demande des devis, les pratiques varient). C'est le meilleur investissement de tout ton projet : l'exercice de la leçon 1 t'a montré qu'un seul retraitement manqué coûte dix fois plus.</p>
        <p><strong>La data room</strong> : dès l'entrée en exclusivité, envoie une liste de documents structurée (comptes, contrats, social, fiscal, juridique). Le professeur peut te générer cette liste complète adaptée à ta cible — demande-lui.</p>` },
      { type:"concept", label:"Red flags : deal breakers vs points de négociation",
        body:`<p>Toutes les découvertes de DD ne se traitent pas pareil. Apprends à les trier en deux catégories :</p>
        <p><strong>Deal breakers (on part, même si ça fait mal) :</strong> fraude ou dissimulation avérée du vendeur (s'il a menti sur une chose vérifiable, tout le reste est suspect), CA en érosion structurelle masquée, dépendance totale au dirigeant sans transition possible, litige existentiel en cours, activité dont la conformité réglementaire est irréparable.</p>
        <p><strong>Points de négociation (on ajuste le deal) :</strong> capex caché → réduction de prix ; risque fiscal ou social identifié → GAP renforcée et séquestre ; clause de changement de contrôle → condition suspensive d'accord client ; dépendance partielle au dirigeant → accompagnement prolongé du cédant, avec earn-out éventuel.</p>` },
      { type:"expert", label:"Œil d'expert : le biais qui ruine les repreneurs",
        body:`<p>Le moment le plus dangereux de tout ton projet n'est pas la négociation — c'est le jour où, après 4 mois de travail et 8 000 € de frais de DD, tu découvres un vrai deal breaker. Ton cerveau va te souffler : <em>« J'ai déjà tellement investi, je ne peux pas abandonner maintenant. »</em></p>
        <p>C'est le <strong>biais des coûts irrécupérables</strong>, et c'est lui qui transforme une DD bien menée en catastrophe : avoir trouvé le problème, et signer quand même. Les 8 000 € sont dépensés quoi que tu décides — la seule question valable est : « Signerais-je CE deal, avec CE que je sais maintenant, si je le découvrais aujourd'hui ? » Si la réponse est non, renoncer n'est pas un échec de ta DD. C'est exactement sa réussite.</p>` },
      { type:"predict", label:"À toi de jouer",
        question:"Ta DD révèle un risque de redressement fiscal potentiel de 40 000 € sur une période antérieure à ton achat. Deal breaker ou point de négociation ?",
        options:["Deal breaker : tout risque fiscal doit faire fuir","Point de négociation : GAP dimensionnée pour couvrir ce montant, éventuellement avec un séquestre d'une partie du prix, et compensation possible sur le crédit-vendeur","Ni l'un ni l'autre : on ignore, ça ne se produira peut-être jamais"],
        correctIndex:1,
        explanation:"Exactement. Un risque identifié, chiffrable et antérieur à ton achat est précisément ce pour quoi la GAP existe (Module 6) — renforcée ici d'un séquestre ou de la compensation sur le crédit-vendeur (Module 7). L'ignorer serait une faute ; fuir serait excessif. Le tri deal breaker / négociable est LA compétence de synthèse de toute ta DD." },
      { type:"validation", label:"Question de validation 1/3",
        question:"Liste les 5 premières vérifications que TU ferais, dans l'ordre, sur une cible réelle correspondant à ta thèse — et pour chacune, dis qui la fait (toi, expert-comptable, avocat)." },
      { type:"validation", label:"Question de validation 2/3",
        question:"Ta DD révèle que le dirigeant détient personnellement la marque de l'entreprise, et que 30% du CA vient d'un client sans contrat écrit. Pour chacun de ces deux points : deal breaker ou négociable ? Et si négociable, comment tu le traites concrètement ?" },
      { type:"validation", label:"Question de validation 3/3",
        question:"Explique avec tes propres mots pourquoi renoncer à un deal après avoir dépensé 8 000 € de DD peut être la meilleure décision financière de ton projet — et pourquoi c'est si difficile psychologiquement." },
      { type:"summary",
        summary:"Une DD bien menée se répartit entre toi (commercial, opérationnel), ton expert-comptable (financier) et ton avocat (juridique, social) — pour un budget qui reste dérisoire face au coût d'un vice manqué. La compétence finale : trier les découvertes entre deal breakers et points de négociation, et avoir le courage de renoncer quand les faits le commandent.",
        nextHint:"Le Module 6 approfondira la GAP — l'outil contractuel qui couvre tout ce que ta DD a identifié sans pouvoir le lever." }
    ]
  },

  c1: {
    id:"c1", moduleId:3, title:"Le compte de résultat : le film de l'année", duration:"15 min",
    steps:[
      { type:"concept", label:"Le film et la photo",
        body:`<p>Les comptes d'une entreprise racontent deux histoires différentes, et l'erreur n°1 du débutant est de les confondre :</p>
        <ul>
          <li>Le <strong>compte de résultat</strong>, c'est le <strong>film</strong> des 12 derniers mois : tout ce qui a été facturé (produits) et tout ce qui a été consommé (charges). Produits − charges = résultat.</li>
          <li>Le <strong>bilan</strong>, c'est la <strong>photo</strong> du patrimoine au dernier jour de l'exercice : ce que l'entreprise possède et comment c'est financé. On le voit à la prochaine leçon.</li>
        </ul>
        <p>Tu vas apprendre à lire le film d'abord — parce que c'est là que vit l'EBITDA qui détermine ton prix.</p>` },
      { type:"concept", label:"La cascade qui mène à l'EBITDA",
        body:`<p>Dans les comptes français, le résultat se construit en cascade — et chaque étage raconte quelque chose :</p>
        <ol>
          <li><strong>Chiffre d'affaires</strong> − achats et charges externes = <strong>Valeur ajoutée</strong> (ce que l'entreprise crée réellement)</li>
          <li>− charges de personnel − impôts et taxes = <strong>EBE</strong> (Excédent Brut d'Exploitation) — <strong>c'est le cousin français de l'EBITDA du Module 1</strong>. Quand tu cherches l'EBITDA dans des comptes français, cherche cette ligne.</li>
          <li>− dotations aux amortissements = <strong>Résultat d'exploitation</strong></li>
          <li>± résultat financier ± résultat exceptionnel − impôt sur les sociétés = <strong>Résultat net</strong></li>
        </ol>
        <p>Retiens ceci : <strong>le résultat net est le chiffre le plus cité et le moins fiable</strong> pour juger l'exploitation — il est pollué par l'exceptionnel et les choix d'amortissement. L'EBE, lui, dit ce que le moteur produit vraiment.</p>` },
      { type:"numeric", label:"Exercice — remonte la cascade toi-même",
        question:"Une cible affiche : CA 1 200 000 €, achats et charges externes 600 000 €, charges de personnel 380 000 €, impôts et taxes 20 000 €. Quel est son EBE (en €) ?",
        placeholder:"Ex : 180000", answer:200000, tolerance:2000,
        successMsg:"200 000 € (1 200 000 − 600 000 − 380 000 − 20 000). Tu viens de calculer toi-même l'équivalent de l'EBITDA à partir de comptes bruts — c'est exactement ce que tu feras sur chaque cible réelle, sans dépendre du chiffre présenté par le vendeur.",
        hint:"Indice : CA − achats/charges externes − charges de personnel − impôts et taxes." },
      { type:"predict", label:"À toi de jouer",
        question:"Une entreprise affiche un résultat net en hausse de 80%, mais son EBE baisse de 10%. Que s'est-il probablement passé ?",
        options:["L'activité s'est nettement améliorée","Un élément exceptionnel (vente d'un actif, reprise de provision) a gonflé le résultat net, alors que l'exploitation se dégrade — à creuser d'urgence","C'est impossible, les deux évoluent toujours ensemble"],
        correctIndex:1,
        explanation:"Exactement. C'est le scénario classique d'une entreprise « habillée pour la vente » : un événement ponctuel embellit le chiffre que tout le monde regarde (résultat net), pendant que le moteur réel (EBE) ralentit. Un vendeur mettra en avant les +80% ; toi, tu regardes les −10%." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Juger une entreprise sur son seul résultat net — tu sais maintenant pourquoi c'est le chiffre le plus manipulable de la cascade.",
          "Comparer des exercices de durées différentes sans retraiter : après un changement de date de clôture, un exercice peut faire 15 ou 18 mois — comparer ses chiffres bruts à une année normale fausse tout."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un analyste expérimenté ne lit jamais un compte de résultat en euros — il le lit <strong>en pourcentage du CA, sur 3 ans</strong>. Chaque ligne divisée par le chiffre d'affaires de l'année. Une dérive saute alors aux yeux : des charges externes qui passent de 18% à 24% du CA en 3 ans racontent une histoire (perte de maîtrise des coûts, sous-traitance qui grimpe...) que les montants bruts noient complètement.</p>` },
      { type:"checkpoint", question:"La cascade CA → EBE → résultat net, et pourquoi l'EBE prime sur le résultat net, c'est clair ?",
        helpPrompt:"Je viens de voir la cascade du compte de résultat (CA, valeur ajoutée, EBE, résultat d'exploitation, résultat net). Peux-tu me la refaire sur un exemple complet chiffré, ligne par ligne, comme si on lisait une vraie liasse fiscale ensemble ?" },
      { type:"summary",
        summary:"Le compte de résultat est le film de l'année, construit en cascade : CA → valeur ajoutée → EBE (l'EBITDA français) → résultat d'exploitation → résultat net. Plus on descend, plus le chiffre est manipulable — juge le moteur sur l'EBE, en % du CA, sur 3 ans.",
        nextHint:"Le bilan : la photo du patrimoine, et les 4 lignes à regarder en premier en tant que repreneur." }
    ]
  },

  c2: {
    id:"c2", moduleId:3, title:"Le bilan : la photo du patrimoine", duration:"14 min",
    steps:[
      { type:"concept", label:"Actif et passif : les deux faces de la photo",
        body:`<p>Le bilan répond à deux questions, en deux colonnes toujours égales :</p>
        <ul>
          <li><strong>L'actif</strong> — qu'est-ce que l'entreprise possède ? Immobilisations (machines, locaux, fonds de commerce), stocks, créances clients (l'argent que les clients doivent), trésorerie.</li>
          <li><strong>Le passif</strong> — comment c'est financé ? Capitaux propres (l'argent des associés + les bénéfices accumulés), dettes financières (banques), dettes fournisseurs, comptes courants d'associés.</li>
        </ul>
        <p><strong>Les 4 lignes à regarder en premier en tant que repreneur :</strong> les capitaux propres (négatifs = alerte majeure : les pertes ont mangé le capital), la trésorerie, les dettes financières, et les <strong>comptes courants d'associés</strong> — l'argent que l'entreprise doit à son dirigeant. Devra-t-il être remboursé au closing ? C'est un point de négociation à part entière, souvent oublié des débutants.</p>` },
      { type:"concept", label:"FR, BFR, trésorerie nette : le triangle qui explique le cash",
        body:`<p>Trois notions qui s'emboîtent, et que tu as déjà croisées sans les formaliser :</p>
        <ul>
          <li><strong>Fonds de roulement (FR)</strong> = ressources longues (capitaux propres + dettes long terme) − emplois longs (immobilisations). C'est le « matelas » de financement stable.</li>
          <li><strong>Besoin en fonds de roulement (BFR)</strong> = stocks + créances clients − dettes fournisseurs. C'est l'argent immobilisé en permanence par le cycle d'exploitation : tu paies tes fournisseurs et tes salariés avant d'encaisser tes clients.</li>
          <li><strong>Trésorerie nette = FR − BFR.</strong></li>
        </ul>
        <p>Tu reconnais le BFR : c'est lui qui déterminait la « trésorerie réellement excédentaire » mobilisable dans ton montage (Module 7, leçon f3). Maintenant tu sais exactement d'où sortent ces chiffres dans un bilan réel.</p>` },
      { type:"numeric", label:"Exercice — calcule le BFR",
        question:"Au bilan de ta cible : stocks 60 000 €, créances clients 150 000 €, dettes fournisseurs 90 000 €. Quel est son BFR (en €) ?",
        placeholder:"Ex : 100000", answer:120000, tolerance:2000,
        successMsg:"120 000 € (60 000 + 150 000 − 90 000). C'est l'argent structurellement immobilisé par l'activité — et donc le plancher en dessous duquel la trésorerie ne doit jamais descendre. Tout ce qui est au-dessus est potentiellement mobilisable pour ton montage.",
        hint:"Indice : stocks + créances clients − dettes fournisseurs." },
      { type:"pitfall", label:"⚠ Pièges classiques",
        items:[
          "Prendre les valeurs comptables pour la réalité : un immeuble amorti depuis 20 ans vaut peut-être dix fois sa valeur au bilan ; des machines « encore au bilan » sont peut-être bonnes pour la casse. Tu connais déjà la deuxième moitié de ce piège : c'est le capex caché de la DD opérationnelle (dd3).",
          "Oublier le hors-bilan : crédits-baux en cours, cautions données par la société — invisibles dans les deux colonnes, mais bien réels le jour où il faut payer."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Un repreneur expérimenté trace deux courbes sur 3 ans avant toute autre analyse : <strong>capitaux propres</strong> et <strong>trésorerie nette</strong>. Deux courbes qui montent ensemble = une entreprise qui s'enrichit. Deux courbes qui baissent ensemble = une entreprise qui se vide — quel que soit le discours du vendeur sur « le potentiel » et « les projets en cours ».</p>` },
      { type:"checkpoint", question:"Le triangle FR / BFR / trésorerie nette, et son lien avec ton montage du Module 7, c'est clair ?",
        helpPrompt:"Je viens de voir le bilan (actif/passif, FR, BFR, trésorerie nette). Peux-tu me montrer sur un bilan simplifié complet comment tu calcules les trois, et comment tu en déduis la trésorerie mobilisable pour un montage ?" },
      { type:"summary",
        summary:"Le bilan est la photo du patrimoine : l'actif (ce qu'on possède) face au passif (comment c'est financé). Les 4 lignes prioritaires du repreneur : capitaux propres, trésorerie, dettes financières, comptes courants d'associés. Le BFR (stocks + créances − fournisseurs) fixe le plancher de trésorerie intouchable.",
        nextHint:"Les retraitements : transformer les comptes officiels en réalité économique — le travail qui détermine directement ton prix." }
    ]
  },

  c3: {
    id:"c3", moduleId:3, title:"Les retraitements : des comptes à la réalité économique", duration:"15 min",
    steps:[
      { type:"concept", label:"Pourquoi les comptes d'une PME ne disent pas la vérité économique",
        body:`<p>Les comptes d'une PME reflètent les <strong>choix</strong> du dirigeant — fiscaux, patrimoniaux, personnels — pas la performance économique pure. Il se paie peu (ou beaucoup), loge des dépenses personnelles dans la boîte, se verse un loyer via sa SCI... Rien d'illégal la plupart du temps ; mais rien de représentatif non plus de ce que TOI tu gagneras.</p>
        <p>Retraiter, c'est reconstituer ce que l'entreprise dégagerait avec une gestion « normale ». Et comme <strong>prix = multiple × EBITDA normalisé</strong>, chaque euro de retraitement se multiplie par 2,5 dans ton prix. C'est le travail le plus rentable de toute ton analyse — tu en as eu un avant-goût en DD financière (dd1) ; cette leçon le systématise.</p>` },
      { type:"concept", label:"Les 5 retraitements classiques",
        body:`<ol>
          <li><strong>Salaire du dirigeant</strong> — ramené au prix du marché pour le poste, dans les deux sens (trop bas : l'EBITDA est gonflé ; trop haut : il est sous-évalué).</li>
          <li><strong>Le loyer versé à la SCI du dirigeant</strong> — LE grand classique français : le dirigeant possède les murs via une SCI et loue à sa propre entreprise. Loyer au-dessus du marché = il sort du cash (EBITDA sous-évalué, bonne surprise pour toi). Loyer en dessous du marché = attention, il gonfle l'EBITDA avant la vente... et le loyer remontera au prix du marché après ton rachat. Compare toujours au marché locatif réel de la zone.</li>
          <li><strong>Charges personnelles</strong> — véhicules, voyages, conjoint salarié sans poste réel...</li>
          <li><strong>Éléments non récurrents</strong> — litige soldé, subvention exceptionnelle, année atypique : à neutraliser.</li>
          <li><strong>Crédit-bail</strong> — selon la présentation comptable, à retraiter pour comparer des cibles entre elles sur une base homogène.</li>
        </ol>` },
      { type:"numeric", label:"Exercice — retraite dans les deux sens",
        question:"EBITDA affiché : 180 000 €. Le dirigeant se paie 30 000 € (marché : 75 000 €). Il verse 60 000 € de loyer à sa SCI (marché : 36 000 €). Tu identifies 12 000 € de charges personnelles. Quel est l'EBITDA normalisé (en €) ?",
        placeholder:"Ex : 170000", answer:171000, tolerance:2000,
        successMsg:"171 000 € (180 000 − 45 000 de salaire manquant + 24 000 de sur-loyer SCI + 12 000 de charges perso). Remarque l'essentiel : les retraitements vont dans LES DEUX SENS — ici le salaire tire vers le bas, le loyer et les charges perso tirent vers le haut. Un vendeur ne te présentera jamais spontanément ceux qui baissent le chiffre.",
        hint:"Indice : 180 000, moins l'écart de salaire (75−30 = 45K en moins), plus l'excès de loyer (60−36 = 24K en plus), plus les 12K de charges perso." },
      { type:"pitfall", label:"⚠ Le piège du retraitement à sens unique",
        items:[
          "Le vendeur retraite toujours à la hausse (il « normalise » ce qui gonfle l'EBITDA) et « oublie » les retraitements à la baisse : le loyer SCI sous-évalué qui remontera au marché, le conjoint bénévole qu'il faudra remplacer par un salarié, la maintenance repoussée. Ta contre-liste des retraitements négatifs est aussi importante que la vérification des positifs.",
          "Accepter un retraitement sans justificatif chiffré. La règle : un retraitement sans pièce = un retraitement refusé."
        ] },
      { type:"expert", label:"Œil d'expert",
        body:`<p>Face à un « EBITDA retraité » présenté par le vendeur, un acheteur expérimenté demande systématiquement le <strong>pont détaillé</strong> : le passage ligne à ligne de l'EBITDA comptable à l'EBITDA retraité, chaque ajustement justifié par une pièce (bulletin de salaire, bail SCI, facture). Puis il construit sa propre contre-liste des ajustements négatifs. L'écart entre l'EBITDA « vendeur » et le tien devient la base factuelle — et non émotionnelle — de ta négociation de prix.</p>` },
      { type:"checkpoint", question:"L'idée que les retraitements vont dans les deux sens — et que le vendeur ne te montrera qu'un seul — est-elle bien ancrée ?",
        helpPrompt:"Je viens de voir les 5 retraitements classiques (salaire, loyer SCI, charges perso, non-récurrent, crédit-bail). Peux-tu me faire un cas complet où le vendeur présente un EBITDA retraité gonflé, et me montrer comment je le déconstruis point par point ?" },
      { type:"summary",
        summary:"Les comptes d'une PME reflètent les choix du dirigeant, pas la performance pure. Les 5 retraitements classiques (salaire, loyer SCI, charges perso, non-récurrent, crédit-bail) vont dans les deux sens — et chaque euro retraité pèse 2,5 € dans ton prix. Un retraitement sans justificatif est un retraitement refusé.",
        nextHint:"Dernière leçon : les signaux d'alerte cachés dans les comptes, et comment vérifier réellement la dépendance client de ta thèse." }
    ]
  },

  c4: {
    id:"c4", moduleId:3, title:"Signaux d'alerte & dépendance client : lire entre les lignes", duration:"14 min",
    steps:[
      { type:"concept", label:"Les 4 signaux d'alerte silencieux",
        body:`<p>Certains problèmes ne s'affichent jamais en clair dans les comptes — mais ils laissent des traces. Les 4 à surveiller systématiquement sur 3 ans :</p>
        <ul>
          <li><strong>Créances clients qui gonflent plus vite que le CA</strong> — les clients paient de plus en plus tard (rapport de force dégradé, clients en difficulté), ou pire : du CA « poussé » artificiellement en fin d'exercice pour embellir l'année de la vente.</li>
          <li><strong>Stocks qui gonflent sans hausse d'activité</strong> — invendus, obsolescence, ou production stockée pour gonfler le résultat.</li>
          <li><strong>Charges soudainement « activées »</strong> (production immobilisée qui apparaît) — une façon comptable de sortir des charges du compte de résultat et d'améliorer l'EBE optiquement.</li>
          <li><strong>Changement d'expert-comptable ou de méthode comptable juste avant la mise en vente</strong> — parfois anodin, toujours à questionner frontalement.</li>
        </ul>` },
      { type:"numeric", label:"Exercice — le délai de paiement clients (DSO)",
        question:"Ta cible affiche 165 000 € de créances clients pour 1 000 000 € de CA annuel. Quel est son délai moyen de paiement clients, en jours (arrondi) ? Formule : (créances clients ÷ CA) × 365.",
        placeholder:"Ex : 45", answer:60, tolerance:2,
        successMsg:"60 jours ((165 000 ÷ 1 000 000) × 365). En soi, 60 jours n'est ni bon ni mauvais — tout dépend du secteur et surtout de la TENDANCE : ce même calcul sur les 3 derniers exercices te dit si la situation se dégrade. Un DSO qui passe de 45 à 60 puis 75 jours est une alerte, même si chaque chiffre isolé semble acceptable.",
        hint:"Indice : divise 165 000 par 1 000 000, puis multiplie par 365." },
      { type:"predict", label:"À toi de jouer",
        question:"CA stable sur 3 ans, mais le délai de paiement clients passe de 45 à 60 puis 95 jours. Interprétation la plus probable ?",

const LEVELS = [
  { min:0, title:"Apprenti Repreneur" },
  { min:150, title:"Chasseur de Cibles" },
  { min:400, title:"Lecteur de Bilans" },
  { min:700, title:"Négociateur" },
  { min:1100, title:"Stratège Financier" },
  { min:1600, title:"Repreneur Confirmé" },
  { min:2300, title:"Bâtisseur de Groupe" }
];
function getLevelInfo(xp){
  let idx = 0;
  for(let i=0;i<LEVELS.length;i++){ if(xp >= LEVELS[i].min) idx = i; }
  const cur = LEVELS[idx];
  const next = LEVELS[idx+1] || null;
  const span = next ? (next.min - cur.min) : 1;
  const into = next ? (xp - cur.min) : 1;
  const pct = next ? Math.min(100, Math.round((into/span)*100)) : 100;
  return { title: cur.title, next, pct };
}

function saveToCloud(){
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    if(!state.currentUser || !sbClient) return;
    try{
      const { error } = await sbClient.from('progress').upsert({
        user_id: state.currentUser.id,
        data: { progress: state.progress, chatHistory: state.chatHistory.slice(-30) },
        updated_at: new Date().toISOString()
      }, { onConflict: 'user_id' });
      if(error) throw error;
      state.dbStatus = "ok";
    } catch(e){
      console.error("Erreur de sauvegarde Supabase", e);
      state.dbStatus = "error";
    }
    updateSidebarStats();
  }, 500);
}
// Alias conservés pour compatibilité avec le reste du moteur de leçons (aucun autre changement nécessaire)
function saveProgress(){ saveToCloud(); }
function saveChat(){ saveToCloud(); }

async function doSignOut(){
  if(sbClient) await sbClient.auth.signOut();
}

function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  const last = state.progress.lastActiveDate;
  if(last === today) return;
  if(last){
    const diffDays = Math.round((new Date(today) - new Date(last)) / 86400000);
    state.progress.streak = (diffDays === 1) ? (state.progress.streak + 1) : 1;
  } else {
    state.progress.streak = 1;
  }
  state.progress.lastActiveDate = today;
  saveProgress();
}

function awardXP(n){
  state.progress.xp += n;
  saveProgress();
  updateSidebarStats();
}

async function confirmReset(){
  if(!confirm("Réinitialiser toute ta progression (XP, leçons terminées, réponses, historique du chat) ? Cette action est irréversible.")) return;
  state.progress = JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
  state.chatHistory = [];
  saveToCloud();
  state.view = "onboarding";
  render();
}

function collectValidationAnswersText(){
  const lines = [];
  Object.keys(state.progress.validationAnswers || {}).forEach(key => {
    const answer = state.progress.validationAnswers[key];
    if(!answer || !answer.trim()) return;
    const idx = key.lastIndexOf('_');
    const lessonId = key.slice(0, idx);
    const stepIndex = parseInt(key.slice(idx + 1), 10);
    const lesson = LESSONS[lessonId];
    const step = lesson && lesson.steps[stepIndex];
    if(!step) return;
    lines.push("[" + lesson.title + "] " + step.question + "\n→ " + answer.trim());
  });
  if(lines.length === 0) return "Aucune réponse de validation enregistrée pour l'instant.";
  return "Voici mes réponses aux questions de validation dans REPRISE. :\n\n" + lines.join("\n\n");
}
async function copyAnswersForClaude(){
  const text = collectValidationAnswersText();
  const btn = document.getElementById('copyAnswersBtn');
  const restore = (label) => { if(btn){ setTimeout(() => { btn.textContent = "📋 Copier mes réponses pour Claude"; }, 1800); btn.textContent = label; } };
  try{
    await navigator.clipboard.writeText(text);
    restore("✓ Copié !");
  } catch(e){
    try{
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      restore("✓ Copié !");
    } catch(e2){
      alert(text);
    }
  }
}

function renderLesson(){
  const app = document.getElementById('app');
  const lesson = LESSONS[state.currentLessonId];
  const stepIndex = state.currentStep;
  const step = lesson.steps[stepIndex];
  const total = lesson.steps.length;
  const pct = Math.round(((stepIndex+1)/total)*100);
  let body = "";
  if(step.type === "intro") body = stepIntro(lesson.id, stepIndex, step);
  else if(step.type === "concept") body = stepConcept(step);
  else if(step.type === "predict") body = stepMCQ(lesson.id, stepIndex, step);
  else if(step.type === "numeric") body = stepNumeric(lesson.id, stepIndex, step);
  else if(step.type === "pitfall") body = stepPitfall(step);
  else if(step.type === "expert") body = stepExpert(step);
  else if(step.type === "checkpoint") body = stepCheckpoint(step);
  else if(step.type === "validation") body = stepValidation(lesson.id, stepIndex, step);
  else if(step.type === "summary") body = stepSummary(lesson.id, step);
  const showFooter = (step.type !== "checkpoint" && step.type !== "summary");
  app.innerHTML = `
    <div class="lesson-view">
      <div class="lesson-header">
        <button class="back-link" onclick="goToRoadmap()">← Retour au parcours</button>
        <h2>${lesson.title}</h2>

function checkNumeric(lessonId, stepIndex){

  </div>`;

function nextStep(){
  const lesson = LESSONS[state.currentLessonId];
  // sauvegarder les réponses de validation avant de changer d'étape
  const cur = lesson.steps[state.currentStep];
  if(cur.type === 'validation'){
    const ta = document.getElementById(`val-${lesson.id}-${state.currentStep}`);
    if(ta) { state.progress.validationAnswers[lesson.id+'_'+state.currentStep] = ta.value; saveProgress(); }
  }
  if(state.currentStep < lesson.steps.length - 1){
    state.currentStep++; awardXP(6); render();
  } else {
    render();
  }
}
function prevStep(){
  if(state.currentStep > 0){ state.currentStep--; render(); }
}
function finishLesson(lessonId){
  if(!state.progress.completedLessons.includes(lessonId)){
    state.progress.completedLessons.push(lessonId);
    awardXP(60);
    checkModuleCompletion(LESSONS[lessonId].moduleId);
    addLessonToRevisionBank(lessonId);
  }
  saveProgress();
  state.view = "roadmap";
  state.currentLessonId = null; state.currentStep = 0;
  render();
}
function checkModuleCompletion(moduleId){
  const m = MODULES.find(x=>x.id===moduleId);
  const allDone = m.lessonIds.every(l => state.progress.completedLessons.includes(l));
  if(allDone && !state.progress.completedModules.includes(moduleId)){
    state.progress.completedModules.push(moduleId);
    awardXP(200);
  }
}

/* =========================================================
   RÉVISION ESPACÉE (rappel actif)
   ========================================================= */
function getPredictQuestionsForLesson(lessonId){
  const lesson = LESSONS[lessonId];
  if(!lesson) return [];
  const out = [];
  lesson.steps.forEach((step, idx) => {
    if(step.type === 'predict'){
      out.push({ key: lessonId+'_'+idx, lessonId, stepIndex: idx, lessonTitle: lesson.title,
        question: step.question, options: step.options, correctIndex: step.correctIndex, explanation: step.explanation });
    }
  });
  return out;
}
function addLessonToRevisionBank(lessonId){
  const questions = getPredictQuestionsForLesson(lessonId);
  const today = new Date().toISOString().slice(0,10);
  questions.forEach(q => {
    if(!state.progress.revisionBank[q.key]){
      state.progress.revisionBank[q.key] = { interval: 2, nextDue: today, timesCorrect: 0, timesWrong: 0 };
    }
  });
}
function getDueRevisionQuestions(){
  const today = new Date().toISOString().slice(0,10);
  const due = [];
  Object.keys(state.progress.revisionBank).forEach(key => {
    const record = state.progress.revisionBank[key];
    if(record.nextDue <= today){
      const idx = key.lastIndexOf('_');
      const lessonId = key.slice(0, idx);
      const stepIndex = parseInt(key.slice(idx+1), 10);
      const lesson = LESSONS[lessonId];
      const step = lesson && lesson.steps[stepIndex];
      if(step && step.type === 'predict'){
        due.push({ key, lessonId, stepIndex, lessonTitle: lesson.title,
          question: step.question, options: step.options, correctIndex: step.correctIndex, explanation: step.explanation });
      }
    }
  });
  return due;
}
function answerRevisionQuestion(key, chosenIndex){
  const q = state.currentRevisionQueue.find(x => x.key === key);
  const record = state.progress.revisionBank[key];
  const correct = chosenIndex === q.correctIndex;
  if(correct){
    record.timesCorrect++;
    record.interval = Math.min(record.interval * 2, 60);
    awardXP(12);
  } else {
    record.timesWrong++;
    record.interval = 1;
    awardXP(4);
  }
  const nextDate = new Date();
  nextDate.setDate(nextDate.getDate() + record.interval);
  record.nextDue = nextDate.toISOString().slice(0,10);
  saveProgress();

  document.querySelectorAll(`.mcq-option[data-revkey="${key}"]`).forEach((btn,i) => {
    btn.disabled = true;
    if(i === q.correctIndex) btn.classList.add('correct');
    else if(i === chosenIndex) btn.classList.add('incorrect');
  });
  const expl = document.getElementById('revExplanation');
  expl.classList.remove('hidden');
  expl.innerHTML = (correct ? "✓ Exactement. " : "Pas tout à fait. ") + q.explanation + `<div style="margin-top:14px;"><button class="btn-primary" onclick="nextRevisionQuestion()">${state.currentRevisionIndex < state.currentRevisionQueue.length-1 ? 'Question suivante →' : 'Terminer la session →'}</button></div>`;
}
function nextRevisionQuestion(){
  state.currentRevisionIndex++;
  renderRevisionSession();
}
function startRevisionSession(){
  state.currentRevisionQueue = getDueRevisionQuestions().sort(() => Math.random() - 0.5).slice(0, 5);
  state.currentRevisionIndex = 0;
  renderRevisionSession();
}
function renderRevisionSession(){
  const container = document.getElementById('revisionArea');
  if(!container) return;
  const queue = state.currentRevisionQueue;
  const idx = state.currentRevisionIndex;
  if(idx >= queue.length){
    container.innerHTML = `<div class="summary-card"><div class="step-label">Session terminée</div><p>Bien joué — les questions correctement répondues reviendront plus tard, celles ratées reviendront demain.</p><button class="btn-primary" onclick="goTo('dashboard')">Retour au tableau de bord →</button></div>`;
    return;
  }
  const q = queue[idx];
  const opts = q.options.map((o,i) => `<button class="mcq-option" data-revkey="${q.key}" onclick="answerRevisionQuestion('${q.key}',${i})">${o}</button>`).join('');
  container.innerHTML = `
    <div class="predict-card">
      <div class="step-label">Révision — ${escapeHtml(q.lessonTitle)} · Question ${idx+1}/${queue.length}</div>
      <p class="step-question">${q.question}</p>
      <div class="mcq-options">${opts}</div>
      <div class="mcq-explanation hidden" id="revExplanation"></div>
    </div>`;
}
function renderRevisionShell(){
  const dueCount = getDueRevisionQuestions().length;
  const totalTracked = Object.keys(state.progress.revisionBank).length;
  if(dueCount === 0){
    return `<div class="eyebrow">Révision</div><h1>Rien à réviser pour l'instant.</h1>
    <p class="subtitle">${totalTracked === 0 ? "Termine des leçons pour constituer ta banque de révision — chaque question à choix révisée pendant une leçon y sera ajoutée automatiquement." : `${totalTracked} question(s) suivie(s) au total. Reviens quand une prochaine sera due — la révision espacée fonctionne mieux en laissant l'intervalle faire son travail.`}</p>`;
  }
  return `<div class="eyebrow">Révision</div><h1>${dueCount} question(s) prête(s).</h1>
  <p class="subtitle">Rappel actif sur des notions déjà vues — pas une relecture, un vrai test.</p>
  <button class="btn-primary" onclick="startRevisionSession()">Commencer la session →</button>
  <div id="revisionArea" style="margin-top:24px;"></div>`;
}

function renderAnalyzerShell(){
  return `
  <div class="eyebrow">Analyseur de deal</div>
  <h1 style="margin-bottom:8px;">Colle les chiffres, obtiens l'analyse.</h1>
  <p class="subtitle">Calcul instantané et local — rien n'est envoyé nulle part. Renseigne ce que tu as, laisse vide ce que tu ne sais pas encore.</p>
  <div class="onboard-q">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px;">
      <div><label style="font-size:12.5px; color:var(--text-muted); display:block; margin-bottom:5px;">Chiffre d'affaires (€)</label>
        <input type="number" id="an_ca" style="width:100%; box-sizing:border-box; padding:10px 12px; background:var(--ink); border:1px solid var(--ink-border); border-radius:var(--radius-sm); color:var(--text-light); font-family:var(--font-mono);"></div>
      <div><label style="font-size:12.5px; color:var(--text-muted); display:block; margin-bottom:5px;">EBITDA normalisé (€)</label>
        <input type="number" id="an_ebitda" style="width:100%; box-sizing:border-box; padding:10px 12px; background:var(--ink); border:1px solid var(--ink-border); border-radius:var(--radius-sm); color:var(--text-light); font-family:var(--font-mono);"></div>
      <div><label style="font-size:12.5px; color:var(--text-muted); display:block; margin-bottom:5px;">Prix demandé (€)</label>
        <input type="number" id="an_prix" style="width:100%; box-sizing:border-box; padding:10px 12px; background:var(--ink); border:1px solid var(--ink-border); border-radius:var(--radius-sm); color:var(--text-light); font-family:var(--font-mono);"></div>
      <div><label style="font-size:12.5px; color:var(--text-muted); display:block; margin-bottom:5px;">Concentration top 3 clients (%)</label>
        <input type="number" id="an_concentration" style="width:100%; box-sizing:border-box; padding:10px 12px; background:var(--ink); border:1px solid var(--ink-border); border-radius:var(--radius-sm); color:var(--text-light); font-family:var(--font-mono);"></div>
    </div>
    <label style="font-size:12.5px; color:var(--text-muted); display:block; margin-bottom:5px;">Trésorerie excédentaire disponible (€, optionnel)</label>
    <input type="number" id="an_treso" style="width:100%; box-sizing:border-box; padding:10px 12px; background:var(--ink); border:1px solid var(--ink-border); border-radius:var(--radius-sm); color:var(--text-light); font-family:var(--font-mono); margin-bottom:14px;">
    <button class="btn-primary" onclick="runDealAnalysis()">Analyser →</button>
  </div>
  <div id="analyzerResult"></div>
  <div class="section-title">Analyses précédentes</div>
  <div id="analyzerHistory">${renderAnalyzerHistory()}</div>`;
}
function renderAnalyzerHistory(){
  const list = state.progress.dealAnalyses || [];
  if(list.length === 0) return `<p style="color:var(--text-muted); font-size:14px;">Aucune analyse enregistrée pour l'instant.</p>`;
  return list.slice().reverse().slice(0,8).map((a,i) => `
    <div class="module-card" style="margin-bottom:10px;">
      <div><div class="module-card-title" style="font-size:15px;">CA ${fmtEuro(a.ca)} · EBITDA ${fmtEuro(a.ebitda)} · Prix ${fmtEuro(a.prix)}</div>
      <div class="module-card-desc">${new Date(a.date).toLocaleDateString('fr-FR')} · Multiple ${a.multiple.toFixed(2)}x · ${a.redFlags.length} alerte(s)</div></div>
    </div>`).join('');
}
function fmtEuro(n){ return Math.round(n).toLocaleString('fr-FR') + ' €'; }
function runDealAnalysis(){
  const ca = parseFloat(document.getElementById('an_ca').value);
  const ebitda = parseFloat(document.getElementById('an_ebitda').value);
  const prix = parseFloat(document.getElementById('an_prix').value);
  const concentration = parseFloat(document.getElementById('an_concentration').value);
  const tresoExcedentaire = parseFloat(document.getElementById('an_treso').value) || 0;
  const resultBox = document.getElementById('analyzerResult');

  if(isNaN(ca) || isNaN(ebitda) || isNaN(prix) || ebitda <= 0){
    resultBox.innerHTML = `<div class="pitfall-card"><p>Renseigne au moins le CA, l'EBITDA (&gt; 0) et le prix demandé.</p></div>`;
    return;
  }

  const multiple = prix / ebitda;
  const ecartMultiple = multiple - 3;
  const margeEbitda = (ebitda / ca) * 100;

  // Esquisse de montage (Module 7) : prêt d'honneur fixe, crédit-vendeur 25%,
  // dette bancaire plafonnée à 4x EBITDA (ordre de grandeur indicatif)
  const pretHonneur = Math.min(30000, prix);
  const creditVendeur = prix * 0.25;
  const detteBancairePlafond = ebitda * 4;
  const resteAvantBanque = Math.max(0, prix - pretHonneur - creditVendeur - tresoExcedentaire);
  const detteBancaire = Math.min(resteAvantBanque, detteBancairePlafond);
  const ecartResiduel = resteAvantBanque - detteBancaire;

  const redFlags = [];
  if(multiple > 3.3) redFlags.push(`Multiple de ${multiple.toFixed(2)}x, au-dessus de ton objectif de 3x (Module 4). Vérifie le barème sectoriel réel de cette cible avant d'accepter — ou renégocie.`);
  if(margeEbitda < 15) redFlags.push(`Marge EBITDA de ${margeEbitda.toFixed(1)}%, sous ton critère de 15% (Module 1). Vérifie si l'EBITDA a bien été retraité (Module 3) — le vrai chiffre est peut-être différent.`);
  if(!isNaN(concentration)){
    if(concentration > 40) redFlags.push(`Concentration client de ${concentration}% sur le top 3 : risque élevé (Module 1, Module 5). Vérifie en priorité les clauses de changement de contrôle dans leurs contrats.`);
    else if(concentration > 20) redFlags.push(`Concentration client de ${concentration}% : à surveiller sans être rédhibitoire seul — croise avec l'ancienneté et la récurrence contractuelle de ces clients.`);
  }
  if(ebitda < 100000) redFlags.push(`EBITDA sous 100 K€ : les fonds d'investissement désertent ce ticket (Module 4) — moins de compétition institutionnelle, mais vérifie que ta banque suit sur cette taille.`);
  if(ecartResiduel > 1000) redFlags.push(`Le montage esquissé ne boucle pas avec ces seules briques : il manque ${fmtEuro(ecartResiduel)}. À combler via une dette investisseur, un crédit-vendeur plus élevé, ou une renégociation du prix (Module 7).`);
  if(redFlags.length === 0) redFlags.push("Aucune alerte automatique sur ces chiffres — ça ne remplace pas une vraie due diligence (Module 5).");

  resultBox.innerHTML = `
    <div class="concept-card">
      <div class="step-label">Résultat</div>
      <p><strong>Multiple implicite : ${multiple.toFixed(2)}x</strong> l'EBITDA (écart de ${ecartMultiple >= 0 ? '+' : ''}${ecartMultiple.toFixed(2)}x par rapport à ton objectif de 3x). Marge EBITDA : ${margeEbitda.toFixed(1)}% du CA.</p>
      <p><strong>Esquisse de montage sous 30K€ d'apport :</strong></p>
      <ul>
        <li>Prêt d'Honneur (0%) : ${fmtEuro(pretHonneur)}</li>
        <li>Crédit-vendeur (25% indicatif) : ${fmtEuro(creditVendeur)}</li>
        ${tresoExcedentaire > 0 ? `<li>Trésorerie excédentaire mobilisée : ${fmtEuro(tresoExcedentaire)}</li>` : ''}
        <li>Dette bancaire (plafonnée à titre indicatif à 4x EBITDA) : ${fmtEuro(detteBancaire)}</li>
        ${ecartResiduel > 1000 ? `<li style="color:var(--wine-2);">Écart non financé : ${fmtEuro(ecartResiduel)}</li>` : `<li style="color:var(--forest-2);">Montage bouclé avec ces briques.</li>`}
      </ul>
    </div>
    <div class="pitfall-card" style="margin-top:16px;">
      <div class="step-label">⚠ Alertes automatiques</div>
      <ul>${redFlags.map(f => `<li>${f}</li>`).join('')}</ul>
    </div>
    <p style="color:var(--text-muted); font-size:12.5px; margin-top:14px;">Esquisse indicative basée sur des règles simples (Modules 4 et 7) — ne remplace ni un dossier bancaire réel, ni une due diligence (Module 5), ni l'avis de ton expert-comptable.</p>`;

  state.progress.dealAnalyses = state.progress.dealAnalyses || [];
  state.progress.dealAnalyses.push({ date: new Date().toISOString(), ca, ebitda, prix, concentration: isNaN(concentration)?null:concentration, multiple, redFlags });
  saveProgress();
  document.getElementById('analyzerHistory').innerHTML = renderAnalyzerHistory();
}

    box.innerHTML = state.chatHistory.map(m => `<div class="msg ${m.role==='user'?'msg-user':'msg-assistant'}">${escapeHtml(m.content).replace(/\n/g,'<br>')}</div>`).join('');
    if(state.chatBusy){ box.innerHTML += `<div class="msg msg-assistant typing">Le professeur réfléchit…</div>`; }
  }
  box.scrollTop = box.scrollHeight;
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
async function sendChatMessage(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text || state.chatBusy) return;
  state.chatHistory.push({role:'user', content:text});
  input.value = '';
  state.chatBusy = true;
  renderChatMessages();
  saveChat();
  const reply = await callProfessor();
  state.chatBusy = false;
  state.chatHistory.push({role:'assistant', content:reply});
  saveChat();
  renderChatMessages();
}
function buildSystemPrompt(){
  const d = state.progress.diagnostic || {};
  return `Tu incarnes "Le Professeur" de REPRISE. — et ce n'est surtout pas un enseignant académique qui récite des définitions de manuel. Parle comme un repreneur d'expérience qui a vu passer un grand nombre de dossiers de rachat de PME, et qui prend le temps de transmettre non seulement la théorie, mais surtout les erreurs qu'on ne voit qu'après les avoir commises — les siennes et celles des autres. Le ton est celui d'un mentor franc qui te dit ce qui va te mordre si tu n'y fais pas attention, pas celui d'un consultant qui lisse tout pour ne froisser personne.

PROJET DE L'UTILISATEUR (contexte permanent à utiliser) :
- Rachat d'une entreprise en Île-de-France, CA entre 500 K€ et 3 M€.
- Profil ciblé : une "belle endormie" — rentable, stable, sans développement récent, peu digitalisée, sans CRM ni prospection structurée, dépendante d'un portefeuille client historique, marché stable ou en croissance, revenus récurrents, EBITDA > 15%, faible dépendance à quelques clients, avantage concurrentiel difficile à copier ou forte demande locale.
- Objectif de deal : racheter à un multiple inférieur à 3x l'EBITDA, SANS mobiliser sa trésorerie personnelle (financement via trésorerie excédentaire de la cible, crédit-vendeur, dette bancaire, dette investisseur, structuré via une holding d'acquisition).
- Après le rachat, deux objectifs possibles selon la suite : (1) faire croître/structurer/adapter l'entreprise pour la revendre avec plus-value entre 1 et 3 ans, ou (2) développer avec un gérant en place (rythme de suivi : quotidien 0-3 mois, hebdomadaire 3-6 mois, trimestriel ensuite) dans une logique de build-up (portefeuille d'entreprises).
- Diagnostic de l'utilisateur : niveau comptable = ${d.comptes||'inconnu'} ; avancement du projet = ${d.avancement||'inconnu'} ; principale crainte = ${d.peur||'inconnue'}.

TON STYLE PEDAGOGIQUE (à respecter scrupuleusement) :
1. Distingue exposition et exploration : si la question porte sur "comment ça marche en général" (normes établies : mécanique d'un LBO, définition d'un terme, fiscalité standard), donne directement la réponse avec confiance — ne transforme jamais une question factuelle en devinette. Réserve les questions en retour aux cas où tu explores SA situation spécifique (ex: "sur CETTE cible, avec CES chiffres, que ferais-tu ?").
2. Honnêteté radicale : si un point est incertain, débattu, dépend du cas précis, ou risque d'avoir changé (taux d'intérêt, seuils fiscaux, jurisprudence), dis-le clairement et recommande de vérifier avec un expert-comptable ou un avocat M&A plutôt que d'inventer un chiffre précis. Tu peux parler avec le recul d'un praticien de terrain ("c'est l'erreur que je vois revenir neuf fois sur dix chez les repreneurs débutants", "voici ce qui arrive presque systématiquement quand..."), mais n'invente JAMAIS un cas personnel précis et vérifiable (nom d'entreprise, date, lieu) présenté comme un fait que tu aurais réellement vécu — reste sur des schémas généraux et des scénarios illustratifs, jamais une fausse biographie.
3. Si l'utilisateur te soumet une réponse à une question de validation ou un raisonnement qui te semble incomplet ou erroné, ne donne pas immédiatement "la bonne réponse" — pose d'abord une question qui l'aide à creuser son propre raisonnement (sauf s'il dit explicitement être bloqué ou demande la réponse directement).
4. Pas de réponse fleuve : va à l'essentiel, structure en points courts si utile, et propose d'approfondir si besoin plutôt que de tout déverser d'un coup.
5. Toujours au moins un exemple concret et chiffré quand c'est pertinent pour ce type de deal (PME IDF, 500K-3M€ de CA) — et ancre-le si possible dans une scène un peu brute et vécue ("si un cédant te sort cette phrase-là, méfie-toi", "voilà exactement ce qui se passe le jour où tu découvres ça après signature") plutôt qu'une définition froide.
6. Ton chaleureux, direct, jamais condescendant — aucune question n'est "basique". Tu peux être franc jusqu'à la brusquerie sur les erreurs qui coûtent cher, tant que ça reste bienveillant.
7. Termine si pertinent par UNE seule question ou piste d'action, jamais plusieurs à la fois.

Réponds toujours en français.`;
}
async function callProfessor(){
  const systemPrompt = buildSystemPrompt();
  const messages = state.chatHistory.slice(-16).map(m => ({role: m.role, content: m.content}));
  try{
    const { data: sessionData } = await sbClient.auth.getSession();
    if(!sessionData || !sessionData.session){
      return "Ta session a expiré. Recharge la page et reconnecte-toi.";
    }
    const functionUrl = SUPABASE_URL + "/functions/v1/chat-proxy";
    const response = await fetch(functionUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + sessionData.session.access_token
      },
      body: JSON.stringify({ system: systemPrompt, messages: messages })
    });
    const data = await response.json();
    if(data && data.content){
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
      if(text) return text;
    }
    if(data && data.error){
      const msg = typeof data.error === 'string' ? data.error : (data.error.message || JSON.stringify(data.error));
      return "Le professeur a rencontré un problème : " + msg;
    }
    return "Je n'ai pas réussi à formuler une réponse claire cette fois-ci. Peux-tu reformuler ta question ?";
  } catch(e){
    console.error(e);
    return "Je n'arrive pas à joindre le professeur pour le moment — vérifie ta connexion et réessaie dans un instant.";
  }
}

function simpleMarkdownToHtml(md){
  let html = escapeHtml(md);
  html = html.replace(/^### (.*)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.*)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.*)$/gm, '<h2>$1</h2>');
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/(https?:\/\/[^\s<]+)/g, (m) => m.startsWith('href="') ? m : `<a href="${m}" target="_blank" rel="noopener">${m}</a>`);
  html = html.replace(/^- (.*)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, (m) => '<ul>' + m + '</ul>');
  html = html.split(/\n{2,}/).map(p => p.match(/^<(h\d|ul|li)/) ? p : `<p>${p}</p>`).join('\n');
  return html;
}
function renderAgentShell(){
  return `
  <div class="eyebrow">Agent de recherche</div>
  <h1 style="margin-bottom:10px;">Fais-le chercher et proposer.</h1>
  <p class="subtitle">Décris un sujet — l'agent fait jusqu'à 18 recherches web, lit ta progression pour personnaliser, et rédige une proposition de contenu. Il ne publie jamais tout seul : la proposition est enregistrée ici pour relecture. Compte 1 à 3 minutes par recherche, et un coût réel de quelques dizaines de centimes sur ta clé API (recherches + traitement).</p>
  <div class="onboard-q" style="margin-bottom:24px;">
    <textarea id="agentTopic" placeholder="Ex : Recherche les meilleures pratiques actuelles de négociation avec un cédant de PME et propose un plan de module avec templates d'approche." style="width:100%; min-height:80px; box-sizing:border-box; padding:12px 14px; background:var(--ink); border:1px solid var(--ink-border); border-radius:var(--radius-sm); color:var(--text-light); font-size:14.5px; margin-bottom:12px; resize:vertical;"></textarea>
    <button class="btn-primary" id="agentLaunchBtn" onclick="launchAgentResearch()">🔎 Lancer la recherche →</button>
  </div>
  <div id="agentResult"></div>
  <div class="section-title">Propositions précédentes</div>
  <div id="agentHistory"><p style="color:var(--text-muted); font-size:14px;">Chargement...</p></div>`;
}
async function launchAgentResearch(){
  const topic = document.getElementById('agentTopic').value.trim();
  const btn = document.getElementById('agentLaunchBtn');
  const resultBox = document.getElementById('agentResult');
  if(!topic){ resultBox.innerHTML = `<p style="color:var(--wine-2);">Décris d'abord un sujet.</p>`; return; }
  btn.disabled = true; btn.textContent = "Recherche en cours (peut prendre plusieurs minutes)...";
  resultBox.innerHTML = `<div class="predict-card"><p style="color:var(--text-muted);">L'agent recherche et rédige — ne quitte pas cette page. Ça peut prendre jusqu'à 2-3 minutes pour une recherche approfondie.</p></div>`;
  try{
    const { data: sessionData } = await sbClient.auth.getSession();
    if(!sessionData || !sessionData.session){ resultBox.innerHTML = `<p style="color:var(--wine-2);">Session expirée, reconnecte-toi.</p>`; btn.disabled=false; btn.textContent="🔎 Lancer la recherche →"; return; }
    const functionUrl = SUPABASE_URL + "/functions/v1/ai-agent";
    const response = await fetch(functionUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + sessionData.session.access_token },
      body: JSON.stringify({ topic })
    });
    const data = await response.json();
    if(data.error){
      const msg = typeof data.error === 'string' ? data.error : (data.error.message || JSON.stringify(data.error));
      resultBox.innerHTML = `<div class="pitfall-card"><p>Erreur : ${escapeHtml(msg)}</p></div>`;
    } else {
      resultBox.innerHTML = `<div class="concept-card"><div class="step-label">Proposition (${data.searches_used || 0} recherches effectuées)</div>${simpleMarkdownToHtml(data.proposal)}</div>`;
      document.getElementById('agentTopic').value = '';
      loadAgentProposals();
    }
  } catch(e){
    resultBox.innerHTML = `<p style="color:var(--wine-2);">Impossible de joindre l'agent. Vérifie ta connexion et réessaie.</p>`;
  }
  btn.disabled = false; btn.textContent = "🔎 Lancer la recherche →";
}
async function loadAgentProposals(){
  const box = document.getElementById('agentHistory');
  if(!box) return;
  try{
    const { data, error } = await sbClient.from('agent_proposals').select('*').order('created_at', { ascending:false }).limit(10);
    if(error || !data || data.length === 0){ box.innerHTML = `<p style="color:var(--text-muted); font-size:14px;">Aucune proposition pour l'instant.</p>`; return; }
    box.innerHTML = data.map(p => `
      <div class="module-card" style="margin-bottom:10px; cursor:pointer;" onclick="document.getElementById('agentResult').innerHTML = document.getElementById('prop-${p.id}').innerHTML; window.scrollTo(0,0);">
        <div><div class="module-card-title" style="font-size:15px;">${escapeHtml(p.topic)}</div>
        <div class="module-card-desc">${new Date(p.created_at).toLocaleDateString('fr-FR')} · ${p.searches_used||0} recherches · ${p.status}</div></div>
      </div>
      <div id="prop-${p.id}" class="hidden"><div class="concept-card"><div class="step-label">${escapeHtml(p.topic)}</div>${simpleMarkdownToHtml(p.content)}</div></div>
    `).join('');
  } catch(e){
    box.innerHTML = `<p style="color:var(--text-muted); font-size:14px;">Impossible de charger l'historique.</p>`;
  }
}
